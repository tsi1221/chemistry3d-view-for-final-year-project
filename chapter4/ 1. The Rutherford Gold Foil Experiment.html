<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atomic Orbital Lab - up to 4d</title>
<style>
:root{
    --bg:#020617;
    --panel:#0f172a;
    --primary:#38bdf8;
    --accent:#fbbf24;
    --text:#f1f5f9;
    --spin-up:#22c55e;
    --spin-down:#ef4444;
}
body{
    font-family:system-ui,-apple-system,sans-serif;
    background:var(--bg);
    color:var(--text);
    margin:0;
    display:flex;
    justify-content:center;
    padding:20px 10px; /* reduced padding */
}
.lab-wrapper{
    max-width:900px;
    width:100%;
    display:grid;
    grid-template-columns:1fr 300px; /* slightly smaller sidebar */
    gap:15px; /* reduced gap */
}
.main-lab,.card{
    background:var(--panel);
    padding:15px; /* reduced padding */
    border-radius:16px; /* smaller radius */
    border:1px solid rgba(255,255,255,.05);
    box-shadow:0 15px 30px -8px rgba(0,0,0,.5);
}
.shell-stack{
    display:flex;
    flex-direction:column-reverse;
    gap:10px; /* smaller gap */
    padding:10px; /* reduced padding */
    background:rgba(0,0,0,.2);
    border-radius:12px; /* smaller radius */
}
.subshell{
    display:flex;
    align-items:center;
    padding:6px; /* reduced padding */
    border-radius:6px;
}
.subshell:hover{background:rgba(255,255,255,.03)}
.label{
    width:50px;
    font-weight:800;
    color:var(--primary);
    font-family:monospace;
}
.boxes{display:flex;gap:6px} /* smaller gap */
.box{
    width:40px; /* smaller boxes */
    height:40px;
    border:2px solid #334155;
    background:#020617;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
}
.box:hover{border-color:var(--accent)}
.arrow{
    font-size:24px; /* smaller arrows */
    font-weight:bold;
    user-select:none;
}
.up{color:var(--spin-up);margin-right:-8px}
.down{color:var(--spin-down);margin-left:-8px}
.sidebar{display:flex;flex-direction:column;gap:10px}
.config-display{
    font-family:monospace;
    font-size:1rem;
    color:var(--accent);
    word-wrap:break-word;
}
button{
    width:100%;
    padding:8px; /* smaller padding */
    border-radius:6px;
    border:none;
    background:#334155;
    color:white;
    font-weight:bold;
    cursor:pointer;
}
button:hover{background:#475569}
@media(max-width:900px){
    .lab-wrapper{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="lab-wrapper">

<div class="main-lab">
<h2 style="margin-top:0;margin-bottom:10px;color:var(--primary)">Atomic Orbital Stack</h2>
<div class="shell-stack" id="stack"></div>
</div>

<div class="sidebar">

<div class="card">
<h3 style="margin-top:0;margin-bottom:5px">Telemetry</h3>
<label style="font-size:.8rem;color:#94a3b8">ELECTRON COUNT</label>
<div style="font-size:1.5rem;font-weight:800;" id="totalE">0</div>

<label style="font-size:.8rem;color:#94a3b8;margin-top:10px;display:block;">
CONFIGURATION</label>
<div class="config-display" id="configStr">Empty</div>
</div>

<div class="card">
<h3 style="margin-top:0;margin-bottom:5px;font-size:.9rem;">ATOMIC STATUS</h3>
<div id="statusText">Neutral</div>
</div>

<button onclick="resetLab()">Clear All Electrons</button>

</div>
</div>

<script>
const subshells=[
    { id:'1s', size:1 },
    { id:'2s', size:1 },
    { id:'2p', size:3 },
    { id:'3s', size:1 },
    { id:'3p', size:3 },
    { id:'4s', size:1 },
    { id:'3d', size:5 },
    { id:'4p', size:3 },
    { id:'5s', size:1 },
    { id:'4d', size:5 } // stops at 4d
];

let state={};
subshells.forEach(ss=>state[ss.id]=Array(ss.size).fill(0));

function init(){
    const stack=document.getElementById('stack');
    stack.innerHTML='';
    subshells.forEach(ss=>{
        const row=document.createElement('div');
        row.className='subshell';
        const label=document.createElement('div');
        label.className='label';
        label.textContent=ss.id;
        const boxes=document.createElement('div');
        boxes.className='boxes';
        boxes.id=`shell-${ss.id}`;
        row.appendChild(label);
        row.appendChild(boxes);
        stack.appendChild(row);

        for(let i=0;i<ss.size;i++){
            const box=document.createElement('div');
            box.className='box';
            box.onclick=()=>handleBoxClick(ss.id,i);
            boxes.appendChild(box);
        }
    });
    updateUI();
}

function handleBoxClick(shell,index){
    let value=state[shell][index];
    if(value===0){ state[shell][index]=1; }
    else if(value===1){
        const emptyExists=state[shell].some(v=>v===0);
        if(emptyExists){
            alert("Hund's Rule: Fill every orbital once before pairing.");
            return;
        }
        state[shell][index]=2;
    }else{ state[shell][index]=0; }
    updateUI();
}

function updateUI(){
    let total=0;
    let config=[];
    subshells.forEach(ss=>{
        let count=0;
        const boxes=document.getElementById(`shell-${ss.id}`).children;
        state[ss.id].forEach((v,i)=>{
            const box=boxes[i]; box.innerHTML='';
            if(v>=1) box.innerHTML+='<span class="arrow up">↑</span>';
            if(v===2) box.innerHTML+='<span class="arrow down">↓</span>';
            count+=v;
        });
        if(count>0) config.push(`${ss.id}<sup>${count}</sup>`);
        total+=count;
    });
    document.getElementById('totalE').textContent=total;
    document.getElementById('configStr').innerHTML=config.join(' ')||'Empty';
    const status=document.getElementById('statusText');
    if([2,10,18,36,54,86,118].includes(total)){
        status.innerHTML="✨ Noble Gas Configuration (Stable)";
        status.style.color="var(--primary)";
    } else {
        status.innerHTML="Reactive Element";
        status.style.color="white";
    }
}

function resetLab(){
    Object.keys(state).forEach(k=>state[k].fill(0));
    updateUI();
}

init();
</script>

</body>
</html>
