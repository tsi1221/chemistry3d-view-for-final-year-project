<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Photoelectric Lab</title>
    <style>
        :root {
            --bg: #020617;
            --panel: #1e293b;
            --primary: #38bdf8;
            --accent: #fbbf24;
            --text: #f1f5f9;
            --success: #22c55e;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .lab-container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }

        .viewport {
            background: var(--panel);
            padding: 25px;
            border-radius: 24px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        canvas {
            width: 100%;
            height: 500px;
            background: radial-gradient(circle at center, #0f172a 0%, #000 100%);
            border-radius: 12px;
            display: block;
        }

        .sidebar { display: flex; flex-direction: column; gap: 15px; }

        .card {
            background: rgba(30, 41, 59, 0.7);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        h2 { color: var(--primary); margin: 0 0 15px 0; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }
        label { display: block; font-size: 0.75rem; color: #94a3b8; margin-bottom: 8px; font-weight: 600; }

        input[type=range] { width: 100%; accent-color: var(--primary); cursor: pointer; margin-bottom: 20px; }

        .energy-bar-bg { background: #0f172a; height: 10px; border-radius: 5px; margin: 10px 0; overflow: hidden; border: 1px solid #334155; }
        .energy-bar-fill { height: 100%; width: 0%; transition: width 0.3s, background 0.3s; }

        .indicator {
            padding: 12px; border-radius: 8px; text-align: center; font-weight: 800; font-size: 0.8rem; margin-top: 10px;
        }
        .success { background: rgba(34, 197, 94, 0.1); color: var(--success); border: 1px solid var(--success); }
        .fail { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); }

        .keep-note { background: #26272b; border-left: 4px solid var(--accent); padding: 15px; font-size: 0.85rem; }
        .keep-note ul { padding-left: 15px; margin: 5px 0; color: #94a3b8; }
        .keep-note b { color: var(--accent); }

        @media (max-width: 950px) { .lab-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="lab-container">
    <div class="viewport">
        <h2>Quantum Simulation: Photoelectric Effect</h2>
        <canvas id="photoCanvas"></canvas>
    </div>

    <div class="sidebar">
        <div class="card">
            <h2>Source Controls</h2>
            <label>Wavelength: <span id="nmDisp" style="color:var(--primary)">700</span> nm</label>
            <input type="range" id="freq" min="300" max="800" value="700">
            
            <label>Intensity (Photon Count)</label>
            <input type="range" id="intensity" min="1" max="20" value="5">
        </div>

        <div class="card">
            <h2>Energy Analysis</h2>
            <div style="display:flex; justify-content:space-between; font-family:monospace; font-size:0.9rem;">
                <span>Photon Energy:</span>
                <span id="eText">1.77 eV</span>
            </div>
            <div class="energy-bar-bg">
                <div id="energyFill" class="energy-bar-fill"></div>
            </div>
            <div id="statusBox" class="indicator fail">BELOW THRESHOLD</div>
        </div>

        <div class="card keep-note">
            <h2 style="color: var(--accent); margin-bottom: 5px;">Study Notes</h2>
            <ul>
                <li><b>🔴 Red:</b> "Weak" photons. No ejection even at high brightness.</li>
                <li><b>🔵 Violet:</b> "Strong" photons. High Kinetic Energy ($K.E.$).</li>
                <li><b>Threshold:</b> $E_{photon} > \Phi$ (3.5 eV)</li>
            </ul>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('photoCanvas');
    const ctx = canvas.getContext('2d');
    let photons = [], electrons = [], frame = 0;
    const workFunction = 3.5; // eV

    function init() {
        const dpr = window.devicePixelRatio || 1;
        canvas.width = canvas.offsetWidth * dpr;
        canvas.height = canvas.offsetHeight * dpr;
        ctx.scale(dpr, dpr);
        animate();
    }

    function wavelengthToRGB(nm) {
        if (nm < 440) return "#a855f7"; // Violet
        if (nm < 490) return "#3b82f6"; // Blue
        if (nm < 570) return "#22c55e"; // Green
        if (nm < 610) return "#eab308"; // Yellow
        return "#ef4444"; // Red
    }

    function animate() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const nm = parseFloat(document.getElementById('freq').value);
        const intensity = parseFloat(document.getElementById('intensity').value);
        const photonEnergy = 1240 / nm;
        const color = wavelengthToRGB(nm);
        const canEject = photonEnergy > workFunction;

        // UI Updates
        document.getElementById('nmDisp').innerText = nm;
        document.getElementById('eText').innerText = photonEnergy.toFixed(2) + " eV";
        const fill = document.getElementById('energyFill');
        fill.style.width = Math.min(100, (photonEnergy/6)*100) + "%";
        fill.style.background = canEject ? "var(--success)" : "var(--danger)";
        
        const statusBox = document.getElementById('statusBox');
        statusBox.innerText = canEject ? "EJECTION ACTIVE" : "ENERGY TOO LOW";
        statusBox.className = "indicator " + (canEject ? "success" : "fail");

        // Draw Metal (Cathode)
        ctx.fillStyle = '#334155';
        ctx.fillRect(canvas.offsetWidth - 50, 50, 30, canvas.offsetHeight - 100);
        ctx.strokeStyle = canEject ? 'var(--success)' : '#475569';
        ctx.strokeRect(canvas.offsetWidth - 50, 50, 30, canvas.offsetHeight - 100);

        // Spawn Photons
        if (frame % Math.max(1, Math.floor(25 / intensity)) === 0) {
            photons.push({ x: 0, y: 100 + Math.random() * (canvas.offsetHeight - 200), c: color });
        }

        // Draw Photons
        photons.forEach((p, i) => {
            p.x += 7;
            ctx.shadowBlur = 15; ctx.shadowColor = p.c;
            ctx.fillStyle = p.c;
            ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
            
            if (p.x > canvas.offsetWidth - 50) {
                if (canEject) {
                    const speed = (photonEnergy - workFunction) * 5 + 1.5;
                    electrons.push({ x: p.x, y: p.y, v: speed });
                }
                photons.splice(i, 1);
            }
        });

        // Draw Electrons
        ctx.shadowBlur = 0;
        electrons.forEach((e, i) => {
            e.x -= e.v;
            ctx.fillStyle = '#38bdf8';
            ctx.beginPath(); ctx.arc(e.x, e.y, 3, 0, Math.PI*2); ctx.fill();
            if (e.x < 0) electrons.splice(i, 1);
        });

        frame++;
        requestAnimationFrame(animate);
    }

    window.onload = init;
</script>
</body>
</html>
