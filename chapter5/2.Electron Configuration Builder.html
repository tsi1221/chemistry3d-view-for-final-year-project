<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electron Configuration Builder</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --primary: #38bdf8;
            --electron: #fbbf24;
            --text: #f1f5f9;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            width: 95%;
            max-width: 1000px;
        }

        .orbital-stack {
            background: var(--panel);
            padding: 30px;
            border-radius: 20px;
            display: flex;
            flex-direction: column-reverse;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .subshell {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .label { width: 40px; font-weight: bold; color: var(--primary); }

        .slots { display: flex; gap: 10px; }

        .slot {
            width: 60px;
            height: 60px;
            border: 2px dashed #475569;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: rgba(0,0,0,0.2);
            transition: 0.2s;
        }

        .slot.filled { border-style: solid; border-color: var(--primary); }

        .electron {
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
        }

        .up { color: #4ade80; }
        .down { color: #f87171; }

        .sidebar { display: flex; flex-direction: column; gap: 20px; }

        .card {
            background: var(--panel);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .config-out {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.4rem;
            color: var(--electron);
            text-align: center;
            letter-spacing: 2px;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: var(--primary);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }

        button:hover { filter: brightness(1.1); }
        .btn-reset { background: #475569; color: white; }
        
        .error-msg { color: #f87171; font-size: 0.8rem; height: 20px; text-align: center; }
    </style>
</head>
<body>

<h1 style="margin-bottom:10px;">Configuration Builder</h1>

<div class="container">
    <div class="orbital-stack">
        <div class="subshell" data-limit="6" id="2p">
            <div class="label">2p</div>
            <div class="slots">
                <div class="slot" data-index="0"></div>
                <div class="slot" data-index="1"></div>
                <div class="slot" data-index="2"></div>
            </div>
        </div>
        <div class="subshell" data-limit="2" id="2s">
            <div class="label">2s</div>
            <div class="slots">
                <div class="slot" data-index="0"></div>
            </div>
        </div>
        <div class="subshell" data-limit="2" id="1s">
            <div class="label">1s</div>
            <div class="slots">
                <div class="slot" data-index="0"></div>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="card">
            <button onclick="addElectron()">+ Add Electron</button>
            <button class="btn-reset" onclick="resetAll()">Reset</button>
            <div id="error" class="error-msg"></div>
        </div>

        <div class="card">
            <div style="font-size:0.8rem; color:#94a3b8; margin-bottom:10px;">CONFIGURATION</div>
            <div class="config-out" id="output">1s⁰</div>
        </div>

        <div class="card" style="font-size:0.85rem; line-height:1.5; color:#cbd5e1;">
            <b>The Rules:</b>
            <ul style="padding-left:15px; margin-top:5px;">
                <li><b>Aufbau:</b> Fill bottom to top.</li>
                <li><b>Pauli:</b> Max 2 per box (Opposite spins).</li>
                <li><b>Hund:</b> Don't pair in 'p' until boxes have one.</li>
            </ul>
        </div>
    </div>
</div>

<script>
    let electrons = 0;
    const subshells = [
        { id: '1s', limit: 2, count: 0 },
        { id: '2s', limit: 2, count: 0 },
        { id: '2p', limit: 6, count: 0 }
    ];

    function addElectron() {
        const target = subshells.find(s => s.count < s.limit);
        if (!target) {
            document.getElementById('error').innerText = "Atom full for this demo!";
            return;
        }
        
        target.count++;
        electrons++;
        render();
    }

    function resetAll() {
        electrons = 0;
        subshells.forEach(s => s.count = 0);
        document.getElementById('error').innerText = "";
        render();
    }

    function render() {
        subshells.forEach(s => {
            const slots = document.querySelectorAll(`#${s.id} .slot`);
            slots.forEach((slot, idx) => {
                slot.innerHTML = '';
                slot.classList.remove('filled');
                
                // Logic for Hund's rule and Pauli Exclusion
                if (s.id === '2p') {
                    // Fill all ups first
                    if (s.count > idx) {
                        slot.innerHTML += '<span class="electron up">↑</span>';
                        slot.classList.add('filled');
                    }
                    // Then fill downs
                    if (s.count > idx + 3) {
                        slot.innerHTML += '<span class="electron down">↓</span>';
                    }
                } else {
                    // Simple s-orbital logic
                    if (s.count > 0 && idx === 0) {
                        slot.innerHTML += '<span class="electron up">↑</span>';
                        slot.classList.add('filled');
                    }
                    if (s.count > 1 && idx === 0) {
                        slot.innerHTML += '<span class="electron down">↓</span>';
                    }
                }
            });
        });

        // Update Text Output
        const text = subshells
            .filter(s => s.count > 0)
            .map(s => `${s.id}<sup>${s.count}</sup>`)
            .join(' ');
        document.getElementById('output').innerHTML = text || '1s⁰';
    }
</script>
</body>
</html>
