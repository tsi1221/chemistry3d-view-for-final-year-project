<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ionic Brittleness Lab</title>
<style>
:root {
    --bg: #020617;
    --panel: #0f172a;
    --na: #4ade80;
    --cl: #fbbf24;
    --repulse: #ff4d4d;
    --text: #f1f5f9;
}

body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    display: flex;
    height: 100vh;
    overflow: hidden;
}

.sidebar {
    width: 320px;
    background: var(--panel);
    padding: 25px;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.viewport {
    flex-grow: 1;
    position: relative;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    perspective: 800px;
}

#lattice {
    display: grid;
    grid-template-columns: repeat(6, 50px);
    gap: 5px;
    transition: transform 0.5s ease-in-out;
}

.ion {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 1.2rem;
    box-shadow: 0 6px 12px rgba(0,0,0,0.5);
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.4s ease, box-shadow 0.3s ease;
    animation: pulse 1.5s infinite alternate;
}

.na { background: var(--na); color: #064e3b; }
.cl { background: var(--cl); color: #78350f; }

@keyframes pulse {
    0% { transform: scale(1); box-shadow: 0 6px 12px rgba(0,0,0,0.5); }
    100% { transform: scale(1.05); box-shadow: 0 10px 18px rgba(0,0,0,0.7); }
}

.hammer-btn {
    background: #f87171;
    color: white;
    padding: 15px;
    border: none;
    border-radius: 8px;
    font-weight: 800;
    cursor: pointer;
    text-transform: uppercase;
}
.hammer-btn:hover { background: #ef4444; }

.reset-btn {
    background:#334155;
    color:white;
    border:none;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
}

.repulsion-line {
    position: absolute;
    width: 3px;
    background: var(--repulse);
    box-shadow: 0 0 12px var(--repulse);
    opacity: 0;
    transform-origin: top center;
    z-index: 5;
}

.shatter {
    animation: shatterEffect 0.8s forwards;
}

@keyframes shatterEffect {
    0% { transform: translateY(0) rotate(0deg) scale(1); opacity:1; }
    100% { transform: translateY(250px) rotate(25deg) scale(0.5); opacity:0; }
}
</style>
</head>
<body>

<div class="sidebar">
    <h2 style="margin:0;">Brittleness Lab</h2>
    
    <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px;">
        <p style="font-size: 0.85rem; line-height: 1.4;">
            Ionic crystals are held together by <b>alternating charges</b>. 
            <br><br>
            When hit, layers shift. If (+/-) becomes (+/+) or (-/-), the ions <b>repel</b> each other instantly, showing <b>brittleness</b>.
        </p>
    </div>

    <button class="hammer-btn" onclick="strike()">Strike Lattice 🔨</button>
    <button class="reset-btn" onclick="reset()">Reset Crystal</button>

    <div id="status" style="text-align:center; font-weight:bold; color:#f87171; height: 20px;"></div>
</div>

<div class="viewport">
    <div id="lattice"></div>
</div>

<script>
const lattice = document.getElementById('lattice');
const status = document.getElementById('status');
const cols = 6, rows = 6;
let repulsionLines = [];

function init() {
    lattice.innerHTML = '';
    lattice.style.transform = 'rotateX(0deg) rotateY(0deg)';
    status.innerText = '';
    
    // Reset repulsion lines
    repulsionLines.forEach(line => line.remove());
    repulsionLines = [];

    for(let r=0; r<rows; r++){
        for(let c=0; c<cols; c++){
            const ion = document.createElement('div');
            const isNa = (r+c)%2===0;
            ion.className = `ion ${isNa ? 'na':'cl'}`;
            ion.id = `ion-${r}-${c}`;
            ion.innerText = isNa ? '+' : '-';
            lattice.appendChild(ion);
        }
    }
}

function strike(){
    status.innerText = "LAYER SHIFTED!";
    lattice.style.transform = "rotateX(10deg) rotateY(15deg)";

    setTimeout(()=>{
        status.innerText = "REPULSION SHATTER!";
        // Shatter top half of lattice
        for(let r=0; r<3; r++){
            for(let c=0; c<cols; c++){
                const ion = document.getElementById(`ion-${r}-${c}`);
                ion.classList.add('shatter');

                // Create repulsion line
                const line = document.createElement('div');
                line.className = 'repulsion-line';
                document.querySelector('.viewport').appendChild(line);
                const rect = ion.getBoundingClientRect();
                line.style.left = rect.left + rect.width/2 + 'px';
                line.style.top = rect.top + rect.height/2 + 'px';
                line.style.height = Math.random()*100 + 50 + 'px';
                line.style.transform = `rotate(${Math.random()*360}deg)`;
                line.style.opacity = 1;
                repulsionLines.push(line);

                setTimeout(()=> line.remove(), 800);
            }
        }
    }, 500);
}

function reset(){
    init();
    lattice.style.transform = "rotateX(0deg) rotateY(0deg)";
}

init();
</script>

</body>
</html>
