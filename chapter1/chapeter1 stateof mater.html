<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D States of Matter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000011;
            font-family: 'Segoe UI', sans-serif;
        }

        #container {
            position: fixed;
            width: 100vw;
            height: 100vh;
            top: 0;
            left: 0;
        }

        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 20px;
            align-items: center;
            min-width: 400px;
        }

        .temp-slider {
            flex: 1;
            -webkit-appearance: none;
            height: 8px;
            background: linear-gradient(90deg, #1e3c72, #2a5298, #3498db, #85c1e9);
            border-radius: 4px;
            outline: none;
        }

        .temp-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            border: 2px solid #3498db;
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.8);
        }

        .temp-label {
            color: white;
            font-size: 16px;
            font-weight: bold;
            min-width: 60px;
            text-align: center;
        }

        #phaseIndicator {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            color: white;
            font-size: 24px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px 30px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            letter-spacing: 2px;
        }

        .state-indicator {
            position: absolute;
            top: 30px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 30px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 2px solid;
        }

        #solidIndicator {
            left: 30px;
            border-color: #4a6fa5;
        }

        #liquidIndicator {
            left: 50%;
            transform: translateX(-50%);
            border-color: #166088;
        }

        #gasIndicator {
            right: 30px;
            border-color: #17a2b8;
        }

        .transition-btn {
            background: rgba(52, 152, 219, 0.3);
            border: 2px solid #3498db;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }

        .transition-btn:hover {
            background: rgba(52, 152, 219, 0.5);
            transform: scale(1.05);
        }

        #info {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-align: center;
            max-width: 400px;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #cameraControls {
            position: absolute;
            bottom: 30px;
            right: 30px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .camera-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
        }

        .camera-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div id="container"></div>
    
    <div id="phaseIndicator">SOLID STATE</div>
    
    <div id="solidIndicator" class="state-indicator">SOLID</div>
    <div id="liquidIndicator" class="state-indicator">LIQUID</div>
    <div id="gasIndicator" class="state-indicator">GAS</div>
    
    <div id="controls">
        <button id="meltBtn" class="transition-btn">MELT</button>
        <div style="flex: 1; display: flex; flex-direction: column; gap: 10px;">
            <input type="range" min="0" max="100" value="0" class="temp-slider" id="tempSlider">
            <div style="display: flex; justify-content: space-between; color: white; font-size: 12px;">
                <span>COLD</span>
                <span>HEAT</span>
            </div>
        </div>
        <button id="freezeBtn" class="transition-btn">FREEZE</button>
    </div>
    
    <div id="info">Drag to rotate • Scroll to zoom • Use temperature slider to change states</div>
    
    <div id="cameraControls">
        <button id="resetCamera" class="camera-btn">⟳</button>
        <button id="topView" class="camera-btn">↑</button>
        <button id="frontView" class="camera-btn">→</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.min.js"></script>
    
    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000011);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 20);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('container').appendChild(renderer.domElement);
        
        // Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 10);
        directionalLight.castShadow = true;
        scene.add(directionalLight);
        
        const pointLight = new THREE.PointLight(0x3498db, 0.5, 100);
        pointLight.position.set(0, 10, 0);
        scene.add(pointLight);
        
        // Create three transparent containers
        const containerMaterial = new THREE.MeshPhysicalMaterial({
            color: 0xaaaaaa,
            transmission: 0.9,
            roughness: 0.1,
            thickness: 0.5,
            opacity: 0.3,
            transparent: true,
            side: THREE.DoubleSide
        });
        
        // Solid container (left)
        const solidContainer = new THREE.Mesh(
            new THREE.BoxGeometry(4, 4, 4),
            containerMaterial
        );
        solidContainer.position.set(-8, 2, 0);
        solidContainer.castShadow = true;
        scene.add(solidContainer);
        
        // Liquid container (center)
        const liquidContainer = new THREE.Mesh(
            new THREE.BoxGeometry(4, 4, 4),
            containerMaterial
        );
        liquidContainer.position.set(0, 2, 0);
        liquidContainer.castShadow = true;
        scene.add(liquidContainer);
        
        // Gas container (right)
        const gasContainer = new THREE.Mesh(
            new THREE.BoxGeometry(4, 4, 4),
            containerMaterial
        );
        gasContainer.position.set(8, 2, 0);
        gasContainer.castShadow = true;
        scene.add(gasContainer);
        
        // Add container frames for better visibility
        const frameMaterial = new THREE.MeshBasicMaterial({ 
            color: 0xffffff, 
            transparent: true, 
            opacity: 0.5 
        });
        
        function addFrame(container) {
            const edges = new THREE.EdgesGeometry(container.geometry);
            const line = new THREE.LineSegments(edges, frameMaterial);
            container.add(line.clone());
        }
        
        addFrame(solidContainer);
        addFrame(liquidContainer);
        addFrame(gasContainer);
        
        // Create particles
        const particleCount = 150;
        const particles = {
            solid: [],
            liquid: [],
            gas: []
        };
        
        // Particle materials
        const solidMaterial = new THREE.MeshPhongMaterial({ 
            color: 0x4a6fa5,
            shininess: 100 
        });
        
        const liquidMaterial = new THREE.MeshPhongMaterial({ 
            color: 0x166088,
            shininess: 100 
        });
        
        const gasMaterial = new THREE.MeshPhongMaterial({ 
            color: 0x17a2b8,
            shininess: 100 
        });
        
        // Create particle spheres
        function createParticle(material, size) {
            const geometry = new THREE.SphereGeometry(size, 16, 16);
            return new THREE.Mesh(geometry, material);
        }
        
        // Initialize solid particles (tightly packed lattice)
        const solidSpacing = 0.6;
        const solidGrid = 5; // 5x5x5 grid
        for (let x = 0; x < solidGrid; x++) {
            for (let y = 0; y < solidGrid; y++) {
                for (let z = 0; z < solidGrid; z++) {
                    const particle = createParticle(solidMaterial, 0.2);
                    particle.position.set(
                        (x - solidGrid/2) * solidSpacing,
                        (y - solidGrid/2) * solidSpacing,
                        (z - solidGrid/2) * solidSpacing
                    );
                    particle.userData = {
                        basePosition: particle.position.clone(),
                        vibration: new THREE.Vector3(
                            Math.random() * 0.1,
                            Math.random() * 0.1,
                            Math.random() * 0.1
                        )
                    };
                    solidContainer.add(particle);
                    particles.solid.push(particle);
                }
            }
        }
        
        // Initialize liquid particles (random but close)
        for (let i = 0; i < particleCount; i++) {
            const particle = createParticle(liquidMaterial, 0.18);
            particle.position.set(
                (Math.random() - 0.5) * 3,
                (Math.random() - 0.5) * 3,
                (Math.random() - 0.5) * 3
            );
            particle.userData = {
                velocity: new THREE.Vector3(
                    (Math.random() - 0.5) * 0.02,
                    (Math.random() - 0.5) * 0.02,
                    (Math.random() - 0.5) * 0.02
                )
            };
            liquidContainer.add(particle);
            particles.liquid.push(particle);
        }
        
        // Initialize gas particles (sparse and fast)
        for (let i = 0; i < particleCount; i++) {
            const particle = createParticle(gasMaterial, 0.15);
            particle.position.set(
                (Math.random() - 0.5) * 3.5,
                (Math.random() - 0.5) * 3.5,
                (Math.random() - 0.5) * 3.5
            );
            particle.userData = {
                velocity: new THREE.Vector3(
                    (Math.random() - 0.5) * 0.1,
                    (Math.random() - 0.5) * 0.1,
                    (Math.random() - 0.5) * 0.1
                )
            };
            gasContainer.add(particle);
            particles.gas.push(particle);
        }
        
        // Animation variables
        let time = 0;
        let temperature = 0;
        let currentState = 'solid';
        let isTransitioning = false;
        let transitionProgress = 0;
        
        // Temperature slider
        const tempSlider = document.getElementById('tempSlider');
        const phaseIndicator = document.getElementById('phaseIndicator');
        const meltBtn = document.getElementById('meltBtn');
        const freezeBtn = document.getElementById('freezeBtn');
        
        tempSlider.addEventListener('input', function() {
            temperature = parseInt(this.value);
            updateStateFromTemperature();
        });
        
        meltBtn.addEventListener('click', function() {
            temperature = Math.min(100, temperature + 40);
            tempSlider.value = temperature;
            updateStateFromTemperature();
        });
        
        freezeBtn.addEventListener('click', function() {
            temperature = Math.max(0, temperature - 40);
            tempSlider.value = temperature;
            updateStateFromTemperature();
        });
        
        function updateStateFromTemperature() {
            let newState;
            if (temperature < 33) {
                newState = 'solid';
            } else if (temperature < 66) {
                newState = 'liquid';
            } else {
                newState = 'gas';
            }
            
            if (newState !== currentState) {
                currentState = newState;
                updatePhaseIndicator();
            }
        }
        
        function updatePhaseIndicator() {
            const texts = {
                solid: 'SOLID STATE',
                liquid: 'LIQUID STATE', 
                gas: 'GAS STATE'
            };
            phaseIndicator.textContent = texts[currentState];
            
            const colors = {
                solid: '#4a6fa5',
                liquid: '#166088',
                gas: '#17a2b8'
            };
            phaseIndicator.style.textShadow = `0 0 20px ${colors[currentState]}`;
        }
        
        // Camera controls
        document.getElementById('resetCamera').addEventListener('click', function() {
            camera.position.set(0, 10, 20);
            controls.target.set(0, 0, 0);
        });
        
        document.getElementById('topView').addEventListener('click', function() {
            camera.position.set(0, 20, 0);
            controls.target.set(0, 0, 0);
        });
        
        document.getElementById('frontView').addEventListener('click', function() {
            camera.position.set(0, 5, 20);
            controls.target.set(0, 0, 0);
        });
        
        // Add floor
        const floorGeometry = new THREE.PlaneGeometry(50, 50);
        const floorMaterial = new THREE.MeshPhongMaterial({ 
            color: 0x111122,
            side: THREE.DoubleSide 
        });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = Math.PI / 2;
        floor.position.y = -2;
        floor.receiveShadow = true;
        scene.add(floor);
        
        // Add subtle background particles
        const starGeometry = new THREE.SphereGeometry(0.1, 8, 8);
        const starMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 });
        
        for (let i = 0; i < 50; i++) {
            const star = new THREE.Mesh(starGeometry, starMaterial);
            star.position.set(
                (Math.random() - 0.5) * 100,
                (Math.random() - 0.5) * 50 + 10,
                (Math.random() - 0.5) * 100 - 20
            );
            scene.add(star);
        }
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;
            
            // Animate solid particles (vibration)
            particles.solid.forEach(particle => {
                const vib = particle.userData.vibration;
                const base = particle.userData.basePosition;
                particle.position.set(
                    base.x + Math.sin(time * 2 + vib.x) * 0.05,
                    base.y + Math.sin(time * 3 + vib.y) * 0.05,
                    base.z + Math.sin(time * 4 + vib.z) * 0.05
                );
            });
            
            // Animate liquid particles (flowing motion)
            particles.liquid.forEach(particle => {
                const vel = particle.userData.velocity;
                
                // Update position
                particle.position.x += vel.x;
                particle.position.y += vel.y;
                particle.position.z += vel.z;
                
                // Boundary collision
                const limit = 1.8;
                if (Math.abs(particle.position.x) > limit) vel.x *= -1;
                if (Math.abs(particle.position.y) > limit) vel.y *= -1;
                if (Math.abs(particle.position.z) > limit) vel.z *= -1;
                
                // Add some turbulence
                vel.x += (Math.random() - 0.5) * 0.001;
                vel.y += (Math.random() - 0.5) * 0.001;
                vel.z += (Math.random() - 0.5) * 0.001;
                
                // Dampen velocity
                vel.multiplyScalar(0.99);
            });
            
            // Animate gas particles (fast random motion)
            particles.gas.forEach(particle => {
                const vel = particle.userData.velocity;
                
                // Update position
                particle.position.x += vel.x;
                particle.position.y += vel.y;
                particle.position.z += vel.z;
                
                // Boundary collision with more energy
                const limit = 1.9;
                if (Math.abs(particle.position.x) > limit) {
                    vel.x *= -1;
                    vel.x += (Math.random() - 0.5) * 0.02;
                }
                if (Math.abs(particle.position.y) > limit) {
                    vel.y *= -1;
                    vel.y += (Math.random() - 0.5) * 0.02;
                }
                if (Math.abs(particle.position.z) > limit) {
                    vel.z *= -1;
                    vel.z += (Math.random() - 0.5) * 0.02;
                }
                
                // Random velocity changes
                vel.x += (Math.random() - 0.5) * 0.003;
                vel.y += (Math.random() - 0.5) * 0.003;
                vel.z += (Math.random() - 0.5) * 0.003;
                
                // Limit maximum speed
                vel.clampLength(0, 0.15);
            });
            
            // Animate point light
            pointLight.position.y = 10 + Math.sin(time) * 2;
            
            // Update controls
            controls.update();
            
            // Render
            renderer.render(scene, camera);
        }
        
        // Handle window resize
        window.addEventListener('resize', function() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Start animation
        animate();
        updatePhaseIndicator();
    </script>
</body>
</html>
