<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interactive Young Modulus Lab</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --panel: #ffffff;
            --primary: #4f46e5;
            --secondary: #10b981;
            --accent: #ef4444;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 1rem 2rem;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            flex: 1;
            gap: 1rem;
            padding: 1rem;
        }

        .canvas-container {
            position: relative;
            background: var(--panel);
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
        }

        .ui-overlay {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: rgba(255, 255, 255, 0.9);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            pointer-events: none;
            backdrop-filter: blur(4px);
        }

        .controls-footer {
            padding: 1rem 2rem;
            background: var(--panel);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2rem;
        }

        .control-item {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:active { opacity: 0.8; }

        label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
        }

        .instruction {
            position: absolute;
            bottom: 1rem;
            width: 100%;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-light);
            pointer-events: none;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        @media (max-width: 850px) {
            .main-layout { grid-template-columns: 1fr; }
            .header h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Young Modulus & Hooke's Law</h1>
    <p style="font-size: 0.9rem; color: var(--text-light)">$Y = \frac{\text{Stress}}{\text{Strain}} = \frac{F/A}{\Delta L/L}$</p>
</div>

<div class="main-layout">
    <div class="canvas-container" id="physContainer">
        <div class="ui-overlay">
            <div style="font-weight: bold; color: var(--primary)">MATERIAL SIMULATION</div>
            <div id="data-f">Force: 0 N</div>
            <div id="data-dl">$\Delta L$: 0.00 m</div>
        </div>
        <canvas id="physCanvas"></canvas>
        <div class="instruction">DRAG THE END OF THE ROD TO DEFORM</div>
    </div>

    <div class="canvas-container" id="graphContainer">
        <div class="ui-overlay">
            <div style="font-weight: bold; color: var(--secondary)">STRESS-STRAIN CURVE</div>
            <div id="data-y">Y (Modulus): 200 GPa</div>
        </div>
        <canvas id="graphCanvas"></canvas>
    </div>
</div>

<div class="controls-footer">
    <div class="control-item">
        <label>Material Type</label>
        <select id="materialSelect" style="padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border)">
            <option value="200">Steel (200 GPa)</option>
            <option value="70">Aluminum (70 GPa)</option>
            <option value="117">Copper (117 GPa)</option>
            <option value="0.1">Rubber (0.1 GPa)</option>
        </select>
    </div>
    <button class="btn" id="resetBtn">Reset View</button>
</div>

<script>
    const physCanvas = document.getElementById('physCanvas');
    const graphCanvas = document.getElementById('graphCanvas');
    const pCtx = physCanvas.getContext('2d');
    const gCtx = graphCanvas.getContext('2d');

    const materialSelect = document.getElementById('materialSelect');
    const resetBtn = document.getElementById('resetBtn');

    let width, height;
    let isDragging = false;
    let modulus = 200; // Y in GPa
    let appliedForce = 0;
    let targetForce = 0;

    // Physical dimensions
    const rodBaseX = 100;
    const rodL0 = 250;
    const rodThickness = 40;

    function init() {
        resize();
        window.addEventListener('resize', resize);
        
        physCanvas.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', drag);
        window.addEventListener('mouseup', endDrag);

        physCanvas.addEventListener('touchstart', e => startDrag(e.touches[0]), {passive: false});
        window.addEventListener('touchmove', e => drag(e.touches[0]), {passive: false});
        window.addEventListener('touchend', endDrag);

        materialSelect.onchange = (e) => {
            modulus = parseFloat(e.target.value);
            targetForce = 0;
        };
        resetBtn.onclick = () => targetForce = 0;

        animate();
    }

    function resize() {
        width = physCanvas.parentElement.clientWidth;
        height = physCanvas.parentElement.clientHeight;
        
        physCanvas.width = width;
        physCanvas.height = height;
        graphCanvas.width = width;
        graphCanvas.height = height;
    }

    function startDrag(e) {
        const rect = physCanvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        
        // Check if clicking near the end of the rod
        const rodEndX = rodBaseX + rodL0 + (appliedForce / modulus) * 10;
        if (Math.abs(mx - rodEndX) < 50 && Math.abs(my - height/2) < 60) {
            isDragging = true;
        }
    }

    function drag(e) {
        if (!isDragging) return;
        const rect = physCanvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        
        // Calculate force based on mouse displacement relative to L0
        // ΔL = F * L0 / (A * Y) -> F = (ΔL * A * Y) / L0
        const dl = mx - (rodBaseX + rodL0);
        targetForce = dl * modulus * 0.5; // Scale for visual feel
    }

    function endDrag() {
        isDragging = false;
    }

    function drawArrow(ctx, x, y, length, color) {
        if (Math.abs(length) < 5) return;
        ctx.save();
        ctx.translate(x, y);
        ctx.strokeStyle = color;
        ctx.fillStyle = color;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(length, 0);
        ctx.stroke();
        
        // Head
        const head = length > 0 ? 10 : -10;
        ctx.beginPath();
        ctx.moveTo(length, 0);
        ctx.lineTo(length - head, -5);
        ctx.lineTo(length - head, 5);
        ctx.fill();
        ctx.restore();
    }

    function update() {
        // Smooth transition for force
        appliedForce += (targetForce - appliedForce) * 0.2;
        
        const dl = (appliedForce / modulus) * 10; 
        document.getElementById('data-f').innerText = `Force: ${Math.round(appliedForce)} N`;
        document.getElementById('data-dl').innerText = `ΔL: ${(dl/100).toFixed(2)} m`;
        document.getElementById('data-y').innerText = `Y (Modulus): ${modulus} GPa`;
    }

    function drawPhysics() {
        pCtx.clearRect(0, 0, width, height);
        const cy = height / 2;
        const dl = (appliedForce / modulus) * 10;
        const currentL = rodL0 + dl;

        // Wall
        pCtx.fillStyle = '#334155';
        pCtx.fillRect(rodBaseX - 20, cy - 80, 20, 160);

        // Reference Line (L0)
        pCtx.setLineDash([5, 5]);
        pCtx.strokeStyle = '#cbd5e1';
        pCtx.beginPath();
        pCtx.moveTo(rodBaseX + rodL0, cy - 100);
        pCtx.lineTo(rodBaseX + rodL0, cy + 100);
        pCtx.stroke();
        pCtx.setLineDash([]);

        // Rod
        const grad = pCtx.createLinearGradient(rodBaseX, 0, rodBaseX + currentL -50, 0);
        grad.addColorStop(0, '#4f46e5');
        grad.addColorStop(1, '#818cf8');
        pCtx.fillStyle = grad;
        
        // Poisson effect (thinning/thickening)
        const currentT = rodThickness / (1 + (dl/rodL0) * 0.5);
        pCtx.beginPath();
        pCtx.roundRect(rodBaseX, cy - currentT/2, currentL, currentT, 4);
        pCtx.fill();

        // Interaction point
        pCtx.fillStyle = isDragging ? '#10b981' : '#4f46e5';
        pCtx.beginPath();
        pCtx.arc(rodBaseX + currentL, cy, 10, 0, Math.PI*2);
        pCtx.fill();
        pCtx.strokeStyle = 'white';
        pCtx.lineWidth = 2;
        pCtx.stroke();

        // Force Arrows
        const fColor = appliedForce >= 0 ? '#10b981' : '#ef4444';
        drawArrow(pCtx, rodBaseX + currentL + 20, cy, appliedForce * 0.5, fColor);
    }

    function drawGraph() {
        gCtx.clearRect(0, 0, width, height);
        const pad = 60;
        const oX = pad;
        const oY = height / 2;
        const gW = width - pad * 2;
        const gH = height - pad * 2;

        // Axes
        gCtx.strokeStyle = '#1e293b';
        gCtx.lineWidth = 2;
        gCtx.beginPath();
        gCtx.moveTo(oX, pad);
        gCtx.lineTo(oX, height - pad);
        gCtx.moveTo(oX, oY);
        gCtx.lineTo(width - pad, oY);
        gCtx.stroke();

        // Labels
        gCtx.fillStyle = '#64748b';
        gCtx.font = 'bold 12px sans-serif';
        gCtx.fillText('STRAIN (ε)', width - pad - 10, oY + 20);
        gCtx.save();
        gCtx.translate(oX - 35, pad + 20);
        gCtx.rotate(-Math.PI/2);
        gCtx.fillText('STRESS (σ)', 0, 0);
        gCtx.restore();

        // Current Line
        const strain = (appliedForce / modulus) * 0.1;
        const stress = (appliedForce) * 0.1;
        
        const px = oX + (appliedForce / modulus) * (gW/20);
        const py = oY - (appliedForce * (gH / 800));

        // Theoretical slope line
        gCtx.strokeStyle = '#e2e8f0';
        gCtx.lineWidth = 1;
        gCtx.beginPath();
        gCtx.moveTo(oX, oY);
        gCtx.lineTo(oX + 300, oY - (300 * (modulus/200)));
        gCtx.stroke();

        // Plot
        gCtx.strokeStyle = '#4f46e5';
        gCtx.lineWidth = 3;
        gCtx.beginPath();
        gCtx.moveTo(oX, oY);
        gCtx.lineTo(px, py);
        gCtx.stroke();

        gCtx.fillStyle = '#ef4444';
        gCtx.beginPath();
        gCtx.arc(px, py, 5, 0, Math.PI*2);
        gCtx.fill();
    }

    function animate() {
        update();
        drawPhysics();
        drawGraph();
        requestAnimationFrame(animate);
    }

    init();
</script>
</body>
</html>
