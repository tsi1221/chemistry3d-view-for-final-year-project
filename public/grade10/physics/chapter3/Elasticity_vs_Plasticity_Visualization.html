<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elasticity vs Plasticity Visualization</title>
    <style>
        :root {
            --bg: #f0f4f8;
            --card: #ffffff;
            --primary: #3b82f6;
            --accent: #ef4444;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            text-align: center;
            padding: 1rem;
        }

        #canvas-container {
            position: relative;
            width: 90vw;
            max-width: 800px;
            height: 400px;
            background: var(--card);
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border);
            cursor: crosshair;
        }

        canvas {
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        .ui-panel {
            margin-top: 1.5rem;
            display: flex;
            gap: 20px;
            background: var(--card);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        label {
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #64748b;
        }

        .stats {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
        }

        .stat-item {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .indicator {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: white;
            display: inline-block;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.9; }

        .instructions {
            position: absolute;
            bottom: 10px;
            right: 15px;
            font-size: 0.75rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Elasticity & Plasticity</h1>
        <p>Drag the handle to apply a deforming force.</p>
    </div>

    <div id="canvas-container">
        <div class="stats">
            <div id="state-tag" class="indicator" style="background: #10b981;">ELASTIC REGION</div>
            <div class="stat-item">Force: <span id="force-val">0</span> N</div>
            <div class="stat-item">Deformation: <span id="def-val">0</span>%</div>
        </div>
        <canvas id="vizCanvas"></canvas>
        <div class="instructions">Push/Pull the blue handle to deform the material</div>
    </div>

    <div class="ui-panel">
        <div class="control-group">
            <label>Elastic Limit</label>
            <input type="range" id="limitSlider" min="50" max="250" value="150">
        </div>
        <div class="control-group">
            <label>Material Type</label>
            <select id="preset" style="padding: 5px;">
                <option value="steel">Steel (High Elasticity)</option>
                <option value="rubber">Rubber (High Ductility)</option>
                <option value="clay">Putty/Clay (Low Elasticity)</option>
            </select>
        </div>
        <button class="btn" id="resetBtn">Reset Material</button>
    </div>

    <script>
        const canvas = document.getElementById('vizCanvas');
        const ctx = canvas.getContext('2d');
        const forceLabel = document.getElementById('force-val');
        const defLabel = document.getElementById('def-val');
        const stateTag = document.getElementById('state-tag');
        const limitSlider = document.getElementById('limitSlider');
        const presetSelect = document.getElementById('preset');
        const resetBtn = document.getElementById('resetBtn');

        let width, height;
        let isDragging = false;
        
        // Material Properties
        const originalX = 150;
        let currentX = originalX;
        let restX = originalX; // The "natural" length the material wants to return to
        let elasticLimit = 150; // Distance from restX
        let k = 0.15; // Stiffness
        
        function init() {
            resize();
            window.addEventListener('resize', resize);
            
            canvas.addEventListener('mousedown', startDrag);
            canvas.addEventListener('mousemove', drag);
            window.addEventListener('mouseup', endDrag);
            
            canvas.addEventListener('touchstart', (e) => startDrag(e.touches[0]));
            canvas.addEventListener('touchmove', (e) => drag(e.touches[0]));
            window.addEventListener('touchend', endDrag);

            resetBtn.addEventListener('click', resetMaterial);
            limitSlider.addEventListener('input', (e) => elasticLimit = parseInt(e.target.value));
            presetSelect.addEventListener('change', applyPreset);

            animate();
        }

        function resize() {
            width = canvas.clientWidth;
            height = canvas.clientHeight;
            canvas.width = width;
            canvas.height = height;
        }

        function applyPreset() {
            resetMaterial();
            const val = presetSelect.value;
            if (val === 'steel') { k = 0.3; elasticLimit = 80; }
            else if (val === 'rubber') { k = 0.05; elasticLimit = 250; }
            else if (val === 'clay') { k = 0.5; elasticLimit = 10; }
            limitSlider.value = elasticLimit;
        }

        function resetMaterial() {
            restX = originalX;
            currentX = originalX;
        }

        function startDrag(e) {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            // Check if clicking near handle
            if (Math.abs(x - currentX) < 40) {
                isDragging = true;
            }
        }

        function drag(e) {
            if (!isDragging) return;
            const rect = canvas.getBoundingClientRect();
            currentX = Math.max(50, Math.min(width - 50, e.clientX - rect.left));
            
            // Logic for Plasticity
            const deformation = Math.abs(currentX - restX);
            if (deformation > elasticLimit) {
                // If we exceed limit, the "rest position" starts to shift (permanent deformation)
                const drift = (deformation - elasticLimit) * 0.5;
                if (currentX > restX) restX += drift;
                else restX -= drift;
            }
        }

        function endDrag() {
            isDragging = false;
        }

        function update() {
            if (!isDragging) {
                // Spring physics to return to restX
                const force = (restX - currentX) * k;
                currentX += force;
            }

            // Update UI
            const totalDeformation = Math.abs(currentX - originalX);
            const currentStretch = Math.abs(currentX - restX);
            const force = (currentStretch * k).toFixed(1);
            
            forceLabel.innerText = force;
            defLabel.innerText = ((totalDeformation / originalX) * 100).toFixed(0);

            if (currentStretch > elasticLimit - 2) {
                stateTag.innerText = "PLASTIC REGION (PERMANENT)";
                stateTag.style.background = "#ef4444";
            } else {
                stateTag.innerText = "ELASTIC REGION";
                stateTag.style.background = "#10b981";
            }
        }

        function drawSpring(xStart, xEnd, y, coils) {
            ctx.beginPath();
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#94a3b8';
            ctx.moveTo(xStart, y);
            
            const dist = xEnd - xStart;
            for (let i = 0; i < coils; i++) {
                const x = xStart + (dist / coils) * i;
                const nextX = xStart + (dist / coils) * (i + 1);
                ctx.bezierCurveTo(x, y - 30, nextX, y + 30, nextX, y);
            }
            ctx.stroke();
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            const centerY = height / 2;

            // Draw Wall
            ctx.fillStyle = '#1e293b';
            ctx.fillRect(0, centerY - 60, 20, 120);

            // Draw Material Body (Visualizing the internal structure)
            const color = isDragging ? '#3b82f6' : '#64748b';
            
            // Draw "Spring" or "Wire"
            drawSpring(20, currentX, centerY, 15);

            // Draw Handle
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.roundRect(currentX - 10, centerY - 40, 20, 80, 5);
            ctx.fill();

            // Draw original position marker
            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = '#cbd5e1';
            ctx.beginPath();
            ctx.moveTo(originalX, centerY - 80);
            ctx.lineTo(originalX, centerY + 80);
            ctx.stroke();
            ctx.setLineDash([]);

            // Draw Rest Position (where it will return to)
            if (restX !== originalX) {
                ctx.strokeStyle = '#ef4444';
                ctx.beginPath();
                ctx.moveTo(restX, centerY - 50);
                ctx.lineTo(restX, centerY + 50);
                ctx.stroke();
                
                ctx.fillStyle = '#ef4444';
                ctx.font = '10px sans-serif';
                ctx.fillText('NEW REST SHAPE', restX + 5, centerY - 55);
            }
        }

        function animate() {
            update();
            draw();
            requestAnimationFrame(animate);
        }

        init();
    </script>
</body>
</html>
