<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Static Equilibrium Lab</title>
    <style>
        :root {
            --bg: #f1f5f9;
            --surface: #ffffff;
            --primary: #3b82f6;
            --secondary: #10b981;
            --accent: #f59e0b;
            --danger: #ef4444;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; touch-action: none; }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 1rem;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .main-layout {
            flex: 1;
            position: relative;
            background: var(--surface);
            margin: 10px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            overflow: hidden;
        }

        canvas { width: 100%; height: 100%; display: block; }

        .ui-panel {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            min-width: 200px;
            pointer-events: none;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .status-ok { background: #dcfce7; color: #166534; }
        .status-fail { background: #fee2e2; color: #991b1b; }

        .data-row { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 4px; font-family: monospace; }

        .footer {
            padding: 1rem;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 16px;
            border-radius: 6px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .instruction {
            position: absolute;
            bottom: 15px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
            color: var(--primary);
            font-weight: bold;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="header">
    <h2 style="font-size: 1.2rem;">Static Equilibrium: The Seesaw Experiment</h2>
</div>

<div class="main-layout" id="container">
    <div class="ui-panel">
        <div id="status" class="status-badge status-ok">IN EQUILIBRIUM</div>
        <div class="data-row"><span>Σ F<sub>y</sub>:</span> <span id="sum-f">0 N</span></div>
        <div class="data-row"><span>Σ τ:</span> <span id="sum-t">0 Nm</span></div>
        <hr style="margin: 8px 0; border: 0; border-top: 1px solid var(--border);">
        <div class="data-row" style="color: var(--primary)"><span>Left Mass:</span> <span id="m1-val">5 kg</span></div>
        <div class="data-row" style="color: var(--secondary)"><span>Right Mass:</span> <span id="m2-val">5 kg</span></div>
    </div>
    <canvas id="simCanvas"></canvas>
    <div class="instruction">DRAG MASSES TO BALANCE THE TORQUE</div>
</div>

<div class="footer">
    <button class="btn" id="resetBtn">Reset Positions</button>
    <button class="btn" id="toggleGrid" style="background: #64748b;">Toggle Grid</button>
</div>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    const statusBadge = document.getElementById('status');
    const sumFLabel = document.getElementById('sum-f');
    const sumTLabel = document.getElementById('sum-t');

    let width, height;
    let isDragging = null;
    let showGrid = true;
    
    // Physics Constants
    const g = 9.81;
    const pixelsPerMeter = 60;
    
    // Seesaw State
    const beam = { length: 8, height: 10, angle: 0, angularVel: 0 };
    
    const masses = [
        { id: 0, m: 5, x: -2, y: 0, color: '#3b82f6', label: 'm1' },
        { id: 1, m: 5, x: 2, y: 0, color: '#10b981', label: 'm2' }
    ];

    function resize() {
        const rect = canvas.parentElement.getBoundingClientRect();
        width = rect.width;
        height = rect.height;
        canvas.width = width;
        canvas.height = height;
    }

    function init() {
        resize();
        window.addEventListener('resize', resize);
        
        const getMousePos = (e) => {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            return { x: clientX - rect.left, y: clientY - rect.top };
        };

        const start = (e) => {
            const pos = getMousePos(e);
            masses.forEach(m => {
                const mx = width/2 + m.x * pixelsPerMeter;
                const my = height/2 - 20;
                const dist = Math.sqrt((pos.x - mx)**2 + (pos.y - my)**2);
                if (dist < 30) isDragging = m;
            });
        };

        const move = (e) => {
            if (!isDragging) return;
            const pos = getMousePos(e);
            const newX = (pos.x - width/2) / pixelsPerMeter;
            isDragging.x = Math.max(-beam.length/2, Math.min(beam.length/2, newX));
        };

        canvas.addEventListener('mousedown', start);
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', () => isDragging = null);

        canvas.addEventListener('touchstart', start);
        window.addEventListener('touchmove', move);
        window.addEventListener('touchend', () => isDragging = null);

        document.getElementById('resetBtn').onclick = () => {
            masses[0].x = -2; masses[1].x = 2;
            beam.angle = 0; beam.angularVel = 0;
        };
        document.getElementById('toggleGrid').onclick = () => showGrid = !showGrid;

        animate();
    }

    function update() {
        // Torque Calculation: τ = r * F * sin(theta) 
        // Here theta is 90 deg relative to beam, so τ = x * (m*g)
        let netTorque = 0;
        masses.forEach(m => {
            const torque = m.x * (m.m * g);
            netTorque += torque;
        });

        // 1st Condition: Net Force (Normal force of pivot balances weights)
        const totalWeight = masses.reduce((acc, m) => acc + m.m * g, 0);
        sumFLabel.innerText = `0 N (Balanced)`;

        // 2nd Condition: Net Torque
        sumTLabel.innerText = `${netTorque.toFixed(1)} Nm`;

        // Physics simulation of rotation
        const momentOfInertia = 20; // Simplified
        const angularAcc = netTorque / momentOfInertia;
        
        if (Math.abs(netTorque) < 0.5) {
            beam.angularVel *= 0.8; // Dampen to stop
            if (Math.abs(beam.angularVel) < 0.001) {
                beam.angularVel = 0;
                beam.angle *= 0.9;
            }
            statusBadge.innerText = "IN EQUILIBRIUM";
            statusBadge.className = "status-badge status-ok";
        } else {
            beam.angularVel += angularAcc * 0.016;
            beam.angularVel *= 0.98; // Friction
            beam.angle += beam.angularVel;
            statusBadge.innerText = "NOT IN EQUILIBRIUM";
            statusBadge.className = "status-badge status-fail";
        }

        // Limit tilt
        beam.angle = Math.max(-0.4, Math.min(0.4, beam.angle));
        
        document.getElementById('m1-val').innerText = `${masses[0].m}kg at ${Math.abs(masses[0].x).toFixed(1)}m`;
        document.getElementById('m2-val').innerText = `${masses[1].m}kg at ${Math.abs(masses[1].x).toFixed(1)}m`;
    }

    function draw() {
        pCtx = ctx;
        pCtx.clearRect(0, 0, width, height);
        const cx = width / 2;
        const cy = height / 2;

        if (showGrid) {
            pCtx.strokeStyle = '#f1f5f9';
            pCtx.lineWidth = 1;
            for(let i = -4; i <= 4; i++) {
                const x = cx + i * pixelsPerMeter;
                pCtx.beginPath(); pCtx.moveTo(x, 0); pCtx.lineTo(x, height); pCtx.stroke();
                pCtx.fillStyle = '#94a3b8';
                pCtx.font = '10px sans-serif';
                pCtx.fillText(i + 'm', x + 2, cy + 60);
            }
        }

        // Pivot (Fulcrum)
        pCtx.fillStyle = '#475569';
        pCtx.beginPath();
        pCtx.moveTo(cx, cy);
        pCtx.lineTo(cx - 20, cy + 40);
        pCtx.lineTo(cx + 20, cy + 40);
        pCtx.fill();

        // Beam
        pCtx.save();
        pCtx.translate(cx, cy);
        pCtx.rotate(beam.angle);
        
        pCtx.fillStyle = '#94a3b8';
        pCtx.fillRect(-beam.length/2 * pixelsPerMeter, -5, beam.length * pixelsPerMeter, 10);

        // Masses
        masses.forEach(m => {
            const mx = m.x * pixelsPerMeter;
            const size = 30;
            pCtx.fillStyle = m.color;
            pCtx.fillRect(mx - size/2, -size - 5, size, size);
            
            pCtx.fillStyle = 'white';
            pCtx.font = 'bold 12px sans-serif';
            pCtx.textAlign = 'center';
            pCtx.fillText(m.m + 'kg', mx, -size/2);

            // Force vector
            pCtx.strokeStyle = '#ef4444';
            pCtx.lineWidth = 2;
            pCtx.beginPath();
            pCtx.moveTo(mx, -5);
            pCtx.lineTo(mx, 40);
            pCtx.stroke();
        });

        pCtx.restore();
    }

    function animate() {
        update();
        draw();
        requestAnimationFrame(animate);
    }

    init();
</script>
</body>
</html>
