<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, touch-action: manipulation">
    <title>Remainder Theorem | f(c) = Remainder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fb;
            min-height: 100vh;
            padding: 16px;
            touch-action: pan-y pinch-zoom;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        .header h1 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #0f172a;
            letter-spacing: -0.3px;
        }
        .header p {
            font-size: 0.8rem;
            color: #475569;
            margin-top: 4px;
        }

        /* 2 column layout */
        .split {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        /* Cards */
        .card {
            background: #ffffff;
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            border: 1px solid #eef2f8;
        }

        .card-title {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid #eef2f8;
        }

        /* Division display */
        .division-content {
            font-family: 'SF Mono', 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            background: #f8fafc;
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .remainder-box {
            background: #fef9e3;
            border-radius: 24px;
            padding: 12px;
            text-align: center;
            border: 1px solid #fde68a;
        }
        .remainder-label {
            font-size: 0.6rem;
            color: #92400e;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .remainder-number {
            font-size: 2.2rem;
            font-weight: 700;
            font-family: monospace;
            color: #d97706;
            line-height: 1;
        }

        /* Machine card (dark) */
        .machine {
            background: #0f172a;
            border-radius: 32px;
            padding: 20px;
            color: #e2e8f0;
        }
        .machine-input {
            background: #1e293b;
            border-radius: 48px;
            padding: 12px;
            text-align: center;
            margin-bottom: 20px;
        }
        .machine-input .label {
            font-size: 0.6rem;
            color: #94a3b8;
        }
        .machine-input .value {
            font-size: 1.8rem;
            font-weight: 600;
            font-family: monospace;
            color: #facc15;
        }
        .machine-body {
            text-align: center;
        }
        .poly {
            font-family: monospace;
            font-size: 1rem;
            background: #1e293b;
            padding: 12px;
            border-radius: 28px;
            margin: 12px 0;
        }
        .output-box {
            background: #fef9e3;
            border-radius: 24px;
            padding: 12px;
            margin-top: 16px;
        }
        .output-box .label {
            font-size: 0.6rem;
            color: #92400e;
        }
        .output-number {
            font-size: 2.2rem;
            font-weight: 700;
            font-family: monospace;
            color: #d97706;
        }

        /* Touch-friendly controls */
        .controls {
            background: #ffffff;
            border-radius: 32px;
            padding: 18px;
            border: 1px solid #eef2f8;
        }

        .poly-selector {
            margin-bottom: 20px;
        }
        .poly-selector label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        select {
            width: 100%;
            padding: 14px 16px;
            border-radius: 60px;
            border: 1px solid #e2e8f0;
            background: #ffffff;
            font-family: monospace;
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23475685' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 16px center;
        }

        /* C value buttons - touch friendly */
        .c-control {
            text-align: center;
        }
        .c-control label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        .c-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .c-btn {
            background: #f1f5f9;
            border: none;
            padding: 12px 20px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            font-family: monospace;
            color: #1e293b;
            cursor: pointer;
            transition: all 0.1s ease;
            min-width: 70px;
            touch-action: manipulation;
        }
        .c-btn:active {
            transform: scale(0.94);
            background: #e2e8f0;
        }
        .c-btn.primary {
            background: #3b82f6;
            color: white;
        }
        .c-value-display {
            background: #f8fafc;
            padding: 10px;
            border-radius: 60px;
            font-family: monospace;
            font-size: 1.1rem;
            font-weight: 600;
            color: #3b82f6;
            margin-top: 8px;
        }

        .badge {
            text-align: center;
            margin-top: 20px;
            font-size: 0.7rem;
            color: #3b82f6;
        }

        @media (max-width: 750px) {
            .split {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            .header h1 { font-size: 1.3rem; }
            .c-btn { padding: 10px 16px; min-width: 60px; }
        }

        @media (max-width: 480px) {
            body { padding: 12px; }
            .c-buttons { gap: 8px; }
            .c-btn { padding: 8px 14px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>remainder theorem</h1>
        <p>f(c) = remainder of f(x) ÷ (x − c)</p>
    </div>

    <div class="split">
        <!-- left: division panel -->
        <div class="card">
            <div class="card-title">▸ division by (x − c)</div>
            <div class="division-content" id="divisionDisplay">—</div>
            <div class="remainder-box">
                <div class="remainder-label">remainder</div>
                <div class="remainder-number" id="remainderVal">0</div>
            </div>
        </div>

        <!-- right: function machine -->
        <div class="machine">
            <div class="machine-input">
                <div class="label">input c</div>
                <div class="value" id="machineC">c = 2</div>
            </div>
            <div class="machine-body">
                <div class="poly" id="machinePoly">f(x) = x² − 3x + 5</div>
                <div style="font-size:0.7rem; opacity:0.7;">↓ evaluate ↓</div>
                <div class="output-box">
                    <div class="label">f(c) = remainder</div>
                    <div class="output-number" id="fofcVal">0</div>
                </div>
            </div>
        </div>
    </div>

    <!-- touch controls: polynomial + c value buttons -->
    <div class="controls">
        <div class="poly-selector">
            <label>📐 polynomial f(x)</label>
            <select id="polySelect">
                <option value="x^2-3x+5">x² − 3x + 5</option>
                <option value="x^3-2x^2+4x-7">x³ − 2x² + 4x − 7</option>
                <option value="2x^2+5x-3">2x² + 5x − 3</option>
                <option value="x^4-3x^3+2x-6">x⁴ − 3x³ + 2x − 6</option>
                <option value="3x^3-4x+1">3x³ − 4x + 1</option>
            </select>
        </div>

        <div class="c-control">
            <label>🎮 choose c  (divisor: x − c)</label>
            <div class="c-buttons">
                <button class="c-btn" data-c="-3">-3</button>
                <button class="c-btn" data-c="-2">-2</button>
                <button class="c-btn" data-c="-1">-1</button>
                <button class="c-btn" data-c="0">0</button>
                <button class="c-btn" data-c="1">1</button>
                <button class="c-btn" data-c="2">2</button>
                <button class="c-btn" data-c="3">3</button>
                <button class="c-btn" data-c="4">4</button>
                <button class="c-btn primary" data-c="5">5</button>
            </div>
            <div class="c-value-display" id="cDisplay">c = 2</div>
        </div>
    </div>
    <div class="badge">✨ f(c) = remainder — tap any c button to verify ✨</div>
</div>

<script>
    // Polynomial data: coeffs from highest degree to constant
    const POLY_LIB = {
        "x^2-3x+5": { coeffs: [1, -3, 5], str: "x² − 3x + 5" },
        "x^3-2x^2+4x-7": { coeffs: [1, -2, 4, -7], str: "x³ − 2x² + 4x − 7" },
        "2x^2+5x-3": { coeffs: [2, 5, -3], str: "2x² + 5x − 3" },
        "x^4-3x^3+2x-6": { coeffs: [1, -3, 0, 2, -6], str: "x⁴ − 3x³ + 2x − 6" },
        "3x^3-4x+1": { coeffs: [3, 0, -4, 1], str: "3x³ − 4x + 1" }
    };

    let currentKey = "x^2-3x+5";
    let currentCoeffs = [1, -3, 5];
    let currentC = 2;

    // DOM elements
    const polySelect = document.getElementById('polySelect');
    const cDisplaySpan = document.getElementById('cDisplay');
    const machineCSpan = document.getElementById('machineC');
    const machinePolySpan = document.getElementById('machinePoly');
    const remainderSpan = document.getElementById('remainderVal');
    const fofcSpan = document.getElementById('fofcVal');
    const divisionDisplayDiv = document.getElementById('divisionDisplay');

    // evaluate f(c)
    function evaluatePoly(coeffs, c) {
        let result = 0;
        let power = 1;
        for (let i = coeffs.length - 1; i >= 0; i--) {
            result += coeffs[i] * power;
            power *= c;
        }
        return result;
    }

    // synthetic division (returns remainder and quotient coeffs)
    function syntheticDivision(coeffs, c) {
        const n = coeffs.length;
        let synthetic = [coeffs[0]];
        for (let i = 1; i < n; i++) {
            synthetic.push(synthetic[i-1] * c + coeffs[i]);
        }
        const remainder = synthetic[synthetic.length - 1];
        const quotient = synthetic.slice(0, -1);
        return { remainder, quotient };
    }

    // format polynomial from coeffs (clean minimal)
    function formatPoly(coeffs) {
        let terms = [];
        let deg = coeffs.length - 1;
        for (let i = 0; i <= deg; i++) {
            let coef = coeffs[i];
            if (coef === 0) continue;
            let power = deg - i;
            let sign = (coef > 0 && terms.length > 0) ? "+" : "";
            let absCoef = Math.abs(coef);
            let coefStr = (absCoef === 1 && power > 0) ? "" : absCoef.toString();
            if (power === 0) coefStr = absCoef.toString();
            let term = "";
            if (power === 0) term = coefStr;
            else if (power === 1) term = `${coefStr}x`;
            else term = `${coefStr}x^{${power}}`;
            if (sign === "+") term = "+ " + term;
            else if (terms.length > 0 && coef < 0) term = "- " + term.replace("-", "");
            else if (coef < 0) term = "-" + term;
            terms.push(term);
        }
        if (terms.length === 0) return "0";
        return terms.join(" ");
    }

    // update division panel (minimal synthetic view)
    function updateDivisionPanel() {
        const { remainder, quotient } = syntheticDivision(currentCoeffs, currentC);
        const polyStr = formatPoly(currentCoeffs);
        const quotientStr = formatPoly(quotient);
        
        const html = `
            <div><strong>f(x)</strong> = ${polyStr}</div>
            <div style="margin: 8px 0;">÷ <strong>(x − ${currentC})</strong></div>
            <div style="background:#eef2ff; padding:6px 10px; border-radius:16px; margin:10px 0; font-size:0.7rem;">
                synthetic division
            </div>
            <div style="font-size:0.75rem;">
                Q(x) = ${quotientStr}<br>
                R = ${remainder.toFixed(4)}
            </div>
        `;
        divisionDisplayDiv.innerHTML = html;
        remainderSpan.innerText = remainder.toFixed(4);
        return remainder;
    }

    // full sync: update all UI
    function syncUI() {
        const fofc = evaluatePoly(currentCoeffs, currentC);
        const { remainder: synRem } = syntheticDivision(currentCoeffs, currentC);
        
        // update numbers
        remainderSpan.innerText = synRem.toFixed(4);
        fofcSpan.innerText = fofc.toFixed(4);
        
        // update machine display
        machineCSpan.innerText = `c = ${currentC}`;
        cDisplaySpan.innerText = `c = ${currentC}`;
        machinePolySpan.innerText = POLY_LIB[currentKey].str;
        
        // update division
        updateDivisionPanel();
        
        // visual feedback: highlight both remainder boxes
        const remBox = document.getElementById('remainderVal');
        const fBox = document.getElementById('fofcVal');
        remBox.style.transform = 'scale(1.08)';
        fBox.style.transform = 'scale(1.08)';
        setTimeout(() => {
            remBox.style.transform = '';
            fBox.style.transform = '';
        }, 200);
    }

    // set c value
    function setC(value) {
        currentC = value;
        syncUI();
    }

    // change polynomial
    function setPolynomial(key) {
        currentKey = key;
        currentCoeffs = [...POLY_LIB[currentKey].coeffs];
        syncUI();
    }

    // --- event binding (touch + mouse) ---
    polySelect.addEventListener('change', (e) => {
        setPolynomial(e.target.value);
    });

    // attach c button listeners
    const cButtons = document.querySelectorAll('.c-btn');
    cButtons.forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.preventDefault();
            const cVal = parseFloat(btn.getAttribute('data-c'));
            if (!isNaN(cVal)) {
                setC(cVal);
            }
        });
        // also support touchstart for faster response
        btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const cVal = parseFloat(btn.getAttribute('data-c'));
            if (!isNaN(cVal)) {
                setC(cVal);
            }
        }, { passive: false });
    });

    // initial sync
    function init() {
        currentKey = "x^2-3x+5";
        currentCoeffs = [1, -3, 5];
        currentC = 2;
        polySelect.value = "x^2-3x+5";
        syncUI();
    }
    init();
</script>
</body>
</html>
