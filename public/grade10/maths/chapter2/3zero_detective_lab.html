<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Rational Zero Detective | Find the Rational Zeros</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f0f4fa;
            min-height: 100vh;
            padding: 16px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: -0.3px;
        }
        .header p {
            font-size: 0.8rem;
            color: #475569;
            margin-top: 4px;
        }

        /* Layout */
        .split {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 20px;
        }

        /* Canvas card */
        .canvas-card {
            background: #ffffff;
            border-radius: 28px;
            padding: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            border: 1px solid #eef2f8;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: #fefefe;
            border-radius: 20px;
            cursor: crosshair;
            touch-action: pan-x pan-y;
        }

        /* Suspect panel */
        .suspect-panel {
            background: #ffffff;
            border-radius: 28px;
            padding: 18px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            border: 1px solid #eef2f8;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .poly-info {
            background: #f8fafc;
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            font-family: monospace;
            font-size: 0.9rem;
            font-weight: 500;
            color: #1e293b;
            word-break: break-word;
        }

        .suspect-list {
            flex: 1;
            max-height: 380px;
            overflow-y: auto;
        }
        .suspect-title {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        .suspect-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 10px;
        }
        .suspect-btn {
            background: #f1f5f9;
            border: none;
            padding: 10px 6px;
            border-radius: 40px;
            font-family: monospace;
            font-size: 0.85rem;
            font-weight: 600;
            color: #1e293b;
            cursor: pointer;
            transition: all 0.1s;
            text-align: center;
            touch-action: manipulation;
        }
        .suspect-btn:active { transform: scale(0.94); }
        .suspect-btn.guilty {
            background: #22c55e;
            color: white;
            box-shadow: 0 2px 8px rgba(34,197,94,0.3);
        }
        .suspect-btn.innocent {
            background: #e2e8f0;
            color: #94a3b8;
            text-decoration: line-through;
            opacity: 0.7;
        }
        .suspect-btn.pending {
            background: #f1f5f9;
            color: #1e293b;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn {
            flex: 1;
            background: #3b82f6;
            border: none;
            padding: 12px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.8rem;
            color: white;
            cursor: pointer;
            transition: all 0.1s;
            text-align: center;
        }
        .btn:active { transform: scale(0.96); }
        .btn-secondary {
            background: #f59e0b;
        }
        .btn-outline {
            background: #e2e8f0;
            color: #1e293b;
        }

        .legend {
            display: flex;
            gap: 12px;
            justify-content: center;
            font-size: 0.65rem;
            color: #64748b;
            border-top: 1px solid #eef2f8;
            padding-top: 12px;
            margin-top: 4px;
        }
        .legend span {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        @media (max-width: 800px) {
            .split {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            .suspect-panel { order: 2; }
            .canvas-card { order: 1; }
            .header h1 { font-size: 1.3rem; }
        }
        @media (max-width: 480px) {
            body { padding: 12px; }
            .suspect-grid { grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🕵️ Rational Zero Detective</h1>
        <p>p/q suspects → test each → find the real zeros (x-intercepts)</p>
    </div>

    <div class="split">
        <!-- Graph Area -->
        <div class="canvas-card">
            <canvas id="graphCanvas" width="700" height="500" style="width:100%; height:auto; max-width:700px; margin:0 auto; display:block"></canvas>
            <div class="legend">
                <span>🟢 <span style="color:#22c55e;">●</span> Confirmed zero</span>
                <span>🔵 <span style="color:#3b82f6;">◆</span> Tested point</span>
                <span>⚫ <span style="color:#1e293b;">━</span> Polynomial</span>
                <span>📏 Vertical test line</span>
            </div>
        </div>

        <!-- Suspect Panel -->
        <div class="suspect-panel">
            <div class="poly-info" id="polyDisplay">f(x) = 2x³ − 3x² − 11x + 6</div>
            
            <div class="suspect-list">
                <div class="suspect-title">🔍 POSSIBLE RATIONAL ZEROS (p/q)</div>
                <div class="suspect-grid" id="suspectGrid"></div>
            </div>

            <div class="action-buttons">
                <button id="autoSolveBtn" class="btn">⚡ Auto-Solve</button>
                <button id="newCaseBtn" class="btn btn-secondary">🔄 New Case</button>
                <button id="resetBtn" class="btn btn-outline">🗑️ Reset Tests</button>
            </div>
            <div class="legend" style="border-top: none; padding-top: 0;">
                <span>✅ Guilty = zero</span>
                <span>❌ Innocent</span>
                <span>⏳ Untested</span>
            </div>
        </div>
    </div>
</div>

<script>
    // ----- Utility: generate random integer between min and max inclusive
    function randInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    // ----- Generate a random polynomial with integer coefficients (degree 2 to 4)
    // format: return { coeffs: [a_n, ..., a_0], str }
    function generateRandomPolynomial() {
        const degree = randInt(2, 4);
        let coeffs = [];
        // leading coefficient non-zero, between -4 and 4 excluding 0
        let leading = randInt(-4, 4);
        while (leading === 0) leading = randInt(-4, 4);
        coeffs.push(leading);
        for (let i = 1; i <= degree; i++) {
            let coef = randInt(-5, 5);
            coeffs.push(coef);
        }
        // ensure constant term non-zero for rational test interest
        if (coeffs[coeffs.length-1] === 0) coeffs[coeffs.length-1] = randInt(-5, 5) || 1;
        return coeffs;
    }

    // Format polynomial from coefficients
    function formatPolynomial(coeffs) {
        const terms = [];
        const deg = coeffs.length - 1;
        for (let i = 0; i <= deg; i++) {
            let coef = coeffs[i];
            if (coef === 0) continue;
            let power = deg - i;
            let sign = (coef > 0 && terms.length > 0) ? "+" : "";
            let absCoef = Math.abs(coef);
            let coefStr = (absCoef === 1 && power > 0) ? "" : absCoef.toString();
            if (power === 0) coefStr = absCoef.toString();
            let term = "";
            if (power === 0) term = coefStr;
            else if (power === 1) term = `${coefStr}x`;
            else term = `${coefStr}x^{${power}}`;
            if (sign === "+") term = "+ " + term;
            else if (terms.length > 0 && coef < 0) term = "- " + term.replace("-", "");
            else if (coef < 0) term = "-" + term;
            terms.push(term);
        }
        if (terms.length === 0) return "0";
        let result = terms.join(" ");
        result = result.replace(/^\+ /, "");
        return "f(x) = " + result;
    }

    // Evaluate polynomial at x
    function evaluatePoly(coeffs, x) {
        let result = 0;
        let power = 1;
        for (let i = coeffs.length - 1; i >= 0; i--) {
            result += coeffs[i] * power;
            power *= x;
        }
        return result;
    }

    // Rational Zero Test: return array of unique rational suspects (as fractions and decimals)
    function getRationalSuspects(coeffs) {
        const constant = coeffs[coeffs.length - 1];
        const leading = coeffs[0];
        if (constant === 0) return [0]; // special case, but our generator avoids zero constant
        const factorsP = getFactors(Math.abs(constant));
        const factorsQ = getFactors(Math.abs(leading));
        const suspectsSet = new Set();
        for (let p of factorsP) {
            for (let q of factorsQ) {
                const val1 = p / q;
                const val2 = -p / q;
                suspectsSet.add(val1);
                suspectsSet.add(val2);
            }
        }
        // convert to array and sort
        let suspects = Array.from(suspectsSet);
        suspects.sort((a,b) => a - b);
        return suspects;
    }

    function getFactors(n) {
        const factors = [];
        for (let i = 1; i <= Math.sqrt(n); i++) {
            if (n % i === 0) {
                factors.push(i);
                if (i !== n/i) factors.push(n/i);
            }
        }
        return factors.sort((a,b)=>a-b);
    }

    // ----- Graphing and state -----
    let currentCoeffs = [2, -3, -11, 6];  // default
    let currentSuspects = []; // list of numbers
    let suspectStatus = {};    // map from suspect string -> 'guilty' or 'innocent' or null
    let testedPoints = [];      // {x, y, isZero}
    let animationLineX = null;  // current vertical test line position
    let animFrame = null;
    
    const canvas = document.getElementById('graphCanvas');
    const ctx = canvas.getContext('2d');
    let width = 700, height = 500;
    let originX = width/2, originY = height/2;
    let xMin = -5, xMax = 5, yMin = -10, yMax = 10;
    
    function updateCanvasSize() {
        const rect = canvas.parentElement.getBoundingClientRect();
        const maxW = Math.min(700, rect.width - 20);
        canvas.style.width = `${maxW}px`;
        canvas.style.height = 'auto';
        canvas.width = 700;
        canvas.height = 500;
        width = 700;
        height = 500;
        originX = width/2;
        originY = height/2;
        // dynamic scaling based on polynomial range? keep fixed -5..5 x, y auto?
        xMin = -5.2; xMax = 5.2;
        // compute y range from polynomial values
        let yVals = [];
        for (let x = xMin; x <= xMax; x+=0.2) {
            yVals.push(evaluatePoly(currentCoeffs, x));
        }
        let minY = Math.min(...yVals, -8);
        let maxY = Math.max(...yVals, 8);
        yMin = Math.floor(minY) - 1;
        yMax = Math.ceil(maxY) + 1;
        if (yMin > -6) yMin = -6;
        if (yMax < 6) yMax = 6;
        drawGraph();
    }
    
    function worldToScreen(x, y) {
        const sx = originX + (x - xMin) / (xMax - xMin) * width;
        const sy = originY - (y - yMin) / (yMax - yMin) * height;
        return { sx, sy };
    }
    
    function drawGridAndAxes() {
        ctx.save();
        ctx.strokeStyle = "#e2e8f0";
        ctx.lineWidth = 0.8;
        // vertical grid
        for (let x = Math.ceil(xMin); x <= xMax; x += 1) {
            if (Math.abs(x) < 0.01) continue;
            const { sx } = worldToScreen(x, 0);
            ctx.beginPath();
            ctx.moveTo(sx, 0);
            ctx.lineTo(sx, height);
            ctx.stroke();
        }
        // horizontal
        for (let y = Math.ceil(yMin); y <= yMax; y += 1) {
            if (Math.abs(y) < 0.01) continue;
            const { sy } = worldToScreen(0, y);
            ctx.beginPath();
            ctx.moveTo(0, sy);
            ctx.lineTo(width, sy);
            ctx.stroke();
        }
        // axes
        ctx.beginPath();
        ctx.lineWidth = 2;
        ctx.strokeStyle = "#1e293b";
        const { sx: zeroX } = worldToScreen(0, 0);
        ctx.moveTo(0, zeroX);
        ctx.lineTo(width, zeroX);
        const { sy: zeroY } = worldToScreen(0, 0);
        ctx.moveTo(zeroY, 0);
        ctx.lineTo(zeroY, height);
        ctx.stroke();
        ctx.restore();
    }
    
    function drawPolynomial() {
        ctx.beginPath();
        ctx.lineWidth = 2.5;
        ctx.strokeStyle = "#1e293b";
        let first = true;
        for (let px = 0; px <= width; px++) {
            const x = xMin + (px / width) * (xMax - xMin);
            const y = evaluatePoly(currentCoeffs, x);
            if (y < yMin - 1 || y > yMax + 1) {
                first = true;
                continue;
            }
            const { sx, sy } = worldToScreen(x, y);
            if (first) {
                ctx.moveTo(sx, sy);
                first = false;
            } else {
                ctx.lineTo(sx, sy);
            }
        }
        ctx.stroke();
    }
    
    function drawTestedPoints() {
        for (let p of testedPoints) {
            const { sx, sy } = worldToScreen(p.x, p.y);
            ctx.beginPath();
            if (p.isZero) {
                ctx.fillStyle = "#22c55e";
                ctx.arc(sx, sy, 8, 0, 2*Math.PI);
                ctx.fill();
                ctx.fillStyle = "white";
                ctx.arc(sx, sy, 3, 0, 2*Math.PI);
                ctx.fill();
            } else {
                ctx.fillStyle = "#3b82f6";
                ctx.beginPath();
                ctx.moveTo(sx, sy-6);
                ctx.lineTo(sx+5, sy+3);
                ctx.lineTo(sx-5, sy+3);
                ctx.fill();
            }
        }
    }
    
    function drawVerticalLine(xPos) {
        if (xPos === null) return;
        const { sx } = worldToScreen(xPos, 0);
        ctx.beginPath();
        ctx.setLineDash([8, 8]);
        ctx.lineWidth = 2;
        ctx.strokeStyle = "#f59e0b";
        ctx.moveTo(sx, 0);
        ctx.lineTo(sx, height);
        ctx.stroke();
        ctx.setLineDash([]);
    }
    
    function drawGraph() {
        if (!ctx) return;
        ctx.clearRect(0, 0, width, height);
        drawGridAndAxes();
        drawPolynomial();
        drawTestedPoints();
        drawVerticalLine(animationLineX);
    }
    
    // test a suspect value
    function testSuspect(value) {
        const y = evaluatePoly(currentCoeffs, value);
        const isZero = Math.abs(y) < 1e-6;
        const key = value.toString();
        if (isZero) {
            suspectStatus[key] = 'guilty';
        } else {
            suspectStatus[key] = 'innocent';
        }
        // add to testedPoints
        const existing = testedPoints.find(p => Math.abs(p.x - value) < 1e-6);
        if (!existing) {
            testedPoints.push({ x: value, y: y, isZero: isZero });
        } else {
            existing.isZero = isZero;
            existing.y = y;
        }
        // animate vertical line
        animationLineX = value;
        drawGraph();
        setTimeout(() => { animationLineX = null; drawGraph(); }, 400);
        updateSuspectUI();
    }
    
    function updateSuspectUI() {
        const grid = document.getElementById('suspectGrid');
        grid.innerHTML = '';
        for (let s of currentSuspects) {
            const key = s.toString();
            let status = suspectStatus[key];
            let btnClass = 'pending';
            let label = s % 1 === 0 ? s.toString() : (Math.abs(s) < 1e-6 ? '0' : s.toFixed(3).replace(/\.?0+$/, ''));
            if (status === 'guilty') btnClass = 'guilty';
            else if (status === 'innocent') btnClass = 'innocent';
            const btn = document.createElement('button');
            btn.className = `suspect-btn ${btnClass}`;
            btn.innerText = label;
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                testSuspect(s);
            });
            grid.appendChild(btn);
        }
    }
    
    // auto solve: test all suspects and reveal zeros
    function autoSolve() {
        for (let s of currentSuspects) {
            const y = evaluatePoly(currentCoeffs, s);
            const isZero = Math.abs(y) < 1e-6;
            const key = s.toString();
            if (isZero) suspectStatus[key] = 'guilty';
            else suspectStatus[key] = 'innocent';
            const existing = testedPoints.find(p => Math.abs(p.x - s) < 1e-6);
            if (!existing) {
                testedPoints.push({ x: s, y: y, isZero: isZero });
            } else {
                existing.isZero = isZero;
                existing.y = y;
            }
        }
        updateSuspectUI();
        drawGraph();
        // flash message
        const guilty = currentSuspects.filter(s => Math.abs(evaluatePoly(currentCoeffs, s)) < 1e-6);
        if (guilty.length) alert(`🔍 Case solved! Rational zeros: ${guilty.map(g=>g.toFixed(4)).join(', ')}`);
        else alert(`No rational zeros found. Try irrational or complex roots.`);
    }
    
    function resetTests() {
        suspectStatus = {};
        testedPoints = [];
        animationLineX = null;
        updateSuspectUI();
        drawGraph();
    }
    
    function newRandomCase() {
        const newCoeffs = generateRandomPolynomial();
        currentCoeffs = newCoeffs;
        const suspects = getRationalSuspects(currentCoeffs);
        currentSuspects = suspects;
        suspectStatus = {};
        testedPoints = [];
        animationLineX = null;
        const polyStr = formatPolynomial(currentCoeffs);
        document.getElementById('polyDisplay').innerText = polyStr;
        updateSuspectUI();
        updateCanvasSize();
        drawGraph();
    }
    
    // init and events
    function init() {
        currentCoeffs = [2, -3, -11, 6];
        const suspects = getRationalSuspects(currentCoeffs);
        currentSuspects = suspects;
        suspectStatus = {};
        testedPoints = [];
        animationLineX = null;
        const polyStr = formatPolynomial(currentCoeffs);
        document.getElementById('polyDisplay').innerText = polyStr;
        updateSuspectUI();
        updateCanvasSize();
        drawGraph();
        
        document.getElementById('autoSolveBtn').addEventListener('click', () => autoSolve());
        document.getElementById('newCaseBtn').addEventListener('click', () => newRandomCase());
        document.getElementById('resetBtn').addEventListener('click', () => resetTests());
        window.addEventListener('resize', () => updateCanvasSize());
    }
    
    init();
</script>
</body>
</html>
