<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🧪 haber · ammonia</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:system-ui,sans-serif;background:#fff;min-height:100dvh;padding:12px}
    #canvas-container{width:100%;height:100dvh;position:relative;background:#f8fafc}
    .panel{position:absolute;bottom:20px;left:20px;right:20px;background:rgba(255,255,255,0.95);backdrop-filter:blur(8px);border-radius:30px;padding:16px 20px;border:1px solid #d0e2ff;max-width:360px;margin:0 auto;box-shadow:0 8px 24px rgba(0,0,0,0.04)}
    .eq{text-align:center;font-weight:600;color:#3b82f6;margin-bottom:12px}
    .btn{width:100%;padding:16px;border-radius:40px;border:none;font-weight:700;font-size:1rem;cursor:pointer;background:#10b981;color:#fff}
    .legend{display:flex;gap:16px;justify-content:center;margin-top:12px;font-size:0.8rem;color:#3a628c}
    .hint{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.9);padding:6px 14px;border-radius:40px;font-size:0.8rem;color:#3a628c}
  </style>
</head>
<body>
<div id="canvas-container"></div>
<div class="hint">🖱️ drag to rotate</div>
<div class="panel">
  <div class="eq">N₂ + 3H₂ ⇌ 2NH₃</div>
  <button class="btn" id="powerBtn">▶ start synthesis</button>
  <div class="legend"><span style="color:#3b82f6">● N₂</span><span style="color:#94a3b8">● H₂</span><span style="color:#10b981">● NH₃</span></div>
</div>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.128.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.128.0/examples/jsm/"}}</script>
<script type="module">
import*as THREE from'three';import{OrbitControls}from'three/addons/controls/OrbitControls.js';
const container=document.getElementById('canvas-container'),scene=new THREE.Scene();scene.background=new THREE.Color('#f8fafc');
const camera=new THREE.PerspectiveCamera(45,container.clientWidth/container.clientHeight,0.1,1000);camera.position.set(0,5,16);camera.lookAt(0,0,0);
const renderer=new THREE.WebGLRenderer({antialias:!0});renderer.setSize(container.clientWidth,container.clientHeight);renderer.shadowMap.enabled=!0;container.appendChild(renderer.domElement);
new OrbitControls(camera,renderer.domElement).enableDamping=!0;
scene.add(new THREE.AmbientLight(0xffffff,0.7));const dl=new THREE.DirectionalLight(0xffffff,1);dl.position.set(5,10,6);scene.add(dl);
const vessel=new THREE.Mesh(new THREE.CylinderGeometry(3.8,3.8,9,24),new THREE.MeshPhongMaterial({color:'#cbd5e1',transparent:!0,opacity:0.12,side:THREE.DoubleSide}));vessel.position.y=0;scene.add(vessel);
const cat=new THREE.Mesh(new THREE.CylinderGeometry(3.5,3.5,1,20),new THREE.MeshStandardMaterial({color:'#475569'}));cat.position.y=-2;scene.add(cat);
let running=!1,molecules=[];
function spawn(){const isN=Math.random()>0.7;const g=new THREE.Group();if(isN){const n1=new THREE.Mesh(new THREE.SphereGeometry(0.24,10),new THREE.MeshStandardMaterial({color:'#3b82f6'}));const n2=n1.clone();n2.position.x=0.45;g.add(n1,n2);g.userData={type:'N2'}}else{const h1=new THREE.Mesh(new THREE.SphereGeometry(0.16,8),new THREE.MeshStandardMaterial({color:'#94a3b8'}));const h2=h1.clone();h2.position.x=0.35;g.add(h1,h2);g.userData={type:'H2'}}g.position.set((Math.random()-0.5)*5,6,(Math.random()-0.5)*4);scene.add(g);molecules.push(g)}
function convert(pos){const g=new THREE.Group();const n=new THREE.Mesh(new THREE.SphereGeometry(0.24,10),new THREE.MeshStandardMaterial({color:'#10b981'}));g.add(n);for(let i=0;i<3;i++){const h=new THREE.Mesh(new THREE.SphereGeometry(0.14,6),new THREE.MeshStandardMaterial({color:'#94a3b8'}));h.position.set(Math.cos(i*2.09)*0.4,-0.15,Math.sin(i*2.09)*0.4);g.add(h)}g.position.copy(pos);g.userData={type:'NH3'};scene.add(g);molecules.push(g)}
document.getElementById('powerBtn').onclick=()=>{running=!running; document.getElementById('powerBtn').textContent=running?'⏸ stop':'▶ start'};
function animate(){requestAnimationFrame(animate);if(running&&Math.random()<0.15)spawn();
  for(let i=molecules.length-1;i>=0;i--){const m=molecules[i];m.position.y-=m.userData.type==='NH3'?0.03:0.06;
    if(m.userData.type!=='NH3'&&m.position.y<-1.5&&m.position.y>-2.5&&Math.random()<0.08){const p=m.position.clone();scene.remove(m);molecules.splice(i,1);convert(p);continue}
    if(m.position.y<-5){scene.remove(m);molecules.splice(i,1)}} renderer.render(scene,camera)}animate();
window.addEventListener('resize',()=>{const w=container.clientWidth,h=container.clientHeight;renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix()});
</script>
</body>
</html>
