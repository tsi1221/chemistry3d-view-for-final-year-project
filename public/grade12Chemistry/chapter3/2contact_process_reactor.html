<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>⚗️ contact process · so₂ → so₃</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:system-ui,sans-serif;background:#fff;min-height:100dvh;padding:12px}
    #canvas-container{width:100%;height:100dvh;position:relative;background:#f8fafc}
    .panel{position:absolute;bottom:20px;left:20px;right:20px;background:rgba(255,255,255,0.95);backdrop-filter:blur(8px);border-radius:30px;padding:16px 20px;border:1px solid #d0e2ff;max-width:360px;margin:0 auto;box-shadow:0 8px 24px rgba(0,0,0,0.04)}
    .eq{text-align:center;font-weight:600;color:#3b82f6;margin-bottom:12px}
    .btn{width:100%;padding:16px;border-radius:40px;border:none;font-weight:700;font-size:1rem;cursor:pointer;background:#facc15;color:#0a1e3c}
    .legend{display:flex;gap:16px;justify-content:center;margin-top:12px;font-size:0.8rem;color:#3a628c}
    .hint{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.9);padding:6px 14px;border-radius:40px;font-size:0.8rem;color:#3a628c}
  </style>
</head>
<body>
<div id="canvas-container"></div>
<div class="hint">🖱️ drag to rotate</div>
<div class="panel">
  <div class="eq">2SO₂ + O₂ ⇌ 2SO₃ · V₂O₅</div>
  <button class="btn" id="powerBtn">▶ start reaction</button>
  <div class="legend"><span style="color:#94a3b8">● SO₂</span><span style="color:#3b82f6">● O₂</span><span style="color:#ef4444">● SO₃</span><span style="color:#facc15">▬ V₂O₅</span></div>
</div>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.128.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.128.0/examples/jsm/"}}</script>
<script type="module">
import*as THREE from'three';import{OrbitControls}from'three/addons/controls/OrbitControls.js';
const container=document.getElementById('canvas-container'),scene=new THREE.Scene();scene.background=new THREE.Color('#f8fafc');
const camera=new THREE.PerspectiveCamera(45,container.clientWidth/container.clientHeight,0.1,1000);camera.position.set(0,6,18);camera.lookAt(0,0,0);
const renderer=new THREE.WebGLRenderer({antialias:!0});renderer.setSize(container.clientWidth,container.clientHeight);renderer.shadowMap.enabled=!0;container.appendChild(renderer.domElement);
new OrbitControls(camera,renderer.domElement).enableDamping=!0;
scene.add(new THREE.AmbientLight(0xffffff,0.7));const dl=new THREE.DirectionalLight(0xffffff,1);dl.position.set(5,10,6);scene.add(dl);
const tower=new THREE.Mesh(new THREE.CylinderGeometry(3.5,3.5,12,24),new THREE.MeshPhongMaterial({color:'#cbd5e1',transparent:!0,opacity:0.1,side:THREE.DoubleSide}));tower.position.y=0;scene.add(tower);
const trays=[-2.5,0.5,3.5];trays.forEach(y=>{const t=new THREE.Mesh(new THREE.CylinderGeometry(3.2,3.2,0.4,16),new THREE.MeshStandardMaterial({color:'#facc15'}));t.position.y=y;scene.add(t)});
let running=!1,molecules=[];
function spawn(type){const g=new THREE.Group();if(type==='SO2'){const s=new THREE.Mesh(new THREE.SphereGeometry(0.24,8),new THREE.MeshStandardMaterial({color:'#facc15'}));g.add(s);const o1=new THREE.Mesh(new THREE.SphereGeometry(0.18,6),new THREE.MeshStandardMaterial({color:'#94a3b8'}));o1.position.set(0.35,-0.1,0.1);g.add(o1);const o2=o1.clone();o2.position.set(-0.35,-0.1,-0.1);g.add(o2);g.userData={type:'SO2'}}else{const o1=new THREE.Mesh(new THREE.SphereGeometry(0.18,6),new THREE.MeshStandardMaterial({color:'#3b82f6'}));o1.position.x=-0.25;g.add(o1);const o2=o1.clone();o2.position.x=0.25;g.add(o2);g.userData={type:'O2'}}g.position.set((Math.random()-0.5)*4,7,(Math.random()-0.5)*4);scene.add(g);molecules.push(g)}
function convert(pos){const g=new THREE.Group();const s=new THREE.Mesh(new THREE.SphereGeometry(0.24,8),new THREE.MeshStandardMaterial({color:'#facc15'}));g.add(s);for(let i=0;i<3;i++){const o=new THREE.Mesh(new THREE.SphereGeometry(0.18,6),new THREE.MeshStandardMaterial({color:'#ef4444'}));o.position.set(Math.cos(i*2.09)*0.4,0.15,Math.sin(i*2.09)*0.4);g.add(o)}g.position.copy(pos);g.userData={type:'SO3'};scene.add(g);molecules.push(g)}
document.getElementById('powerBtn').onclick=()=>{running=!running; document.getElementById('powerBtn').textContent=running?'⏸ stop':'▶ start'};
function animate(){requestAnimationFrame(animate);if(running&&Math.random()<0.12){spawn(Math.random()>0.3?'SO2':'O2')}
  for(let i=molecules.length-1;i>=0;i--){const m=molecules[i];m.position.y-=0.05;
    if(m.userData.type==='SO2'){for(const ty of trays){if(Math.abs(m.position.y-ty)<0.7&&Math.random()<0.05){const p=m.position.clone();scene.remove(m);molecules.splice(i,1);convert(p);break}}}
    if(m.position.y<-6){scene.remove(m);molecules.splice(i,1)}} renderer.render(scene,camera)}animate();
window.addEventListener('resize',()=>{const w=container.clientWidth,h=container.clientHeight;renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix()});
</script>
</body>
</html>
