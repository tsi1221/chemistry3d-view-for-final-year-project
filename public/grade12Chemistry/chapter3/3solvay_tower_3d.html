<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🧂 solvay · carbonating tower</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:system-ui,sans-serif;background:#fff;min-height:100dvh;padding:12px}
    #canvas-container{width:100%;height:100dvh;position:relative;background:#f8fafc}
    .panel{position:absolute;bottom:20px;left:20px;right:20px;background:rgba(255,255,255,0.95);backdrop-filter:blur(8px);border-radius:30px;padding:16px 20px;border:1px solid #d0e2ff;max-width:360px;margin:0 auto;box-shadow:0 8px 24px rgba(0,0,0,0.04)}
    .eq{font-size:0.75rem;color:#3a628c;margin-bottom:12px;line-height:1.4}
    .btn{width:100%;padding:16px;border-radius:40px;border:none;font-weight:700;font-size:1rem;cursor:pointer;background:#3b82f6;color:#fff}
    .legend{display:flex;gap:16px;justify-content:center;margin-top:12px;font-size:0.8rem;color:#3a628c}
    .hint{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.9);padding:6px 14px;border-radius:40px;font-size:0.8rem;color:#3a628c}
  </style>
</head>
<body>
<div id="canvas-container"></div>
<div class="hint">🖱️ drag to rotate</div>
<div class="panel">
  <div class="eq">NH₃ + NaCl + H₂O + CO₂ → NaHCO₃↓ + NH₄Cl</div>
  <button class="btn" id="powerBtn">▶ start carbonation</button>
  <div class="legend"><span style="color:#3b82f6">● brine</span><span style="color:#94a3b8">● CO₂</span><span style="color:#10b981">◆ NaHCO₃</span></div>
</div>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.128.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.128.0/examples/jsm/"}}</script>
<script type="module">
import*as THREE from'three';import{OrbitControls}from'three/addons/controls/OrbitControls.js';
const container=document.getElementById('canvas-container'),scene=new THREE.Scene();scene.background=new THREE.Color('#f8fafc');
const camera=new THREE.PerspectiveCamera(45,container.clientWidth/container.clientHeight,0.1,1000);camera.position.set(0,5,16);camera.lookAt(0,0,0);
const renderer=new THREE.WebGLRenderer({antialias:!0});renderer.setSize(container.clientWidth,container.clientHeight);container.appendChild(renderer.domElement);
new OrbitControls(camera,renderer.domElement).enableDamping=!0;
scene.add(new THREE.AmbientLight(0xffffff,0.7));const dl=new THREE.DirectionalLight(0xffffff,1);dl.position.set(5,8,5);scene.add(dl);
const tower=new THREE.Mesh(new THREE.CylinderGeometry(3.2,3.2,12,20),new THREE.MeshPhongMaterial({color:'#cbd5e1',transparent:!0,opacity:0.12,side:THREE.DoubleSide}));tower.position.y=0;scene.add(tower);
for(let y=-4.5;y<=4.5;y+=2.5){const b=new THREE.Mesh(new THREE.RingGeometry(1.2,3,16),new THREE.MeshStandardMaterial({color:'#94a3b8',side:THREE.DoubleSide,transparent:!0,opacity:0.3}));b.rotation.x=Math.PI/2;b.position.y=y;scene.add(b)}
let running=!1,particles=[];
function spawn(type){const g=new THREE.Group();if(type==='brine'){g.add(new THREE.Mesh(new THREE.SphereGeometry(0.14,6),new THREE.MeshStandardMaterial({color:'#3b82f6'})));g.position.set((Math.random()-0.5)*4,6,(Math.random()-0.5)*4);g.userData={type:'brine'}}else{g.add(new THREE.Mesh(new THREE.SphereGeometry(0.12,6),new THREE.MeshStandardMaterial({color:'#94a3b8'})));g.position.set((Math.random()-0.5)*4,-6,(Math.random()-0.5)*4);g.userData={type:'co2'}}scene.add(g);particles.push(g)}
function precipitate(pos){const g=new THREE.Group();g.add(new THREE.Mesh(new THREE.OctahedronGeometry(0.18),new THREE.MeshStandardMaterial({color:'#10b981'})));g.position.copy(pos);g.userData={type:'ppt'};scene.add(g);particles.push(g)}
document.getElementById('powerBtn').onclick=()=>{running=!running; document.getElementById('powerBtn').textContent=running?'⏸ stop':'▶ start'};
function animate(){requestAnimationFrame(animate);if(running){if(Math.random()<0.12)spawn('brine');if(Math.random()<0.1)spawn('co2')}
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];if(p.userData.type==='brine')p.position.y-=0.04;else if(p.userData.type==='co2')p.position.y+=0.05;else p.position.y-=0.02;
    if(p.userData.type!=='ppt'){for(let j=0;j<particles.length;j++){const o=particles[j];if(o===p||o.userData.type==='ppt')continue;if((p.userData.type==='brine'&&o.userData.type==='co2')||(p.userData.type==='co2'&&o.userData.type==='brine')){if(p.position.distanceTo(o.position)<1&&Math.random()<0.05){const mid=p.position.clone().add(o.position).multiplyScalar(0.5);precipitate(mid);scene.remove(p);scene.remove(o);particles.splice(i,1);const oi=particles.indexOf(o);if(oi>-1)particles.splice(oi,1);break}}}}
    if(Math.abs(p.position.y)>7){scene.remove(p);particles.splice(i,1)}} renderer.render(scene,camera)}animate();
window.addEventListener('resize',()=>{const w=container.clientWidth,h=container.clientHeight;renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix()});
</script>
</body>
</html>
