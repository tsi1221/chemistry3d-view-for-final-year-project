<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Solvay Carbonating Tower</title>
    <style>
        :root { --brine: #38bdf8; --co2: #94a3b8; --precipitate: #ffffff; --bg: #0f172a; }
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; }
        
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box;
        }

        .glass-card {
            pointer-events: auto; background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(10px); padding: 15px; border-radius: 12px;
            border: 1px solid #334155; width: 100%; max-width: 320px;
        }

        h2 { margin: 0; font-size: 1.1rem; color: var(--brine); }
        .formula { font-family: monospace; color: #7dd3fc; margin: 8px 0; font-size: 0.85rem; }
        .desc { font-size: 0.75rem; line-height: 1.4; color: #cbd5e1; }

        .controls { margin-top: auto; align-self: center; width: 100%; max-width: 280px; padding-bottom: 30px; }
        
        button {
            pointer-events: auto; background: #0284c7; color: white; border: none;
            width: 100%; padding: 14px; border-radius: 10px; font-weight: bold;
            cursor: pointer; font-size: 1rem; box-shadow: 0 4px 0 #0369a1;
        }
        button:active { transform: translateY(2px); box-shadow: 0 0px 0 #0369a1; }
    </style>
</head>
<body>

<div id="ui">
    <div class="glass-card">
        <h2>Carbonating Tower</h2>
        <div class="formula">NH₃ + NaCl + H₂O + CO₂ → NaHCO₃↓ + NH₄Cl</div>
        <div class="desc">
            Ammoniacal Brine flows down while <b>CO₂</b> rises. The cold temperature causes <b>NaHCO₃</b> crystals to precipitate.
        </div>
    </div>

    <div class="controls">
        <button id="runBtn">Start Carbonation</button>
    </div>
</div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';
    import { OrbitControls } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const light = new THREE.PointLight(0xffffff, 1);
    light.position.set(10, 10, 10);
    scene.add(light);

    // Responsive Camera
    const isMobile = window.innerWidth < 600;
    camera.position.set(0, 5, isMobile ? 25 : 18);

    // --- Tower Structure ---
    const towerGeo = new THREE.CylinderGeometry(4, 4, 15, 32, 1, true);
    const towerMat = new THREE.MeshPhongMaterial({ color: 0x64748b, transparent: true, opacity: 0.2, side: THREE.DoubleSide });
    scene.add(new THREE.Mesh(towerGeo, towerMat));

    // Internal Baffles (Bridges)
    for(let i = -6; i <= 6; i+=3) {
        const baffle = new THREE.Mesh(
            new THREE.RingGeometry(1, 3.9, 32),
            new THREE.MeshStandardMaterial({ color: 0x475569, side: THREE.DoubleSide })
        );
        baffle.rotation.x = Math.PI / 2;
        baffle.position.y = i;
        scene.add(baffle);
    }

    // --- Particle Logic ---
    let active = false;
    const particles = [];

    function createLabel(text, color) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 128; canvas.height = 128;
        ctx.fillStyle = color; ctx.font = 'bold 60px Arial';
        ctx.textAlign = 'center'; ctx.fillText(text, 64, 80);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(canvas) }));
        sprite.scale.set(1.2, 1.2, 1);
        sprite.position.y = 0.5;
        return sprite;
    }

    function spawnCO2() {
        const p = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshBasicMaterial({color: 0x94a3b8}));
        p.add(createLabel("CO₂", "#94a3b8"));
        p.position.set((Math.random()-0.5)*4, -7, (Math.random()-0.5)*4);
        scene.add(p);
        particles.push({ mesh: p, type: 'gas', vy: 0.1 });
    }

    function spawnBrine() {
        const p = new THREE.Mesh(new THREE.SphereGeometry(0.1), new THREE.MeshBasicMaterial({color: 0x0ea5e9}));
        p.position.set((Math.random()-0.5)*5, 7, (Math.random()-0.5)*5);
        scene.add(p);
        particles.push({ mesh: p, type: 'liquid', vy: -0.08 });
    }

    function spawnPrecipitate(pos) {
        const p = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.2), new THREE.MeshStandardMaterial({color: 0xffffff}));
        p.add(createLabel("NaHCO₃", "#fff"));
        p.position.copy(pos);
        scene.add(p);
        particles.push({ mesh: p, type: 'solid', vy: -0.04 });
    }

    const controls = new OrbitControls(camera, renderer.domElement);
    document.getElementById('runBtn').onclick = () => { active = !active; };

    function animate() {
        requestAnimationFrame(animate);
        if(active) {
            if(Math.random() < 0.2) spawnCO2();
            if(Math.random() < 0.3) spawnBrine();
        }

        for(let i=particles.length-1; i>=0; i--) {
            const p = particles[i];
            p.mesh.position.y += p.vy;

            // Simple collision for reaction
            if(p.type === 'gas' && p.mesh.position.y > -2 && p.mesh.position.y < 2 && Math.random() < 0.02) {
                spawnPrecipitate(p.mesh.position);
                scene.remove(p.mesh);
                particles.splice(i, 1);
                continue;
            }

            if(p.mesh.position.y > 8 || p.mesh.position.y < -8) {
                scene.remove(p.mesh);
                particles.splice(i, 1);
            }
        }
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
