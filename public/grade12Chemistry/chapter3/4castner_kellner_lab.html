<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>⚡ castner‑kellner · nacl electrolysis</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:system-ui,sans-serif;background:#fff;min-height:100dvh;padding:12px}
    #canvas-container{width:100%;height:100dvh;position:relative;background:#f8fafc}
    .panel{position:absolute;bottom:20px;left:20px;right:20px;background:rgba(255,255,255,0.95);backdrop-filter:blur(8px);border-radius:30px;padding:16px 20px;border:1px solid #d0e2ff;max-width:360px;margin:0 auto;box-shadow:0 8px 24px rgba(0,0,0,0.04)}
    .btn{width:100%;padding:16px;border-radius:40px;border:none;font-weight:700;font-size:1rem;cursor:pointer;background:#3b82f6;color:#fff}
    .legend{display:flex;gap:16px;justify-content:center;margin-top:12px;font-size:0.8rem;color:#3a628c}
    .hint{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.9);padding:6px 14px;border-radius:40px;font-size:0.8rem;color:#3a628c}
  </style>
</head>
<body>
<div id="canvas-container"></div>
<div class="hint">🖱️ drag to rotate</div>
<div class="panel">
  <div style="font-weight:600;margin-bottom:8px;color:#3b82f6">🧪 Castner‑Kellner cell</div>
  <div style="font-size:0.8rem;color:#3a628c;margin-bottom:12px">NaCl → Na⁺ + Cl⁻ · Na forms amalgam with Hg</div>
  <button class="btn" id="powerBtn">▶ start electrolysis</button>
  <button class="btn" id="resetBtn" style="margin-top:8px;background:#fff;border:1.5px solid #d0e2ff;color:#3a628c">↻ reset</button>
  <div class="legend"><span style="color:#10b981">● Cl₂</span><span style="color:#f59e0b">● Na⁺</span><span style="color:#94a3b8">◼ Hg</span></div>
</div>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.128.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.128.0/examples/jsm/"}}</script>
<script type="module">
import*as THREE from'three';import{OrbitControls}from'three/addons/controls/OrbitControls.js';
const container=document.getElementById('canvas-container'),scene=new THREE.Scene();scene.background=new THREE.Color('#f8fafc');
const camera=new THREE.PerspectiveCamera(45,container.clientWidth/container.clientHeight,0.1,1000);camera.position.set(10,6,14);camera.lookAt(0,0,0);
const renderer=new THREE.WebGLRenderer({antialias:!0});renderer.setSize(container.clientWidth,container.clientHeight);renderer.shadowMap.enabled=!0;container.appendChild(renderer.domElement);
new OrbitControls(camera,renderer.domElement).enableDamping=!0;
scene.add(new THREE.AmbientLight(0xffffff,0.7));const dl=new THREE.DirectionalLight(0xffffff,1);dl.position.set(5,10,6);scene.add(dl);

const tank=new THREE.Mesh(new THREE.BoxGeometry(10,6,6),new THREE.MeshPhongMaterial({color:'#cbd5e1',transparent:!0,opacity:0.15,side:THREE.DoubleSide}));tank.position.y=0;scene.add(tank);
const hg=new THREE.Mesh(new THREE.BoxGeometry(9.5,0.6,5.5),new THREE.MeshStandardMaterial({color:'#94a3b8',metalness:0.9,roughness:0.1}));hg.position.y=-2.5;scene.add(hg);
const lWall=new THREE.Mesh(new THREE.BoxGeometry(0.2,5,6),new THREE.MeshStandardMaterial({color:'#64748b',transparent:!0,opacity:0.6}));lWall.position.x=-3.5;scene.add(lWall);
const rWall=lWall.clone();rWall.position.x=3.5;scene.add(rWall);
let running=!1,particles=[];
function spawn(type,x){
  const g=new THREE.Group();g.position.set(x+(Math.random()-0.5)*3,-2.3,(Math.random()-0.5)*4);
  if(type==='cl'){g.add(new THREE.Mesh(new THREE.SphereGeometry(0.16,6),new THREE.MeshStandardMaterial({color:'#10b981'})));g.userData={type:'cl'}}
  else{g.add(new THREE.Mesh(new THREE.SphereGeometry(0.12,6),new THREE.MeshStandardMaterial({color:'#f59e0b'})));g.userData={type:'na'}}
  scene.add(g);particles.push(g)
}
document.getElementById('powerBtn').onclick=()=>{running=!running; document.getElementById('powerBtn').textContent=running?'⏸ stop':'▶ start'};
document.getElementById('resetBtn').onclick=()=>{particles.forEach(p=>scene.remove(p)); particles=[]};
function animate(){requestAnimationFrame(animate);
  if(running){if(Math.random()<0.1){spawn('cl',-4.5); spawn('cl',4.5)} if(Math.random()<0.08)spawn('na',-4)}
  particles.forEach((p,i)=>{if(p.userData.type==='cl'){p.position.y+=0.05; if(p.position.y>3){scene.remove(p);particles.splice(i,1)}}else{p.position.x+=0.04; if(p.position.x>4){scene.remove(p);particles.splice(i,1)}}});
  renderer.render(scene,camera)}animate();
window.addEventListener('resize',()=>{const w=container.clientWidth,h=container.clientHeight;renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix()});
</script>
</body>
</html>
