<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🔋 PEM fuel cell</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:system-ui,sans-serif;background:#fff;min-height:100dvh;padding:12px}
    #canvas-container{width:100%;height:100dvh;position:relative;background:#f8fafc}
    .panel{position:absolute;bottom:20px;left:20px;right:20px;background:rgba(255,255,255,0.95);backdrop-filter:blur(8px);border-radius:30px;padding:16px 20px;border:1px solid #d0e2ff;max-width:360px;margin:0 auto;box-shadow:0 8px 24px rgba(0,0,0,0.04)}
    .status{display:inline-block;padding:4px 14px;border-radius:20px;font-size:0.7rem;font-weight:700;background:#e2e8f0;color:#3a628c}
    .status.active{background:#d1fae5;color:#065f46}
    .eq{font-family:'JetBrains Mono',monospace;font-size:0.8rem;color:#3b82f6;margin:10px 0}
    .btn{width:100%;padding:14px;border-radius:40px;border:none;font-weight:700;font-size:1rem;cursor:pointer;background:#3b82f6;color:#fff}
    .legend{display:flex;gap:16px;justify-content:center;margin-top:12px;font-size:0.8rem;color:#3a628c}
    .hint{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.9);padding:6px 14px;border-radius:40px;font-size:0.8rem;color:#3a628c}
  </style>
</head>
<body>
<div id="canvas-container"></div>
<div class="hint">🖱️ drag to rotate</div>
<div class="panel">
  <div style="display:flex;justify-content:space-between;align-items:center"><span>🔋 PEM cell</span><span class="status" id="statusBadge">standby</span></div>
  <div class="eq">H₂ → 2H⁺ + 2e⁻ · O₂ + 4H⁺ + 4e⁻ → 2H₂O</div>
  <button class="btn" id="powerBtn">▶ start reaction</button>
  <div class="legend"><span style="color:#7dd3fc">● H⁺</span><span style="color:#fbbf24">● e⁻</span><span style="color:#fff">● H₂O</span></div>
</div>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.128.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.128.0/examples/jsm/"}}</script>
<script type="module">
import*as THREE from'three';import{OrbitControls}from'three/addons/controls/OrbitControls.js';
const container=document.getElementById('canvas-container'),scene=new THREE.Scene();scene.background=new THREE.Color('#f8fafc');
const camera=new THREE.PerspectiveCamera(45,container.clientWidth/container.clientHeight,0.1,1000);camera.position.set(10,5,16);camera.lookAt(0,0,0);
const renderer=new THREE.WebGLRenderer({antialias:!0});renderer.setSize(container.clientWidth,container.clientHeight);renderer.shadowMap.enabled=!0;container.appendChild(renderer.domElement);
new OrbitControls(camera,renderer.domElement).enableDamping=!0;
scene.add(new THREE.AmbientLight(0xffffff,0.7));const dl=new THREE.DirectionalLight(0xffffff,1);dl.position.set(5,10,6);scene.add(dl);

const layer=new THREE.BoxGeometry(1,7,5.5);
const anode=new THREE.Mesh(layer,new THREE.MeshStandardMaterial({color:'#64748b'}));anode.position.x=-3.2;scene.add(anode);
const pem=new THREE.Mesh(layer,new THREE.MeshPhongMaterial({color:'#3b82f6',transparent:!0,opacity:0.35}));pem.position.x=0;scene.add(pem);
const cathode=new THREE.Mesh(layer,new THREE.MeshStandardMaterial({color:'#64748b'}));cathode.position.x=3.2;scene.add(cathode);
const wireCurve=new THREE.CatmullRomCurve3([new THREE.Vector3(-3.2,4,0),new THREE.Vector3(-3.2,6,0),new THREE.Vector3(0,7,0),new THREE.Vector3(3.2,6,0),new THREE.Vector3(3.2,4,0)]);
const wire=new THREE.Mesh(new THREE.TubeGeometry(wireCurve,64,0.08,6),new THREE.MeshStandardMaterial({color:'#475569'}));scene.add(wire);

let running=!1;const protons=[],electrons=[],waters=[];
const btn=document.getElementById('powerBtn'),badge=document.getElementById('statusBadge');
btn.onclick=()=>{running=!running; btn.textContent=running?'⏸ stop':'▶ start'; badge.textContent=running?'⚡ producing':'standby'; badge.className=running?'status active':'status'};

function animate(){requestAnimationFrame(animate);
  if(running){if(Math.random()<0.1){const p=new THREE.Mesh(new THREE.SphereGeometry(0.12,6),new THREE.MeshStandardMaterial({color:'#7dd3fc'}));p.position.set(-3.2,(Math.random()-0.5)*5,(Math.random()-0.5)*3.5);scene.add(p);protons.push(p)}
    if(Math.random()<0.08){const e=new THREE.Mesh(new THREE.SphereGeometry(0.09,5),new THREE.MeshStandardMaterial({color:'#fbbf24',emissive:'#fbbf24'}));e.position.copy(wireCurve.getPoint(0));scene.add(e);electrons.push({m:e,t:0})}
    protons.forEach((p,i)=>{p.position.x+=0.07; if(p.position.x>=2.8){const w=new THREE.Mesh(new THREE.SphereGeometry(0.22,6),new THREE.MeshPhongMaterial({color:'#fff',transparent:!0,opacity:0.5}));w.position.set(3.5,p.position.y,p.position.z);scene.add(w);waters.push(w);scene.remove(p);protons.splice(i,1)}});
    electrons.forEach((e,i)=>{e.t+=0.008; if(e.t<1)e.m.position.copy(wireCurve.getPoint(e.t)); else{scene.remove(e.m);electrons.splice(i,1)}});
    waters.forEach((w,i)=>{w.position.x+=0.02; w.position.y+=0.01; w.material.opacity-=0.005; if(w.material.opacity<=0){scene.remove(w);waters.splice(i,1)}})}
  renderer.render(scene,camera)}animate();
window.addEventListener('resize',()=>{const w=container.clientWidth,h=container.clientHeight;renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix()});
</script>
</body>
</html>
