<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Responsive 3D Galvanic Cell</title>
    <style>
        :root {
            --bg-glass: rgba(255, 255, 255, 0.9);
            --text-dark: #0c4a6e;
        }
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f4f8; }
        
        /* UI Layer using Flexbox for spacing */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: space-between; padding: 15px; box-sizing: border-box;
            z-index: 10;
        }

        .glass-card {
            pointer-events: auto; background: var(--bg-glass);
            backdrop-filter: blur(8px); padding: 15px; border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1); border: 1px solid #cbd5e1;
            width: 100%; max-width: 350px; align-self: flex-start;
        }

        .voltmeter-display {
            font-family: 'Courier New', Courier, monospace;
            background: #1e293b; color: #4ade80; padding: 12px;
            border-radius: 6px; text-align: center; font-size: 1.4rem; margin: 10px 0;
            border: 2px solid #334155;
        }

        /* Responsive Labels */
        .labels {
            position: absolute; width: 100%; top: 25%; display: flex;
            justify-content: space-around; pointer-events: none;
            font-weight: bold; color: #334155; font-size: 0.9rem;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .controls { align-self: center; width: 100%; max-width: 300px; text-align: center; }
        
        button {
            pointer-events: auto; background: #0284c7; color: white; border: none;
            width: 100%; padding: 14px; border-radius: 10px; font-weight: bold;
            cursor: pointer; font-size: 1rem; transition: transform 0.1s;
        }
        button:active { transform: scale(0.98); }

        /* Hide labels or adjust text on very small screens */
        @media (max-width: 600px) {
            .glass-card { max-width: 100%; }
            .labels { top: 35%; font-size: 0.7rem; }
            h2 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="glass-card">
        <h2 style="margin:0; color:var(--text-dark);">Galvanic Cell (Zn/Cu)</h2>
        <div class="voltmeter-display" id="voltage">0.00 V</div>
        <p style="font-size: 0.8rem; color: #64748b; margin-bottom:0;">
            <b>Anode:</b> Oxidation occurs.<br>
            <b>Cathode:</b> Reduction occurs.
        </p>
    </div>

    <div class="labels">
        <span>Zn Anode (-)</span>
        <span>Cu Cathode (+)</span>
    </div>

    <div class="controls">
        <button id="startBtn">Start Reaction</button>
    </div>
</div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';
    import { OrbitControls } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/controls/OrbitControls.js';

    // --- Scene & Camera ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf1f5f9);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Adaptive Camera View
    function adjustCamera() {
        const aspect = window.innerWidth / window.innerHeight;
        if (aspect < 1) { // Portrait (Mobile)
            camera.position.set(0, 15, 35);
        } else { // Landscape (Desktop)
            camera.position.set(0, 10, 25);
        }
        camera.lookAt(0, 0, 0);
    }
    adjustCamera();

    scene.add(new THREE.AmbientLight(0xffffff, 0.7), new THREE.DirectionalLight(0xffffff, 0.5));

    // --- Lab Equipment ---
    function makeBeaker(x, color) {
        const group = new THREE.Group();
        const glass = new THREE.Mesh(
            new THREE.CylinderGeometry(4, 4, 8, 32, 1, true),
            new THREE.MeshPhongMaterial({ color: 0xcccccc, transparent: true, opacity: 0.15, side: THREE.DoubleSide })
        );
        const liquid = new THREE.Mesh(
            new THREE.CylinderGeometry(3.9, 3.9, 6, 32),
            new THREE.MeshPhongMaterial({ color: color, transparent: true, opacity: 0.4 })
        );
        liquid.position.y = -1;
        group.add(glass, liquid);
        group.position.x = x;
        scene.add(group);
    }

    makeBeaker(-7, 0xbae6fd); // Zn side
    makeBeaker(7, 0x60a5fa);  // Cu side

    const znElectro = new THREE.Mesh(new THREE.BoxGeometry(1.2, 9, 0.2), new THREE.MeshStandardMaterial({color: 0xa1a1aa}));
    znElectro.position.set(-7, 1, 0);
    scene.add(znElectro);

    const cuElectro = new THREE.Mesh(new THREE.BoxGeometry(1.2, 9, 0.2), new THREE.MeshStandardMaterial({color: 0xb45309}));
    cuElectro.position.set(7, 1, 0);
    scene.add(cuElectro);

    // Wire & Salt Bridge
    const bridgeGeo = new THREE.TorusGeometry(7, 0.35, 16, 32, Math.PI);
    const saltBridge = new THREE.Mesh(bridgeGeo, new THREE.MeshStandardMaterial({color: 0xffffff, transparent: true, opacity: 0.8}));
    saltBridge.rotation.z = Math.PI;
    saltBridge.position.y = 4;
    scene.add(saltBridge);

    // --- Animation Logic ---
    let running = false;
    const electrons = [];
    const btn = document.getElementById('startBtn');
    const volt = document.getElementById('voltage');

    btn.addEventListener('click', () => {
        running = !running;
        btn.innerText = running ? "Stop Reaction" : "Start Reaction";
        btn.style.background = running ? "#ef4444" : "#0284c7";
        volt.innerText = running ? "1.10 V" : "0.00 V";
    });

    function createElectron() {
        const e = new THREE.Mesh(new THREE.SphereGeometry(0.18), new THREE.MeshBasicMaterial({color: 0xffff00}));
        e.position.set(-7, 5, 0);
        scene.add(e);
        electrons.push({ mesh: e, progress: 0 });
    }

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.enableZoom = false; // Prevent accidental zoom on mobile scroll

    function animate() {
        requestAnimationFrame(animate);
        if (running && Math.random() < 0.08) createElectron();

        electrons.forEach((e, i) => {
            e.progress += 0.008;
            if (e.progress < 0.3) e.mesh.position.y += 0.15;
            else if (e.progress < 0.7) e.mesh.position.x += 0.35;
            else if (e.progress < 1.0) e.mesh.position.y -= 0.15;
            else {
                scene.remove(e.mesh);
                electrons.splice(i, 1);
            }
        });

        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    // --- Handle Screen Resizing ---
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        adjustCamera();
    });
</script>
</body>
</html>
