<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>⚡ redox · leo says ger</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:system-ui,sans-serif;background:#fff;min-height:100dvh;padding:12px}
    #canvas-container{width:100%;height:100dvh;position:relative;background:#f8fafc}
    .panel{position:absolute;bottom:20px;left:20px;right:20px;background:rgba(255,255,255,0.95);backdrop-filter:blur(8px);border-radius:30px;padding:16px 20px;border:1px solid #d0e2ff;max-width:360px;margin:0 auto;box-shadow:0 8px 24px rgba(0,0,0,0.04)}
    .eq{text-align:center;font-weight:600;color:#3b82f6;margin-bottom:12px}
    .btn{width:100%;padding:16px;border-radius:40px;border:none;font-weight:700;font-size:1rem;cursor:pointer;background:#3b82f6;color:#fff}
    .mnemonic{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2.5rem;font-weight:900;color:#f59e0b;text-shadow:0 0 20px #f59e0b;opacity:0;transition:0.3s;pointer-events:none;white-space:nowrap}
    .legend{display:flex;gap:16px;justify-content:center;margin-top:12px;font-size:0.8rem;color:#3a628c}
    .hint{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.9);padding:6px 14px;border-radius:40px;font-size:0.8rem;color:#3a628c}
  </style>
</head>
<body>
<div id="canvas-container"></div>
<div class="hint">🖱️ drag to rotate</div>
<div class="mnemonic" id="mnemonic">LEO says GER</div>
<div class="panel">
  <div class="eq">Mg + 2H⁺ → Mg²⁺ + H₂</div>
  <button class="btn" id="redoxBtn">⚡ transfer electrons</button>
  <div class="legend"><span style="color:#94a3b8">● Mg</span><span style="color:#3b82f6">● H⁺</span><span style="color:#f59e0b">● e⁻</span></div>
</div>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.128.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.128.0/examples/jsm/"}}</script>
<script type="module">
import*as THREE from'three';import{OrbitControls}from'three/addons/controls/OrbitControls.js';
const container=document.getElementById('canvas-container'),scene=new THREE.Scene();scene.background=new THREE.Color('#f8fafc');
const camera=new THREE.PerspectiveCamera(45,container.clientWidth/container.clientHeight,0.1,1000);camera.position.set(0,2,12);camera.lookAt(0,0,0);
const renderer=new THREE.WebGLRenderer({antialias:!0});renderer.setSize(container.clientWidth,container.clientHeight);container.appendChild(renderer.domElement);
new OrbitControls(camera,renderer.domElement).enableDamping=!0;
scene.add(new THREE.AmbientLight(0xffffff,0.7));const dl=new THREE.DirectionalLight(0xffffff,1);dl.position.set(5,8,5);scene.add(dl);

const mg=new THREE.Mesh(new THREE.SphereGeometry(1.3,24),new THREE.MeshStandardMaterial({color:'#94a3b8'}));mg.position.x=-3;scene.add(mg);
const h1=new THREE.Mesh(new THREE.SphereGeometry(0.6,16),new THREE.MeshStandardMaterial({color:'#3b82f6',emissive:'#1e4a8b',emissiveIntensity:0.2}));h1.position.set(3,1,0);scene.add(h1);
const h2=h1.clone();h2.position.set(3,-1,0);scene.add(h2);
const e1=new THREE.Mesh(new THREE.SphereGeometry(0.18,8),new THREE.MeshStandardMaterial({color:'#f59e0b',emissive:'#f59e0b',emissiveIntensity:0.6}));e1.visible=!1;scene.add(e1);
const e2=e1.clone();e2.visible=!1;scene.add(e2);

let phase=0;const btn=document.getElementById('redoxBtn'),mnemonic=document.getElementById('mnemonic');
btn.onclick=()=>{if(phase!==0)return; phase=1; btn.disabled=!0; mnemonic.style.opacity='1'; e1.visible=e2.visible=!0; e1.position.set(-3,0.4,0.2); e2.position.set(-3,-0.4,-0.2);
  let p=0; const int=setInterval(()=>{p+=0.012;
    e1.position.x=-3+p*6; e1.position.y=0.4+Math.sin(p*Math.PI)*0.8;
    e2.position.x=-3+p*6; e2.position.y=-0.4-Math.sin(p*Math.PI)*0.8;
    mg.scale.setScalar(1-p*0.3); mg.material.color.lerp(new THREE.Color('#60a5fa'),0.01);
    if(p>0.7){h1.position.y-=0.01; h2.position.y+=0.01}
    if(p>=1){clearInterval(int); e1.visible=e2.visible=!1; mnemonic.style.opacity='0'}
  },16)
};

function animate(){requestAnimationFrame(animate);renderer.render(scene,camera)}animate();
window.addEventListener('resize',()=>{const w=container.clientWidth,h=container.clientHeight;renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix()});
</script>
</body>
</html>
