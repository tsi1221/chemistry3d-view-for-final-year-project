<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Corrosion Micro-Cell</title>
    <style>
        :root { --iron: #475569; --rust: #92400e; --water: rgba(14, 165, 233, 0.4); }
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #f8fafc; }
        
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box;
        }

        .glass-panel {
            pointer-events: auto; background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px); padding: 15px; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; width: 320px;
        }

        .legend { margin-top: 10px; font-size: 0.8rem; line-height: 1.5; }
        .dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }

        .controls { margin-top: auto; align-self: center; width: 100%; max-width: 300px; text-align: center; }
        button {
            pointer-events: auto; background: #ea580c; color: white; border: none;
            width: 100%; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="ui">
    <div class="glass-panel">
        <h2 style="margin:0; color:#7c2d12;">Corrosion Micro-Cell</h2>
        <p style="font-size: 0.85rem; color: #64748b;">Oxygen ($O_2$) at the edges drives the oxidation of Iron ($Fe$) in the pit.</p>
        
        <div class="legend">
            <div><span class="dot" style="background:#ea580c;"></span><b>Anode (Pit):</b> $Fe \rightarrow Fe^{2+} + 2e^-$</div>
            <div><span class="dot" style="background:#38bdf8;"></span><b>Cathode (Edge):</b> $O_2$ Reduction</div>
            <div><span class="dot" style="background:#92400e;"></span><b>Rust:</b> $Fe_2O_3 \cdot nH_2O$</div>
        </div>
    </div>

    <div class="controls">
        <button id="rustBtn">Start Oxidation</button>
    </div>
</div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';
    import { OrbitControls } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf1f5f9);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.7), new THREE.DirectionalLight(0xffffff, 0.4));
    camera.position.set(0, 12, 20);

    // --- The Iron Bar with a "Pit" ---
    const ironGeo = new THREE.BoxGeometry(15, 2, 8);
    const ironMat = new THREE.MeshStandardMaterial({ color: 0x475569, metalness: 0.6, roughness: 0.4 });
    const ironBar = new THREE.Mesh(ironGeo, ironMat);
    ironBar.position.y = -1;
    scene.add(ironBar);

    // Create the "Pit" (a small subtraction visual)
    const pitGeo = new THREE.SphereGeometry(1.5, 32, 32);
    const pit = new THREE.Mesh(pitGeo, new THREE.MeshStandardMaterial({ color: 0x334155 }));
    pit.position.set(0, 0, 0);
    pit.scale.y = 0.5;
    scene.add(pit);

    // --- The Water Droplet ---
    const dropGeo = new THREE.SphereGeometry(5, 32, 32, 0, Math.PI * 2, 0, Math.PI / 2);
    const dropMat = new THREE.MeshPhongMaterial({ color: 0x0ea5e9, transparent: true, opacity: 0.4, shininess: 100 });
    const droplet = new THREE.Mesh(dropGeo, dropMat);
    droplet.position.y = 0;
    scene.add(droplet);

    // --- Rust Particles ---
    const rustGroup = new THREE.Group();
    scene.add(rustGroup);
    let active = false;

    function createRustFlake() {
        const flake = new THREE.Mesh(
            new THREE.SphereGeometry(0.2 + Math.random()*0.3, 8, 8),
            new THREE.MeshStandardMaterial({ color: 0x92400e, roughness: 1 })
        );
        flake.position.set((Math.random()-0.5)*6, 0.1, (Math.random()-0.5)*6);
        rustGroup.add(flake);
    }

    document.getElementById('rustBtn').addEventListener('click', () => {
        active = !active;
        document.getElementById('rustBtn').innerText = active ? "Stop" : "Start Oxidation";
    });

    const controls = new OrbitControls(camera, renderer.domElement);
    
    function animate() {
        requestAnimationFrame(animate);
        if(active && Math.random() < 0.2) {
            createRustFlake();
            // Slowly change pit color to darker rust
            pit.material.color.lerp(new THREE.Color(0x451a03), 0.005);
        }
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
