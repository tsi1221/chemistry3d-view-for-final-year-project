<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Electroplating Lab</title>
    <style>
        :root { --primary: #f97316; --secondary: #b45309; }
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; background: #fafafa; }
        
        #ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: space-between; padding: 20px; box-sizing: border-box;
        }

        .glass-card {
            pointer-events: auto; background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px); padding: 15px; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e2e8f0;
            width: 100%; max-width: 360px;
        }

        .battery-indicator {
            display: flex; align-items: center; justify-content: center;
            background: #334155; color: #fbbf24; padding: 10px;
            border-radius: 8px; font-weight: bold; margin: 10px 0;
        }

        .controls { align-self: center; width: 100%; max-width: 320px; text-align: center; }
        
        button {
            pointer-events: auto; background: var(--primary); color: white; border: none;
            width: 100%; padding: 15px; border-radius: 12px; font-weight: bold;
            cursor: pointer; font-size: 1rem; box-shadow: 0 4px 0 var(--secondary);
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--secondary); }
        
        .labels {
            position: absolute; width: 100%; top: 35%; display: flex;
            justify-content: space-around; pointer-events: none;
            font-weight: bold; color: #475569; font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div id="ui-overlay">
    <div class="glass-card">
        <h2 style="margin:0; color:#c2410c;">Electroplating Lab</h2>
        <div class="battery-indicator">🔋 DC SOURCE: <span id="volt">ON</span></div>
        <p style="font-size: 0.8rem; color: #64748b; margin: 5px 0;">
            <b>Cathode (Key):</b> $Cu^{2+} + 2e^- \rightarrow Cu_{(s)}$<br>
            <b>Anode (Cu):</b> $Cu_{(s)} \rightarrow Cu^{2+} + 2e^-$
        </p>
    </div>

    <div class="labels">
        <span>IMPURE COPPER (+)</span>
        <span>IRON KEY (-)</span>
    </div>

    <div class="controls">
        <button id="powerBtn">Start Electroplating</button>
    </div>
</div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';
    import { OrbitControls } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/controls/OrbitControls.js';

    // --- Scene Setup ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Responsive Camera
    function adjustCam() {
        const isMobile = window.innerWidth < window.innerHeight;
        camera.position.set(0, 8, isMobile ? 30 : 22);
    }
    adjustCam();

    scene.add(new THREE.AmbientLight(0xffffff, 0.8), new THREE.DirectionalLight(0xffffff, 0.4));

    // --- Components ---
    // Beaker & Electrolyte (CuSO4)
    const beaker = new THREE.Mesh(
        new THREE.CylinderGeometry(5, 5, 10, 32, 1, true),
        new THREE.MeshPhongMaterial({ color: 0xcccccc, transparent: true, opacity: 0.15, side: THREE.DoubleSide })
    );
    const electrolyte = new THREE.Mesh(
        new THREE.CylinderGeometry(4.9, 4.9, 8, 32),
        new THREE.MeshPhongMaterial({ color: 0x0ea5e9, transparent: true, opacity: 0.3 })
    );
    electrolyte.position.y = -1;
    scene.add(beaker, electrolyte);

    // Anode (Copper Slab)
    const copperAnode = new THREE.Mesh(new THREE.BoxGeometry(1.5, 9, 0.3), new THREE.MeshStandardMaterial({color: 0xb45309}));
    copperAnode.position.set(-3, 1, 0);
    scene.add(copperAnode);

    // Cathode (The Key)
    const keyGroup = new THREE.Group();
    const keyHead = new THREE.Mesh(new THREE.TorusGeometry(1, 0.2, 16, 32), new THREE.MeshStandardMaterial({color: 0x64748b}));
    const keyBody = new THREE.Mesh(new THREE.BoxGeometry(0.3, 3, 0.2), new THREE.MeshStandardMaterial({color: 0x64748b}));
    keyBody.position.y = -1.5;
    keyGroup.add(keyHead, keyBody);
    keyGroup.position.set(3, 2, 0);
    scene.add(keyGroup);

    // --- Particle & Mud System ---
    const ions = [];
    const mudParticles = [];
    let active = false;

    function createIon() {
        const ion = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshStandardMaterial({color: 0xf97316, emissive: 0xb45309}));
        ion.position.set(-3, (Math.random()-0.5)*6, 0);
        scene.add(ion);
        ions.push({ mesh: ion, progress: 0 });
    }

    function createMud() {
        const mud = new THREE.Mesh(new THREE.SphereGeometry(0.1), new THREE.MeshStandardMaterial({color: 0x451a03}));
        mud.position.set(-3 + (Math.random()-0.5), -1, 0);
        scene.add(mud);
        mudParticles.push({ mesh: mud, vy: -0.02 });
    }

    const btn = document.getElementById('powerBtn');
    btn.addEventListener('click', () => {
        active = !active;
        btn.innerText = active ? "Stop Power" : "Start Electroplating";
        btn.style.background = active ? "#ef4444" : "#f97316";
    });

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableZoom = false;

    function animate() {
        requestAnimationFrame(animate);
        
        if (active) {
            if (Math.random() < 0.1) createIon();
            if (Math.random() < 0.03) createMud();
            
            // Plating effect: darken key slightly to show "coating"
            keyHead.material.color.lerp(new THREE.Color(0xb45309), 0.0005);
            keyBody.material.color.lerp(new THREE.Color(0xb45309), 0.0005);
        }

        ions.forEach((ion, i) => {
            ion.progress += 0.01;
            ion.mesh.position.x += 0.06; // Move Anode -> Cathode
            ion.mesh.position.y += Math.sin(Date.now() * 0.005 + i) * 0.02;
            if (ion.mesh.position.x > 3) {
                scene.remove(ion.mesh);
                ions.splice(i, 1);
            }
        });

        mudParticles.forEach((mud, i) => {
            if (mud.mesh.position.y > -4.5) mud.mesh.position.y += mud.vy;
        });

        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        adjustCam();
    });
</script>
</body>
</html>
