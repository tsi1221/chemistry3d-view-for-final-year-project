<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🧬 polymer · architecture</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:system-ui,sans-serif;background:#fff;min-height:100dvh;padding:12px}
    #canvas-container{width:100%;height:100dvh;position:relative;background:#f8fafc}
    .panel{position:absolute;bottom:20px;left:20px;right:20px;background:rgba(255,255,255,0.95);backdrop-filter:blur(8px);border-radius:30px;padding:16px 20px;border:1px solid #d0e2ff;max-width:400px;margin:0 auto;box-shadow:0 8px 24px rgba(0,0,0,0.04)}
    .modes{display:flex;gap:6px;margin:12px 0}
    .mode{flex:1;padding:10px;border-radius:30px;border:1.5px solid #d0e2ff;background:#fff;font-weight:600;cursor:pointer;color:#3a628c;font-size:0.8rem}
    .mode.active{background:#3b82f6;border-color:#3b82f6;color:#fff}
    .stats{display:flex;gap:12px;margin:8px 0}
    .stat{flex:1;background:#f0f6ff;border-radius:14px;padding:8px;text-align:center}
    .stat-label{font-size:0.6rem;color:#3a628c}.stat-val{font-weight:700;color:#3b82f6}
    .legend{display:flex;gap:16px;justify-content:center;margin-top:12px;font-size:0.8rem;color:#3a628c}
    .hint{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.9);padding:6px 14px;border-radius:40px;font-size:0.8rem;color:#3a628c}
  </style>
</head>
<body>
<div id="canvas-container"></div>
<div class="hint">🖱️ drag to rotate</div>
<div class="panel">
  <div class="modes"><button class="mode active" data-mode="linear">📏 linear</button><button class="mode" data-mode="branched">🌿 branched</button><button class="mode" data-mode="cross">🔗 cross‑linked</button></div>
  <div class="stats"><div class="stat"><div class="stat-label">type</div><div class="stat-val" id="typeDisp">Linear</div></div><div class="stat"><div class="stat-label">density</div><div class="stat-val" id="densityDisp">High</div></div></div>
  <div class="legend"><span style="color:#475569">● C</span><span style="color:#3b82f6">― bond</span></div>
</div>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.128.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.128.0/examples/jsm/"}}</script>
<script type="module">
import*as THREE from'three';import{OrbitControls}from'three/addons/controls/OrbitControls.js';
const container=document.getElementById('canvas-container'),scene=new THREE.Scene();scene.background=new THREE.Color('#f8fafc');
const camera=new THREE.PerspectiveCamera(45,container.clientWidth/container.clientHeight,0.1,1000);camera.position.set(6,4,12);camera.lookAt(0,0,0);
const renderer=new THREE.WebGLRenderer({antialias:!0});renderer.setSize(container.clientWidth,container.clientHeight);container.appendChild(renderer.domElement);
new OrbitControls(camera,renderer.domElement).enableDamping=!0;
scene.add(new THREE.AmbientLight(0xffffff,0.7));const dl=new THREE.DirectionalLight(0xffffff,1);dl.position.set(5,8,5);scene.add(dl);
const polymer=new THREE.Group();scene.add(polymer);
const typeD=document.getElementById('typeDisp'),densityD=document.getElementById('densityDisp');
function addBond(s,e){const d=s.distanceTo(e),c=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.06,d,6),new THREE.MeshStandardMaterial({color:'#3b82f6'}));c.position.copy(s).lerp(e,0.5);c.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),e.clone().sub(s).normalize());polymer.add(c)}
function build(m){
  while(polymer.children.length)polymer.remove(polymer.children[0]);
  if(m==='linear'){for(let i=-5;i<=5;i++){const p=new THREE.Vector3(i*1.2,Math.sin(i*0.7)*0.2,0);const c=new THREE.Mesh(new THREE.SphereGeometry(0.3,12),new THREE.MeshStandardMaterial({color:'#475569'}));c.position.copy(p);polymer.add(c); if(i<5)addBond(p,new THREE.Vector3((i+1)*1.2,Math.sin((i+1)*0.7)*0.2,0))}
    typeD.textContent='Linear'; densityD.textContent='High'}
  else if(m==='branched'){for(let i=-4;i<=4;i++){const p=new THREE.Vector3(i*1.4,0,0);const c=new THREE.Mesh(new THREE.SphereGeometry(0.3,12),new THREE.MeshStandardMaterial({color:'#475569'}));c.position.copy(p);polymer.add(c); if(i<4)addBond(p,new THREE.Vector3((i+1)*1.4,0,0));
    if(i%2===0&&i!==0){const b=new THREE.Vector3(i*1.4,1.1,0.2);const bc=new THREE.Mesh(new THREE.SphereGeometry(0.28,10),new THREE.MeshStandardMaterial({color:'#3b82f6'}));bc.position.copy(b);polymer.add(bc);addBond(p,b)}}
    typeD.textContent='Branched'; densityD.textContent='Medium'}
  else{for(let r=0;r<3;r++)for(let c=-3;c<=3;c++){const p=new THREE.Vector3(c*1.5,r*1.2-1.2,0);const carb=new THREE.Mesh(new THREE.SphereGeometry(0.3,12),new THREE.MeshStandardMaterial({color:'#475569'}));carb.position.copy(p);polymer.add(carb); if(c<3)addBond(p,new THREE.Vector3((c+1)*1.5,r*1.2-1.2,0)); if(r>0&&(c===-1||c===2))addBond(p,new THREE.Vector3(c*1.5,(r-1)*1.2-1.2,0))}
    typeD.textContent='Cross-linked'; densityD.textContent='Rigid'}}
document.querySelectorAll('.mode').forEach(b=>b.onclick=()=>{document.querySelectorAll('.mode').forEach(x=>x.classList.remove('active'));b.classList.add('active');build(b.dataset.mode)});
function animate(){requestAnimationFrame(animate);renderer.render(scene,camera)}animate();
window.addEventListener('resize',()=>{const w=container.clientWidth,h=container.clientHeight;renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix()});
build('linear');
</script>
</body>
</html>
