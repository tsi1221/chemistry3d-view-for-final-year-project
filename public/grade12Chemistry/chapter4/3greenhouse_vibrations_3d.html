<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CO2 Molecular Dynamics - Pro Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000814; font-family: 'Segoe UI', sans-serif; color: #ffffff; }
        
        #ui-layer {
            position: absolute; top: 20px; left: 20px; padding: 25px; width: 280px;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px; z-index: 10;
        }

        h2 { margin: 0 0 10px 0; color: #007AFF; font-size: 1.2rem; }
        p { font-size: 0.85rem; opacity: 0.8; margin-bottom: 20px; }

        button {
            width: 100%; padding: 12px; background: #ffffff; border: none;
            border-radius: 6px; color: #001d3d; font-weight: 700;
            cursor: pointer; transition: 0.3s;
        }

        button:hover { background: #007AFF; color: white; }

        /* Floating Label Style */
        .label {
            position: absolute; color: white; font-weight: bold;
            pointer-events: none; font-size: 14px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h2>$CO_2$ IR Absorption</h2>
        <p>Click to simulate an Infrared photon hitting the molecule and triggering asymmetric stretching.</p>
        <button onclick="triggerInfrared()">EMIT IR PHOTON</button>
    </div>

    <div id="labelC" class="label">Carbon</div>
    <div id="labelL" class="label">Oxygen</div>
    <div id="labelR" class="label">Oxygen</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, carbon, oxygenL, oxygenR;
        let bonds = [];
        let isVibrating = false;
        let clock = new THREE.Clock();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const light = new THREE.DirectionalLight(0xffffff, 1.5);
            light.position.set(5, 5, 5);
            scene.add(light, new THREE.AmbientLight(0x404040, 2));

            // Atoms
            const carbonMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const oxygenMat = new THREE.MeshStandardMaterial({ color: 0x007AFF });
            
            carbon = new THREE.Mesh(new THREE.SphereGeometry(0.5, 32, 32), carbonMat);
            oxygenL = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32), oxygenMat);
            oxygenR = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32), oxygenMat);

            scene.add(carbon, oxygenL, oxygenR);

            // Double Bonds (2 cylinders per side)
            const bondGeom = new THREE.CylinderGeometry(0.04, 0.04, 1, 16);
            const bondMat = new THREE.MeshStandardMaterial({ color: 0x666666 });

            for(let i=0; i<4; i++) {
                let b = new THREE.Mesh(bondGeom, bondMat);
                b.rotation.z = Math.PI / 2;
                bonds.push(b);
                scene.add(b);
            }

            animate();
        }

        function triggerInfrared() {
            alert("⚠️ Infrared Radiation Detected!\nThe molecule is absorbing energy and beginning to vibrate.");
            isVibrating = true;
            setTimeout(() => { isVibrating = false; }, 5000);
        }

        function updateLabels() {
            const labels = [
                { el: document.getElementById('labelC'), obj: carbon },
                { el: document.getElementById('labelL'), obj: oxygenL },
                { el: document.getElementById('labelR'), obj: oxygenR }
            ];

            labels.forEach(l => {
                const vector = l.obj.position.clone().project(camera);
                l.el.style.left = (vector.x + 1) / 2 * window.innerWidth + 'px';
                l.el.style.top = -(vector.y - 1) / 2 * window.innerHeight - 50 + 'px';
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            let t = clock.getElapsedTime() * 15;

            if (isVibrating) {
                const off = Math.sin(t) * 0.4;
                oxygenL.position.x = -1.5 + off;
                oxygenR.position.x = 1.5 + off;
                carbon.position.y = Math.cos(t) * 0.1; 
            } else {
                oxygenL.position.x = THREE.MathUtils.lerp(oxygenL.position.x, -1.5, 0.1);
                oxygenR.position.x = THREE.MathUtils.lerp(oxygenR.position.x, 1.5, 0.1);
                carbon.position.y = THREE.MathUtils.lerp(carbon.position.y, 0, 0.1);
            }

            // Update Double Bonds
            updateDoubleBond(bonds[0], bonds[1], carbon, oxygenL, 0.1);
            updateDoubleBond(bonds[2], bonds[3], carbon, oxygenR, 0.1);

            updateLabels();
            renderer.render(scene, camera);
        }

        function updateDoubleBond(b1, b2, a1, a2, gap) {
            const mid = a1.position.clone().lerp(a2.position, 0.5);
            const dist = a1.position.distanceTo(a2.position);
            const dir = a2.position.clone().sub(a1.position).normalize();
            
            [b1, b2].forEach((b, i) => {
                b.position.copy(mid);
                b.position.y += (i === 0 ? gap : -gap);
                b.scale.y = dist;
                b.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
            });
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
