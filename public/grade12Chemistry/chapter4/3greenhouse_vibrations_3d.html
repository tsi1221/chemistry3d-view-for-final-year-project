<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🧬 poly · vsepr</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:system-ui,sans-serif;background:#fff;height:100dvh;display:flex;flex-direction:column}
    #canvas-container{flex:1;background:#f8fafc}
    .sidebar{position:absolute;top:16px;left:16px;bottom:16px;width:240px;background:rgba(255,255,255,0.95);backdrop-filter:blur(8px);border-radius:24px;padding:20px;border:1px solid #d0e2ff;overflow-y:auto}
    .logo{font-weight:800;font-size:1.2rem;color:#3b82f6;margin-bottom:24px}
    .section{font-size:0.65rem;text-transform:uppercase;color:#3a628c;margin:16px 0 8px}
    .nav-btn{width:100%;padding:12px 14px;border-radius:14px;border:1.5px solid transparent;background:transparent;text-align:left;font-weight:600;color:#3a628c;cursor:pointer;margin-bottom:4px}
    .nav-btn.active{background:#3b82f6;border-color:#3b82f6;color:#fff}
    .info-panel{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.95);backdrop-filter:blur(8px);border-radius:20px;padding:18px;border:1px solid #d0e2ff;max-width:260px}
    .info-title{font-weight:700;color:#3b82f6;margin-bottom:6px}
    .info-desc{font-size:0.85rem;color:#3a628c;line-height:1.5}
    .hint{position:absolute;bottom:16px;right:16px;background:rgba(255,255,255,0.9);padding:6px 14px;border-radius:40px;font-size:0.8rem;color:#3a628c}
    @media(max-width:700px){.sidebar{position:static;width:100%;border-radius:0;margin-bottom:8px}}
  </style>
</head>
<body>
<div id="canvas-container"></div>
<div class="sidebar">
  <div class="logo">🧬 poly·lab</div>
  <div class="section">polymers</div>
  <button class="nav-btn active" data-mode="linear">📏 linear · HDPE</button>
  <button class="nav-btn" data-mode="branched">🌿 branched · LDPE</button>
  <button class="nav-btn" data-mode="crosslink">🔗 cross‑linked</button>
  <div class="section">vsepr</div>
  <button class="nav-btn" data-mode="tetrahedral">💎 tetrahedral · CH₄</button>
  <button class="nav-btn" data-mode="bent">💧 bent · H₂O</button>
</div>
<div class="info-panel"><div class="info-title" id="modeTitle">Linear Polymer</div><div class="info-desc" id="modeDesc">High-density · chains pack tightly · rigid</div></div>
<div class="hint">🖱️ drag to rotate</div>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.128.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.128.0/examples/jsm/"}}</script>
<script type="module">
import*as THREE from'three';import{OrbitControls}from'three/addons/controls/OrbitControls.js';
const container=document.getElementById('canvas-container'),scene=new THREE.Scene();scene.background=new THREE.Color('#f8fafc');
const camera=new THREE.PerspectiveCamera(45,container.clientWidth/container.clientHeight,0.1,1000);camera.position.set(6,4,12);camera.lookAt(0,0,0);
const renderer=new THREE.WebGLRenderer({antialias:!0});renderer.setSize(container.clientWidth,container.clientHeight);renderer.shadowMap.enabled=!0;container.appendChild(renderer.domElement);
new OrbitControls(camera,renderer.domElement).enableDamping=!0;
scene.add(new THREE.AmbientLight(0xffffff,0.7));const dl=new THREE.DirectionalLight(0xffffff,1);dl.position.set(5,8,5);scene.add(dl);
const mol=new THREE.Group();scene.add(mol);
const title=document.getElementById('modeTitle'),desc=document.getElementById('modeDesc');
function addBond(s,e){const d=s.distanceTo(e),c=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.06,d,6),new THREE.MeshStandardMaterial({color:'#3b82f6'}));c.position.copy(s).lerp(e,0.5);c.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),e.clone().sub(s).normalize());mol.add(c)}
function build(m){
  while(mol.children.length)mol.remove(mol.children[0]);
  if(m==='linear'){title.textContent='Linear · HDPE';desc.textContent='High-density · chains pack tightly · rigid';
    for(let i=-5;i<=5;i++){const p=new THREE.Vector3(i*1.2,Math.sin(i*0.6)*0.2,0);const c=new THREE.Mesh(new THREE.SphereGeometry(0.3,12),new THREE.MeshStandardMaterial({color:'#475569'}));c.position.copy(p);mol.add(c); if(i<5)addBond(p,new THREE.Vector3((i+1)*1.2,Math.sin((i+1)*0.6)*0.2,0))}}
  else if(m==='branched'){title.textContent='Branched · LDPE';desc.textContent='Low-density · branches prevent packing · flexible';
    for(let i=-4;i<=4;i++){const p=new THREE.Vector3(i*1.5,0,0);const c=new THREE.Mesh(new THREE.SphereGeometry(0.3,12),new THREE.MeshStandardMaterial({color:'#475569'}));c.position.copy(p);mol.add(c); if(i<4)addBond(p,new THREE.Vector3((i+1)*1.5,0,0));
      if(i%2===0&&i!==0){const b=new THREE.Vector3(i*1.5,1.3,0.2);const bc=new THREE.Mesh(new THREE.SphereGeometry(0.26,10),new THREE.MeshStandardMaterial({color:'#3b82f6'}));bc.position.copy(b);mol.add(bc);addBond(p,b)}}}
  else if(m==='crosslink'){title.textContent='Cross‑linked';desc.textContent='Covalent bridges · rigid · heat‑resistant';
    for(let r=0;r<3;r++)for(let c=-3;c<=3;c++){const p=new THREE.Vector3(c*1.4,r*1.3-1.3,0);const carb=new THREE.Mesh(new THREE.SphereGeometry(0.28,12),new THREE.MeshStandardMaterial({color:'#475569'}));carb.position.copy(p);mol.add(carb); if(c<3)addBond(p,new THREE.Vector3((c+1)*1.4,r*1.3-1.3,0)); if(r>0&&(c===-1||c===2))addBond(p,new THREE.Vector3(c*1.4,(r-1)*1.3-1.3,0))}}
  else if(m==='tetrahedral'){title.textContent='Tetrahedral · CH₄';desc.textContent='VSEPR · 4 bonds · 109.5°';
    const c=new THREE.Vector3(0,0,0);const carb=new THREE.Mesh(new THREE.SphereGeometry(0.45,16),new THREE.MeshStandardMaterial({color:'#475569'}));carb.position.copy(c);mol.add(carb);
    [[1.5,1.5,1.5],[-1.5,-1.5,1.5],[-1.5,1.5,-1.5],[1.5,-1.5,-1.5]].forEach(v=>{const p=new THREE.Vector3(...v);const h=new THREE.Mesh(new THREE.SphereGeometry(0.24,10),new THREE.MeshStandardMaterial({color:'#94a3b8'}));h.position.copy(p);mol.add(h);addBond(c,p)})}
  else if(m==='bent'){title.textContent='Bent · H₂O';desc.textContent='VSEPR · 2 bonds + 2 lone pairs · ~104.5°';
    const o=new THREE.Vector3(0,0,0);const ox=new THREE.Mesh(new THREE.SphereGeometry(0.4,16),new THREE.MeshStandardMaterial({color:'#ef4444'}));ox.position.copy(o);mol.add(ox);
    [[1.1,0.7,0],[-1.1,0.7,0]].forEach(v=>{const p=new THREE.Vector3(...v);const h=new THREE.Mesh(new THREE.SphereGeometry(0.22,10),new THREE.MeshStandardMaterial({color:'#94a3b8'}));h.position.copy(p);mol.add(h);addBond(o,p)});
    [[0.5,-0.7,0.7],[-0.5,-0.7,-0.7]].forEach(v=>{const lp=new THREE.Mesh(new THREE.SphereGeometry(0.18,8),new THREE.MeshStandardMaterial({color:'#3b82f6'}));lp.position.set(v[0],v[1],v[2]);mol.add(lp)})}}
document.querySelectorAll('.nav-btn').forEach(b=>b.onclick=()=>{document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');build(b.dataset.mode)});
function animate(){requestAnimationFrame(animate);renderer.render(scene,camera)}animate();
window.addEventListener('resize',()=>{const w=container.clientWidth,h=container.clientHeight;renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix()});
build('linear');
</script>
</body>
</html>
