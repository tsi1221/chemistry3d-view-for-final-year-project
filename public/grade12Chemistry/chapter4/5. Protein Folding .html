<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protein Folding 3D</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: #0f172a;
    color: white;
  }

  #ui {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
  }

  button {
    margin: 5px;
    padding: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #2563eb;
    color: white;
  }

  button:hover {
    background: #1d4ed8;
  }
</style>
</head>

<body>

<div id="ui">
  <button onclick="showHelix()">Alpha Helix</button>
  <button onclick="showSheet()">Beta Sheet</button>
  <button onclick="toggleColors()">Hydrophobic Mode</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>

<script>
let scene, camera, renderer, controls;
let proteinGroup;
let hydrophobic = false;

init();
animate();

function init() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.z = 20;

  renderer = new THREE.WebGLRenderer({antialias: true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  controls = new THREE.OrbitControls(camera, renderer.domElement);

  const light = new THREE.PointLight(0xffffff, 1);
  light.position.set(10, 10, 10);
  scene.add(light);

  proteinGroup = new THREE.Group();
  scene.add(proteinGroup);

  showHelix();
}

function clearScene() {
  while(proteinGroup.children.length > 0) {
    proteinGroup.remove(proteinGroup.children[0]);
  }
}

function showHelix() {
  clearScene();

  for (let i = 0; i < 50; i++) {
    let angle = i * 0.3;
    let x = Math.cos(angle) * 3;
    let y = i * 0.3 - 7;
    let z = Math.sin(angle) * 3;

    let geometry = new THREE.SphereGeometry(0.4);
    let color = hydrophobic ? (i % 2 === 0 ? 0xff4444 : 0x44aaff) : 0x00ffcc;
    let material = new THREE.MeshStandardMaterial({color});
    let sphere = new THREE.Mesh(geometry, material);

    sphere.position.set(x, y, z);
    proteinGroup.add(sphere);

    // hydrogen bonds (lines)
    if (i > 3) {
      let prev = proteinGroup.children[i-3];
      let points = [];
      points.push(prev.position);
      points.push(sphere.position);

      let geometryLine = new THREE.BufferGeometry().setFromPoints(points);
      let line = new THREE.Line(geometryLine, new THREE.LineBasicMaterial({color: 0xffffff}));
      proteinGroup.add(line);
    }
  }
}

function showSheet() {
  clearScene();

  for (let i = 0; i < 20; i++) {
    for (let j = 0; j < 5; j++) {
      let geometry = new THREE.BoxGeometry(0.8, 0.3, 0.3);
      let color = hydrophobic ? (j % 2 === 0 ? 0xff4444 : 0x44aaff) : 0x00ffcc;
      let material = new THREE.MeshStandardMaterial({color});
      let cube = new THREE.Mesh(geometry, material);

      cube.position.set(i - 10, j - 2, (i % 2 === 0 ? 1 : -1));
      proteinGroup.add(cube);
    }
  }
}

function toggleColors() {
  hydrophobic = !hydrophobic;
  showHelix();
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
