<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTwin | Molecular & Polymer Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00f2ff;
            --bg: #020617;
            --glass: rgba(15, 23, 42, 0.8);
            --border: rgba(0, 242, 255, 0.2);
        }

        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden;
        }

        /* --- SIDEBAR NAV --- */
        #sidebar {
            width: 320px; background: var(--glass); backdrop-filter: blur(20px);
            border-right: 1px solid var(--border); padding: 40px 25px;
            display: flex; flex-direction: column; z-index: 10;
        }

        .logo {
            font-family: 'Orbitron', sans-serif; font-size: 1.4rem; color: var(--neon);
            letter-spacing: 2px; text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
            margin-bottom: 40px;
        }

        .nav-btn {
            background: transparent; border: 1px solid transparent; color: #94a3b8;
            padding: 15px; border-radius: 8px; cursor: pointer; text-align: left;
            transition: 0.3s; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 8px;
        }
        .nav-btn:hover, .nav-btn.active {
            border-color: var(--neon); color: white; background: rgba(0, 242, 255, 0.05);
        }

        /* --- VIEWPORT --- */
        #viewport {
            flex: 1; position: relative;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* --- HUD PANEL --- */
        .hud-card {
            position: absolute; top: 25px; right: 25px; width: 280px;
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid var(--border); border-radius: 12px; padding: 20px;
            pointer-events: none;
        }

        .status-header { display: flex; align-items: center; gap: 8px; font-size: 0.65rem; color: var(--neon); margin-bottom: 12px; }
        .pulse { width: 8px; height: 8px; background: var(--neon); border-radius: 50%; box-shadow: 0 0 8px var(--neon); animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        #description { font-size: 0.85rem; line-height: 1.5; color: #cbd5e1; margin-top: 10px; }
    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="logo">EDUTWIN.LAB</div>
        
        <div style="font-size: 0.7rem; color: var(--neon); margin-bottom: 10px;">POLYMERS</div>
        <button class="nav-btn active" onclick="changeMode('linear')">Linear Chain</button>
        <button class="nav-btn" onclick="changeMode('branched')">Branched Chain</button>
        <button class="nav-btn" onclick="changeMode('crosslink')">Cross-Linked</button>

        <div style="font-size: 0.7rem; color: var(--neon); margin-top: 25px; margin-bottom: 10px;">VSEPR GEOMETRY</div>
        <button class="nav-btn" onclick="changeMode('tetrahedral')">Tetrahedral ($CH_4$)</button>
        <button class="nav-btn" onclick="changeMode('bent')">Bent ($H_2O$)</button>
    </aside>

    <main id="viewport">
        <div class="hud-card">
            <div class="status-header"><div class="pulse"></div> ANALYZING STRUCTURE</div>
            <h3 id="mode-title" style="margin:0; font-family: 'Orbitron'; font-size: 1rem;">LINEAR POLYMER</h3>
            <div id="description">High-density packing (HDPE). Strong intermolecular forces make it rigid and durable.</div>
        </div>
    </main>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/controls/OrbitControls.js';

        // --- Basic Setup ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 320) / window.innerHeight, 0.1, 1000);
        camera.position.set(10, 8, 15);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth - 320, window.innerHeight);
        document.getElementById('viewport').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        const light = new THREE.PointLight(0x00f2ff, 2, 100);
        light.position.set(10, 10, 10);
        scene.add(new THREE.AmbientLight(0xffffff, 0.4), light);

        let group = new THREE.Group();
        scene.add(group);

        // --- Helper: Create Atom ---
        function addAtom(x, y, z, color = 0x334155, size = 0.5) {
            const sphere = new THREE.Mesh(
                new THREE.SphereGeometry(size, 32, 32),
                new THREE.MeshPhongMaterial({ color, shininess: 100 })
            );
            sphere.position.set(x, y, z);
            group.add(sphere);
            return sphere;
        }

        // --- Helper: Create Bond ---
        function addBond(v1, v2) {
            const distance = v1.distanceTo(v2);
            const cylinder = new THREE.Mesh(
                new THREE.CylinderGeometry(0.15, 0.15, distance, 12),
                new THREE.MeshPhongMaterial({ color: 0x00f2ff, emissive: 0x00f2ff, emissiveIntensity: 0.2 })
            );
            cylinder.position.copy(v1).lerp(v2, 0.5);
            cylinder.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), v2.clone().sub(v1).normalize());
            group.add(cylinder);
        }

        // --- UI Logic ---
        window.changeMode = (mode) => {
            while(group.children.length > 0) group.remove(group.children[0]);
            
            // Sidebar UI update
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            const title = document.getElementById('mode-title');
            const desc = document.getElementById('description');

            if(mode === 'linear') {
                title.innerText = "LINEAR POLYMER";
                desc.innerText = "High-density structure. Chains pack tightly together, creating rigid materials like HDPE.";
                for(let i=-5; i<=5; i++) {
                    addAtom(i*1.5, 0, 0);
                    if(i < 5) addBond(new THREE.Vector3(i*1.5, 0, 0), new THREE.Vector3((i+1)*1.5, 0, 0));
                }
            } 
            else if(mode === 'branched') {
                title.innerText = "BRANCHED POLYMER";
                desc.innerText = "Low-density (LDPE). Branches prevent tight packing, making the material flexible and soft.";
                for(let i=-4; i<=4; i++) {
                    const v = new THREE.Vector3(i*1.8, 0, 0);
                    addAtom(v.x, v.y, v.z);
                    if(i < 4) addBond(v, new THREE.Vector3((i+1)*1.8, 0, 0));
                    if(i % 2 === 0) {
                        const branch = new THREE.Vector3(v.x, 1.8, 0);
                        addAtom(branch.x, branch.y, branch.z, 0x00f2ff);
                        addBond(v, branch);
                    }
                }
            }
            else if(mode === 'tetrahedral') {
                title.innerText = "TETRAHEDRAL (CH4)";
                desc.innerText = "VSEPR Theory: 4 bonding pairs repel equally to create 109.5° bond angles.";
                const center = new THREE.Vector3(0,0,0);
                addAtom(0,0,0, 0x1e293b, 0.7); // Carbon
                const points = [
                    new THREE.Vector3(2, 2, 2), new THREE.Vector3(-2, -2, 2),
                    new THREE.Vector3(-2, 2, -2), new THREE.Vector3(2, -2, -2)
                ];
                points.forEach(p => { addAtom(p.x, p.y, p.z, 0xffffff, 0.4); addBond(center, p); });
            }
        };

        // --- Render Loop ---
        function animate() {
            requestAnimationFrame(animate);
            group.rotation.y += 0.003;
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = (window.innerWidth - 320) / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth - 320, window.innerHeight);
        });

        changeMode('linear');
        animate();
    </script>
</body>
</html>
