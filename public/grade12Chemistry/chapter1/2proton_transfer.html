<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>⚛️ proton transfer · brønsted</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:system-ui,sans-serif;background:#fff;min-height:100dvh;padding:12px}
    #canvas-container{width:100%;height:100dvh;position:relative;background:#f8fafc}
    .info-panel{position:absolute;bottom:20px;left:20px;right:20px;background:rgba(255,255,255,0.95);backdrop-filter:blur(8px);border-radius:30px;padding:16px 20px;border:1px solid #d0e2ff;max-width:400px;margin:0 auto;box-shadow:0 8px 24px rgba(0,0,0,0.04)}
    .equation{font-size:1.2rem;font-weight:700;color:#3b82f6;text-align:center;margin-bottom:8px}
    .status{text-align:center;font-weight:600;color:#3a628c;margin:8px 0}
    .btn{width:100%;padding:14px;border-radius:40px;border:none;font-weight:700;background:#3b82f6;color:#fff;cursor:pointer}
    .legend{display:flex;gap:16px;justify-content:center;margin-top:12px;font-size:0.8rem;color:#3a628c}
    .hint{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.9);padding:6px 14px;border-radius:40px;font-size:0.8rem;color:#3a628c}
  </style>
</head>
<body>
<div id="canvas-container"></div>
<div class="hint">🖱️ drag H⁺ to H₂O</div>
<div class="info-panel">
  <div class="equation" id="eqDisplay">HCl + H₂O → Cl⁻ + H₃O⁺</div>
  <div class="status" id="statusDisplay">⚡ before reaction</div>
  <button class="btn" id="resetBtn">↻ reset</button>
  <div class="legend"><span style="color:#10b981">● Cl</span><span style="color:#ef4444">● O</span><span style="color:#fff;text-shadow:0 0 4px #000">● H</span><span style="color:#06b6d4">✨ H⁺</span></div>
</div>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.128.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.128.0/examples/jsm/"}}</script>
<script type="module">
import*as THREE from'three';import{OrbitControls}from'three/addons/controls/OrbitControls.js';import{DragControls}from'three/addons/controls/DragControls.js';
const container=document.getElementById('canvas-container'),scene=new THREE.Scene();scene.background=new THREE.Color('#f8fafc');
const camera=new THREE.PerspectiveCamera(45,container.clientWidth/container.clientHeight,0.1,1000);camera.position.set(5,2,10);camera.lookAt(0,0,0);
const renderer=new THREE.WebGLRenderer({antialias:!0});renderer.setSize(container.clientWidth,container.clientHeight);renderer.shadowMap.enabled=!0;container.appendChild(renderer.domElement);
const controls=new OrbitControls(camera,renderer.domElement);controls.enableDamping=!0;controls.autoRotate=!0;
scene.add(new THREE.AmbientLight(0xffffff,0.7));const dl=new THREE.DirectionalLight(0xffffff,1);dl.position.set(5,8,5);scene.add(dl);

const mol=new THREE.Group();scene.add(mol);
const cl=new THREE.Mesh(new THREE.SphereGeometry(1,32),new THREE.MeshStandardMaterial({color:'#10b981'}));cl.position.set(-3.2,0,0);mol.add(cl);
const proton=new THREE.Mesh(new THREE.SphereGeometry(0.4,24),new THREE.MeshStandardMaterial({color:'#06b6d4',emissive:'#06b6d4',emissiveIntensity:0.4}));proton.position.set(-1.9,0.1,0);mol.add(proton);
const o=new THREE.Mesh(new THREE.SphereGeometry(0.9,32),new THREE.MeshStandardMaterial({color:'#ef4444'}));o.position.set(3.2,0,0);mol.add(o);
const h1=new THREE.Mesh(new THREE.SphereGeometry(0.35,16),new THREE.MeshStandardMaterial({color:'#fff'}));h1.position.set(3.9,0.6,0.3);mol.add(h1);
const h2=h1.clone();h2.position.set(3.9,-0.6,-0.3);mol.add(h2);

const drag=new DragControls([proton],camera,renderer.domElement);let reacted=!1;
const eqD=document.getElementById('eqDisplay'),statusD=document.getElementById('statusDisplay');
drag.addEventListener('dragstart',()=>controls.autoRotate=!1);drag.addEventListener('dragend',()=>{controls.autoRotate=!0;if(proton.position.distanceTo(o.position)<2&&!reacted){reacted=!0;proton.position.set(2.5,0.5,0.4);statusD.textContent='✨ complete · H₃O⁺';eqD.innerHTML='Cl⁻ + H₃O⁺';cl.material.transparent=!0;cl.material.opacity=0.7}});
document.getElementById('resetBtn').onclick=()=>{proton.position.set(-1.9,0.1,0);reacted=!1;statusD.textContent='⚡ before reaction';eqD.innerHTML='HCl + H₂O → Cl⁻ + H₃O⁺';cl.material.opacity=1};

function animate(){requestAnimationFrame(animate);if(!reacted){const t=Date.now()*0.002;cl.position.y=Math.sin(t)*0.05;o.position.y=Math.cos(t*1.3)*0.05;proton.position.y=0.1+Math.sin(t*1.5)*0.04}controls.update();renderer.render(scene,camera)}animate();
window.addEventListener('resize',()=>{const w=container.clientWidth,h=container.clientHeight;renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix()});
</script>
</body>
</html>
