<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>💧 water ionization · kw</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:system-ui,sans-serif;background:#fff;min-height:100dvh;padding:12px}
    #canvas-container{width:100%;height:100dvh;position:relative;background:#f8fafc}
    .panel{position:absolute;bottom:20px;left:20px;right:20px;background:rgba(255,255,255,0.95);backdrop-filter:blur(8px);border-radius:30px;padding:16px 20px;border:1px solid #d0e2ff;max-width:400px;margin:0 auto;box-shadow:0 8px 24px rgba(0,0,0,0.04)}
    .kw{font-size:1.4rem;font-weight:700;color:#3b82f6;text-align:center}
    .eq{text-align:center;color:#3a628c;margin:8px 0}
    .slider-item{margin:12px 0}
    .slider-head{display:flex;justify-content:space-between;margin-bottom:4px}
    input[type=range]{width:100%;height:5px;background:#d4e2fa;border-radius:10px;-webkit-appearance:none;appearance:none}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;background:#3b82f6;border-radius:20px;border:3px solid #fff;cursor:grab}
    .btn{width:100%;padding:14px;border-radius:40px;border:none;font-weight:700;background:#3b82f6;color:#fff;cursor:pointer}
    .hint{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.9);padding:6px 14px;border-radius:40px;font-size:0.8rem;color:#3a628c}
    .legend{display:flex;gap:16px;justify-content:center;margin-top:12px;font-size:0.8rem;color:#3a628c}
  </style>
</head>
<body>
<div id="canvas-container"></div>
<div class="hint">🖱️ drag to rotate · simulate collision</div>
<div class="panel">
  <div class="kw" id="kwDisplay">Kw = 1.00 × 10⁻¹⁴</div>
  <div class="eq">2H₂O ⇌ H₃O⁺ + OH⁻</div>
  <div class="slider-item"><div class="slider-head"><span>🌡️ temperature</span><span id="tempVal">25°C</span></div><input type="range" id="tempSlider" min="0" max="60" value="25"></div>
  <button class="btn" id="collideBtn">💥 simulate collision</button>
  <div class="legend"><span style="color:#ef4444">● O</span><span style="color:#fff;text-shadow:0 0 2px #000">● H</span></div>
</div>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.128.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.128.0/examples/jsm/"}}</script>
<script type="module">
import*as THREE from'three';import{OrbitControls}from'three/addons/controls/OrbitControls.js';
const container=document.getElementById('canvas-container'),scene=new THREE.Scene();scene.background=new THREE.Color('#f8fafc');
const camera=new THREE.PerspectiveCamera(45,container.clientWidth/container.clientHeight,0.1,1000);camera.position.set(6,2,10);camera.lookAt(0,0,0);
const renderer=new THREE.WebGLRenderer({antialias:!0});renderer.setSize(container.clientWidth,container.clientHeight);container.appendChild(renderer.domElement);
new OrbitControls(camera,renderer.domElement).enableDamping=!0;
scene.add(new THREE.AmbientLight(0xffffff,0.7));const dl=new THREE.DirectionalLight(0xffffff,1);dl.position.set(5,8,5);scene.add(dl);

function createH2O(x){
  const g=new THREE.Group();g.position.x=x;
  const o=new THREE.Mesh(new THREE.SphereGeometry(0.9,24),new THREE.MeshStandardMaterial({color:'#ef4444'}));g.add(o);
  const h1=new THREE.Mesh(new THREE.SphereGeometry(0.35,12),new THREE.MeshStandardMaterial({color:'#fff'}));h1.position.set(0.7,0.6,0.2);g.add(h1);
  const h2=h1.clone();h2.position.set(-0.7,0.6,-0.2);g.add(h2);
  return g;
}
const left=createH2O(-3.5),right=createH2O(3.5);scene.add(left,right);
let reacted=!1,temp=25;

const kwD=document.getElementById('kwDisplay'),tempS=document.getElementById('tempSlider'),tempV=document.getElementById('tempVal');
function updateKw(){const t=parseFloat(tempS.value);tempV.textContent=t+'°C';const p=14.94-0.04*t+0.0001*t*t,k=Math.pow(10,-p);kwD.innerHTML=`Kw = ${k.toExponential(2).replace('e',' × 10')}`}
tempS.oninput=updateKw;updateKw();

document.getElementById('collideBtn').onclick=()=>{if(reacted)return; reacted=!0;
  let p=0; const int=setInterval(()=>{p+=0.02;
    if(p<1){left.position.x=-3.5+p*2.8; right.position.x=3.5-p*2.8}
    else if(p<1.5){left.children[1].position.x+=0.03; left.children[1].material.emissive=new THREE.Color('#06b6d4'); left.children[1].material.emissiveIntensity=2}
    else if(p<2.5){left.position.x-=0.03; right.position.x+=0.03}
    else{clearInterval(int)}
  },16)
};

function animate(){requestAnimationFrame(animate);if(!reacted){const j=temp/600; left.position.y=(Math.random()-0.5)*j; right.position.y=(Math.random()-0.5)*j} renderer.render(scene,camera)}animate();
window.addEventListener('resize',()=>{const w=container.clientWidth,h=container.clientHeight;renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix()});
</script>
</body>
</html>
