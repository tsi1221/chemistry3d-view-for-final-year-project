<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atom Economy Visualizer</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: #0f172a;
    color: white;
  }

  #ui {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
  }

  button {
    margin: 5px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: #2563eb;
    color: white;
  }

  button:hover {
    background: #1d4ed8;
  }

  #info {
    margin-top: 10px;
    font-size: 14px;
  }
</style>
</head>

<body>

<div id="ui">
  <button onclick="highEconomy()">High Atom Economy</button>
  <button onclick="lowEconomy()">Low Atom Economy</button>
  <div id="info"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>

<script>
let scene, camera, renderer, controls;
let group;

init();
animate();

function init() {
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.z = 20;

  renderer = new THREE.WebGLRenderer({antialias: true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  controls = new THREE.OrbitControls(camera, renderer.domElement);

  const light = new THREE.PointLight(0xffffff, 1);
  light.position.set(10,10,10);
  scene.add(light);

  group = new THREE.Group();
  scene.add(group);

  highEconomy();
}

function clearScene() {
  while(group.children.length > 0) {
    group.remove(group.children[0]);
  }
}

function createAtom(x,y,z,color) {
  let geometry = new THREE.SphereGeometry(0.6);
  let material = new THREE.MeshStandardMaterial({color});
  let sphere = new THREE.Mesh(geometry, material);
  sphere.position.set(x,y,z);
  group.add(sphere);
}

function highEconomy() {
  clearScene();

  // PRODUCT cluster (almost all atoms)
  for(let i=0; i<20; i++) {
    let angle = i * 0.5;
    createAtom(Math.cos(angle)*3, Math.sin(angle)*3, 0, 0x22c55e); // green
  }

  // small waste
  for(let i=0; i<3; i++) {
    createAtom(8, i, 0, 0xef4444); // red
  }

  document.getElementById("info").innerHTML =
    "High Atom Economy 🟢<br>Most atoms become product → Less waste";
}

function lowEconomy() {
  clearScene();

  // small product
  for(let i=0; i<5; i++) {
    let angle = i * 1;
    createAtom(Math.cos(angle)*2, Math.sin(angle)*2, 0, 0x22c55e);
  }

  // large waste pile
  for(let i=0; i<20; i++) {
    let x = 6 + Math.random()*3;
    let y = Math.random()*4 - 2;
    createAtom(x, y, 0, 0xef4444);
  }

  document.getElementById("info").innerHTML =
    "Low Atom Economy 🔴<br>Many atoms wasted → Inefficient reaction";
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
