<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biochemistry: Alpha Helix Visualizer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000814; font-family: 'Segoe UI', sans-serif; color: white; }
        
        #ui-layer {
            position: absolute; top: 20px; left: 20px; padding: 25px; width: 300px;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px;
            z-index: 10;
        }

        h2 { margin: 0 0 10px 0; color: #007AFF; font-size: 1.2rem; text-transform: uppercase; }
        p { font-size: 0.85rem; opacity: 0.8; margin-bottom: 15px; }

        .legend { font-size: 0.8rem; margin-bottom: 15px; }
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }

        button {
            width: 100%; padding: 12px; background: #ffffff; border: none;
            border-radius: 6px; color: #001d3d; font-weight: 700;
            cursor: pointer; transition: 0.3s;
        }

        button:hover { background: #007AFF; color: white; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <h2>Alpha Helix Structure</h2>
        <p>The helix is stabilized by H-bonds between every 4th residue. In membrane pores, the exterior is hydrophobic.</p>
        
        <div class="legend">
            <span class="dot" style="background: #ffffff;"></span> Hydrophilic (Polar)<br>
            <span class="dot" style="background: #007AFF;"></span> Hydrophobic (Non-polar)
        </div>

        <button onclick="toggleHydro()">Toggle Surface Affinity</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, helixTube;
        let isHydroMode = false;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 10);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const light = new THREE.PointLight(0xffffff, 1.5, 100);
            light.position.set(10, 10, 10);
            scene.add(light, new THREE.AmbientLight(0x404040, 2));

            createHelix();
            animate();
        }

        function createHelix() {
            // Path for the Alpha Helix
            const points = [];
            for (let i = 0; i < 50; i++) {
                const angle = 0.5 * i;
                const x = Math.cos(angle) * 2;
                const y = i * 0.2 - 5;
                const z = Math.sin(angle) * 2;
                points.push(new THREE.Vector3(x, y, z));
            }

            const curve = new THREE.CatmullRomCurve3(points);
            const geometry = new THREE.TubeGeometry(curve, 100, 0.3, 16, false);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0xffffff, 
                metalness: 0.2, 
                roughness: 0.5 
            });

            helixTube = new THREE.Mesh(geometry, material);
            scene.add(helixTube);
        }

        function toggleHydro() {
            isHydroMode = !isHydroMode;
            helixTube.material.color.set(isHydroMode ? 0x007AFF : 0xffffff);
            
            // UI alert for memorization
            const msg = isHydroMode 
                ? "Showing Hydrophobic Surface: These residues face the lipid membrane." 
                : "Showing Hydrophilic Backbone: Stabilized by Hydrogen bonds.";
            console.log(msg);
        }

        function animate() {
            requestAnimationFrame(animate);
            helixTube.rotation.y += 0.01;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
