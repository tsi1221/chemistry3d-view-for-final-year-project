<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🧬 alpha helix · secondary structure</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:system-ui,sans-serif;background:#fff;min-height:100dvh;padding:12px}
    #canvas-container{width:100%;height:100dvh;position:relative;background:#f8fafc}
    .panel{position:absolute;bottom:20px;left:20px;right:20px;background:rgba(255,255,255,0.95);backdrop-filter:blur(8px);border-radius:30px;padding:12px 20px;border:1px solid #d0e2ff;max-width:300px;margin:0 auto;box-shadow:0 8px 24px rgba(0,0,0,0.04)}
    .btn{width:100%;padding:14px;border-radius:40px;border:none;font-weight:700;font-size:1rem;cursor:pointer;background:#3b82f6;color:#fff}
    .legend{display:flex;gap:16px;justify-content:center;margin-top:12px;font-size:0.8rem;color:#3a628c}
    .hint{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.9);padding:6px 14px;border-radius:40px;font-size:0.8rem;color:#3a628c}
  </style>
</head>
<body>
<div id="canvas-container"></div>
<div class="hint">🖱️ drag to rotate</div>
<div class="panel">
  <button class="btn" id="toggleBtn">🌊 toggle hydrophobicity</button>
  <div class="legend"><span style="color:#10b981">● hydrophilic</span><span style="color:#f59e0b">● hydrophobic</span></div>
</div>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.128.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.128.0/examples/jsm/"}}</script>
<script type="module">
import*as THREE from'three';import{OrbitControls}from'three/addons/controls/OrbitControls.js';
const container=document.getElementById('canvas-container'),scene=new THREE.Scene();scene.background=new THREE.Color('#f8fafc');
const camera=new THREE.PerspectiveCamera(45,container.clientWidth/container.clientHeight,0.1,1000);camera.position.set(4,3,10);camera.lookAt(0,0,0);
const renderer=new THREE.WebGLRenderer({antialias:!0});renderer.setSize(container.clientWidth,container.clientHeight);renderer.shadowMap.enabled=!0;container.appendChild(renderer.domElement);
new OrbitControls(camera,renderer.domElement).enableDamping=!0;
scene.add(new THREE.AmbientLight(0xffffff,0.7));const dl=new THREE.DirectionalLight(0xffffff,1);dl.position.set(5,8,5);scene.add(dl);
const pts=[];for(let i=0;i<50;i++){const a=i*0.5,x=Math.cos(a)*2,y=i*0.22-5,z=Math.sin(a)*2;pts.push(new THREE.Vector3(x,y,z))}
const curve=new THREE.CatmullRomCurve3(pts);
const tube=new THREE.Mesh(new THREE.TubeGeometry(curve,120,0.28,10),new THREE.MeshStandardMaterial({color:'#10b981',transparent:!0,opacity:0.85}));tube.castShadow=!0;scene.add(tube);
const ribbon=new THREE.Mesh(new THREE.TubeGeometry(curve,120,0.14,6),new THREE.MeshStandardMaterial({color:'#34d399'}));ribbon.castShadow=!0;scene.add(ribbon);
const side=[];pts.filter((_,i)=>i%4===0).forEach((p,i)=>{const d=new THREE.Vector3(-Math.sin(i*0.5*4),0.3,Math.cos(i*0.5*4)).normalize();const ch=p.clone().add(d.multiplyScalar(0.7));const s=new THREE.Mesh(new THREE.SphereGeometry(0.15,6),new THREE.MeshStandardMaterial({color:'#f59e0b'}));s.position.copy(ch);scene.add(s);side.push(s)});
let hydro=!1;const btn=document.getElementById('toggleBtn');btn.onclick=()=>{hydro=!hydro; tube.material.color.set(hydro?'#f59e0b':'#10b981'); ribbon.material.color.set(hydro?'#fbbf24':'#34d399'); side.forEach(s=>s.material.color.set(hydro?'#ef4444':'#f59e0b')); btn.textContent=hydro?'💧 show hydrophilic':'🌊 show hydrophobic'};
function animate(){requestAnimationFrame(animate);renderer.render(scene,camera)}animate();
window.addEventListener('resize',()=>{const w=container.clientWidth,h=container.clientHeight;renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix()});
</script>
</body>
</html>
