<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Motion Tracer · x-t Graph</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            background: #fafbfc;
            overflow: hidden;
            touch-action: pan-y;
            color: #1a1e2b;
        }
        
        /* Header */
        .app-header {
            padding: 16px 24px;
            background: #ffffff;
            border-bottom: 1px solid #eef2f6;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        
        .app-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .app-title h1 {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #1a1e2b;
        }
        
        .app-title .badge {
            background: #eef2f6;
            color: #5b687c;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        
        /* Tabs */
        .tabs-container {
            padding: 12px 24px 0 24px;
            background: #ffffff;
            border-bottom: 1px solid #eef2f6;
            flex-shrink: 0;
        }
        
        .tab-bar {
            display: flex;
            gap: 8px;
        }
        
        .tab-btn {
            padding: 10px 20px;
            border: none;
            background: transparent;
            color: #7c879c;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            touch-action: manipulation;
            border-radius: 40px;
        }
        
        .tab-btn:hover {
            color: #1a1e2b;
            background: #f5f7fa;
        }
        
        .tab-btn.active {
            background: #1a1e2b;
            color: white;
        }
        
        /* Main Simulation Area */
        .simulation-container {
            flex-grow: 1;
            background: #fafbfc;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            touch-action: none;
        }
        
        .canvas-card {
            position: relative;
            width: 100%;
            max-width: 1050px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.05);
            border: 1px solid #eef2f6;
            overflow: hidden;
        }
        
        .canvas-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 15 / 8;
        }
        
        #motionCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }
        
        /* Controls */
        .controls-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 16px 24px;
            background: #ffffff;
            border-top: 1px solid #eef2f6;
        }
        
        .control-btn {
            padding: 12px 28px;
            border-radius: 40px;
            border: none;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            touch-action: manipulation;
        }
        
        .control-btn.primary {
            background: #10b981;
            color: white;
        }
        
        .control-btn.primary:hover {
            background: #059669;
        }
        
        .control-btn.secondary {
            background: #f5f7fa;
            color: #5b687c;
            border: 1px solid #eef2f6;
        }
        
        .control-btn.secondary:hover {
            background: #eef2f6;
        }
        
        /* Hint */
        .hint-wrapper {
            padding: 12px 24px 16px 24px;
            text-align: center;
            background: #ffffff;
            border-top: 1px solid #eef2f6;
        }
        
        .hint-text {
            display: inline-block;
            padding: 8px 20px;
            background: #f5f7fa;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #5b687c;
            border: 1px solid #eef2f6;
        }
        
        /* Mobile Optimizations */
        @media (max-width: 600px) {
            .app-header {
                padding: 12px 16px;
            }
            
            .app-title h1 {
                font-size: 1.1rem;
            }
            
            .tabs-container {
                padding: 8px 16px 0 16px;
            }
            
            .tab-btn {
                padding: 8px 14px;
                font-size: 0.85rem;
            }
            
            .simulation-container {
                padding: 12px;
            }
            
            .controls-bar {
                padding: 12px 16px;
            }
            
            .control-btn {
                padding: 10px 20px;
                font-size: 0.85rem;
            }
        }
        
        /* Prevent pull-to-refresh */
        html, body {
            overscroll-behavior: none;
        }
        
        button:focus-visible {
            outline: 2px solid #0066cc;
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="app-title">
            <h1>📈 Position-Time Tracer</h1>
            <span class="badge">Standard View</span>
        </div>
    </header>

    <div class="tabs-container">
        <div class="tab-bar">
            <button id="btn-const" class="tab-btn active" data-mode="const">🚗 Constant Velocity</button>
            <button id="btn-accel" class="tab-btn" data-mode="accel">🛑 Braking (Stop → Curve)</button>
        </div>
    </div>

    <div class="simulation-container">
        <div class="canvas-card">
            <div class="canvas-wrapper">
                <canvas id="motionCanvas" width="1050" height="560"></canvas>
            </div>
            
            <!-- Controls -->
            <div class="controls-bar">
                <button id="start-btn" class="control-btn primary">▶ Start Simulation</button>
                <button id="reset-btn" class="control-btn secondary">↻ Reset</button>
            </div>
            
            <!-- Hint -->
            <div class="hint-wrapper">
                <div class="hint-text">
                    <span id="hintMessage">💡 Time runs UPWARD · Watch how stopping creates a vertical trace</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('motionCanvas');
        const ctx = canvas.getContext('2d');
        
        // Canvas internal dimensions
        const width = 1050;
        const height = 560;
        
        function resizeCanvas() {
            canvas.width = width;
            canvas.height = height;
        }
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        let mode = 'const';
        let isRunning = false;
        let time = 0;
        
        // Equal Dimensions Config
        const margin = 120;
        const startX = margin;
        const endX = width - margin;
        const trackWidth = endX - startX;
        
        // Top Track Config
        const trackY = 95;
        
        // Bottom Graph Config
        const graphStartY = 185;
        const graphH = 340; 
        const graphBaselineY = graphStartY + graphH;
        const scaleT = 0.65;

        // Rider & Trace State
        let riderX = startX;
        let riderV = 0; 
        let riderA = 0; 
        let tracePoints = [];

        function setMode(m) {
            mode = m;
            document.getElementById('btn-const').classList.toggle('active', m === 'const');
            document.getElementById('btn-accel').classList.toggle('active', m === 'accel');
            
            const hint = document.getElementById('hintMessage');
            if (m === 'const') {
                hint.textContent = '💡 Constant velocity creates a diagonal line · Time runs UPWARD';
            } else {
                hint.textContent = '💡 Braking creates a curve that becomes vertical when stopped';
            }
            
            resetSim();
        }

        function startSim() {
            if (!isRunning) {
                isRunning = true;
                if(mode === 'const') {
                    riderV = 4;
                    riderA = 0;
                } else if(mode === 'accel') {
                    riderV = 9;
                    riderA = -0.06;
                }
                document.getElementById('start-btn').innerHTML = '⏸ Running...';
            }
        }

        function resetSim() {
            isRunning = false;
            time = 0;
            riderX = startX;
            riderV = 0;
            riderA = 0;
            tracePoints = [];
            document.getElementById('start-btn').innerHTML = '▶ Start Simulation';
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            
            // --- Background gradients ---
            // Track area gradient
            const trackGrad = ctx.createLinearGradient(startX, trackY - 35, endX, trackY + 35);
            trackGrad.addColorStop(0, '#f8fafc');
            trackGrad.addColorStop(1, '#f1f5f9');
            ctx.fillStyle = trackGrad;
            ctx.fillRect(startX - 10, trackY - 35, trackWidth + 20, 70);
            
            // Graph area gradient
            const graphGrad = ctx.createLinearGradient(startX, graphStartY, endX, graphBaselineY);
            graphGrad.addColorStop(0, '#fafbfc');
            graphGrad.addColorStop(1, '#f5f7fa');
            ctx.fillStyle = graphGrad;
            ctx.fillRect(startX - 10, graphStartY - 10, trackWidth + 20, graphH + 20);
            
            // --- 1. Draw Physical Track (TOP) ---
            // Track border with shadow
            ctx.shadowColor = 'rgba(0, 0, 0, 0.06)';
            ctx.shadowBlur = 8;
            ctx.shadowOffsetY = 2;
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.roundRect(startX - 5, trackY - 30, trackWidth + 10, 60, 8);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.shadowOffsetY = 0;
            
            ctx.strokeStyle = '#cbd5e1';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(startX - 5, trackY - 30, trackWidth + 10, 60);
            
            // Track surface line
            ctx.strokeStyle = '#94a3b8';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(startX, trackY);
            ctx.lineTo(endX, trackY);
            ctx.stroke();
            
            // Track Labels
            ctx.fillStyle = '#64748b';
            ctx.font = '600 13px Inter, sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText('PHYSICAL TRACK · 1D Motion', startX, trackY - 40);
            
            ctx.font = '500 11px Inter, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#94a3b8';
            ctx.fillText('0 m', startX, trackY + 45);
            ctx.fillText('700 m', endX, trackY + 45);
            
            // Tick marks on track
            ctx.strokeStyle = '#cbd5e1';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 7; i++) {
                const tickX = startX + (i * trackWidth / 7);
                ctx.beginPath();
                ctx.moveTo(tickX, trackY - 8);
                ctx.lineTo(tickX, trackY + 8);
                ctx.stroke();
            }

            // Draw Rider with glow
            ctx.shadowColor = '#3b82f6';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.arc(riderX, trackY, 20, 0, Math.PI * 2);
            ctx.fillStyle = '#3b82f6';
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Rider highlight
            ctx.beginPath();
            ctx.arc(riderX - 4, trackY - 4, 8, 0, Math.PI * 2);
            ctx.fillStyle = '#60a5fa';
            ctx.fill();
            
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.arc(riderX, trackY, 20, 0, Math.PI * 2);
            ctx.stroke();
            
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 13px Inter, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('RIDER', riderX, trackY);

            // --- 2. Draw Graph Area (BOTTOM) ---
            ctx.font = '600 13px Inter, sans-serif';
            ctx.fillStyle = '#1e293b';
            ctx.textAlign = 'left';
            ctx.fillText('Position-Time (x-t) Graph', startX, graphStartY - 15);
            
            ctx.font = '10px Inter, sans-serif';
            ctx.fillStyle = '#94a3b8';
            ctx.fillText('Standard Physics View', startX + 200, graphStartY - 15);
            
            // Graph border
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 1;
            ctx.strokeRect(startX - 5, graphStartY - 5, trackWidth + 10, graphH + 10);
            
            // Grid lines
            ctx.strokeStyle = '#f1f5f9';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= 10; i++) {
                const gridY = graphStartY + (i * graphH / 10);
                ctx.beginPath();
                ctx.moveTo(startX, gridY);
                ctx.lineTo(endX, gridY);
                ctx.stroke();
            }
            for (let i = 0; i <= 7; i++) {
                const gridX = startX + (i * trackWidth / 7);
                ctx.beginPath();
                ctx.moveTo(gridX, graphStartY);
                ctx.lineTo(gridX, graphBaselineY);
                ctx.stroke();
            }
            
            // --- AXIS ---
            // Y-Axis (Time, pointing UP)
            ctx.strokeStyle = '#64748b';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.moveTo(startX, graphBaselineY);
            ctx.lineTo(startX, graphStartY);
            ctx.stroke();
            
            // Arrow head for Y-axis
            ctx.fillStyle = '#64748b';
            ctx.beginPath();
            ctx.moveTo(startX - 5, graphStartY + 8);
            ctx.lineTo(startX, graphStartY);
            ctx.lineTo(startX + 5, graphStartY + 8);
            ctx.fill();
            
            ctx.fillStyle = '#64748b';
            ctx.font = '500 12px Inter, sans-serif';
            ctx.save();
            ctx.translate(startX - 22, graphStartY + graphH / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.textAlign = 'center';
            ctx.fillText('Time (t)  →  UP', 0, 0);
            ctx.restore();
            
            // X-Axis (Position)
            ctx.beginPath();
            ctx.moveTo(startX, graphBaselineY);
            ctx.lineTo(endX + 8, graphBaselineY);
            ctx.stroke();
            
            // Arrow head for X-axis
            ctx.fillStyle = '#64748b';
            ctx.beginPath();
            ctx.moveTo(endX, graphBaselineY - 5);
            ctx.lineTo(endX + 8, graphBaselineY);
            ctx.lineTo(endX, graphBaselineY + 5);
            ctx.fill();
            
            ctx.textAlign = 'center';
            ctx.fillStyle = '#64748b';
            ctx.font = '500 12px Inter, sans-serif';
            ctx.fillText('Position (x)', startX + trackWidth / 2, graphBaselineY + 25);
            
            ctx.font = '11px Inter, sans-serif';
            ctx.fillStyle = '#94a3b8';
            ctx.fillText('0 m', startX, graphBaselineY + 22);
            ctx.fillText('700 m', endX, graphBaselineY + 22);

            // --- 3. Run Simulation Logic (CORE LOGIC PRESERVED) ---
            if (isRunning) {
                time++;
                
                riderV += riderA;
                riderV = Math.max(0, riderV);
                riderX += riderV;
                riderX = Math.max(startX, Math.min(endX, riderX));
                
                const traceY = graphBaselineY - (time * scaleT);
                tracePoints.push({ x: riderX, y: traceY });
                
                if (riderX >= endX || (riderV === 0 && mode === 'accel') || traceY <= graphStartY) {
                    isRunning = false;
                    document.getElementById('start-btn').innerHTML = '▶ Start Simulation';
                }
            }

            // --- 4. Draw Trace (VISUALLY ENHANCED) ---
            if (tracePoints.length > 1) {
                // Trace line with gradient
                const traceGrad = ctx.createLinearGradient(startX, graphBaselineY, endX, graphStartY);
                traceGrad.addColorStop(0, '#ef4444');
                traceGrad.addColorStop(1, '#f97316');
                
                ctx.strokeStyle = traceGrad;
                ctx.lineWidth = 3.5;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.beginPath();
                ctx.moveTo(tracePoints[0].x, tracePoints[0].y);
                for(let i = 1; i < tracePoints.length; i++) {
                    ctx.lineTo(tracePoints[i].x, tracePoints[i].y);
                }
                ctx.stroke();
                
                // Trace dots
                ctx.fillStyle = '#ef4444';
                for(let i = 0; i < tracePoints.length; i += Math.max(1, Math.floor(tracePoints.length / 20))) {
                    ctx.beginPath();
                    ctx.arc(tracePoints[i].x, tracePoints[i].y, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Current data point with glow
                const lastP = tracePoints[tracePoints.length - 1];
                ctx.shadowColor = '#ef4444';
                ctx.shadowBlur = 15;
                ctx.fillStyle = '#ef4444';
                ctx.beginPath();
                ctx.arc(lastP.x, lastP.y, 7, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.shadowBlur = 20;
                ctx.fillStyle = '#fca5a5';
                ctx.beginPath();
                ctx.arc(lastP.x, lastP.y, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                
                // Projection line
                ctx.setLineDash([6, 4]);
                ctx.strokeStyle = '#fca5a5';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(riderX, trackY + 20);
                ctx.lineTo(lastP.x, lastP.y - 7);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            requestAnimationFrame(draw);
        }

        // Event listeners
        document.getElementById('btn-const').addEventListener('click', () => setMode('const'));
        document.getElementById('btn-accel').addEventListener('click', () => setMode('accel'));
        document.getElementById('start-btn').addEventListener('click', startSim);
        document.getElementById('reset-btn').addEventListener('click', resetSim);
        
        // Touch events
        document.getElementById('btn-const').addEventListener('touchstart', (e) => { e.preventDefault(); setMode('const'); }, { passive: false });
        document.getElementById('btn-accel').addEventListener('touchstart', (e) => { e.preventDefault(); setMode('accel'); }, { passive: false });
        document.getElementById('start-btn').addEventListener('touchstart', (e) => { e.preventDefault(); startSim(); }, { passive: false });
        document.getElementById('reset-btn').addEventListener('touchstart', (e) => { e.preventDefault(); resetSim(); }, { passive: false });
        
        // RoundRect polyfill
        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            return this;
        };
        
        resetSim();
        draw();
    </script>
</body>
</html>
