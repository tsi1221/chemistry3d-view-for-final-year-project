<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Distance vs. Displacement Lab</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fdfdfd; color: #333; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .lab-container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); text-align: center; max-width: 900px; width: 100%; border: 1px solid #eee; }
        
        canvas { background: #ffffff; border-radius: 12px; border: 1px solid #eee; cursor: crosshair; margin-bottom: 20px; }
        
        .stats { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; background: #f8f9fa; padding: 15px; border-radius: 12px; }
        .stat-box { font-weight: bold; font-size: 1.1rem; }
        #dist-val { color: #e67e22; } /* Distance = Orange Thread */
        #disp-val { color: #3498db; } /* Displacement = Blue Rod */
        
        .controls { display: flex; gap: 10px; justify-content: center; }
        button { padding: 12px 24px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-straighten { background: #2ecc71; color: white; }
        .btn-clear { background: #95a5a6; color: white; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        
        .hint { color: #7f8c8d; font-size: 0.9rem; margin-top: 15px; max-width: 600px; }
    </style>
</head>
<body>

<div class="lab-container">
    <h2>Distance vs. Displacement</h2>
    
    <div class="stats">
        <div class="stat-box">Distance (Scalar): <span id="dist-val">0</span> m</div>
        <div class="stat-box">Displacement (Vector): <span id="disp-val">0</span> m</div>
    </div>

    <canvas id="vectorCanvas" width="800" height="400"></canvas>

    <div class="controls">
        <button class="btn-straighten" onclick="straightenThread()">Straighten & Compare</button>
        <button class="btn-clear" onclick="clearLab()">Clear Path</button>
    </div>

    <p class="hint">
        <b>Instruction:</b> Use your mouse to <b>draw a winding path</b> on the canvas. <br>
        The <span style="color:#e67e22">Orange Thread</span> is your Distance. The <span style="color:#3498db">Blue Arrow</span> is your Displacement. <br>
        Click <b>"Straighten"</b> to see the total magnitude of the scalar distance!
    </p>
</div>

<script>
    const canvas = document.getElementById('vectorCanvas');
    const ctx = canvas.getContext('2d');
    const distLabel = document.getElementById('dist-val');
    const dispLabel = document.getElementById('disp-val');

    let path = []; // Points {x, y}
    let isDrawing = false;
    let isStraightened = false;
    let straightenedAnim = 0; // 0 to 1 for animation

    function clearLab() {
        path = [];
        isStraightened = false;
        straightenedAnim = 0;
        distLabel.innerText = "0";
        dispLabel.innerText = "0";
    }

    function straightenThread() {
        if (path.length < 2) return;
        isStraightened = true;
    }

    canvas.addEventListener('mousedown', (e) => {
        if(isStraightened) clearLab();
        isDrawing = true;
        addPoint(e);
    });

    window.addEventListener('mouseup', () => isDrawing = false);
    canvas.addEventListener('mousemove', (e) => { if(isDrawing) addPoint(e); });

    function addPoint(e) {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        path.push({x, y});
    }

    function calculateStats() {
        if (path.length < 2) return;
        
        // Distance = Sum of all segments
        let distance = 0;
        for(let i=1; i<path.length; i++) {
            distance += Math.hypot(path[i].x - path[i-1].x, path[i].y - path[i-1].y);
        }

        // Displacement = Distance from Start to Finish
        const start = path[0];
        const end = path[path.length-1];
        const displacement = Math.hypot(end.x - start.x, end.y - start.y);

        distLabel.innerText = Math.round(distance);
        dispLabel.innerText = Math.round(displacement);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (path.length > 1) {
            const start = path[0];
            const end = path[path.length - 1];

            // 1. Draw Distance (The Thread)
            ctx.beginPath();
            ctx.strokeStyle = "#e67e22";
            ctx.lineWidth = 3;
            ctx.setLineDash([]);
            
            if (!isStraightened) {
                // Regular Winding Path
                ctx.moveTo(start.x, start.y);
                for(let i=1; i<path.length; i++) ctx.lineTo(path[i].x, path[i].y);
            } else {
                // Animated Straightening
                if(straightenedAnim < 1) straightenedAnim += 0.02;
                
                let totalDist = parseFloat(distLabel.innerText);
                ctx.moveTo(start.x, start.y + 40); // Shift down slightly to compare
                ctx.lineTo(start.x + (totalDist * straightenedAnim), start.y + 40);
                
                ctx.fillStyle = "#e67e22";
                ctx.font = "bold 12px Arial";
                ctx.fillText("UNROLLED DISTANCE (SCALAR)", start.x, start.y + 60);
            }
            ctx.stroke();

            // 2. Draw Displacement (The Steel Rod / Arrow)
            // It only exists between start and end
            ctx.beginPath();
            ctx.strokeStyle = "#3498db";
            ctx.lineWidth = 5;
            ctx.moveTo(start.x, start.y);
            ctx.lineTo(end.x, end.y);
            ctx.stroke();

            // Arrow Head
            const angle = Math.atan2(end.y - start.y, end.x - start.x);
            ctx.beginPath();
            ctx.fillStyle = "#3498db";
            ctx.moveTo(end.x, end.y);
            ctx.lineTo(end.x - 15 * Math.cos(angle - Math.PI/6), end.y - 15 * Math.sin(angle - Math.PI/6));
            ctx.lineTo(end.x - 15 * Math.cos(angle + Math.PI/6), end.y - 15 * Math.sin(angle + Math.PI/6));
            ctx.fill();

            // Start/End Points
            ctx.fillStyle = "#2c3e50";
            ctx.beginPath(); ctx.arc(start.x, start.y, 5, 0, Math.PI*2); ctx.fill();
            ctx.fillText("START", start.x - 20, start.y - 15);
            ctx.fillText("FINISH", end.x - 20, end.y - 15);
        }

        if(!isStraightened) calculateStats();
        requestAnimationFrame(draw);
    }

    draw();
</script>
</body>
</html>
