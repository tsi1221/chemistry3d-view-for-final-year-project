<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Friction Lab · Static vs Kinetic</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            background: #fafbfc;
            overflow: hidden;
            touch-action: pan-y;
            color: #1a1e2b;
        }
        
        /* Header */
        .app-header {
            padding: 16px 24px;
            background: #ffffff;
            border-bottom: 1px solid #eef2f6;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        
        .app-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .app-title h1 {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #1a1e2b;
        }
        
        .app-title .badge {
            background: #eef2f6;
            color: #5b687c;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
        }
        
        /* Tabs */
        .tabs-container {
            padding: 12px 24px 0 24px;
            background: #ffffff;
            border-bottom: 1px solid #eef2f6;
            flex-shrink: 0;
        }
        
        .tabs {
            display: flex;
            gap: 8px;
        }
        
        .tab-btn {
            padding: 12px 28px;
            border: none;
            background: transparent;
            color: #7c879c;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s ease;
            border-radius: 40px;
            touch-action: manipulation;
        }
        
        .tab-btn:hover {
            color: #1a1e2b;
            background: #f5f7fa;
        }
        
        .tab-btn.active {
            background: #1a1e2b;
            color: white;
        }
        
        /* Main Simulation Area */
        .simulation-container {
            flex-grow: 1;
            background: #fafbfc;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            touch-action: none;
        }
        
        .canvas-card {
            position: relative;
            width: 100%;
            max-width: 900px;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.05);
            border: 1px solid #eef2f6;
            overflow: hidden;
        }
        
        .canvas-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 10;
        }
        
        #frictionCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
        }
        
        /* HUD / Info Panel */
        .hud-panel {
            padding: 18px 24px;
            background: #ffffff;
            border-top: 1px solid #eef2f6;
        }
        
        .friction-hud {
            display: flex;
            justify-content: space-around;
            background: #f8fafc;
            padding: 16px;
            border-radius: 16px;
            border: 1px solid #eef2f6;
        }
        
        .stat-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        
        .label {
            font-size: 0.7rem;
            color: #7c879c;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        
        .value {
            font-family: 'SF Mono', 'Menlo', 'Monaco', 'Cascadia Code', 'Consolas', monospace;
            font-weight: 700;
            font-size: 1.5rem;
        }
        
        .equation-box {
            text-align: center;
            padding: 8px;
            font-family: 'SF Mono', monospace;
            font-size: 1rem;
            color: #475569;
        }
        
        /* Hint */
        .hint-wrapper {
            padding: 12px 24px 16px 24px;
            text-align: center;
            background: #ffffff;
            border-top: 1px solid #eef2f6;
        }
        
        .hint-text {
            display: inline-block;
            padding: 8px 20px;
            background: #f5f7fa;
            border-radius: 40px;
            font-size: 0.9rem;
            color: #5b687c;
            border: 1px solid #eef2f6;
        }
        
        /* Mobile */
        @media (max-width: 600px) {
            .app-header { padding: 12px 16px; }
            .app-title h1 { font-size: 1.1rem; }
            .tabs-container { padding: 8px 16px 0; }
            .tab-btn { padding: 10px 18px; font-size: 0.9rem; }
            .simulation-container { padding: 16px; }
            .hud-panel { padding: 14px 16px; }
            .value { font-size: 1.2rem; }
            .friction-hud { flex-wrap: wrap; gap: 12px; }
        }
        
        html, body { overscroll-behavior: none; }
        button:focus-visible { outline: 2px solid #0066cc; outline-offset: 2px; }
        
        /* RoundRect */
        
    </style>
</head>
<body>
    <header class="app-header">
        <div class="app-title">
            <h1>🔬 Friction Laboratory</h1>
            <span class="badge">Static vs Kinetic</span>
        </div>
    </header>

    <div class="tabs-container">
        <div class="tabs">
            <button class="tab-btn active" data-tab="static">🧊 Static Friction</button>
            <button class="tab-btn" data-tab="kinetic">⚡ Kinetic Friction</button>
        </div>
    </div>

    <div class="simulation-container">
        <div class="canvas-card">
            <div class="canvas-wrapper">
                <canvas id="frictionCanvas" width="900" height="562"></canvas>
            </div>
            
            <!-- Static HUD -->
            <div id="staticHUD" class="hud-panel">
                <div class="equation-box">
                    <span style="font-weight:600;">F<sub>Pull</sub> vs. F<sub>Static Friction</sub></span>
                </div>
                <div class="friction-hud">
                    <div class="stat-group">
                        <span class="label">Status</span>
                        <span class="value" id="staticStatus" style="color:#94a3b8;">STATIC</span>
                    </div>
                    <div class="stat-group">
                        <span class="label">Pull Force</span>
                        <span class="value" id="pullForce" style="color:#ef4444;">0 N</span>
                    </div>
                    <div class="stat-group">
                        <span class="label">Max Static</span>
                        <span class="value" id="maxStatic" style="color:#1e293b;">250 N</span>
                    </div>
                </div>
            </div>
            
            <!-- Kinetic HUD -->
            <div id="kineticHUD" class="hud-panel" style="display:none;">
                <div class="friction-hud">
                    <div class="stat-group">
                        <span class="label">Status</span>
                        <span class="value" id="kineticStatus" style="color:#94a3b8;">AT REST</span>
                    </div>
                    <div class="stat-group">
                        <span class="label">Friction Type</span>
                        <span class="value" id="frictionType">STATIC (fₛ)</span>
                    </div>
                    <div class="stat-group">
                        <span class="label">Retarding Force</span>
                        <span class="value" id="retardingForce">200 N</span>
                    </div>
                </div>
            </div>
            
            <!-- Hint -->
            <div class="hint-wrapper">
                <div class="hint-text" id="hintMessage">
                    <span>👆 Click and drag the blue block to pull it</span>
                </div>
            </div>
        </div>
    </div>

    <script>

        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            return this;
        };
        const canvas = document.getElementById('frictionCanvas');
        const ctx = canvas.getContext('2d');
        
        // Canvas internal dimensions
        const width = 900;
        const height = 562;
        
        function resizeCanvas() {
            canvas.width = width;
            canvas.height = height;
        }
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        // Tab state
        let currentTab = 'static';
        
        // ============ STATIC FRICTION STATE ============
        const staticConfig = {
            blockX: 80, blockY: 210, blockW: 220, blockH: 110,
            floorY: 320, breakPointForce: 250, teethCount: 40
        };
        
        let staticState = {
            block: { x: staticConfig.blockX, isDragging: false },
            mouse: { startX: 0, currentX: 0 },
            pullForce: 0,
            frictionActive: true,
            blockOffset: 0,
            teethBendingForce: 0
        };
        
        let floorTeeth = [];
        let blockTeeth = [];
        const toothSpacing = staticConfig.blockW / staticConfig.teethCount;
        const toothHeight = 15;
        
        for (let i = 0; i < staticConfig.teethCount; i++) {
            floorTeeth.push({ x: i * toothSpacing, height: (Math.random() * toothHeight) + 5 });
            blockTeeth.push({ x: i * toothSpacing, height: (Math.random() * toothHeight) + 5 });
        }
        
        // ============ KINETIC FRICTION STATE ============
        const kineticConfig = {
            blockX: 80, blockY: 210, blockW: 250, blockH: 120,
            floorY: 330, staticFriction: 200, kineticFriction: 120,
            kickForce: 350, teethCount: 50, maxToothHeight: 18
        };
        
        let kineticState = {
            block: { x: kineticConfig.blockX, vx: 0, ax: 0 },
            frictionState: "STATIC",
            isMoving: false,
            pushActive: false,
            pushFrame: 0
        };
        
        let kineticFloorTeeth = [];
        for (let i = 0; i < kineticConfig.teethCount * 4; i++) {
            kineticFloorTeeth.push({ height: (Math.random() * kineticConfig.maxToothHeight) + 4 });
        }
        
        // ============ HELPER FUNCTIONS ============
        function interpolateColor(color1, color2, factor) {
            const r1 = parseInt(color1.substring(1,3), 16);
            const g1 = parseInt(color1.substring(3,5), 16);
            const b1 = parseInt(color1.substring(5,7), 16);
            const r2 = parseInt(color2.substring(1,3), 16);
            const g2 = parseInt(color2.substring(3,5), 16);
            const b2 = parseInt(color2.substring(5,7), 16);
            const r = Math.round(r1 + factor * (r2 - r1)).toString(16).padStart(2, "0");
            const g = Math.round(g1 + factor * (g2 - g1)).toString(16).padStart(2, "0");
            const b = Math.round(b1 + factor * (b2 - b1)).toString(16).padStart(2, "0");
            return `#${r}${g}${b}`;
        }
        
        function drawVector(ctx, x, y, length, color, label) {
            ctx.strokeStyle = color;
            ctx.fillStyle = color;
            ctx.lineWidth = 5;
            ctx.lineCap = "round";
            const endX = x + length * 0.5;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(endX, y);
            ctx.stroke();
            const headSize = 12;
            const direction = length > 0 ? 1 : -1;
            ctx.beginPath();
            ctx.moveTo(endX, y);
            ctx.lineTo(endX - headSize * direction, y - headSize / 2);
            ctx.lineTo(endX - headSize * direction, y + headSize / 2);
            ctx.fill();
            ctx.fillStyle = "#1a1e2b";
            ctx.font = "bold 11px Inter, sans-serif";
            ctx.fillText(`${label} ${Math.abs(length).toFixed(0)}N`, x + (length > 0 ? 10 : -80), y - 12);
        }
        
        // ============ STATIC FRICTION UPDATE & DRAW ============
        function updateStatic() {
            const s = staticState;
            if (s.block.isDragging) {
                s.pullForce = Math.max(0, s.mouse.currentX - s.mouse.startX);
                
                if (s.frictionActive) {
                    s.teethBendingForce = Math.min(1, s.pullForce / staticConfig.breakPointForce);
                    s.blockOffset = s.teethBendingForce * (toothSpacing * 0.9);
                    
                    if (s.pullForce > staticConfig.breakPointForce) {
                        s.frictionActive = false;
                        s.blockOffset = 0;
                        s.pullForce = 0;
                    }
                } else {
                    s.block.x = Math.max(staticConfig.blockX, (s.mouse.currentX - s.mouse.startX) + staticConfig.blockX - staticConfig.breakPointForce);
                }
            } else {
                s.pullForce = 0;
                s.blockOffset = 0;
                s.teethBendingForce = 0;
                s.frictionActive = true;
                s.block.x = staticConfig.blockX;
            }
            
            const statusEl = document.getElementById('staticStatus');
            statusEl.innerHTML = s.frictionActive ? 'STATIC' : '<span style="color:#ef4444;">BREAKING</span>';
            statusEl.style.color = s.frictionActive ? '#94a3b8' : '#ef4444';
            document.getElementById('pullForce').textContent = Math.round(s.pullForce) + ' N';
        }
        
        function drawStatic() {
            ctx.clearRect(0, 0, width, height);
            
            // Grid background
            ctx.strokeStyle = '#f1f5f9';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < width; i += 50) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, height); ctx.stroke();
            }
            
            // Floor
            ctx.fillStyle = '#94a3b8';
            ctx.fillRect(0, staticConfig.floorY, width, height - staticConfig.floorY);
            
            // Floor texture
            ctx.fillStyle = '#64748b';
            for (let i = 0; i < width; i += 30) {
                ctx.fillRect(i, staticConfig.floorY + 10, 15, 3);
            }
            
            const s = staticState;
            
            // Block shadow
            ctx.shadowColor = 'rgba(0,0,0,0.15)';
            ctx.shadowBlur = 15;
            ctx.shadowOffsetY = 5;
            
            // Block
            const gradient = ctx.createLinearGradient(s.block.x + s.blockOffset, staticConfig.blockY, 
                s.block.x + staticConfig.blockW + s.blockOffset, staticConfig.blockY + staticConfig.blockH);
            gradient.addColorStop(0, '#3b82f6');
            gradient.addColorStop(1, '#2563eb');
            ctx.fillStyle = gradient;
            ctx.strokeStyle = '#1d4ed8';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.roundRect(s.block.x + s.blockOffset, staticConfig.blockY, staticConfig.blockW, staticConfig.blockH, 10);
            ctx.fill();
            ctx.stroke();
            
            ctx.shadowBlur = 0;
            ctx.shadowOffsetY = 0;
            
            // Block highlight
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.beginPath();
            ctx.roundRect(s.block.x + s.blockOffset + 8, staticConfig.blockY + 8, staticConfig.blockW - 16, 15, 6);
            ctx.fill();
            
            const centerY = staticConfig.blockY + staticConfig.blockH / 2;
            if (s.pullForce > 10) {
                drawVector(ctx, s.block.x + staticConfig.blockW + s.blockOffset, centerY, s.pullForce, "#ef4444", "PULL");
                drawVector(ctx, s.block.x + s.blockOffset, centerY, s.frictionActive ? -s.pullForce : 0, "#718096", "FRICTION");
            }
            
            // Zoom circle
            const zoomRadius = 130;
            const zoomX = width - zoomRadius - 30;
            const zoomY = zoomRadius + 30;
            
            ctx.save();
            ctx.beginPath(); ctx.arc(zoomX, zoomY, zoomRadius, 0, Math.PI * 2); ctx.clip();
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(zoomX - zoomRadius, zoomY - zoomRadius, zoomRadius * 2, zoomRadius * 2);
            
            // Grid inside zoom
            ctx.strokeStyle = '#f1f5f9';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < zoomRadius * 2; i += 20) {
                ctx.beginPath();
                ctx.moveTo(zoomX - zoomRadius + i, zoomY - zoomRadius);
                ctx.lineTo(zoomX - zoomRadius + i, zoomY + zoomRadius);
                ctx.stroke();
            }
            
            const zoomOffset = s.blockOffset * 3;
            
            floorTeeth.forEach((tooth, i) => {
                ctx.fillStyle = "#1e293b";
                ctx.beginPath();
                ctx.moveTo(zoomX - zoomRadius + tooth.x, zoomY);
                ctx.lineTo(zoomX - zoomRadius + tooth.x + toothSpacing / 2, zoomY - tooth.height);
                ctx.lineTo(zoomX - zoomRadius + tooth.x + toothSpacing, zoomY);
                ctx.fill();
                
                const stressColor = interpolateColor("#1e293b", "#ef4444", s.teethBendingForce);
                ctx.fillStyle = stressColor;
                const shear = (s.teethBendingForce * 10) * (i / staticConfig.teethCount * 0.1);
                
                ctx.beginPath();
                ctx.moveTo(zoomX - zoomRadius + blockTeeth[i].x + zoomOffset, zoomY - zoomRadius);
                ctx.lineTo(zoomX - zoomRadius + blockTeeth[i].x + toothSpacing / 2 + zoomOffset + shear, 
                    zoomY - (toothHeight + 5) * (1 - s.teethBendingForce));
                ctx.lineTo(zoomX - zoomRadius + blockTeeth[i].x + toothSpacing + zoomOffset, zoomY - zoomRadius);
                ctx.fill();
            });
            
            if (s.frictionActive && s.teethBendingForce > 0.5) {
                ctx.shadowBlur = 15 * s.teethBendingForce;
                ctx.shadowColor = "rgba(239, 68, 68, 0.5)";
                ctx.strokeStyle = "#ef4444";
                ctx.lineWidth = 6 * s.teethBendingForce;
                ctx.beginPath(); ctx.arc(zoomX, zoomY, zoomRadius, 0, Math.PI * 2); ctx.stroke();
                ctx.shadowBlur = 0;
            }
            ctx.restore();
            
            // Zoom border
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 4;
            ctx.beginPath(); ctx.arc(zoomX, zoomY, zoomRadius, 0, Math.PI * 2); ctx.stroke();
            
            ctx.fillStyle = '#64748b';
            ctx.font = '600 11px Inter, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('🔍 MICROSCOPIC INTERLOCKS', zoomX, zoomY + zoomRadius + 20);
            ctx.textAlign = 'left';
        }
        
        // ============ KINETIC FRICTION UPDATE & DRAW ============
        function updateKinetic() {
            const s = kineticState;
            
            if (s.pushActive) {
                s.pushFrame++;
                if (s.frictionState === "STATIC") {
                    if (kineticConfig.kickForce > kineticConfig.staticFriction) {
                        s.frictionState = "BREAKING";
                        s.block.ax = (kineticConfig.kickForce - kineticConfig.staticFriction) / 10;
                    }
                } else {
                    s.block.ax = (kineticConfig.kickForce - kineticConfig.kineticFriction) / 10;
                }
                if (s.pushFrame > 20) s.pushActive = false;
            } else if (s.isMoving) {
                s.block.ax = -kineticConfig.kineticFriction / 15;
            } else {
                s.block.ax = 0; s.block.vx = 0;
            }
            
            s.block.vx += s.block.ax;
            s.block.vx = Math.max(0, s.block.vx);
            s.block.x += s.block.vx;
            
            if (s.block.vx > 0.2) {
                s.frictionState = "KINETIC";
                s.isMoving = true;
            } else if (s.isMoving && s.block.vx <= 0.2) {
                s.isMoving = false;
                s.frictionState = "STATIC";
                s.block.vx = 0;
            }
            
            if (s.block.x > width) s.block.x = -kineticConfig.blockW;
            
            // Update HUD
            const statusEl = document.getElementById('kineticStatus');
            const typeEl = document.getElementById('frictionType');
            const forceEl = document.getElementById('retardingForce');
            
            if (s.frictionState === "STATIC") {
                statusEl.innerText = "AT REST";
                statusEl.style.color = "#94a3b8";
                typeEl.innerHTML = "STATIC (fₛ)";
                forceEl.innerText = kineticConfig.staticFriction + " N (max)";
            } else {
                statusEl.innerText = "IN MOTION";
                statusEl.style.color = "#f59e0b";
                typeEl.innerHTML = "KINETIC (fₖ)";
                forceEl.innerText = kineticConfig.kineticFriction + " N";
            }
        }
        
        function drawKinetic() {
            ctx.clearRect(0, 0, width, height);
            
            // Grid
            ctx.strokeStyle = '#f1f5f9';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < width; i += 50) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, height); ctx.stroke();
            }
            
            // Floor
            ctx.fillStyle = '#94a3b8';
            ctx.fillRect(0, kineticConfig.floorY, width, height - kineticConfig.floorY);
            
            const s = kineticState;
            
            // Block shadow
            ctx.shadowColor = 'rgba(0,0,0,0.15)';
            ctx.shadowBlur = 15;
            ctx.shadowOffsetY = 5;
            
            // Block
            const gradient = ctx.createLinearGradient(s.block.x, kineticConfig.blockY,
                s.block.x + kineticConfig.blockW, kineticConfig.blockY + kineticConfig.blockH);
            gradient.addColorStop(0, s.frictionState === "KINETIC" ? '#f59e0b' : '#3b82f6');
            gradient.addColorStop(1, s.frictionState === "KINETIC" ? '#d97706' : '#2563eb');
            ctx.fillStyle = gradient;
            ctx.strokeStyle = s.frictionState === "KINETIC" ? '#d97706' : '#1d4ed8';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.roundRect(s.block.x, kineticConfig.blockY, kineticConfig.blockW, kineticConfig.blockH, 10);
            ctx.fill();
            ctx.stroke();
            
            ctx.shadowBlur = 0;
            ctx.shadowOffsetY = 0;
            
            // Motion blur effect
            if (s.block.vx > 2) {
                ctx.fillStyle = 'rgba(245, 158, 11, 0.15)';
                ctx.beginPath();
                ctx.roundRect(s.block.x - 10, kineticConfig.blockY, kineticConfig.blockW + 20, kineticConfig.blockH, 10);
                ctx.fill();
            }
            
            // Zoom circle
            const zoomRadius = 140;
            const zoomX = width - zoomRadius - 30;
            const zoomY = zoomRadius + 30;
            
            ctx.save();
            ctx.beginPath(); ctx.arc(zoomX, zoomY, zoomRadius, 0, Math.PI * 2); ctx.clip();
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(zoomX - zoomRadius, zoomY - zoomRadius, zoomRadius * 2, zoomRadius * 2);
            
            const viewScale = 4;
            const lift = s.frictionState === "KINETIC" ? 14 : 0;
            const blur = s.frictionState === "KINETIC" ? Math.min(s.block.vx, 10) : 0;
            
            if (blur > 0) ctx.filter = `blur(${blur}px)`;
            
            for (let i = 0; i < 60; i++) {
                let tx = (zoomX - 220) + (i * 5 * viewScale) - (s.block.vx * viewScale * 2 % 1000);
                
                ctx.fillStyle = '#cbd5e1';
                ctx.beginPath();
                ctx.moveTo(tx, zoomY + 45);
                ctx.lineTo(tx + 12, zoomY + 10);
                ctx.lineTo(tx + 24, zoomY + 45);
                ctx.fill();
                
                ctx.fillStyle = s.frictionState === "KINETIC" ? '#f59e0b' : '#1e293b';
                ctx.shadowColor = s.frictionState === "KINETIC" ? '#f59e0b60' : 'transparent';
                ctx.shadowBlur = 6;
                ctx.beginPath();
                ctx.moveTo(tx, zoomY + 10 - lift);
                ctx.lineTo(tx + 12, zoomY + 45 - lift);
                ctx.lineTo(tx + 24, zoomY + 10 - lift);
                ctx.fill();
            }
            
            ctx.filter = "none";
            ctx.shadowBlur = 0;
            ctx.restore();
            
            // Zoom border
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 4;
            ctx.beginPath(); ctx.arc(zoomX, zoomY, zoomRadius, 0, Math.PI * 2); ctx.stroke();
            
            ctx.fillStyle = '#64748b';
            ctx.font = '600 11px Inter, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('🔍 HILL & VALLEY SLIDE', zoomX, zoomY + zoomRadius + 20);
            ctx.textAlign = 'left';
            
            // Speed indicator
            if (s.block.vx > 0.5) {
                ctx.fillStyle = '#f59e0b';
                ctx.font = '600 13px Inter, sans-serif';
                ctx.fillText(`⚡ ${s.block.vx.toFixed(1)} px/frame`, s.block.x + kineticConfig.blockW/2 - 30, kineticConfig.blockY - 15);
            }
        }
        
        // ============ UNIFIED POINTER EVENTS ============
        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }
        
        function handlePointerDown(e) {
            e.preventDefault();
            const coords = getCanvasCoords(e);
            
            if (currentTab === 'static') {
                const s = staticState;
                if (coords.x > s.block.x && coords.x < s.block.x + staticConfig.blockW &&
                    coords.y > staticConfig.blockY && coords.y < staticConfig.blockY + staticConfig.blockH) {
                    s.block.isDragging = true;
                    s.mouse.startX = coords.x;
                    s.mouse.currentX = coords.x;
                    canvas.setPointerCapture(e.pointerId);
                }
            } else {
                const s = kineticState;
                if (!s.isMoving) {
                    s.pushActive = true;
                    s.pushFrame = 0;
                }
            }
        }
        
        function handlePointerMove(e) {
            e.preventDefault();
            
            if (currentTab === 'static') {
                const s = staticState;
                if (s.block.isDragging) {
                    const coords = getCanvasCoords(e);
                    s.mouse.currentX = coords.x;
                }
            }
        }
        
        function handlePointerUp(e) {
            e.preventDefault();
            
            if (currentTab === 'static') {
                staticState.block.isDragging = false;
                staticState.frictionActive = true;
                canvas.releasePointerCapture(e.pointerId);
            }
        }
        
        // ============ ANIMATION LOOP ============
        function animate() {
            if (currentTab === 'static') {
                updateStatic();
                drawStatic();
            } else {
                updateKinetic();
                drawKinetic();
            }
            requestAnimationFrame(animate);
        }
        
        // ============ TAB SWITCHING ============
        function switchTab(tab) {
            currentTab = tab;
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });
            
            const staticHUD = document.getElementById('staticHUD');
            const kineticHUD = document.getElementById('kineticHUD');
            const hint = document.getElementById('hintMessage');
            
            if (tab === 'static') {
                staticHUD.style.display = 'block';
                kineticHUD.style.display = 'none';
                hint.innerHTML = '<span>👆 Click and drag the blue block to pull it</span>';
            } else {
                staticHUD.style.display = 'none';
                kineticHUD.style.display = 'block';
                hint.innerHTML = '<span>👆 Tap the block to apply force · Watch the teeth bounce!</span>';
            }
        }
        
        // ============ INITIALIZATION ============
        canvas.addEventListener('pointerdown', handlePointerDown);
        canvas.addEventListener('pointermove', handlePointerMove);
        canvas.addEventListener('pointerup', handlePointerUp);
        canvas.addEventListener('pointercancel', handlePointerUp);
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.dataset.tab));
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                switchTab(btn.dataset.tab);
            }, { passive: false });
        });
        
        animate();
    </script>
</body>
</html>
