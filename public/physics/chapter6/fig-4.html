<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Sound Lab: Velocity & Echo</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --steel: #94a3b8;
            --water: #3b82f6;
            --air: #22c55e;
            --echo: #f59e0b;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: #f1f5f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .lab-bench {
            background: var(--panel);
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            width: 900px;
            border: 1px solid #334155;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 16px;
        }

        .btn-group { display: flex; gap: 8px; }
        button {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #334155;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button.active { border-color: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.2); }
        
        .hud-display {
            display: flex;
            justify-content: space-around;
            text-align: center;
            margin-top: 15px;
        }

        .stat-box { display: flex; flex-direction: column; }
        .stat-label { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-size: 1.4rem; font-weight: 800; font-family: monospace; }

        canvas {
            background: #020617;
            border-radius: 12px;
            border: 1px solid #334155;
            cursor: crosshair;
        }

        .math-overlay {
            font-size: 0.9rem;
            color: var(--echo);
            margin-top: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="lab-bench">
    <div class="controls">
        <div class="stat-box">
            <span class="stat-label">Step 1: Select Medium</span>
            <div class="btn-group">
                <button id="btn-air" class="active" onclick="setMedium('air')">💨 Air</button>
                <button id="btn-water" onclick="setMedium('water')">💧 Water</button>
                <button id="btn-steel" onclick="setMedium('steel')">🔩 Steel</button>
            </div>
        </div>
        <div class="stat-box">
            <span class="stat-label">Step 2: Transmission</span>
            <button style="background: var(--echo); color: #000;" onclick="firePulse()">⚡ FIRE SONIC PULSE</button>
        </div>
    </div>

    <canvas id="mainCanvas" width="850" height="300"></canvas>

    <div class="hud-display">
        <div class="stat-box">
            <span class="stat-label">Wave Speed (v)</span>
            <span id="val-speed" class="stat-value" style="color:var(--air)">340 m/s</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Time Elapsed (t)</span>
            <span id="val-time" class="stat-value">0.00s</span>
        </div>
        <div class="stat-box">
            <span class="stat-label">Calculated Dist (d)</span>
            <span id="val-dist" class="stat-value">---</span>
        </div>
    </div>
    <div class="math-overlay" id="math-hint">Click 'Fire' to see the Echo calculation...</div>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    
    let medium = 'air';
    let particles = [];
    let pulseX = -100;
    let isReflecting = false;
    let startTime = 0;
    let timerActive = false;
    let finalDist = 0;

    const DATA = {
        air: { v: 1, label: '340 m/s', color: '#22c55e', density: 10 },
        water: { v: 4.4, label: '1,480 m/s', color: '#3b82f6', density: 25 },
        steel: { v: 17.5, label: '5,960 m/s', color: '#94a3b8', density: 50 }
    };

    function setMedium(m) {
        medium = m;
        pulseX = -100;
        timerActive = false;
        document.querySelectorAll('.btn-group button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + m).classList.add('active');
        document.getElementById('val-speed').innerText = DATA[m].label;
        document.getElementById('val-speed').style.color = DATA[m].color;
        initParticles();
    }

    function initParticles() {
        particles = [];
        const rows = 12;
        const cols = 60;
        for(let r=0; r<rows; r++) {
            for(let c=0; c<cols; c++) {
                particles.push({
                    x: c * 15 + 20,
                    y: r * 20 + 40,
                    origX: c * 15 + 20,
                    isRed: (r === 6 && c === 30)
                });
            }
        }
    }

    function firePulse() {
        pulseX = 0;
        isReflecting = false;
        startTime = Date.now();
        timerActive = true;
        document.getElementById('math-hint').innerText = "Pulse traveling... waiting for impact.";
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Wall (Reflector)
        ctx.fillStyle = "#334155";
        ctx.fillRect(830, 0, 20, canvas.height);

        const currentV = DATA[medium].v;

        if (timerActive) {
            let elapsed = (Date.now() - startTime) / 1000;
            document.getElementById('val-time').innerText = elapsed.toFixed(2) + "s";
            
            if (!isReflecting) {
                pulseX += currentV * 3; 
                if (pulseX >= 830) isReflecting = true;
            } else {
                pulseX -= currentV * 3;
                if (pulseX <= 0) {
                    timerActive = false;
                    const totalT = elapsed;
                    const speedNum = medium === 'air' ? 340 : (medium === 'water' ? 1480 : 5960);
                    const d = (speedNum * totalT) / 2;
                    document.getElementById('val-dist').innerText = Math.round(d) + "m";
                    document.getElementById('math-hint').innerText = `Math: (${speedNum} m/s × ${totalT.toFixed(2)}s) / 2 = ${Math.round(d)}m to the wall.`;
                }
            }
        }

        particles.forEach(p => {
            // Particle logic: They compress when the pulseX is near them
            let dist = Math.abs(p.origX - pulseX);
            let off = 0;
            if (dist < 40) {
                off = (isReflecting ? -15 : 15) * (1 - dist/40);
            }
            
            ctx.fillStyle = p.isRed ? "#f43f5e" : DATA[medium].color;
            ctx.globalAlpha = p.isRed ? 1.0 : 0.4;
            ctx.beginPath();
            ctx.arc(p.origX + off, p.y, p.isRed ? 4 : 2, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha = 1.0;
        });

        requestAnimationFrame(draw);
    }

    setMedium('air');
    draw();
</script>
</body>
</html>
