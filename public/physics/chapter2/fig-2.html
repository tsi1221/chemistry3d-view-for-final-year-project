<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Precision Laboratory - Multi-Device Edition</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f2f5; color: #1a1a1b; margin: 0; padding: 20px; }
        .container { background: #ffffff; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 950px; width: 100%; text-align: center; }
        .tab-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { padding: 10px 18px; border: 1px solid #ddd; background: #fff; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s; color: #555; }
        .tab-btn.active { background: #3498db; color: white; border-color: #3498db; }
        canvas { border: 1px solid #e0e0e0; border-radius: 12px; background: #fdfdfd; margin-bottom: 20px; cursor: crosshair; }
        .info-box { text-align: left; padding: 20px; background: #f8f9fa; border-left: 4px solid #3498db; border-radius: 4px; width: 100%; box-sizing: border-box; }
        .reading-display { font-family: 'Courier New', monospace; font-size: 1.2rem; color: #e67e22; font-weight: bold; margin-bottom: 10px; min-height: 25px; }
        .highlight { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="tab-bar" id="tab-bar"></div>

    <div id="display-area">
        <div id="val-readout" class="reading-display">Move the sliders to measure</div>
        <canvas id="mainCanvas" width="900" height="500"></canvas>
        <div class="info-box">
            <h2 id="exp-name">Loading...</h2>
            <p id="exp-desc"></p>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const nameEl = document.getElementById('exp-name');
    const descEl = document.getElementById('exp-desc');
    const readoutEl = document.getElementById('val-readout');
    const tabBar = document.getElementById('tab-bar');

    let activeTab = 0;
    const mouse = { x: 0, y: 0, isDown: false };

    const state = {
        mass: { value: 6.38, ox: 150, unitPx: 60 },
        temp: { value: 38.45, ox: 350, oy: 50, h: 380 }
    };

    const experiments = [
        {
            name: "Mass Comparison",
            desc: "Device A (Top) has marks every 1g. Device B (Bottom) has marks every 0.1g. Notice how Device B allows you to estimate the hundredths place (0.01g).",
            draw: () => {
                const s = state.mass;
                // Device A: 1g marks
                drawBeam(s.ox, 120, "DEVICE A: 1g Divisions", 1, false, s.value);
                // Device B: 0.1g marks
                drawBeam(s.ox, 320, "DEVICE B: 0.1g Divisions", 0.1, true, s.value);
                
                readoutEl.innerHTML = `Reading A: ~${s.value.toFixed(1)}g | Reading B: ${s.value.toFixed(2)}g (Precise)`;
            }
        },
        {
            name: "Temperature Comparison",
            desc: "The left thermometer has 10° marks (low precision). The right has 1° marks (high precision). As mark density increases, so does the certainty of your data.",
            draw: () => {
                const s = state.temp;
                // Thermometer 1: Coarse
                drawThermometer(s.ox - 150, s.oy, s.h, 10, "COARSE (10°)", s.value);
                // Thermometer 2: Fine
                drawThermometer(s.ox + 150, s.oy, s.h, 1, "FINE (1°)", s.value);

                readoutEl.innerHTML = `Observation: At ${s.value.toFixed(1)}°C, the Fine Scale allows for a <span class="highlight">0.01</span> estimation.`;
            }
        }
    ];

    function drawBeam(x, y, label, step, sub, val) {
        const width = 600;
        ctx.fillStyle = "#f1f2f6";
        ctx.fillRect(x, y, width, 50);
        ctx.strokeStyle = "#2f3542";
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y, width, 50);
        
        ctx.fillStyle = "#2f3542"; ctx.font = "bold 13px Arial"; ctx.textAlign="left";
        ctx.fillText(label, x, y - 15);

        // Scale Logic
        for(let i=0; i<=10; i++) {
            let px = x + (i * 60);
            ctx.beginPath(); ctx.moveTo(px, y); ctx.lineTo(px, y+20); ctx.stroke();
            ctx.fillText(i, px - 4, y + 35);
            
            if(sub && i < 10) {
                for(let j=1; j<10; j++) {
                    let spx = px + (j * 6);
                    ctx.beginPath(); ctx.moveTo(spx, y); ctx.lineTo(spx, y+10); ctx.stroke();
                }
            }
        }

        // Rider (Slider)
        const riderX = x + (val * 60);
        ctx.fillStyle = "#e74c3c";
        ctx.fillRect(riderX - 8, y - 10, 16, 25);
        ctx.strokeStyle = "white"; ctx.strokeRect(riderX - 8, y-10, 16, 25);
    }

    function drawThermometer(x, y, h, step, label, val) {
        // Tube
        ctx.strokeStyle = "#2f3542"; ctx.lineWidth = 4;
        ctx.strokeRect(x, y, 30, h);
        
        // Liquid
        const fill = (val / 100) * h;
        ctx.fillStyle = "#e74c3c";
        ctx.fillRect(x + 2, y + h - fill, 26, fill);

        // Scale
        ctx.fillStyle = "#2f3542"; ctx.font = "11px Arial";
        for(let i=0; i<=100; i+=step) {
            const ty = y + h - (i/100 * h);
            ctx.beginPath();
            ctx.moveTo(x + 30, ty);
            ctx.lineTo(x + 45, ty);
            ctx.stroke();
            if(i % 10 === 0) ctx.fillText(i, x + 50, ty + 4);
        }
        ctx.textAlign = "center";
        ctx.fillText(label, x + 15, y + h + 25);
    }

    function init() {
        experiments.forEach((ex, i) => {
            const btn = document.createElement('button');
            btn.className = 'tab-btn' + (i === activeTab ? ' active' : '');
            btn.innerText = ex.name;
            btn.onclick = () => {
                activeTab = i;
                document.querySelectorAll('.tab-btn').forEach((b, idx) => b.className = 'tab-btn' + (idx === i ? ' active' : ''));
                nameEl.innerText = ex.name;
                descEl.innerText = ex.desc;
            };
            tabBar.appendChild(btn);
        });
        nameEl.innerText = experiments[activeTab].name;
        descEl.innerText = experiments[activeTab].desc;
        animate();
    }

    canvas.onmousedown = (e) => { mouse.isDown = true; handleInput(e); };
    window.onmouseup = () => mouse.isDown = false;
    canvas.onmousemove = (e) => { if(mouse.isDown) handleInput(e); };

    function handleInput(e) {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        if(activeTab === 0) {
            state.mass.value = Math.max(0, Math.min(10, (mx - state.mass.ox) / 60));
        } else {
            state.temp.value = Math.max(0, Math.min(100, ( (state.temp.oy + state.temp.h) - my) / (state.temp.h / 100)));
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        experiments[activeTab].draw();
        requestAnimationFrame(animate);
    }

    init();
</script>
</body>
</html>
