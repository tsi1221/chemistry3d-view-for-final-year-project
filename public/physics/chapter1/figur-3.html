<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Physics · Thought Experiments</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            background: #fafbfc;
            overflow: hidden;
            touch-action: pan-y;
            color: #1a1e2b;
        }
        
        /* Header */
        .app-header {
            padding: 16px 24px;
            background: #ffffff;
            border-bottom: 1px solid #eef2f6;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        
        .app-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .app-title h1 {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #1a1e2b;
        }
        
        .app-title .badge {
            background: #eef2f6;
            color: #5b687c;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        
        /* Tabs */
        .tabs-container {
            padding: 12px 24px 0 24px;
            background: #ffffff;
            border-bottom: 1px solid #eef2f6;
            flex-shrink: 0;
        }
        
        .tab-bar {
            display: flex;
            gap: 4px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            padding-bottom: 4px;
        }
        
        .tab-bar::-webkit-scrollbar {
            display: none;
        }
        
        .tab-btn {
            padding: 10px 18px;
            border: none;
            background: transparent;
            color: #7c879c;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            white-space: nowrap;
            flex-shrink: 0;
            touch-action: manipulation;
            border-radius: 40px;
        }
        
        .tab-btn:hover {
            color: #1a1e2b;
            background: #f5f7fa;
        }
        
        .tab-btn.active {
            background: #1a1e2b;
            color: white;
        }
        
        /* Main Simulation Area */
        .simulation-container {
            flex-grow: 1;
            background: #fafbfc;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            touch-action: none;
        }
        
        .canvas-card {
            position: relative;
            width: 100%;
            max-width: 950px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.05);
            border: 1px solid #eef2f6;
            overflow: hidden;
        }
        
        .canvas-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 10;
        }
        
        #mainCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
        }
        
        /* Controls Panel */
        .controls-panel {
            padding: 14px 24px;
            background: #ffffff;
            border-top: 1px solid #eef2f6;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        
        .control-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .control-btn {
            padding: 8px 18px;
            border-radius: 40px;
            border: 1px solid #eef2f6;
            background: #ffffff;
            font-weight: 500;
            font-size: 0.85rem;
            color: #1a1e2b;
            cursor: pointer;
            transition: all 0.2s ease;
            touch-action: manipulation;
        }
        
        .control-btn:hover {
            background: #f5f7fa;
            border-color: #dce2ec;
        }
        
        .control-btn.primary {
            background: #1a1e2b;
            border-color: #1a1e2b;
            color: white;
        }
        
        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .slider-container label {
            font-size: 0.85rem;
            color: #5b687c;
            font-weight: 500;
        }
        
        input[type="range"] {
            width: 140px;
            height: 4px;
            background: #eef2f6;
            border-radius: 2px;
            appearance: none;
            -webkit-appearance: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #1a1e2b;
            border-radius: 50%;
            cursor: pointer;
        }
        
        /* Info Panel */
        .info-panel {
            padding: 18px 24px;
            background: #ffffff;
            border-top: 1px solid #eef2f6;
        }
        
        #sci-name {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            color: #1a1e2b;
            margin-bottom: 6px;
        }
        
        #sci-desc {
            font-size: 0.9rem;
            color: #5b687c;
            line-height: 1.5;
        }
        
        /* Hint */
        .hint-wrapper {
            padding: 10px 24px 16px 24px;
            text-align: center;
            background: #ffffff;
            border-top: 1px solid #eef2f6;
        }
        
        .hint-text {
            display: inline-block;
            padding: 6px 18px;
            background: #f5f7fa;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #5b687c;
            border: 1px solid #eef2f6;
        }
        
        .hidden {
            display: none !important;
        }
        
        /* Mobile Optimizations */
        @media (max-width: 600px) {
            .app-header {
                padding: 12px 16px;
            }
            
            .app-title h1 {
                font-size: 1.1rem;
            }
            
            .tabs-container {
                padding: 8px 16px 0 16px;
            }
            
            .tab-btn {
                padding: 8px 14px;
                font-size: 0.8rem;
            }
            
            .simulation-container {
                padding: 12px;
            }
            
            .controls-panel {
                padding: 12px 16px;
                gap: 10px;
            }
            
            .info-panel {
                padding: 14px 16px;
            }
            
            #sci-name {
                font-size: 1rem;
            }
            
            #sci-desc {
                font-size: 0.85rem;
            }
            
            .slider-container {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
        
        html, body {
            overscroll-behavior: none;
        }
        
        button:focus-visible {
            outline: 2px solid #0066cc;
            outline-offset: 2px;
        }
        
        
       
    </style>
</head>
<body>
    <header class="app-header">
        <div class="app-title">
            <h1>💭 Thought Experiments</h1>
            <span class="badge">5 Classics</span>
        </div>
    </header>

    <div class="tabs-container">
        <div class="tab-bar" id="tab-bar"></div>
    </div>

    <div class="simulation-container">
        <div class="canvas-card">
            <div class="canvas-wrapper">
                <canvas id="mainCanvas" width="950" height="594"></canvas>
            </div>
            
            <!-- Newton Controls -->
            <div id="newton-controls" class="controls-panel hidden">
                <div class="slider-container">
                    <label>Launch Velocity</label>
                    <input type="range" id="v-slider" min="2" max="8" step="0.1" value="3">
                    <span id="velocity-value" style="min-width: 40px; font-weight: 600;">3.0</span>
                </div>
                <button class="control-btn primary" id="fireNewtonBtn">🚀 Fire Cannon</button>
            </div>
            
            <!-- Curie Controls -->
            <div id="curie-controls" class="controls-panel hidden">
                <button class="control-btn" id="poloniumBtn">💎 Polonium (High Energy)</button>
                <button class="control-btn primary" id="radiumBtn">✨ Radium (Classic Glow)</button>
            </div>
            
            <!-- Default Controls (hidden) -->
            <div id="default-controls" class="controls-panel"></div>
            
            <!-- Info Panel -->
            <div class="info-panel">
                <div id="sci-name">Loading...</div>
                <div id="sci-desc"></div>
            </div>
            
            <!-- Hint -->
            <div class="hint-wrapper">
                <div class="hint-text" id="hintMessage">
                    <span>🔬 Click and drag to interact with each experiment</span>
                </div>
            </div>
        </div>
    </div>

    <script>
         CanvasRenderingContext2D.prototype.roundRect = (x, y, w, h, r)=> {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            return this;
        };
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const nameEl = document.getElementById('sci-name');
        const descEl = document.getElementById('sci-desc');
        const tabBar = document.getElementById('tab-bar');
        const hintEl = document.getElementById('hintMessage');

        // Canvas internal dimensions
        const width = 950;
        const height = 594;
        
        function resizeCanvas() {
            canvas.width = width;
            canvas.height = height;
        }
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let time = 0;
        let activeTab = 0;
        const mouse = { x: width/2, y: height/2, isDown: false, lastX: width/2, target: null };

        // Drawing helpers
        function drawBulb3D(x, y, intensity) {
            ctx.save();
            ctx.translate(x, y);
            if (intensity > 0.05) {
                const grad = ctx.createRadialGradient(0, 0, 2, 0, 0, 70 * intensity);
                grad.addColorStop(0, `rgba(255, 240, 150, ${intensity})`);
                grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
                ctx.fillStyle = grad;
                ctx.beginPath(); ctx.arc(0, 0, 80 * intensity, 0, Math.PI*2); ctx.fill();
            }
            ctx.strokeStyle = "#333"; ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-15, 30); ctx.bezierCurveTo(-45, 10, -45, -50, 0, -60);
            ctx.bezierCurveTo(45, -50, 45, 10, 15, 30); ctx.stroke();
            ctx.strokeStyle = intensity > 0.2 ? "#f1c40f" : "#bbb";
            ctx.lineWidth = intensity > 0.3 ? 3 : 2;
            ctx.beginPath(); ctx.moveTo(-10, 10); ctx.lineTo(-5, -15); ctx.lineTo(5, -15); ctx.lineTo(10, 10); ctx.stroke();
            ctx.fillStyle = "#bdc3c7"; ctx.fillRect(-18, 30, 36, 15);
            ctx.restore();
        }

        function drawCoilPart(isFront, bulbGlow) {
            const coil = { x: 400, y: height/2, loops: 12, width: 260, radius: 55 };
            const spacing = coil.width / coil.loops;
            ctx.lineWidth = 6;
            for(let i = 0; i < coil.loops; i++) {
                const lx = (coil.x - coil.width/2) + (i * spacing);
                const r = Math.floor(184 + (46 - 184) * Math.min(1, bulbGlow));
                const g = Math.floor(115 + (204 - 115) * Math.min(1, bulbGlow));
                const b = Math.floor(51 + (113 - 51) * Math.min(1, bulbGlow));
                ctx.strokeStyle = `rgb(${r}, ${g}, ${b})`;
                ctx.beginPath();
                if (isFront) ctx.ellipse(lx, coil.y, 14, coil.radius, 0, -Math.PI/2, Math.PI/2);
                else ctx.ellipse(lx, coil.y, 14, coil.radius, 0, Math.PI/2, 3 * Math.PI/2);
                ctx.stroke();
            }
        }

        // State
        const state = {
            newton: { ballX: 0, ballY: 0, vx: 0, vy: 0, path: [], active: false },
            faraday: { magX: 150, brightness: 0 },
            joule: { angle: 0, throttle: 0.4, carX: 50, lever: { x: 720, y: 330, h: 200, handleR: 14 } },
            curie: { mode: 'Radium', particles: [] },
            einstein: { massX: width/2, massY: height/2 }
        };

        const experiments = [
            {
                name: "Isaac Newton", 
                desc: "The Cannonball Orbit: Increase velocity until the ball falls 'around' the Earth.",
                hint: "🚀 Adjust velocity and fire the cannon to achieve orbit",
                draw: () => {
                    ctx.translate(width/2, height/2 - 20);
                    ctx.fillStyle = "#3498db"; ctx.beginPath(); ctx.arc(0,0, 70, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = "#333"; ctx.fillRect(-12, -85, 24, 18);
                    if (state.newton.active) {
                        let s = state.newton;
                        let distSq = s.ballX*s.ballX + s.ballY*s.ballY;
                        let force = 1800 / distSq;
                        let angle = Math.atan2(s.ballY, s.ballX);
                        s.vx -= Math.cos(angle) * force; s.vy -= Math.sin(angle) * force;
                        s.ballX += s.vx; s.ballY += s.vy;
                        s.path.push({x: s.ballX, y: s.ballY});
                        if (s.path.length > 100) s.path.shift();
                        ctx.strokeStyle = "rgba(0,0,0,0.2)"; ctx.beginPath();
                        s.path.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke();
                        ctx.fillStyle = "#ef4444"; ctx.beginPath(); ctx.arc(s.ballX, s.ballY, 5, 0, Math.PI*2); ctx.fill();
                        if (Math.sqrt(distSq) < 70) s.active = false;
                    }
                }
            },
            {
                name: "Michael Faraday", 
                desc: "3D Electromagnetic Induction: Drag the magnet through the coil. Motion creates current!",
                hint: "🧲 Drag the magnet back and forth through the coil",
                draw: () => {
                    let s = state.faraday;
                    const coilX = 400, coilY = height/2, coilW = 260;
                    ctx.strokeStyle = "#ccc"; ctx.lineWidth = 3;
                    if(s.brightness > 0.1) ctx.strokeStyle = `rgba(100,100,100,${0.3 + s.brightness})`;
                    ctx.beginPath();
                    ctx.moveTo(coilX + coilW/2, coilY); ctx.lineTo(680, coilY); ctx.lineTo(680, 180);
                    ctx.moveTo(coilX - coilW/2, coilY); ctx.lineTo(180, coilY); ctx.lineTo(180, 450); ctx.lineTo(680, 450); ctx.lineTo(680, 225);
                    ctx.stroke();
                    drawCoilPart(false, s.brightness);
                    const w = 150, h = 50;
                    const mx = s.magX - w/2, my = coilY - h/2;
                    ctx.fillStyle = "#c0392b"; ctx.fillRect(mx, my, w/2, h);
                    ctx.fillStyle = "#2c3e50"; ctx.fillRect(mx+w/2, my, w/2, h);
                    ctx.fillStyle = "white"; ctx.font = "bold 20px Inter, sans-serif"; ctx.textAlign = "center";
                    ctx.fillText("N", mx + 37, my + 32); ctx.fillText("S", mx + 112, my + 32);
                    drawCoilPart(true, s.brightness);
                    const dist = Math.abs(s.magX - coilX);
                    const prox = Math.max(0, 1.3 - (dist / 250));
                    const speed = Math.abs(s.magX - mouse.lastX);
                    if (mouse.isDown && activeTab === 1) s.brightness += (speed * 0.07) * prox;
                    s.brightness *= 0.93; 
                    if (s.brightness > 1.2) s.brightness = 1.2;
                    drawBulb3D(680, 180, s.brightness);
                }
            },
            {
                name: "James Joule", 
                desc: "Heat to Motion: Drag the red throttle to inject heat. The 'Power Stroke' turns the motor to move the car.",
                hint: "🔥 Drag the red throttle handle up for more power",
                draw: () => {
                    let s = state.joule;
                    const ex = 260, ey = 370, crankR = 45, rodL = 150;
                    const speed = 0.02 + (s.throttle * 0.18);
                    s.angle += speed;
                    s.carX += speed * 40;
                    if(s.carX > width + 60) s.carX = -60;

                    ctx.strokeStyle = "#e2e8f0"; ctx.beginPath(); ctx.moveTo(0, 145); ctx.lineTo(width, 145); ctx.stroke();
                    
                    ctx.save(); ctx.translate(s.carX, 105);
                    ctx.fillStyle = "#3498db"; ctx.beginPath(); ctx.roundRect(-50, 0, 100, 28, 8); ctx.fill();
                    ctx.fillStyle = "rgba(52,152,219,0.5)"; ctx.beginPath(); ctx.roundRect(-28, -18, 50, 22, 5); ctx.fill();
                    const wheelRot = s.angle * 2.5;
                    const drawW = (wx) => {
                        ctx.save(); ctx.translate(wx, 28); ctx.rotate(wheelRot);
                        ctx.fillStyle = "#1e293b"; ctx.beginPath(); ctx.arc(0,0,12,0,Math.PI*2); ctx.fill();
                        ctx.strokeStyle="#fff"; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(-9,0); ctx.lineTo(9,0); ctx.stroke();
                        ctx.restore();
                    }
                    drawW(-35); drawW(30); ctx.restore();

                    ctx.save(); ctx.translate(s.lever.x, s.lever.y);
                    ctx.strokeStyle="#e2e8f0"; ctx.lineWidth=10; ctx.lineCap="round";
                    ctx.beginPath(); ctx.moveTo(0, -s.lever.h/2); ctx.lineTo(0, s.lever.h/2); ctx.stroke();
                    const hY = (s.lever.h/2) - (s.throttle * s.lever.h);
                    s.lever.curH = hY + s.lever.y;
                    ctx.strokeStyle="#1e293b"; ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(0,hY); ctx.lineTo(-24,hY); ctx.stroke();
                    ctx.fillStyle="#ef4444"; ctx.beginPath(); ctx.arc(-24,hY,s.lever.handleR,0,Math.PI*2); ctx.fill(); ctx.stroke();
                    ctx.fillStyle="#64748b"; ctx.font="600 12px Inter, sans-serif"; ctx.fillText("MAX HEAT", 18, -s.lever.h/2 + 8);
                    ctx.fillText("IDLE", 18, s.lever.h/2 + 8); ctx.restore();

                    ctx.save(); ctx.translate(ex, ey);
                    const phase = s.angle % (Math.PI * 4);
                    let fill = "rgba(255,255,255,0)", spark = false;
                    if(phase < Math.PI) fill = `rgba(52,152,219,${0.1+s.throttle*0.3})`;
                    else if(phase < Math.PI*2) fill = `rgba(52,152,219,${0.4+s.throttle*0.4})`;
                    else if(phase < Math.PI*3) {
                        const p = (phase-Math.PI*2)/Math.PI; fill = `rgba(239,68,68,${0.8-p*0.5})`;
                        if(phase < Math.PI*2.3) spark = true;
                    } else fill = "rgba(150,150,150,0.3)";
                    
                    ctx.strokeStyle="#1e293b"; ctx.lineWidth=5; ctx.strokeRect(-50, -200, 100, 135);
                    const pY = (Math.sin(s.angle)*crankR) - Math.sqrt(rodL**2 - (Math.cos(s.angle)*crankR)**2);
                    ctx.fillStyle = fill; ctx.fillRect(-48, -198, 96, pY + 198);
                    if(spark) { ctx.fillStyle="#fbbf24"; ctx.beginPath(); ctx.arc(0,-195,12,0,Math.PI*2); ctx.fill(); }
                    ctx.strokeStyle="#64748b"; ctx.lineWidth=7; ctx.beginPath(); ctx.moveTo(0, pY+18); ctx.lineTo(Math.cos(s.angle)*crankR, Math.sin(s.angle)*crankR); ctx.stroke();
                    ctx.fillStyle="#1e293b"; ctx.fillRect(-45, pY, 90, 28);
                    ctx.beginPath(); ctx.arc(0,0,62,0,Math.PI*2); ctx.strokeStyle="#cbd5e1"; ctx.lineWidth=12; ctx.stroke();
                    for(let i=0; i<4; i++) {
                        const a = s.angle + (i*Math.PI/2); ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*56, Math.sin(a)*56); ctx.stroke();
                    }
                    ctx.restore();
                }
            },
            {
                name: "Marie Curie", 
                desc: "Radioactive Decay: Observe Alpha particles being emitted as the nucleus breaks down.",
                hint: "☢️ Watch alpha particles emit from the radioactive nucleus",
                draw: () => {
                    ctx.translate(width/2, height/2 - 20);
                    let s = state.curie;
                    let glow = (s.mode === 'Polonium') ? "rgba(0, 255, 255, 0.3)" : "rgba(0, 255, 0, 0.2)";
                    ctx.shadowBlur = 35; ctx.shadowColor = glow;
                    ctx.fillStyle = (s.mode === 'Polonium') ? "#00ced1" : "#32cd32";
                    ctx.beginPath(); ctx.arc(0,0, 35, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
                    if (Math.random() < (s.mode === 'Polonium' ? 0.12 : 0.05)) {
                        s.particles.push({x:0, y:0, ang: Math.random()*Math.PI*2, life: 1});
                    }
                    s.particles.forEach((p, i) => {
                        p.x += Math.cos(p.ang) * 6; p.y += Math.sin(p.ang) * 6; p.life -= 0.02;
                        ctx.fillStyle = `rgba(239,68,68,${p.life})`;
                        ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
                        if(p.life <= 0) s.particles.splice(i, 1);
                    });
                }
            },
            {
                name: "Albert Einstein", 
                desc: "Warped Spacetime: Move your mouse to see how mass bends the grid of the universe.",
                hint: "🕳️ Move your cursor to warp spacetime with gravity",
                draw: () => {
                    ctx.strokeStyle = "rgba(139, 92, 246, 0.15)";
                    for(let i=0; i<width; i+=30) {
                        ctx.beginPath();
                        for(let j=0; j<height; j+=12) {
                            let dx = i - mouse.x; let dy = j - mouse.y;
                            let dist = Math.sqrt(dx*dx + dy*dy);
                            let pull = Math.max(0, 180 - dist) * 0.5;
                            let ang = Math.atan2(dy, dx);
                            ctx.lineTo(i - Math.cos(ang)*pull, j - Math.sin(ang)*pull);
                        }
                        ctx.stroke();
                    }
                    ctx.fillStyle = "#1e293b"; ctx.shadowBlur = 20; ctx.shadowColor = "rgba(0,0,0,0.2)";
                    ctx.beginPath(); ctx.arc(mouse.x, mouse.y, 24, 0, Math.PI*2); ctx.fill();
                    ctx.shadowBlur = 0;
                }
            }
        ];

        function init() {
            experiments.forEach((ex, i) => {
                const btn = document.createElement('button');
                btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
                btn.innerText = ex.name.split(" ")[1];
                btn.onclick = () => setTab(i);
                btn.addEventListener('touchstart', (e) => { e.preventDefault(); setTab(i); }, { passive: false });
                tabBar.appendChild(btn);
            });
            setTab(0);
            animate();
        }

        function setTab(i) {
            activeTab = i;
            document.querySelectorAll('.tab-btn').forEach((b, idx) => b.className = 'tab-btn' + (idx === i ? ' active' : ''));
            
            document.getElementById('newton-controls').classList.add('hidden');
            document.getElementById('curie-controls').classList.add('hidden');
            
            nameEl.innerText = experiments[i].name;
            descEl.innerText = experiments[i].desc;
            hintEl.innerHTML = `<span>${experiments[i].hint}</span>`;
            
            if(i === 0) document.getElementById('newton-controls').classList.remove('hidden');
            if(i === 3) document.getElementById('curie-controls').classList.remove('hidden');
        }

        function resetNewton() {
            let v = parseFloat(document.getElementById('v-slider').value);
            state.newton = { ballX: 0, ballY: -85, vx: v, vy: 0, path: [], active: true };
        }

        function setCurie(m) { 
            state.curie.mode = m; 
            state.curie.particles = []; 
        }

        // Unified Pointer Events
        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let clientX, clientY;
            
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        function handlePointerDown(e) {
            e.preventDefault();
            
            const coords = getCanvasCoords(e);
            mouse.x = coords.x;
            mouse.y = coords.y;
            mouse.isDown = true;
            
            if (activeTab === 1) {
                state.faraday.magX = mouse.x;
            }
            
            if (activeTab === 2) {
                const s = state.joule;
                const handleX = s.lever.x - 24;
                const handleY = s.lever.curH;
                const dH = Math.sqrt((mouse.x - handleX) ** 2 + (mouse.y - handleY) ** 2);
                if (dH < s.lever.handleR + 15) mouse.target = 'lever';
            }
            
            canvas.setPointerCapture(e.pointerId);
        }

        function handlePointerMove(e) {
            e.preventDefault();
            
            const coords = getCanvasCoords(e);
            const lastX = mouse.x;
            mouse.x = coords.x;
            mouse.y = coords.y;
            
            if (activeTab === 1 && mouse.isDown) {
                state.faraday.magX = Math.max(100, Math.min(width - 100, mouse.x));
            }
            
            if (activeTab === 2 && mouse.isDown && mouse.target === 'lever') {
                const s = state.joule;
                const top = s.lever.y - s.lever.h/2;
                const bot = s.lever.y + s.lever.h/2;
                let nY = Math.max(top, Math.min(bot, mouse.y));
                s.throttle = (bot - nY) / s.lever.h;
            }
            
            mouse.lastX = lastX;
        }

        function handlePointerUp(e) {
            e.preventDefault();
            mouse.isDown = false;
            mouse.target = null;
            canvas.releasePointerCapture(e.pointerId);
        }

        // Initialize
        canvas.addEventListener('pointerdown', handlePointerDown);
        canvas.addEventListener('pointermove', handlePointerMove);
        canvas.addEventListener('pointerup', handlePointerUp);
        canvas.addEventListener('pointercancel', handlePointerUp);
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());

        document.getElementById('v-slider').addEventListener('input', (e) => {
            document.getElementById('velocity-value').textContent = parseFloat(e.target.value).toFixed(1);
        });
        document.getElementById('fireNewtonBtn').addEventListener('click', resetNewton);
        document.getElementById('poloniumBtn').addEventListener('click', () => setCurie('Polonium'));
        document.getElementById('radiumBtn').addEventListener('click', () => setCurie('Radium'));

        function animate() {
            ctx.clearRect(0, 0, width, height); 
            time += 0.03;
            ctx.save(); 
            experiments[activeTab].draw(); 
            ctx.restore();
            requestAnimationFrame(animate);
        }

        init();
    </script>
</body>
</html>
