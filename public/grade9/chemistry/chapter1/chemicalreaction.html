<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🧪 reaction lab · H₂ + O₂ → H₂O</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-page: #ffffff;
      --surface: #fafcff;
      --border-light: #d0e2ff;
      --text-dark: #0a1e3c;
      --accent: #3b82f6;
      --hydrogen: #ef4444;
      --oxygen: #10b981;
      --water: #3b82f6;
      --shadow-card: 0 8px 24px rgba(0,0,0,0.04);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-page);
      color: var(--text-dark);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #canvas-container {
      flex: 1;
      position: relative;
      background: radial-gradient(circle at center, #f8fafc 0%, #e8f2ff 100%);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .stats-mini {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      padding: 10px 18px;
      border-radius: 40px;
      border: 1px solid var(--border-light);
      display: flex;
      gap: 16px;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .stat-item {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .stat-value {
      font-weight: 700;
      color: var(--accent);
    }

    .legend {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      padding: 10px 18px;
      border-radius: 40px;
      border: 1px solid var(--border-light);
      display: flex;
      gap: 16px;
    }

    .legend-dot {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
    }

    .equation {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      padding: 10px 24px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 1.2rem;
      border: 1px solid var(--border-light);
    }

    .hint {
      position: absolute;
      bottom: 80px;
      left: 20px;
      background: rgba(255,255,255,0.9);
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 0.8rem;
      color: var(--text-dark);
      pointer-events: none;
    }

    .btn-reset {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: white;
      border: 1px solid var(--border-light);
      padding: 12px 20px;
      border-radius: 40px;
      font-weight: 600;
      cursor: pointer;
      color: var(--accent);
      box-shadow: var(--shadow-card);
    }
  </style>
</head>
<body>

<div id="canvas-container"></div>

<div class="legend">
  <div class="legend-dot"><span style="color:var(--hydrogen);">●</span> H₂</div>
  <div class="legend-dot"><span style="color:var(--oxygen);">●</span> O₂</div>
  <div class="legend-dot"><span style="color:var(--water);">●</span> H₂O</div>
</div>

<div class="stats-mini">
  <div class="stat-item">H₂ <span class="stat-value" id="h2Count">12</span></div>
  <div class="stat-item">O₂ <span class="stat-value" id="o2Count">6</span></div>
  <div class="stat-item">H₂O <span class="stat-value" id="h2oCount">0</span></div>
</div>

<div class="equation">2H₂ + O₂ → 2H₂O</div>
<div class="hint">👆 drag to rotate · particles react on collision</div>
<button class="btn-reset" id="resetBtn">↻ reset</button>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

  const container = document.getElementById('canvas-container');
  const scene = new THREE.Scene();
  scene.background = new THREE.Color('#f8fafc');
  
  const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
  camera.position.set(8, 5, 14);
  camera.lookAt(0, 0, 0);
  
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  container.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.8;
  controls.enableZoom = true;

  // lighting
  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
  dirLight.position.set(5, 10, 8);
  scene.add(dirLight);
  scene.add(new THREE.PointLight(0xcce0ff, 0.4));

  // particles
  let molecules = [];
  const bounds = { x: 5, y: 3.5, z: 3 };
  
  function createMolecule(type) {
    const group = new THREE.Group();
    const color = type === 'H2' ? '#ef4444' : (type === 'O2' ? '#10b981' : '#3b82f6');
    
    if (type === 'H2') {
      const h1 = new THREE.Mesh(new THREE.SphereGeometry(0.3, 12), new THREE.MeshStandardMaterial({ color }));
      const h2 = h1.clone();
      h1.position.x = -0.4;
      h2.position.x = 0.4;
      group.add(h1, h2);
    } else if (type === 'O2') {
      const o1 = new THREE.Mesh(new THREE.SphereGeometry(0.35, 12), new THREE.MeshStandardMaterial({ color }));
      const o2 = o1.clone();
      o1.position.x = -0.45;
      o2.position.x = 0.45;
      group.add(o1, o2);
    } else {
      const o = new THREE.Mesh(new THREE.SphereGeometry(0.32, 12), new THREE.MeshStandardMaterial({ color }));
      const h1 = new THREE.Mesh(new THREE.SphereGeometry(0.22, 8), new THREE.MeshStandardMaterial({ color: '#ef4444' }));
      const h2 = h1.clone();
      h1.position.set(-0.5, 0.3, 0);
      h2.position.set(0.5, 0.3, 0);
      group.add(o, h1, h2);
    }
    
    group.position.x = (Math.random() - 0.5) * bounds.x * 1.8;
    group.position.y = (Math.random() - 0.5) * bounds.y * 1.8;
    group.position.z = (Math.random() - 0.5) * bounds.z * 1.5;
    
    group.userData = {
      type,
      vel: new THREE.Vector3(
        (Math.random() - 0.5) * 0.04,
        (Math.random() - 0.5) * 0.04,
        (Math.random() - 0.5) * 0.03
      )
    };
    
    scene.add(group);
    return group;
  }

  function init() {
    molecules.forEach(m => scene.remove(m));
    molecules = [];
    for (let i = 0; i < 12; i++) molecules.push(createMolecule('H2'));
    for (let i = 0; i < 6; i++) molecules.push(createMolecule('O2'));
    updateUI();
  }

  function updateUI() {
    const h2 = molecules.filter(m => m.userData.type === 'H2').length;
    const o2 = molecules.filter(m => m.userData.type === 'O2').length;
    const h2o = molecules.filter(m => m.userData.type === 'H2O').length;
    document.getElementById('h2Count').textContent = h2;
    document.getElementById('o2Count').textContent = o2;
    document.getElementById('h2oCount').textContent = h2o;
  }

  function react(m1, m2) {
    if (m1.userData.type === 'H2' && m2.userData.type === 'O2' || m1.userData.type === 'O2' && m2.userData.type === 'H2') {
      const pos = m1.position.clone().add(m2.position).multiplyScalar(0.5);
      scene.remove(m1); scene.remove(m2);
      molecules = molecules.filter(m => m !== m1 && m !== m2);
      
      for (let i = 0; i < 2; i++) {
        const water = createMolecule('H2O');
        water.position.copy(pos).add(new THREE.Vector3((i-0.5)*1.2, 0, 0));
        molecules.push(water);
      }
      updateUI();
      return true;
    }
    return false;
  }

  function animate() {
    requestAnimationFrame(animate);
    
    molecules.forEach(m => {
      m.position.x += m.userData.vel.x;
      m.position.y += m.userData.vel.y;
      m.position.z += m.userData.vel.z;
      
      if (Math.abs(m.position.x) > bounds.x) { m.position.x = Math.sign(m.position.x)*bounds.x; m.userData.vel.x *= -0.9; }
      if (Math.abs(m.position.y) > bounds.y) { m.position.y = Math.sign(m.position.y)*bounds.y; m.userData.vel.y *= -0.9; }
      if (Math.abs(m.position.z) > bounds.z) { m.position.z = Math.sign(m.position.z)*bounds.z; m.userData.vel.z *= -0.9; }
      
      m.rotation.y += 0.01;
    });
    
    // collisions
    for (let i = 0; i < molecules.length; i++) {
      for (let j = i+1; j < molecules.length; j++) {
        const a = molecules[i], b = molecules[j];
        if (a.position.distanceTo(b.position) < 1.2) {
          if (a.userData.type !== 'H2O' && b.userData.type !== 'H2O') {
            if (react(a, b)) break;
          }
          // bounce
          const v = a.userData.vel; a.userData.vel = b.userData.vel; b.userData.vel = v;
        }
      }
    }
    
    controls.update();
    renderer.render(scene, camera);
  }

  document.getElementById('resetBtn').addEventListener('click', init);
  
  window.addEventListener('resize', () => {
    const w = container.clientWidth;
    const h = container.clientHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  });

  init();
  animate();
</script>
</body>
</html>
