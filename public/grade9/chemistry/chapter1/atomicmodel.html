<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>⚛️ ChemLab · Interactive Definitions</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-page: #f8fafc;
      --surface: #ffffff;
      --border-light: #d0e2ff;
      --text-dark: #0a1e3c;
      --text-soft: #3a628c;
      --accent: #1a6eeb;
      --accent-light: #e1edff;
      --shadow-card: 0 12px 30px rgba(0, 60, 130, 0.06);
      --radius: 24px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-page);
      color: var(--text-dark);
      min-height: 100dvh;
    }

    .app-grid {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: 100dvh;
    }

    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border-light);
      padding: 28px 16px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      position: sticky;
      top: 0;
      height: 100dvh;
      overflow-y: auto;
    }

    .logo {
      font-weight: 800;
      font-size: 1.5rem;
      letter-spacing: -0.02em;
      color: var(--accent);
      padding: 0 8px;
    }

    .nav-section {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .nav-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-soft);
      padding: 0 8px;
      margin-bottom: 4px;
    }

    .nav-btn {
      background: transparent;
      border: 1.5px solid transparent;
      padding: 14px 16px;
      border-radius: 16px;
      cursor: pointer;
      text-align: left;
      font-weight: 600;
      color: var(--text-soft);
      transition: 0.12s;
      font-size: 0.95rem;
    }

    .nav-btn:hover {
      background: #f0f6ff;
    }

    .nav-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .main-content {
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .header-card {
      background: linear-gradient(145deg, var(--accent), #3b82f6);
      border-radius: var(--radius);
      padding: 32px 30px;
      color: white;
      box-shadow: var(--shadow-card);
    }

    .header-card h1 {
      font-weight: 700;
      font-size: 2rem;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .header-card p {
      opacity: 0.9;
      font-weight: 500;
    }

    .search-bar {
      width: 100%;
      padding: 16px 20px;
      border-radius: 60px;
      border: 1.5px solid var(--border-light);
      background: white;
      font-size: 0.95rem;
      outline: none;
      transition: 0.15s;
    }

    .search-bar:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(26, 110, 235, 0.1);
    }

    .canvas-wrapper {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow-card);
      overflow: hidden;
      aspect-ratio: 16 / 9;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      cursor: grab;
    }

    canvas:active {
      cursor: grabbing;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .info-card {
      background: var(--surface);
      border-radius: 20px;
      padding: 22px 20px;
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow-card);
    }

    .info-card h3 {
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--accent);
    }

    .slider-block {
      margin: 16px 0;
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      background: #d4e2fa;
      border-radius: 10px;
      appearance: none;
      -webkit-appearance: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      background: var(--accent);
      border-radius: 20px;
      border: 3px solid white;
      cursor: grab;
    }

    .log-list {
      list-style: none;
      font-size: 0.9rem;
      color: var(--text-soft);
    }

    .log-list li {
      padding: 8px 0;
      border-bottom: 1px solid var(--border-light);
    }

    .toast-container {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    .toast {
      background: var(--accent);
      color: white;
      padding: 14px 24px;
      border-radius: 60px;
      font-weight: 600;
      box-shadow: 0 8px 20px rgba(26, 110, 235, 0.25);
      animation: slideToast 0.3s ease;
      pointer-events: auto;
    }

    /* Definition Alert */
    .definition-alert {
      background: var(--surface);
      border-left: 6px solid var(--accent);
      padding: 16px 20px;
      border-radius: 20px;
      box-shadow: var(--shadow-card);
      margin-top: 16px;
      border: 1px solid var(--border-light);
    }

    .definition-title {
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .definition-text {
      color: var(--text-soft);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    @keyframes slideToast {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @media (max-width: 800px) {
      .app-grid { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border-light); }
      .info-grid { grid-template-columns: 1fr; }
      .main-content { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<div class="app-grid">
  <aside class="sidebar">
    <div class="logo">⚛️ ChemLab</div>
    
    <div class="nav-section">
      <div class="nav-label">simulations</div>
      <button class="nav-btn active" data-mode="atomic">🔬 atomic structure</button>
      <button class="nav-btn" data-mode="bonding">🔗 chemical bonding</button>
      <button class="nav-btn" data-mode="gas">☁️ gas laws</button>
    </div>
  </aside>

  <main class="main-content">
    <header class="header-card">
      <h1>Chemistry Simulation Lab</h1>
      <p>Grade 12 · tap atoms for definitions</p>
    </header>

    <input type="text" class="search-bar" placeholder="🔍 search experiments · covalent bonds, orbitals...">

    <div class="canvas-wrapper">
      <canvas id="chemCanvas"></canvas>
    </div>

    <!-- Definition panel appears here dynamically -->
    <div id="definitionPanel" class="definition-alert" style="display: none;">
      <div class="definition-title" id="defTitle">Hydrogen</div>
      <div class="definition-text" id="defText">The lightest element. Atomic number 1.</div>
    </div>

    <div class="info-grid">
      <div class="info-card">
        <h3>🎛️ simulation controls</h3>
        <p style="color:var(--text-soft); margin-bottom:16px;">drag atoms to interact · pinch to zoom</p>
        <div class="slider-block">
          <div style="display:flex; justify-content:space-between; font-size:0.85rem;">
            <span>energy level</span>
            <span id="energyValue">5.0</span>
          </div>
          <input type="range" id="energySlider" min="1" max="10" value="5" step="0.5">
        </div>
        <button class="nav-btn" id="resetBtn" style="width:100%; margin-top:8px;">↻ reset positions</button>
      </div>

      <div class="info-card">
        <h3>📋 observation log</h3>
        <ul class="log-list" id="logList">
          <li>✨ system ready · tap atoms</li>
        </ul>
      </div>
    </div>
  </main>
</div>

<script>
  (function(){
    const canvas = document.getElementById('chemCanvas');
    const ctx = canvas.getContext('2d');
    const toastContainer = document.getElementById('toastContainer');
    const logList = document.getElementById('logList');
    const energySlider = document.getElementById('energySlider');
    const energyValue = document.getElementById('energyValue');
    const definitionPanel = document.getElementById('definitionPanel');
    const defTitle = document.getElementById('defTitle');
    const defText = document.getElementById('defText');
    
    let width = 0, height = 0;
    const DPR = devicePixelRatio || 1;
    
    let atoms = [];
    let selectedAtom = null;
    let isDragging = false;
    let currentMode = 'atomic';
    
    // Element definitions
    const elementDefinitions = {
      'H': { title: 'Hydrogen (H)', text: 'Atomic number 1. The most abundant element in the universe. Forms diatomic H₂ molecules.' },
      'O': { title: 'Oxygen (O)', text: 'Atomic number 8. Essential for respiration. Highly electronegative, forms double bonds.' },
      'C': { title: 'Carbon (C)', text: 'Atomic number 6. The backbone of organic chemistry. Forms four covalent bonds.' },
      '●': { title: 'Gas Particle', text: 'Represents an ideal gas molecule. Motion increases with temperature.' }
    };
    
    function showToast(msg) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = msg;
      toastContainer.appendChild(toast);
      setTimeout(() => toast.remove(), 2500);
    }
    
    function addLog(msg) {
      const li = document.createElement('li');
      li.textContent = msg;
      logList.appendChild(li);
      if (logList.children.length > 5) {
        logList.removeChild(logList.children[0]);
      }
    }
    
    function showDefinition(atom) {
      const def = elementDefinitions[atom.label] || { 
        title: `${atom.label} Atom`, 
        text: 'A fundamental particle in this simulation. Drag to explore interactions.' 
      };
      defTitle.textContent = def.title;
      defText.textContent = def.text;
      definitionPanel.style.display = 'block';
      
      // auto-hide after 8 seconds
      setTimeout(() => {
        if (definitionPanel.style.display === 'block') {
          definitionPanel.style.display = 'none';
        }
      }, 8000);
    }
    
    function resizeCanvas() {
      const rect = canvas.parentElement.getBoundingClientRect();
      width = rect.width;
      height = rect.height;
      canvas.width = width * DPR;
      canvas.height = height * DPR;
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
    
    class Atom {
      constructor(x, y, radius, label, color) {
        this.x = x;
        this.y = y;
        this.radius = radius;
        this.label = label;
        this.color = color;
        this.angle = Math.random() * 2 * Math.PI;
      }
      
      draw() {
        // electron cloud
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius + 16, 0, 2 * Math.PI);
        ctx.fillStyle = this.color + '15';
        ctx.fill();
        
        // orbit
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius + 12, 0, 2 * Math.PI);
        ctx.strokeStyle = this.color + '30';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([3, 5]);
        ctx.stroke();
        ctx.setLineDash([]);
        
        // nucleus
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, 2 * Math.PI);
        ctx.fillStyle = this.color;
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 14;
        ctx.fill();
        ctx.shadowBlur = 0;
        
        // label
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 14px Inter, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(this.label, this.x, this.y);
      }
      
      hitTest(px, py) {
        return Math.hypot(this.x - px, this.y - py) < this.radius + 20;
      }
    }
    
    function initAtoms() {
      atoms = [];
      if (currentMode === 'atomic') {
        atoms.push(new Atom(width * 0.3, height * 0.5, 22, 'H', '#3b82f6'));
        atoms.push(new Atom(width * 0.65, height * 0.5, 30, 'O', '#1e4a7a'));
      } else if (currentMode === 'bonding') {
        atoms.push(new Atom(width * 0.25, height * 0.5, 22, 'H', '#3b82f6'));
        atoms.push(new Atom(width * 0.45, height * 0.5, 30, 'O', '#1e4a7a'));
        atoms.push(new Atom(width * 0.7, height * 0.5, 22, 'H', '#3b82f6'));
      } else {
        for (let i = 0; i < 18; i++) {
          atoms.push(new Atom(60 + Math.random() * (width - 120), 60 + Math.random() * (height - 120), 10, '●', '#3b82f6'));
        }
      }
    }
    
    function setMode(mode) {
      currentMode = mode;
      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === mode);
      });
      definitionPanel.style.display = 'none';
      initAtoms();
      showToast(`switched to ${mode} simulation`);
      addLog(`📌 mode: ${mode}`);
    }
    
    function draw() {
      ctx.clearRect(0, 0, width, height);
      
      // subtle grid
      ctx.strokeStyle = '#d0e2ff';
      ctx.lineWidth = 0.5;
      for (let i = 0; i < width; i += 35) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, height);
        ctx.stroke();
      }
      for (let i = 0; i < height; i += 35) {
        ctx.beginPath();
        ctx.moveTo(0, i);
        ctx.lineTo(width, i);
        ctx.stroke();
      }
      
      atoms.forEach(atom => atom.draw());
      
      if (currentMode === 'bonding') {
        const d = Math.hypot(atoms[1].x - atoms[0].x, atoms[1].y - atoms[0].y);
        if (d < 120) {
          ctx.beginPath();
          ctx.moveTo(atoms[0].x, atoms[0].y);
          ctx.lineTo(atoms[1].x, atoms[1].y);
          ctx.strokeStyle = '#3b82f6';
          ctx.lineWidth = 4;
          ctx.stroke();
        }
        const d2 = Math.hypot(atoms[1].x - atoms[2].x, atoms[1].y - atoms[2].y);
        if (d2 < 120) {
          ctx.beginPath();
          ctx.moveTo(atoms[1].x, atoms[1].y);
          ctx.lineTo(atoms[2].x, atoms[2].y);
          ctx.stroke();
        }
      }
      
      requestAnimationFrame(draw);
    }
    
    // interaction
    canvas.addEventListener('pointerdown', (e) => {
      const rect = canvas.getBoundingClientRect();
      const scaleX = width / rect.width;
      const scaleY = height / rect.height;
      const x = (e.clientX - rect.left) * scaleX;
      const y = (e.clientY - rect.top) * scaleY;
      
      for (let atom of atoms) {
        if (atom.hitTest(x, y)) {
          selectedAtom = atom;
          isDragging = true;
          canvas.setPointerCapture(e.pointerId);
          
          // Show definition when atom is tapped
          showDefinition(atom);
          showToast(`selected: ${atom.label}`);
          addLog(`🔬 ${atom.label} · ${elementDefinitions[atom.label]?.title || 'atom'}`);
          break;
        }
      }
    });
    
    canvas.addEventListener('pointermove', (e) => {
      if (!isDragging || !selectedAtom) return;
      e.preventDefault();
      
      const rect = canvas.getBoundingClientRect();
      const scaleX = width / rect.width;
      const scaleY = height / rect.height;
      selectedAtom.x = Math.min(width - 20, Math.max(20, (e.clientX - rect.left) * scaleX));
      selectedAtom.y = Math.min(height - 20, Math.max(20, (e.clientY - rect.top) * scaleY));
    });
    
    canvas.addEventListener('pointerup', (e) => {
      if (isDragging) {
        addLog(`📍 atom moved`);
        isDragging = false;
        selectedAtom = null;
        canvas.releasePointerCapture(e.pointerId);
      }
    });
    
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => setMode(btn.dataset.mode));
    });
    
    document.getElementById('resetBtn').addEventListener('click', () => {
      initAtoms();
      definitionPanel.style.display = 'none';
      showToast('positions reset');
      addLog('🔄 reset positions');
    });
    
    energySlider.addEventListener('input', () => {
      energyValue.textContent = parseFloat(energySlider.value).toFixed(1);
    });
    
    window.addEventListener('resize', () => {
      resizeCanvas();
      initAtoms();
    });
    
    resizeCanvas();
    initAtoms();
    draw();
  })();
</script>
</body>
</html>
