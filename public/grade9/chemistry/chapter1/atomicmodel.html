<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChemLab | Grade 12 Interactive Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #3b82f6;
            --bg-main: #ffffff;
            --bg-soft: #eff6ff;
            --glass: rgba(255, 255, 255, 0.7);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-soft); color: var(--primary); overflow-x: hidden; }

        /* --- Layout --- */
        .app-container { display: flex; min-height: 100vh; }
        
        .sidebar {
            width: 260px;
            background: var(--bg-main);
            border-right: 1px solid rgba(37, 99, 235, 0.1);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            transition: transform 0.3s ease;
        }

        .main-content { flex: 1; padding: 2rem; display: flex; flex-direction: column; gap: 2rem; }

        /* --- UI Components --- */
        .header-gradient {
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            padding: 2rem;
            border-radius: 20px;
            color: white;
            box-shadow: var(--shadow);
            animation: gradientMove 6s infinite alternate;
        }

        @keyframes gradientMove { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            transition: transform 0.3s ease;
        }

        .glass-card:hover { transform: translateY(-5px); }

        .search-bar {
            width: 100%;
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid var(--secondary);
            background: var(--bg-main);
            outline: none;
        }

        /* --- Canvas Section --- */
        #canvas-container {
            width: 100%;
            height: 400px;
            background: #fff;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(37, 99, 235, 0.1);
        }

        canvas { width: 100%; height: 100%; touch-action: none; }

        /* --- Custom Alert --- */
        #alert-box {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .alert-item {
            background: var(--primary);
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            box-shadow: var(--shadow);
            animation: slideIn 0.3s ease forwards;
        }

        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* --- Responsive Grid --- */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        /* --- Media Queries --- */
        @media (max-width: 1024px) { .sidebar { width: 200px; } }
        @media (max-width: 768px) {
            .app-container { flex-direction: column; }
            .sidebar { width: 100%; height: auto; padding: 1rem; flex-direction: row; overflow-x: auto; }
            .main-content { padding: 1rem; }
        }
    </style>
</head>
<body>

    <div id="alert-box"></div>

    <div class="app-container">
        <aside class="sidebar">
            <h2 style="font-weight: 600;">ChemLab</h2>
            <nav style="display: flex; flex-direction: column; gap: 10px;">
                <p style="font-size: 0.8rem; opacity: 0.7;">CATEGORIES</p>
                <button class="glass-card" onclick="setMode('atomic')" style="text-align: left; cursor: pointer;">Atomic Structure</button>
                <button class="glass-card" onclick="setMode('bonding')" style="text-align: left; cursor: pointer;">Bonding</button>
                <button class="glass-card" onclick="setMode('gas')" style="text-align: left; cursor: pointer;">Gas Laws</button>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header-gradient">
                <h1>Chemistry Simulation Lab</h1>
                <p>Grade 12 Advanced Learning Platform</p>
            </header>

            <input type="text" class="search-bar" placeholder="Search experiments (e.g. Covalent Bonds)...">

            <div id="canvas-container" class="glass-card">
                <canvas id="chemCanvas"></canvas>
            </div>

            <div class="grid-container">
                <div class="glass-card">
                    <h3>Simulation Controls</h3>
                    <p style="font-size: 0.9rem; margin: 10px 0;">Drag atoms to interact. Use mouse or touch.</p>
                    <input type="range" style="width: 100%;" min="1" max="10" value="5">
                </div>
                <div class="glass-card">
                    <h3>Observation Log</h3>
                    <ul id="log" style="list-style: none; font-size: 0.85rem;">
                        <li>• System Ready.</li>
                    </ul>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- Core Application State ---
        const canvas = document.getElementById('chemCanvas');
        const ctx = canvas.getContext('2d');
        const alertBox = document.getElementById('alert-box');
        let atoms = [];
        let isDragging = false;
        let selectedAtom = null;

        // --- Alert System ---
        function showAlert(message) {
            const div = document.createElement('div');
            div.className = 'alert-item';
            div.innerText = message;
            alertBox.appendChild(div);
            setTimeout(() => {
                div.style.opacity = '0';
                setTimeout(() => div.remove(), 500);
            }, 3000);
        }

        // --- Canvas Engine ---
        function resize() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Atom {
            constructor(x, y, radius, label) {
                this.x = x;
                this.y = y;
                this.radius = radius;
                this.label = label;
                this.angle = Math.random() * Math.PI * 2;
            }

            draw() {
                // Glow effect
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#3b82f6';
                
                // Nucleus
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#2563eb';
                ctx.fill();
                ctx.closePath();

                // Electron Orbit
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius + 20, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(37, 99, 235, 0.2)';
                ctx.stroke();

                // Label
                ctx.fillStyle = 'white';
                ctx.textAlign = 'center';
                ctx.fillText(this.label, this.x, this.y + 5);
            }
        }

        // Initialize Atoms
        atoms.push(new Atom(100, 100, 20, 'H'));
        atoms.push(new Atom(250, 200, 25, 'O'));

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            atoms.forEach(atom => atom.draw());
            requestAnimationFrame(animate);
        }
        animate();

        // --- Interaction Logic (Pointer Events) ---
        canvas.addEventListener('pointerdown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            atoms.forEach(atom => {
                const dist = Math.hypot(atom.x - mouseX, atom.y - mouseY);
                if (dist < atom.radius + 10) {
                    selectedAtom = atom;
                    isDragging = true;
                    showAlert("Element selected: " + atom.label);
                }
            });
        });

        window.addEventListener('pointermove', (e) => {
            if (isDragging && selectedAtom) {
                const rect = canvas.getBoundingClientRect();
                selectedAtom.x = e.clientX - rect.left;
                selectedAtom.y = e.clientY - rect.top;
            }
        });

        window.addEventListener('pointerup', () => {
            if (isDragging) {
                showAlert("Atom moved successfully");
                isDragging = false;
                selectedAtom = null;
            }
        });

        function setMode(mode) {
            showAlert("Switched to " + mode + " simulation");
        }
    </script>
</body>
</html>
