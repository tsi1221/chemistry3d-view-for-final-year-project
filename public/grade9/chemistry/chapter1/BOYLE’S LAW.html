<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🔬 Boyle's Law · touch lab</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-page: #ffffff;
      --surface: #fafcff;
      --border-light: #d0e2ff;
      --text-dark: #0a1e3c;
      --accent: #3b82f6;
      --pressure: #ef4444;
      --shadow-card: 0 12px 30px rgba(0, 60, 130, 0.06);
      --radius: 20px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-page);
      color: var(--text-dark);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #canvas-container {
      flex: 1;
      position: relative;
      background: radial-gradient(circle at center, #f8fafc 0%, #e8f2ff 100%);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .stats-mini {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 40px;
      padding: 10px 18px;
      border: 1px solid var(--border-light);
      display: flex;
      gap: 20px;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .stat-item {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .stat-value {
      font-weight: 700;
      color: var(--accent);
    }

    .pressure-value {
      color: var(--pressure);
    }

    .control-dock {
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    .btn {
      padding: 16px 24px;
      border-radius: 60px;
      border: none;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.12s;
      background: white;
      border: 1px solid var(--border-light);
      color: var(--accent);
      box-shadow: var(--shadow-card);
      flex: 1;
      max-width: 160px;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      border: none;
    }

    .btn:active { scale: 0.96; }

    .hint {
      position: absolute;
      bottom: 90px;
      left: 20px;
      background: rgba(255,255,255,0.9);
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 0.8rem;
      color: var(--text-dark);
      pointer-events: none;
    }

    .formula-badge {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(8px);
      padding: 10px 18px;
      border-radius: 40px;
      font-weight: 600;
      color: var(--accent);
      border: 1px solid var(--border-light);
    }
  </style>
</head>
<body>

<div id="canvas-container"></div>

<div class="formula-badge">P·V = constant</div>

<div class="stats-mini">
  <div class="stat-item">P <span class="stat-value pressure-value" id="pressureDisplay">1.00</span></div>
  <div class="stat-item">V <span class="stat-value" id="volumeDisplay">5.0</span></div>
  <div class="stat-item">⚡ <span class="stat-value" id="collisionDisplay">0</span></div>
</div>

<div class="hint" id="actionHint">👆 drag piston · pinch to zoom</div>

<div class="control-dock">
  <button class="btn" id="pauseBtn">⏸️</button>
  <button class="btn btn-primary" id="resetBtn">↻</button>
</div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { DragControls } from 'three/addons/controls/DragControls.js';

  const container = document.getElementById('canvas-container');
  const scene = new THREE.Scene();
  scene.background = new THREE.Color('#f8fafc');
  
  const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
  camera.position.set(8, 5, 14);
  camera.lookAt(0, 0, 0);
  
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  container.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.enableZoom = true;
  controls.enablePan = true;
  controls.maxPolarAngle = Math.PI / 2;

  // lighting
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambientLight);
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
  dirLight.position.set(6, 12, 8);
  dirLight.castShadow = true;
  scene.add(dirLight);
  scene.add(new THREE.PointLight(0xcce0ff, 0.4, 20));

  // container
  const WALL_W = 7;
  const WALL_H = 5.5;
  const BACK_Z = -2.5;
  let pistonZ = 2.5;
  
  const containerGroup = new THREE.Group();
  scene.add(containerGroup);

  const glassMat = new THREE.MeshPhongMaterial({ color: '#cbd5e1', transparent: true, opacity: 0.12, side: THREE.DoubleSide });
  function addWall(x, y, z, rx, ry, rz, w, h) {
    const wall = new THREE.Mesh(new THREE.PlaneGeometry(w, h), glassMat);
    wall.position.set(x, y, z);
    wall.rotation.set(rx, ry, rz);
    containerGroup.add(wall);
  }
  addWall(0, 0, BACK_Z, 0, Math.PI, 0, WALL_W, WALL_H);
  addWall(-WALL_W/2, 0, 0, 0, Math.PI/2, 0, WALL_H, 5);
  addWall(WALL_W/2, 0, 0, 0, -Math.PI/2, 0, WALL_H, 5);
  addWall(0, WALL_H/2, 0, -Math.PI/2, 0, 0, WALL_W, 5);
  addWall(0, -WALL_H/2, 0, Math.PI/2, 0, 0, WALL_W, 5);

  // piston (draggable)
  const pistonMat = new THREE.MeshStandardMaterial({ color: '#ef4444', transparent: true, opacity: 0.3 });
  const piston = new THREE.Mesh(new THREE.PlaneGeometry(WALL_W, WALL_H), pistonMat);
  piston.position.set(0, 0, pistonZ);
  piston.castShadow = true;
  piston.receiveShadow = true;
  piston.userData.isPiston = true;
  containerGroup.add(piston);

  // wireframe
  const wireframe = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.BoxGeometry(WALL_W, WALL_H, 5)),
    new THREE.LineBasicMaterial({ color: '#3b82f6' })
  );
  wireframe.position.set(0, 0, 0);
  containerGroup.add(wireframe);

  // particles
  let particles = [];
  const particleGeo = new THREE.SphereGeometry(0.16, 8);
  const particleMat = new THREE.MeshStandardMaterial({ color: '#3b82f6', emissive: '#1e4a7a', emissiveIntensity: 0.3 });

  function createParticles(count = 70) {
    particles.forEach(p => scene.remove(p));
    particles = [];
    for (let i = 0; i < count; i++) {
      const p = new THREE.Mesh(particleGeo, particleMat.clone());
      p.position.x = (Math.random() - 0.5) * (WALL_W - 0.8);
      p.position.y = (Math.random() - 0.5) * (WALL_H - 0.8);
      p.position.z = (Math.random() - 0.5) * (pistonZ - BACK_Z - 0.8) + (pistonZ + BACK_Z)/2;
      p.castShadow = true;
      p.userData.vel = new THREE.Vector3(
        (Math.random() - 0.5) * 0.04,
        (Math.random() - 0.5) * 0.04,
        (Math.random() - 0.5) * 0.04
      );
      scene.add(p);
      particles.push(p);
    }
  }

  // drag controls for piston
  const dragControls = new DragControls([piston], camera, renderer.domElement);
  dragControls.addEventListener('dragstart', () => {
    controls.enabled = false;
    document.getElementById('actionHint').textContent = '👇 dragging piston · release to set';
  });
  dragControls.addEventListener('drag', (e) => {
    const obj = e.object;
    obj.position.z = Math.max(1.0, Math.min(4.5, obj.position.z));
    pistonZ = obj.position.z;
  });
  dragControls.addEventListener('dragend', () => {
    controls.enabled = true;
    document.getElementById('actionHint').textContent = '👆 drag piston · pinch to zoom';
  });

  // state
  let isPlaying = true;
  let collisionCount = 0;
  let collisionsPerSec = 0;
  let lastTime = performance.now();

  // UI
  const pressureDisplay = document.getElementById('pressureDisplay');
  const volumeDisplay = document.getElementById('volumeDisplay');
  const collisionDisplay = document.getElementById('collisionDisplay');
  const pauseBtn = document.getElementById('pauseBtn');
  const resetBtn = document.getElementById('resetBtn');

  pauseBtn.addEventListener('click', () => {
    isPlaying = !isPlaying;
    pauseBtn.textContent = isPlaying ? '⏸️' : '▶️';
  });

  resetBtn.addEventListener('click', () => {
    pistonZ = 2.5;
    piston.position.z = pistonZ;
    createParticles(70);
    collisionCount = 0;
    collisionsPerSec = 0;
  });

  createParticles(70);

  function animate() {
    requestAnimationFrame(animate);
    const now = performance.now();
    
    if (isPlaying) {
      let frameCollisions = 0;
      particles.forEach(p => {
        p.position.x += p.userData.vel.x;
        p.position.y += p.userData.vel.y;
        p.position.z += p.userData.vel.z;
        
        const r = 0.16;
        const halfW = WALL_W/2 - r;
        const halfH = WALL_H/2 - r;
        
        if (Math.abs(p.position.x) > halfW) { p.position.x = Math.sign(p.position.x)*halfW; p.userData.vel.x *= -1; frameCollisions++; }
        if (Math.abs(p.position.y) > halfH) { p.position.y = Math.sign(p.position.y)*halfH; p.userData.vel.y *= -1; frameCollisions++; }
        if (p.position.z > pistonZ - r) { p.position.z = pistonZ - r; p.userData.vel.z *= -1; frameCollisions++; }
        else if (p.position.z < BACK_Z + r) { p.position.z = BACK_Z + r; p.userData.vel.z *= -1; frameCollisions++; }
      });
      
      collisionCount += frameCollisions;
      if (now - lastTime > 1000) {
        collisionsPerSec = collisionCount;
        collisionCount = 0;
        lastTime = now;
      }
      
      const volume = WALL_W * WALL_H * (pistonZ - BACK_Z);
      const pressure = (35 / volume) * (0.6 + collisionsPerSec / 120);
      
      pressureDisplay.textContent = pressure.toFixed(2);
      volumeDisplay.textContent = volume.toFixed(1);
      collisionDisplay.textContent = collisionsPerSec;
    }
    
    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    const w = container.clientWidth;
    const h = container.clientHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  });
</script>
</body>
</html>
