<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🌿 photosynthesis · light to life</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-page: #ffffff;
      --surface: #fafcff;
      --border-light: #d0e2ff;
      --text-dark: #0a1e3c;
      --text-soft: #3a628c;
      --accent: #10b981;
      --co2: #ef4444;
      --h2o: #3b82f6;
      --o2: #94a3b8;
      --glucose: #f59e0b;
      --photon: #fde047;
      --shadow-card: 0 12px 30px rgba(0, 60, 130, 0.06);
      --radius: 20px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-page);
      color: var(--text-dark);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #canvas-container {
      flex: 1;
      position: relative;
      background: radial-gradient(circle at center, #f8fafc 0%, #e8f2ff 100%);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .stats-panel {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      padding: 14px 18px;
      border-radius: 40px;
      border: 1px solid var(--border-light);
      display: flex;
      gap: 18px;
      font-weight: 500;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stat-value {
      font-weight: 700;
      color: var(--accent);
    }

    .legend {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      padding: 12px 20px;
      border-radius: 40px;
      border: 1px solid var(--border-light);
      display: flex;
      gap: 20px;
    }

    .legend-dot {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
    }

    .info-card {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      padding: 20px 24px;
      border-radius: 24px;
      border: 1px solid var(--border-light);
      max-width: 360px;
    }

    .info-title {
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
      font-size: 1.1rem;
    }

    .info-text {
      color: var(--text-soft);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .equation {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      padding: 10px 24px;
      border-radius: 40px;
      font-weight: 700;
      border: 1px solid var(--border-light);
    }

    .control-dock {
      position: absolute;
      bottom: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 12px 20px;
      border-radius: 40px;
      border: 1px solid var(--border-light);
      background: white;
      font-weight: 600;
      cursor: pointer;
      color: var(--accent);
    }

    .slider-container {
      position: absolute;
      top: 80px;
      right: 16px;
      background: rgba(255, 255, 255, 0.95);
      padding: 14px 18px;
      border-radius: 40px;
      border: 1px solid #fde047;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    input[type="range"] {
      width: 140px;
      height: 5px;
      background: #fde047;
      border-radius: 5px;
    
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: #eab308;
      border-radius: 18px;
      border: 2px solid white;
      cursor: grab;
    }

    .toast-hint {
      position: absolute;
      top: 140px;
      right: 16px;
      background: #fef3c7;
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 0.8rem;
      color: #92400e;
      pointer-events: none;
    }

    @media (max-width: 700px) {
      .stats-panel { flex-wrap: wrap; gap: 10px; }
      .legend { flex-wrap: wrap; }
      .info-card { left: 16px; right: 16px; max-width: none; }
      .equation { font-size: 0.9rem; white-space: nowrap; }
    }
  </style>
</head>
<body>

<div id="canvas-container"></div>

<div class="legend">
  <div class="legend-dot"><span style="color:var(--co2);">●</span> CO₂</div>
  <div class="legend-dot"><span style="color:var(--h2o);">●</span> H₂O</div>
  <div class="legend-dot"><span style="color:var(--o2);">●</span> O₂</div>
  <div class="legend-dot"><span style="color:var(--glucose);">●</span> C₆H₁₂O₆</div>
  <div class="legend-dot"><span style="color:var(--photon);">☀️</span> photon</div>
</div>

<div class="stats-panel">
  <div class="stat-item">CO₂ <span class="stat-value" id="co2Count">12</span></div>
  <div class="stat-item">H₂O <span class="stat-value" id="h2oCount">12</span></div>
  <div class="stat-item">O₂ <span class="stat-value" id="o2Count">0</span></div>
  <div class="stat-item">Glucose <span class="stat-value" id="glucoseCount">0</span></div>
</div>

<div class="slider-container">
  <span style="color:#b45309;">☀️</span>
  <input type="range" id="sunSlider" min="10" max="100" value="65">
  <span id="sunValue" style="font-weight:600;">65%</span>
</div>
<div class="toast-hint">⬆️ light intensity · drives reaction</div>

<div class="info-card" id="infoCard">
  <div class="info-title" id="infoTitle">🌿 chloroplast</div>
  <div class="info-text" id="infoText">Tap any molecule to learn its role. Sunlight powers the synthesis of glucose from CO₂ and H₂O.</div>
</div>

<div class="equation">6CO₂ + 6H₂O → C₆H₁₂O₆ + 6O₂</div>

<div class="control-dock">
  <button class="btn" id="resetBtn">↻ reset</button>
</div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

  const container = document.getElementById('canvas-container');
  const scene = new THREE.Scene();
  scene.background = new THREE.Color('#f8fafc');
  
  const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
  camera.position.set(10, 5, 16);
  camera.lookAt(0, 0, 0);
  
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  container.appendChild(renderer.domElement);

  const labelRenderer = new CSS2DRenderer();
  labelRenderer.setSize(container.clientWidth, container.clientHeight);
  labelRenderer.domElement.style.position = 'absolute';
  labelRenderer.domElement.style.top = '0';
  labelRenderer.domElement.style.left = '0';
  labelRenderer.domElement.style.pointerEvents = 'none';
  container.appendChild(labelRenderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.5;
  controls.enableZoom = true;

  // lighting
  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
  dirLight.position.set(5, 12, 6);
  dirLight.castShadow = true;
  scene.add(dirLight);
  
  // chloroplasts
  const chloroplasts = [];
  for (let i = 0; i < 6; i++) {
    const angle = (i/6) * Math.PI*2;
    const g = new THREE.Group();
    const sphere = new THREE.Mesh(new THREE.SphereGeometry(1.2, 16), new THREE.MeshPhongMaterial({ color: '#10b981', transparent: true, opacity: 0.4 }));
    g.add(sphere);
    for (let j = 0; j < 5; j++) {
      const t = new THREE.Mesh(new THREE.TorusGeometry(0.5, 0.05, 8, 16), new THREE.MeshStandardMaterial({ color: '#34d399' }));
      t.position.set(Math.cos(j)*0.8, Math.sin(j)*0.6, 0);
      t.rotation.z = j;
      g.add(t);
    }
    g.position.set(Math.cos(angle)*4.5, Math.sin(angle)*3.5, 0);
    g.userData = { type: 'chloroplast', info: 'Chloroplast · site of photosynthesis' };
    scene.add(g);
    chloroplasts.push(g);
  }

  // molecules
  let molecules = [];
  let co2Count = 12, h2oCount = 12, o2Count = 0, glucoseCount = 0;
  
  function createMolecule(type) {
    const g = new THREE.Group();
    const info = {
      co2: 'CO₂ · carbon source, enters through stomata',
      h2o: 'H₂O · provides electrons, splits in light reaction',
      o2: 'O₂ · byproduct, released to atmosphere',
      glucose: 'C₆H₁₂O₆ · energy storage',
      photon: 'Photon · light energy packet'
    };
    
    if (type === 'co2') {
      const c = new THREE.Mesh(new THREE.SphereGeometry(0.45), new THREE.MeshStandardMaterial({ color: '#ef4444' }));
      const o1 = new THREE.Mesh(new THREE.SphereGeometry(0.35), new THREE.MeshStandardMaterial({ color: '#94a3b8' }));
      const o2 = o1.clone();
      o1.position.set(-0.7, 0, 0); o2.position.set(0.7, 0, 0);
      g.add(c, o1, o2);
    } else if (type === 'h2o') {
      const o = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshStandardMaterial({ color: '#3b82f6' }));
      const h1 = new THREE.Mesh(new THREE.SphereGeometry(0.25), new THREE.MeshStandardMaterial({ color: '#ffffff' }));
      const h2 = h1.clone();
      h1.position.set(-0.5, 0.4, 0); h2.position.set(0.5, 0.4, 0);
      g.add(o, h1, h2);
    } else if (type === 'o2') {
      const o1 = new THREE.Mesh(new THREE.SphereGeometry(0.38), new THREE.MeshStandardMaterial({ color: '#94a3b8' }));
      const o2 = o1.clone();
      o1.position.x = -0.5; o2.position.x = 0.5;
      g.add(o1, o2);
    } else if (type === 'glucose') {
      for (let i = 0; i < 6; i++) {
        const c = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshStandardMaterial({ color: '#f59e0b' }));
        c.position.set(Math.cos(i)*0.8, Math.sin(i)*0.8, 0);
        g.add(c);
      }
    } else if (type === 'photon') {
      const p = new THREE.Mesh(new THREE.SphereGeometry(0.25), new THREE.MeshStandardMaterial({ color: '#fde047', emissive: '#eab308', emissiveIntensity: 0.5 }));
      g.add(p);
    }
    
    g.position.x = (Math.random()-0.5)*12;
    g.position.y = (Math.random()-0.5)*8;
    g.position.z = (Math.random()-0.5)*4;
    g.userData = { type, info: info[type] };
    g.userData.vel = new THREE.Vector3((Math.random()-0.5)*0.03, (Math.random()-0.5)*0.02, 0);
    
    scene.add(g);
    return g;
  }

  function init() {
    molecules.forEach(m => scene.remove(m));
    molecules = [];
    for (let i = 0; i < 12; i++) molecules.push(createMolecule('co2'));
    for (let i = 0; i < 12; i++) molecules.push(createMolecule('h2o'));
    for (let i = 0; i < 8; i++) molecules.push(createMolecule('photon'));
    co2Count = 12; h2oCount = 12; o2Count = 0; glucoseCount = 0;
    updateUI();
  }

  function updateUI() {
    document.getElementById('co2Count').textContent = molecules.filter(m => m.userData.type === 'co2').length;
    document.getElementById('h2oCount').textContent = molecules.filter(m => m.userData.type === 'h2o').length;
    document.getElementById('o2Count').textContent = molecules.filter(m => m.userData.type === 'o2').length;
    document.getElementById('glucoseCount').textContent = molecules.filter(m => m.userData.type === 'glucose').length;
  }

  function react() {
    const co2List = molecules.filter(m => m.userData.type === 'co2' && m.position.length() < 7);
    const h2oList = molecules.filter(m => m.userData.type === 'h2o' && m.position.length() < 7);
    const intensity = parseInt(document.getElementById('sunSlider').value) / 100;
    
    if (co2List.length >= 6 && h2oList.length >= 6 && Math.random() < intensity * 0.01) {
      for (let i = 0; i < 6; i++) {
        scene.remove(co2List[i]); scene.remove(h2oList[i]);
        molecules = molecules.filter(m => m !== co2List[i] && m !== h2oList[i]);
      }
      
      const glucose = createMolecule('glucose');
      glucose.position.set((Math.random()-0.5)*3, (Math.random()-0.5)*3, 0);
      molecules.push(glucose);
      
      for (let i = 0; i < 6; i++) {
        const o2 = createMolecule('o2');
        o2.position.set((Math.random()-0.5)*5, (Math.random()-0.5)*5, 0);
        molecules.push(o2);
      }
      updateUI();
    }
  }

  // raycasting for info
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  
  container.addEventListener('click', (e) => {
    const rect = container.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(scene.children, true);
    if (intersects.length) {
      let obj = intersects[0].object;
      while (obj && !obj.userData?.info) obj = obj.parent;
      if (obj?.userData?.info) {
        document.getElementById('infoTitle').textContent = obj.userData.type.toUpperCase();
        document.getElementById('infoText').textContent = obj.userData.info;
      }
    }
  });

  function animate() {
    requestAnimationFrame(animate);
    
    const intensity = parseInt(document.getElementById('sunSlider').value);
    document.getElementById('sunValue').textContent = intensity + '%';
    
    molecules.forEach(m => {
      m.position.x += m.userData.vel.x;
      m.position.y += m.userData.vel.y;
      if (Math.abs(m.position.x) > 8) m.userData.vel.x *= -0.9;
      if (Math.abs(m.position.y) > 6) m.userData.vel.y *= -0.9;
      m.rotation.y += 0.01;
    });
    
    react();
    
    if (Math.random() < intensity / 500) {
      molecules.push(createMolecule('photon'));
    }
    
    controls.update();
    renderer.render(scene, camera);
    labelRenderer.render(scene, camera);
  }

  document.getElementById('resetBtn').addEventListener('click', init);
  window.addEventListener('resize', () => {
    const w = container.clientWidth, h = container.clientHeight;
    renderer.setSize(w, h); labelRenderer.setSize(w, h);
    camera.aspect = w / h; camera.updateProjectionMatrix();
  });

  init();
  animate();
</script>
</body>
</html>
