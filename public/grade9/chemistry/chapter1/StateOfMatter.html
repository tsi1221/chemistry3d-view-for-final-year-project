<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🧊 states of matter · solid liquid gas</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-page: #ffffff;
      --surface: #fafcff;
      --border-light: #d0e2ff;
      --text-dark: #0a1e3c;
      --accent: #3b82f6;
      --solid: #4a6fa5;
      --liquid: #166088;
      --gas: #17a2b8;
      --shadow-card: 0 12px 30px rgba(0,0,0,0.04);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-page);
      color: var(--text-dark);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #canvas-container {
      flex: 1;
      position: relative;
      background: radial-gradient(circle at center, #f8fafc 0%, #e8f2ff 100%);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .state-badge {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px);
      padding: 12px 32px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1.2rem;
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow-card);
    }

    .legend {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(255,255,255,0.95);
      padding: 12px 20px;
      border-radius: 40px;
      border: 1px solid var(--border-light);
      display: flex;
      gap: 20px;
    }

    .legend-dot {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
    }

    .control-bar {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      padding: 16px 28px;
      border-radius: 60px;
      border: 1px solid var(--border-light);
      display: flex;
      gap: 20px;
      align-items: center;
      box-shadow: var(--shadow-card);
    }

    .temp-slider {
      width: 240px;
      height: 6px;
      background: linear-gradient(90deg, var(--solid), var(--liquid), var(--gas));
      border-radius: 10px;
      -webkit-appearance: none;
      appearance: none;
    }

    .temp-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      background: white;
      border-radius: 22px;
      border: 3px solid var(--accent);
      cursor: grab;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .temp-value {
      font-weight: 700;
      min-width: 50px;
      text-align: center;
      color: var(--accent);
    }

    .btn-group {
      display: flex;
      gap: 8px;
    }

    .btn {
      padding: 10px 18px;
      border-radius: 40px;
      border: 1px solid var(--border-light);
      background: white;
      font-weight: 600;
      cursor: pointer;
      color: var(--accent);
    }

    .hint {
      position: absolute;
      bottom: 90px;
      left: 20px;
      background: rgba(255,255,255,0.9);
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 0.8rem;
      color: var(--text-dark);
    }

    @media (max-width: 700px) {
      .control-bar { flex-wrap: wrap; width: 90%; }
      .temp-slider { width: 100%; }
    }
  </style>
</head>
<body>

<div id="canvas-container"></div>

<div class="state-badge" id="stateLabel">🧊 SOLID</div>

<div class="legend">
  <div class="legend-dot"><span style="color:var(--solid);">●</span> solid</div>
  <div class="legend-dot"><span style="color:var(--liquid);">●</span> liquid</div>
  <div class="legend-dot"><span style="color:var(--gas);">●</span> gas</div>
</div>

<div class="control-bar">
  <button class="btn" id="coolBtn">❄️ cool</button>
  <input type="range" class="temp-slider" id="tempSlider" min="0" max="100" value="20">
  <span class="temp-value" id="tempValue">20%</span>
  <button class="btn" id="heatBtn">🔥 heat</button>
  <div class="btn-group">
    <button class="btn" id="resetViewBtn">↻</button>
  </div>
</div>

<div class="hint">👆 drag to rotate · slide to change state</div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

  const container = document.getElementById('canvas-container');
  const scene = new THREE.Scene();
  scene.background = new THREE.Color('#f8fafc');
  
  const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
  camera.position.set(0, 6, 16);
  camera.lookAt(0, 0, 0);
  
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  container.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.8;
  controls.enableZoom = true;
  controls.enablePan = false;

  // lighting
  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const dirLight = new THREE.DirectionalLight(0xffffff, 1);
  dirLight.position.set(5, 10, 6);
  dirLight.castShadow = true;
  scene.add(dirLight);
  scene.add(new THREE.PointLight(0xcce0ff, 0.4));

  // containers
  const glassMat = new THREE.MeshPhongMaterial({ color: '#cbd5e1', transparent: true, opacity: 0.12, side: THREE.DoubleSide });
  
  function createContainer(x, color) {
    const g = new THREE.Group();
    const box = new THREE.Mesh(new THREE.BoxGeometry(3.5, 3.5, 3.5), glassMat);
    box.castShadow = true; box.receiveShadow = true;
    g.add(box);
    const edges = new THREE.EdgesGeometry(box.geometry);
    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color }));
    g.add(line);
    g.position.set(x, 0, 0);
    return g;
  }

  const solidCont = createContainer(-4.5, '#4a6fa5');
  const liquidCont = createContainer(0, '#166088');
  const gasCont = createContainer(4.5, '#17a2b8');
  scene.add(solidCont, liquidCont, gasCont);

  // particles
  const particles = { solid: [], liquid: [], gas: [] };
  
  function createParticle(color, size) {
    return new THREE.Mesh(new THREE.SphereGeometry(size, 10), new THREE.MeshStandardMaterial({ color, roughness: 0.3 }));
  }

  // solid lattice
  for (let x = -1; x <= 1; x+=0.8) {
    for (let y = -1; y <= 1; y+=0.8) {
      for (let z = -1; z <= 1; z+=0.8) {
        const p = createParticle('#4a6fa5', 0.22);
        p.position.set(x, y, z);
        p.userData = { base: p.position.clone(), vib: Math.random()*10 };
        solidCont.add(p);
        particles.solid.push(p);
      }
    }
  }

  // liquid
  for (let i = 0; i < 60; i++) {
    const p = createParticle('#166088', 0.2);
    p.position.set((Math.random()-0.5)*2.8, (Math.random()-0.5)*2.8, (Math.random()-0.5)*2.8);
    p.userData = { vel: new THREE.Vector3((Math.random()-0.5)*0.02, (Math.random()-0.5)*0.02, (Math.random()-0.5)*0.02) };
    liquidCont.add(p);
    particles.liquid.push(p);
  }

  // gas
  for (let i = 0; i < 50; i++) {
    const p = createParticle('#17a2b8', 0.18);
    p.position.set((Math.random()-0.5)*3, (Math.random()-0.5)*3, (Math.random()-0.5)*3);
    p.userData = { vel: new THREE.Vector3((Math.random()-0.5)*0.08, (Math.random()-0.5)*0.08, (Math.random()-0.5)*0.08) };
    gasCont.add(p);
    particles.gas.push(p);
  }

  // state control
  const slider = document.getElementById('tempSlider');
  const tempVal = document.getElementById('tempValue');
  const stateLabel = document.getElementById('stateLabel');
  
  function updateState() {
    const val = parseInt(slider.value);
    tempVal.textContent = val + '%';
    let state = 'SOLID';
    if (val > 65) state = 'GAS';
    else if (val > 35) state = 'LIQUID';
    stateLabel.textContent = state === 'SOLID' ? '🧊 SOLID' : (state === 'LIQUID' ? '💧 LIQUID' : '💨 GAS');
    
    // visual feedback
    solidCont.children[1].material.color.set(val < 40 ? '#4a6fa5' : '#94a3b8');
    liquidCont.children[1].material.color.set(val > 35 && val < 70 ? '#166088' : '#94a3b8');
    gasCont.children[1].material.color.set(val > 65 ? '#17a2b8' : '#94a3b8');
  }
  
  slider.addEventListener('input', updateState);
  document.getElementById('heatBtn').addEventListener('click', () => {
    slider.value = Math.min(100, parseInt(slider.value) + 20);
    updateState();
  });
  document.getElementById('coolBtn').addEventListener('click', () => {
    slider.value = Math.max(0, parseInt(slider.value) - 20);
    updateState();
  });
  document.getElementById('resetViewBtn').addEventListener('click', () => {
    camera.position.set(0, 6, 16);
    controls.target.set(0, 0, 0);
  });

  let time = 0;
  function animate() {
    requestAnimationFrame(animate);
    time += 0.01;
    
    const temp = parseInt(slider.value) / 100;
    
    // solid vibration
    particles.solid.forEach(p => {
      p.position.x = p.userData.base.x + Math.sin(time*3 + p.userData.vib) * 0.04 * temp;
      p.position.y = p.userData.base.y + Math.cos(time*2.5 + p.userData.vib) * 0.04 * temp;
      p.position.z = p.userData.base.z + Math.sin(time*4 + p.userData.vib) * 0.04 * temp;
    });
    
    // liquid flow
    particles.liquid.forEach(p => {
      p.position.x += p.userData.vel.x * (0.5 + temp);
      p.position.y += p.userData.vel.y * (0.5 + temp);
      p.position.z += p.userData.vel.z * (0.5 + temp);
      if (Math.abs(p.position.x) > 1.6) p.userData.vel.x *= -0.9;
      if (Math.abs(p.position.y) > 1.6) p.userData.vel.y *= -0.9;
      if (Math.abs(p.position.z) > 1.6) p.userData.vel.z *= -0.9;
    });
    
    // gas motion
    particles.gas.forEach(p => {
      p.position.x += p.userData.vel.x * temp * 1.5;
      p.position.y += p.userData.vel.y * temp * 1.5;
      p.position.z += p.userData.vel.z * temp * 1.5;
      if (Math.abs(p.position.x) > 1.8) p.userData.vel.x *= -0.95;
      if (Math.abs(p.position.y) > 1.8) p.userData.vel.y *= -0.95;
      if (Math.abs(p.position.z) > 1.8) p.userData.vel.z *= -0.95;
      p.userData.vel.x += (Math.random()-0.5)*0.005;
      p.userData.vel.y += (Math.random()-0.5)*0.005;
      p.userData.vel.z += (Math.random()-0.5)*0.005;
    });
    
    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    const w = container.clientWidth, h = container.clientHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  });

  updateState();
</script>
</body>
</html>
