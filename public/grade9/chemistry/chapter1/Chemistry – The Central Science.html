<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🧪 chemistry · central science</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #ffffff;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #canvas-container {
      flex: 1;
      position: relative;
      background: #ffffff;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .info-card {
      position: absolute;
      bottom: 24px;
      left: 24px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      padding: 20px 24px;
      border-radius: 24px;
      border: 1px solid #d0e2ff;
      max-width: 320px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.04);
    }

    .info-title {
      font-weight: 700;
      color: #1a6eeb;
      margin-bottom: 6px;
      font-size: 1.1rem;
    }

    .info-text {
      color: #3a628c;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .control-dock {
      position: absolute;
      bottom: 24px;
      right: 24px;
      display: flex;
      gap: 10px;
    }

    .btn {
      padding: 12px 20px;
      border-radius: 40px;
      border: 1px solid #d0e2ff;
      background: white;
      font-weight: 600;
      cursor: pointer;
      color: #1a6eeb;
    }

    .legend {
      position: absolute;
      top: 24px;
      right: 24px;
      background: rgba(255, 255, 255, 0.95);
      padding: 10px 18px;
      border-radius: 40px;
      border: 1px solid #d0e2ff;
      display: flex;
      gap: 16px;
      font-size: 0.8rem;
    }

    .legend-dot {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    @media (max-width: 700px) {
      .info-card { left: 16px; right: 16px; max-width: none; }
      .control-dock { flex-direction: column; }
      .legend { top: 16px; right: 16px; flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<div id="canvas-container"></div>

<div class="legend">
  <div class="legend-dot"><span style="color:#10b981;">●</span> biology</div>
  <div class="legend-dot"><span style="color:#ef4444;">●</span> physics</div>
  <div class="legend-dot"><span style="color:#f97316;">●</span> geology</div>
  <div class="legend-dot"><span style="color:#14b8a6;">●</span> medicine</div>
  <div class="legend-dot"><span style="color:#8b5cf6;">●</span> engineering</div>
  <div class="legend-dot"><span style="color:#a78bfa;">●</span> astronomy</div>
</div>

<div class="info-card" id="infoCard">
  <div class="info-title" id="infoTitle">Chemistry</div>
  <div class="info-text" id="infoText">The central science · tap any field to learn its connection.</div>
</div>

<div class="control-dock">
  <button class="btn" id="pauseBtn">⏸️</button>
  <button class="btn" id="resetBtn">↻</button>
</div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

  const container = document.getElementById('canvas-container');
  const scene = new THREE.Scene();
  scene.background = new THREE.Color('#ffffff');
  
  const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
  camera.position.set(0, 3, 14);
  
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(container.clientWidth, container.clientHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  container.appendChild(renderer.domElement);

  const labelRenderer = new CSS2DRenderer();
  labelRenderer.setSize(container.clientWidth, container.clientHeight);
  labelRenderer.domElement.style.position = 'absolute';
  labelRenderer.domElement.style.top = '0';
  labelRenderer.domElement.style.left = '0';
  labelRenderer.domElement.style.pointerEvents = 'none';
  container.appendChild(labelRenderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.8;
  controls.enableZoom = true;
  controls.enablePan = false;

  scene.add(new THREE.AmbientLight(0xffffff, 0.7));
  const dirLight = new THREE.DirectionalLight(0xffffff, 1);
  dirLight.position.set(5, 8, 6);
  scene.add(dirLight);

  // central chemistry
  const centerGroup = new THREE.Group();
  const core = new THREE.Mesh(new THREE.SphereGeometry(1.4, 32), new THREE.MeshStandardMaterial({ color: '#f59e0b', emissive: '#f59e0b', emissiveIntensity: 0.15 }));
  centerGroup.add(core);
  
  for (let i = 0; i < 3; i++) {
    const orbit = new THREE.Mesh(new THREE.TorusGeometry(1.9 + i*0.6, 0.03, 8, 48), new THREE.MeshStandardMaterial({ color: '#3b82f6' }));
    orbit.rotation.x = Math.PI/2;
    orbit.rotation.z = i * 0.7;
    centerGroup.add(orbit);
  }
  scene.add(centerGroup);

  const centerLabel = new CSS2DObject(document.createElement('div'));
  centerLabel.element.textContent = 'CHEMISTRY';
  centerLabel.element.style.color = '#f59e0b';
  centerLabel.element.style.fontWeight = 'bold';
  centerLabel.element.style.fontSize = '16px';
  centerLabel.position.y = 2.2;
  centerGroup.add(centerLabel);

  // surrounding fields
  const fields = [
    { name: 'Biology', color: '#10b981', info: 'Life processes: photosynthesis, respiration, DNA replication — all chemistry.' },
    { name: 'Physics', color: '#ef4444', info: 'Quantum mechanics and thermodynamics explain bonding and reactivity.' },
    { name: 'Geology', color: '#f97316', info: 'Mineral formation, weathering, and Earth\'s geochemical cycles.' },
    { name: 'Medicine', color: '#14b8a6', info: 'Drug design, metabolism, and diagnostics rely on molecular interactions.' },
    { name: 'Engineering', color: '#8b5cf6', info: 'Materials, chemical processes, and nanotechnology.' },
    { name: 'Astronomy', color: '#a78bfa', info: 'Molecules in space, star formation, planetary atmospheres.' }
  ];

  const fieldGroups = [];
  const radius = 5.2;
  
  fields.forEach((f, i) => {
    const g = new THREE.Group();
    const angle = (i / fields.length) * Math.PI * 2;
    const x = Math.cos(angle) * radius;
    const z = Math.sin(angle) * radius;
    
    const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.85, 24), new THREE.MeshStandardMaterial({ color: f.color }));
    g.add(sphere);
    
    const label = new CSS2DObject(document.createElement('div'));
    label.element.textContent = f.name;
    label.element.style.color = f.color;
    label.element.style.fontWeight = '600';
    label.element.style.fontSize = '13px';
    label.position.y = 1.3;
    g.add(label);
    
    g.position.set(x, 0, z);
    g.userData = { name: f.name, info: f.info };
    
    scene.add(g);
    fieldGroups.push(g);
  });

  // connecting lines
  fieldGroups.forEach(g => {
    const line = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0, 0), g.position.clone()]),
      new THREE.LineBasicMaterial({ color: '#cbd5e1' })
    );
    scene.add(line);
  });

  // particles
  const particles = [];
  for (let i = 0; i < 150; i++) {
    const p = new THREE.Mesh(new THREE.SphereGeometry(0.04, 4), new THREE.MeshStandardMaterial({ color: '#3b82f6' }));
    p.position.set((Math.random()-0.5)*12, (Math.random()-0.5)*8, (Math.random()-0.5)*8);
    scene.add(p);
    particles.push({ mesh: p, vel: new THREE.Vector3((Math.random()-0.5)*0.015, (Math.random()-0.5)*0.015, (Math.random()-0.5)*0.015) });
  }

  // interaction
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  const infoTitle = document.getElementById('infoTitle');
  const infoText = document.getElementById('infoText');
  
  container.addEventListener('click', (e) => {
    const rect = container.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(scene.children, true);
    
    if (intersects.length) {
      let obj = intersects[0].object;
      while (obj && !obj.parent?.userData?.info) obj = obj.parent;
      const data = obj?.parent?.userData;
      if (data) {
        infoTitle.textContent = data.name;
        infoText.textContent = data.info;
      } else if (obj === core || obj.parent === centerGroup) {
        infoTitle.textContent = 'Chemistry';
        infoText.textContent = 'The central science · matter, properties, transformations. Connects all disciplines.';
      }
    }
  });

  let isPlaying = true;
  document.getElementById('pauseBtn').addEventListener('click', (e) => {
    isPlaying = !isPlaying;
    e.target.textContent = isPlaying ? '⏸️' : '▶️';
    controls.autoRotate = isPlaying;
  });
  
  document.getElementById('resetBtn').addEventListener('click', () => {
    camera.position.set(0, 3, 14);
    controls.target.set(0, 0, 0);
  });

  function animate() {
    requestAnimationFrame(animate);
    
    if (isPlaying) {
      centerGroup.rotation.y += 0.008;
      
      particles.forEach(p => {
        p.mesh.position.x += p.vel.x;
        p.mesh.position.y += p.vel.y;
        p.mesh.position.z += p.vel.z;
        if (Math.abs(p.mesh.position.x) > 8) p.vel.x *= -0.9;
        if (Math.abs(p.mesh.position.y) > 6) p.vel.y *= -0.9;
        if (Math.abs(p.mesh.position.z) > 6) p.vel.z *= -0.9;
      });
    }
    
    controls.update();
    renderer.render(scene, camera);
    labelRenderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    const w = container.clientWidth, h = container.clientHeight;
    renderer.setSize(w, h); labelRenderer.setSize(w, h);
    camera.aspect = w / h; camera.updateProjectionMatrix();
  });
</script>
</body>
</html>
