<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chemistry – The Central Science</title>
<style>
:root {
  --bg-dark: #0a0a1a;
  --gold: #ffd166;
  --blue: #00d9ff;
  --purple: #9d4edd;
  --green: #4ade80;
  --red: #ff6b6b;
  --orange: #fb923c;
  --teal: #2dd4bf;
  --indigo: #a78bfa;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", Inter, system-ui, sans-serif;
}

body {
  background: var(--bg-dark);
  background-image: 
    radial-gradient(circle at 10% 20%, rgba(157, 78, 221, 0.15) 0%, transparent 20%),
    radial-gradient(circle at 90% 80%, rgba(0, 217, 255, 0.1) 0%, transparent 20%),
    radial-gradient(circle at 50% 50%, rgba(255, 209, 102, 0.05) 0%, transparent 30%);
  color: white;
  min-height: 100vh;
  overflow-x: hidden;
}

header {
  text-align: center;
  padding: 40px 20px 30px;
  position: relative;
  z-index: 10;
}

header h1 {
  font-size: 4rem;
  background: linear-gradient(135deg, var(--gold), var(--blue), var(--purple));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin-bottom: 10px;
  text-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
  letter-spacing: 1px;
  position: relative;
  display: inline-block;
}

header h1::after {
  content: '';
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 200px;
  height: 4px;
  background: linear-gradient(90deg, transparent, var(--blue), transparent);
}

header p {
  margin-top: 20px;
  color: #b0b0ff;
  font-size: 1.4rem;
  max-width: 800px;
  margin-left: auto;
  margin-right: auto;
  line-height: 1.6;
}

.main {
  height: 75vh;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}

canvas {
  display: block;
  filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.7));
  z-index: 5;
}

.controls {
  position: absolute;
  bottom: 30px;
  left: 0;
  right: 0;
  display: flex;
  justify-content: center;
  gap: 20px;
  z-index: 10;
}

.control-btn {
  background: rgba(255, 255, 255, 0.1);
  border: 2px solid rgba(0, 217, 255, 0.5);
  color: white;
  padding: 12px 24px;
  border-radius: 50px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  backdrop-filter: blur(5px);
}

.control-btn:hover {
  background: rgba(0, 217, 255, 0.2);
  transform: translateY(-3px);
  box-shadow: 0 5px 15px rgba(0, 217, 255, 0.3);
}

.info-panel {
  position: absolute;
  top: 20px;
  right: 20px;
  background: rgba(0, 0, 0, 0.7);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 15px;
  padding: 20px;
  max-width: 300px;
  backdrop-filter: blur(10px);
  z-index: 10;
  display: none;
}

.info-panel h3 {
  color: var(--gold);
  margin-bottom: 10px;
  font-size: 1.3rem;
}

.info-panel p {
  color: #ccc;
  line-height: 1.5;
  font-size: 0.95rem;
}

.info-panel.active {
  display: block;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 1;
}

@media (max-width: 768px) {
  header h1 {
    font-size: 2.8rem;
  }
  
  header p {
    font-size: 1.1rem;
    padding: 0 20px;
  }
  
  .controls {
    flex-direction: column;
    align-items: center;
    padding: 0 20px;
  }
  
  .control-btn {
    width: 100%;
    max-width: 300px;
  }
}
</style>
</head>

<body>

<header>
  <h1>CHEMISTRY</h1>
  <p>The Central Science that connects all disciplines through atoms, molecules, and reactions</p>
</header>

<div class="main">
  <canvas id="canvas"></canvas>
  <div id="infoPanel" class="info-panel">
    <h3 id="infoTitle">Chemistry</h3>
    <p id="infoText">The central science that connects all other scientific disciplines. Click on any discipline to learn more about its connection to chemistry.</p>
  </div>
</div>

<div class="controls">
  <button class="control-btn" id="toggleAnimation">Pause Animation</button>
  <button class="control-btn" id="toggleParticles">Hide Particles</button>
  <button class="control-btn" id="resetView">Reset View</button>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const infoPanel = document.getElementById("infoPanel");
const infoTitle = document.getElementById("infoTitle");
const infoText = document.getElementById("infoText");

// Button elements
const toggleAnimationBtn = document.getElementById("toggleAnimation");
const toggleParticlesBtn = document.getElementById("toggleParticles");
const resetViewBtn = document.getElementById("resetView");

// State variables
let animationEnabled = true;
let particlesEnabled = true;
let particles = [];
let time = 0;
let hoveredNode = null;
let centralPulse = 0;

// Central Chemistry
const center = {
  x: 0,
  y: 0,
  r: 90,
  color: "#ffd166"
};

// Surrounding disciplines with additional info
const nodes = [
  { 
    name: "Biology", 
    color: "#4ade80", 
    angle: 0,
    info: "Chemistry explains biological processes like photosynthesis, cellular respiration, and DNA replication at the molecular level."
  },
  { 
    name: "Physics", 
    color: "#ff6b6b", 
    angle: 60,
    info: "Chemical bonds, reactions, and material properties are governed by physical laws like quantum mechanics and thermodynamics."
  },
  { 
    name: "Geology", 
    color: "#fb923c", 
    angle: 120,
    info: "Chemistry helps understand mineral formation, rock cycles, and earth's geochemical processes."
  },
  { 
    name: "Medicine", 
    color: "#2dd4bf", 
    angle: 180,
    info: "Drug design, metabolism, and diagnostic tests rely heavily on chemical principles and molecular interactions."
  },
  { 
    name: "Engineering", 
    color: "#9d4edd", 
    angle: 240,
    info: "Materials science, chemical engineering, and nanotechnology bridge chemistry with practical applications."
  },
  { 
    name: "Astronomy", 
    color: "#a78bfa", 
    angle: 300,
    info: "Astrochemistry studies molecules in space, star formation, and the chemical composition of planets."
  }
];

const radius = 240;

// Initialize particles
function initParticles(count = 100) {
  particles = [];
  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 0.5,
      vy: (Math.random() - 0.5) * 0.5,
      size: Math.random() * 3 + 1,
      color: `rgba(${Math.floor(Math.random() * 100 + 155)}, ${Math.floor(Math.random() * 100 + 155)}, 255, ${Math.random() * 0.5 + 0.2})`,
      life: Math.random() * 100 + 50
    });
  }
}

// Update particles
function updateParticles() {
  if (!particlesEnabled) return;
  
  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    
    // Move particles
    p.x += p.vx;
    p.y += p.vy;
    
    // Bounce off edges
    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
    
    // Keep within bounds
    p.x = Math.max(0, Math.min(canvas.width, p.x));
    p.y = Math.max(0, Math.min(canvas.height, p.y));
    
    // Life cycle
    p.life -= 0.5;
    if (p.life <= 0) {
      // Reset particle
      p.x = Math.random() * canvas.width;
      p.y = Math.random() * canvas.height;
      p.life = Math.random() * 100 + 50;
    }
  }
}

// Draw particles
function drawParticles() {
  if (!particlesEnabled) return;
  
  for (const p of particles) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();
  }
}

// Draw animated connections
function drawConnection(node) {
  const angle = node.angle + (animationEnabled ? Math.sin(time * 0.01 + node.angle) * 5 : 0);
  const x = center.x + Math.cos(angle * Math.PI / 180) * radius;
  const y = center.y + Math.sin(angle * Math.PI / 180) * radius;

  // Draw animated connection line with gradient
  const gradient = ctx.createLinearGradient(center.x, center.y, x, y);
  gradient.addColorStop(0, center.color);
  gradient.addColorStop(1, node.color);
  
  ctx.beginPath();
  ctx.moveTo(center.x, center.y);
  ctx.lineTo(x, y);
  ctx.strokeStyle = gradient;
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.stroke();
  
  // Draw animated particles along connection
  if (animationEnabled) {
    const particleCount = 5;
    for (let i = 0; i < particleCount; i++) {
      const t = (Date.now() * 0.002 + i / particleCount) % 1;
      const px = center.x + (x - center.x) * t;
      const py = center.y + (y - center.y) * t;
      
      ctx.beginPath();
      ctx.arc(px, py, 3, 0, Math.PI * 2);
      ctx.fillStyle = node.color;
      ctx.fill();
    }
  }

  return { x, y, angle };
}

// Draw node with animation
function drawNode(x, y, r, color, text, isHovered) {
  const nodeSize = isHovered ? r + 5 : r;
  const glowIntensity = isHovered ? 30 : 15;
  
  // Glow effect
  ctx.beginPath();
  ctx.arc(x, y, nodeSize + 10, 0, Math.PI * 2);
  const gradient = ctx.createRadialGradient(x, y, nodeSize, x, y, nodeSize + 10);
  gradient.addColorStop(0, color);
  gradient.addColorStop(1, 'transparent');
  ctx.fillStyle = gradient;
  ctx.fill();
  
  // Node circle
  ctx.beginPath();
  ctx.arc(x, y, nodeSize, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
  
  // Node text
  ctx.fillStyle = "white";
  ctx.font = `bold ${isHovered ? '16px' : '14px'} Segoe UI`;
  ctx.textAlign = "center";
  ctx.fillText(text, x, y + 5);
  
  // Add orbiting electrons for hovered nodes
  if (isHovered && animationEnabled) {
    const electronCount = 3;
    for (let i = 0; i < electronCount; i++) {
      const angle = Date.now() * 0.002 + (i * Math.PI * 2 / electronCount);
      const ex = x + Math.cos(angle) * (nodeSize + 15);
      const ey = y + Math.sin(angle) * (nodeSize + 10);
      
      ctx.beginPath();
      ctx.arc(ex, ey, 4, 0, Math.PI * 2);
      ctx.fillStyle = '#00d9ff';
      ctx.fill();
    }
  }
}

// Draw central chemistry node
function drawCentral() {
  // Pulsing effect
  const pulse = animationEnabled ? Math.sin(time * 0.02) * 5 : 0;
  const currentSize = center.r + pulse + centralPulse;
  
  // Glow effect
  ctx.beginPath();
  ctx.arc(center.x, center.y, currentSize + 20, 0, Math.PI * 2);
  const gradient = ctx.createRadialGradient(center.x, center.y, currentSize, center.x, center.y, currentSize + 20);
  gradient.addColorStop(0, center.color);
  gradient.addColorStop(1, 'transparent');
  ctx.fillStyle = gradient;
  ctx.fill();
  
  // Central circle
  ctx.beginPath();
  ctx.arc(center.x, center.y, currentSize, 0, Math.PI * 2);
  ctx.fillStyle = center.color;
  ctx.fill();
  
  // Central text
  ctx.fillStyle = "#000";
  ctx.font = "bold 22px Segoe UI";
  ctx.textAlign = "center";
  ctx.fillText("CHEMISTRY", center.x, center.y + 8);
  
  // Animated atomic orbitals
  if (animationEnabled) {
    const orbitalCount = 3;
    for (let i = 0; i < orbitalCount; i++) {
      const orbitalRadius = currentSize + 25 + i * 20;
      const orbitalAngle = time * 0.005 + i * Math.PI / orbitalCount;
      
      ctx.beginPath();
      ctx.ellipse(
        center.x, 
        center.y, 
        orbitalRadius, 
        orbitalRadius * 0.7, 
        orbitalAngle, 
        0, 
        Math.PI * 2
      );
      ctx.strokeStyle = `rgba(0, 217, 255, ${0.5 - i * 0.15})`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }
}

// Handle mouse movement
function handleMouseMove(e) {
  const rect = canvas.getBoundingClientRect();
  const mouseX = e.clientX - rect.left;
  const mouseY = e.clientY - rect.top;
  
  // Reset hover state
  hoveredNode = null;
  
  // Check if mouse is over central node
  const distToCenter = Math.sqrt(
    Math.pow(mouseX - center.x, 2) + Math.pow(mouseY - center.y, 2)
  );
  
  if (distToCenter < center.r) {
    hoveredNode = { name: "Chemistry", info: "The central science that studies matter, its properties, composition, and transformations. Chemistry connects all scientific disciplines through atoms and molecules." };
    centralPulse = 10;
  } else {
    centralPulse = 0;
    
    // Check if mouse is over any node
    for (const node of nodes) {
      const angle = node.angle + (animationEnabled ? Math.sin(time * 0.01 + node.angle) * 5 : 0);
      const x = center.x + Math.cos(angle * Math.PI / 180) * radius;
      const y = center.y + Math.sin(angle * Math.PI / 180) * radius;
      
      const dist = Math.sqrt(Math.pow(mouseX - x, 2) + Math.pow(mouseY - y, 2));
      
      if (dist < 55) {
        hoveredNode = node;
        break;
      }
    }
  }
  
  // Update info panel
  if (hoveredNode) {
    infoTitle.textContent = hoveredNode.name;
    infoText.textContent = hoveredNode.info;
    infoPanel.classList.add('active');
  } else {
    infoPanel.classList.remove('active');
  }
}

// Handle canvas click
function handleCanvasClick() {
  if (hoveredNode) {
    // Animate a pulse effect
    centralPulse = 20;
    setTimeout(() => {
      centralPulse = 0;
    }, 300);
  }
}

// Resize canvas
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight * 0.75;
  center.x = canvas.width / 2;
  center.y = canvas.height / 2;
  
  // Reinitialize particles
  initParticles(150);
}

// Main render function
function render() {
  // Clear canvas with fade effect
  ctx.fillStyle = 'rgba(10, 10, 26, 0.1)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Update and draw particles
  updateParticles();
  drawParticles();
  
  // Draw connections and nodes
  const nodePositions = [];
  for (const node of nodes) {
    const pos = drawConnection(node);
    const isHovered = hoveredNode === node;
    nodePositions.push({...pos, node, isHovered});
  }
  
  // Draw nodes
  for (const np of nodePositions) {
    drawNode(np.x, np.y, 55, np.node.color, np.node.name, np.isHovered);
  }
  
  // Draw central node
  drawCentral();
  
  // Update time for animations
  if (animationEnabled) {
    time += 1;
  }
  
  // Continue animation loop
  requestAnimationFrame(render);
}

// Button event handlers
toggleAnimationBtn.addEventListener('click', function() {
  animationEnabled = !animationEnabled;
  this.textContent = animationEnabled ? 'Pause Animation' : 'Play Animation';
});

toggleParticlesBtn.addEventListener('click', function() {
  particlesEnabled = !particlesEnabled;
  this.textContent = particlesEnabled ? 'Hide Particles' : 'Show Particles';
});

resetViewBtn.addEventListener('click', function() {
  // Reset all animations and states
  animationEnabled = true;
  particlesEnabled = true;
  hoveredNode = null;
  centralPulse = 0;
  toggleAnimationBtn.textContent = 'Pause Animation';
  toggleParticlesBtn.textContent = 'Hide Particles';
  infoPanel.classList.remove('active');
});

// Initialize
resize();
window.addEventListener('resize', resize);
canvas.addEventListener('mousemove', handleMouseMove);
canvas.addEventListener('click', handleCanvasClick);

// Start animation
render();
</script>
</body>
</html>
