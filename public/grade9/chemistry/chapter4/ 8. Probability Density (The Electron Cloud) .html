<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electron Probability Density</title>
    <style>
        :root {
            --bg: #020617;
            --panel: #0f172a;
            --electron: #38bdf8;
            --text: #f1f5f9;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 320px;
            background: var(--panel);
            padding: 25px;
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .viewport { flex-grow: 1; position: relative; background: #000; }
        canvas { width: 100%; height: 100%; }

        .card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--electron);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
        }

        button:active { transform: scale(0.98); }
        
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-family: monospace;
            font-size: 0.8rem;
            margin-top: 10px;
        }

        .highlight { color: var(--electron); }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color:var(--electron); margin-top:0;">1s Orbital Cloud</h2>
    
    <div class="card">
        <p style="font-size: 0.85rem; line-height: 1.5;">In quantum mechanics, we don't see orbits. We see <b>probability densities</b>.</p>
        <button onclick="measure(100)">Measure Position (x100)</button>
        <button onclick="measure(1000)" style="margin-top:10px; background:#94a3b8;">Instant Cloud (x1000)</button>
    </div>

    <div class="card">
        <div class="stat-grid">
            <span>Measurements:</span> <span id="count" class="highlight">0</span>
            <span>Avg Radius:</span> <span id="avgR" class="highlight">0</span>
        </div>
    </div>

    <button class="reset" onclick="reset()" style="background:#334155; color:white;">Clear Observations</button>

    <div class="card" style="font-size: 0.8rem; color: #94a3b8;">
        <b>The Math:</b> Each dot is placed using a Gaussian distribution. You are 90% likely to find the electron within the "cloud" boundary.
    </div>
</div>

<div class="viewport">
    <canvas id="cloudCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('cloudCanvas');
    const ctx = canvas.getContext('2d');
    let points = [];

    function resize() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        draw();
    }
    window.addEventListener('resize', resize);
    resize();

    // Box-Muller transform for Gaussian Distribution
    function randomGaussian(mean, stdev) {
        let u = 0, v = 0;
        while(u === 0) u = Math.random();
        while(v === 0) v = Math.random();
        let num = Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
        return num * stdev + mean;
    }

    function measure(samples) {
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const scale = 80;

        for(let i=0; i<samples; i++) {
            // Radial probability distribution for 1s orbital
            const r = Math.abs(randomGaussian(0, scale)); 
            const theta = Math.random() * Math.PI * 2;
            
            points.push({
                x: cx + r * Math.cos(theta),
                y: cy + r * Math.sin(theta),
                r: r
            });
        }
        updateStats();
        draw();
    }

    function updateStats() {
        document.getElementById('count').innerText = points.length;
        const totalR = points.reduce((sum, p) => sum + p.r, 0);
        document.getElementById('avgR').innerText = points.length ? (totalR / points.length).toFixed(1) + " pm" : 0;
    }

    function reset() {
        points = [];
        updateStats();
        draw();
    }

    function draw() {
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const cx = canvas.width / 2;
        const cy = canvas.height / 2;

        // Draw Nucleus
        ctx.fillStyle = "#f87171";
        ctx.beginPath();
        ctx.arc(cx, cy, 5, 0, Math.PI * 2);
        ctx.fill();

        // Draw Electron "Observations"
        ctx.fillStyle = "rgba(56, 189, 248, 0.5)";
        points.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, 1.5, 0, Math.PI * 2);
            ctx.fill();
        });
    }

    draw();
</script>
</body>
</html>
