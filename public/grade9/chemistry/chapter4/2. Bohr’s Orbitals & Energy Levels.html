<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>⚛️ bohr · quantum jumps</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:system-ui,sans-serif;background:#fff;min-height:100dvh;padding:12px}
    .grid{display:grid;grid-template-columns:1fr;gap:16px;max-width:800px;margin:0 auto}
    @media(min-width:700px){.grid{grid-template-columns:1fr 220px}}
    h2{font-weight:700;font-size:1.3rem;color:#0a1e3c;margin-bottom:12px}
    .panel{background:#fafcff;border-radius:24px;border:1px solid #d0e2ff;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.04)}
    canvas{display:block;width:100%;aspect-ratio:1/1;background:#f8fcff;border-radius:16px;border:1px solid #d0e2ff}
    .btn{width:100%;padding:16px;border-radius:40px;border:none;font-weight:700;font-size:1rem;cursor:pointer;margin-bottom:8px}
    .btn-absorb{background:#f59e0b;color:#fff}.btn-emit{background:#3b82f6;color:#fff}
    .btn:disabled{opacity:0.4}
    .energy{display:flex;gap:8px;padding:16px 0}
    .bar{flex:1;height:70px;background:#cbd5e1;border-radius:8px 8px 0 0;transition:0.2s;position:relative}
    .bar.active{background:#f59e0b;box-shadow:0 0 12px #f59e0b}
    .bar::after{content:attr(data-n);position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:0.7rem;color:#3a628c}
    .bar:nth-child(1){height:25px}.bar:nth-child(2){height:45px}.bar:nth-child(3){height:65px}.bar:nth-child(4){height:85px}
    .state{text-align:center;font-weight:700;padding:8px;color:#3b82f6}
    .legend{display:flex;gap:16px;margin-top:12px;font-size:0.8rem}
  </style>
</head>
<body>
<div class="grid">
  <div class="panel">
    <h2>⚛️ bohr model</h2>
    <canvas id="bohrCanvas"></canvas>
    <div class="legend"><span style="color:#ef4444">● nucleus</span><span style="color:#3b82f6">● electron</span></div>
  </div>
  <div>
    <div class="panel">
      <button class="btn btn-absorb" id="absorbBtn">☀️ absorb photon</button>
      <button class="btn btn-emit" id="emitBtn">💫 emit photon</button>
      <div class="energy"><div class="bar" data-n="n=1"></div><div class="bar" data-n="n=2"></div><div class="bar" data-n="n=3"></div><div class="bar" data-n="n=4"></div></div>
      <div class="state" id="stateLabel">⚡ ground · n=1</div>
      <div style="font-size:0.85rem;color:#3a628c;margin-top:12px">electrons exist in discrete shells</div>
    </div>
  </div>
</div>
<script>
(function(){
  const canvas=document.getElementById('bohrCanvas'),ctx=canvas.getContext('2d');
  let w=0,h=0,DPR=devicePixelRatio||1,n=1,angle=0;
  const absorb=document.getElementById('absorbBtn'),emit=document.getElementById('emitBtn'),stateL=document.getElementById('stateLabel');
  
  function resize(){const r=canvas.parentElement.getBoundingClientRect();w=r.width;h=w;canvas.width=w*DPR;canvas.height=h*DPR;canvas.style.width=w+'px';canvas.style.height=h+'px';ctx.setTransform(DPR,0,0,DPR,0,0)}
  
  function updateUI(){
    absorb.disabled=n===4; emit.disabled=n===1;
    document.querySelectorAll('.bar').forEach((b,i)=>b.classList.toggle('active',i===n-1));
    stateL.textContent=n===1?'⚡ ground · n=1':`✨ excited · n=${n}`; stateL.style.color=n===1?'#3b82f6':'#f59e0b';
  }
  
  function jump(d){
    if(d>0&&n<4)n++; else if(d<0&&n>1)n--; else return;
    ctx.fillStyle=d>0?'#fef3c7':'#dbeafe'; ctx.globalAlpha=0.25; ctx.fillRect(0,0,w,h); ctx.globalAlpha=1; updateUI();
  }
  
  function draw(){
    ctx.clearRect(0,0,w,h); const cx=w/2,cy=h/2,base=w*0.12;
    for(let i=1;i<=4;i++){const r=base+(i-1)*w*0.1; ctx.beginPath(); ctx.arc(cx,cy,r,0,2*Math.PI); ctx.strokeStyle=i===n?'#3b82f6':'#cbd5e1'; ctx.lineWidth=i===n?2.5:1; ctx.setLineDash(i===n?[]:[4,6]); ctx.stroke(); ctx.fillStyle='#64748b'; ctx.font='10px system-ui'; ctx.fillText(`n=${i}`,cx+r+5,cy-3)}
    ctx.setLineDash([]); ctx.beginPath(); ctx.arc(cx,cy,9,0,2*Math.PI); ctx.fillStyle='#ef4444'; ctx.shadowColor='#ef444480'; ctx.shadowBlur=14; ctx.fill(); ctx.shadowBlur=0;
    const er=base+(n-1)*w*0.1; angle+=0.018/Math.sqrt(n); const ex=cx+Math.cos(angle)*er,ey=cy+Math.sin(angle)*er;
    ctx.beginPath(); ctx.arc(ex,ey,6,0,2*Math.PI); ctx.fillStyle='#3b82f6'; ctx.shadowColor='#3b82f6'; ctx.shadowBlur=12; ctx.fill(); ctx.shadowBlur=0;
    requestAnimationFrame(draw);
  }
  
  absorb.onclick=()=>jump(1); emit.onclick=()=>jump(-1);
  window.onresize=()=>resize();
  resize(); updateUI(); draw();
})();
</script>
</body>
</html>
