<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🌊 de broglie · wave particle</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:system-ui,sans-serif;background:#fff;min-height:100dvh;padding:12px}
    .grid{display:grid;grid-template-columns:1fr;gap:16px;max-width:800px;margin:0 auto}
    @media(min-width:700px){.grid{grid-template-columns:1fr 240px}}
    h2{font-weight:700;font-size:1.3rem;color:#0a1e3c;margin-bottom:12px}
    .panel{background:#fafcff;border-radius:24px;border:1px solid #d0e2ff;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.04)}
    canvas{display:block;width:100%;aspect-ratio:16/10;background:#f8fcff;border-radius:16px;border:1px solid #d0e2ff}
    .slider-item{margin:16px 0}
    .slider-head{display:flex;justify-content:space-between;font-weight:500;margin-bottom:4px}
    input[type=range]{width:100%;height:5px;background:#d4e2fa;border-radius:10px;appearance:none;-webkit-appearance:none}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;background:#3b82f6;border-radius:20px;border:3px solid #fff;cursor:grab}
    .lambda-card{background:#f0f6ff;border-radius:18px;padding:18px;text-align:center;margin:16px 0}
    .lambda-val{font-size:2rem;font-weight:700;color:#3b82f6}
    .regime{display:inline-block;padding:6px 16px;border-radius:40px;font-weight:700;font-size:0.8rem;margin-top:8px}
    .quantum{background:#fce7f3;color:#be185d}.classical{background:#dbeafe;color:#1e4a8b}
    .legend{display:flex;gap:16px;margin-top:12px;font-size:0.8rem;color:#3a628c}
  </style>
</head>
<body>
<div class="grid">
  <div class="panel">
    <h2>🌊 de broglie duality</h2>
    <canvas id="dwCanvas"></canvas>
    <div class="legend"><span>～ wave</span><span style="color:#3b82f6">● particle</span><span>λ = h/mv</span></div>
  </div>
  <div class="panel">
    <div class="slider-item"><div class="slider-head"><span>⚫ mass</span><span id="massVal">10</span></div><input type="range" id="massSlider" min="1" max="60" value="10"></div>
    <div class="slider-item"><div class="slider-head"><span>⚡ velocity</span><span id="velVal">20</span></div><input type="range" id="velSlider" min="2" max="35" value="20"></div>
    <div class="lambda-card"><div style="font-size:0.7rem;color:#3a628c">wavelength</div><div class="lambda-val" id="lambdaDisp">19.0</div><div id="regimeBadge" class="regime quantum">quantum</div></div>
    <div style="font-size:0.85rem;color:#3a628c;margin-top:8px">small mass → wave · large mass → particle</div>
  </div>
</div>
<script>
(function(){
  const canvas=document.getElementById('dwCanvas'),ctx=canvas.getContext('2d');
  let w=0,h=0,DPR=devicePixelRatio||1,time=0,H=3600;
  const massS=document.getElementById('massSlider'),velS=document.getElementById('velSlider'),massV=document.getElementById('massVal'),velV=document.getElementById('velVal'),lambdaD=document.getElementById('lambdaDisp'),badge=document.getElementById('regimeBadge');
  
  function resize(){const r=canvas.parentElement.getBoundingClientRect();w=r.width;h=r.width*10/16;canvas.width=w*DPR;canvas.height=h*DPR;canvas.style.width=w+'px';canvas.style.height=h+'px';ctx.setTransform(DPR,0,0,DPR,0,0)}
  
  function draw(){
    ctx.fillStyle='#f8fcff'; ctx.fillRect(0,0,w,h);
    const m=parseFloat(massS.value),v=parseFloat(velS.value); massV.textContent=m.toFixed(1); velV.textContent=v.toFixed(1);
    const lambda=H/(m*v); lambdaD.textContent=lambda.toFixed(1);
    if(m<14){badge.textContent='quantum';badge.className='regime quantum'}else{badge.textContent='classical';badge.className='regime classical'}
    const amp=Math.min(55,Math.max(8,65/Math.sqrt(m))),cy=h/2,color=m<14?'#ec4899':'#3b82f6';
    ctx.beginPath(); ctx.strokeStyle=color+'50'; ctx.lineWidth=2; ctx.setLineDash([5,5]);
    for(let x=0;x<w;x+=4){const y=cy+Math.sin(x/lambda+time)*amp; x===0?ctx.moveTo(x,y):ctx.lineTo(x,y)} ctx.stroke(); ctx.setLineDash([]);
    const px=(time*v*6)%w,py=cy+Math.sin(px/lambda+time)*amp;
    ctx.beginPath(); ctx.arc(px,py,5+m*0.12,0,2*Math.PI); ctx.fillStyle='#3b82f6'; ctx.shadowColor='#3b82f6'; ctx.shadowBlur=12; ctx.fill(); ctx.shadowBlur=0;
    ctx.strokeStyle='#94a3b8'; ctx.lineWidth=2; ctx.stroke();
    ctx.beginPath(); ctx.strokeStyle='#cbd5e1'; ctx.lineWidth=1; ctx.setLineDash([2,6]); ctx.moveTo(0,cy); ctx.lineTo(w,cy); ctx.stroke(); ctx.setLineDash([]);
    time+=0.035; requestAnimationFrame(draw);
  }
  
  massS.oninput=draw; velS.oninput=draw; window.onresize=resize; resize(); draw();
})();
</script>
</body>
</html>
