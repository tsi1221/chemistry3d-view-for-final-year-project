<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>⚛️ atomic radius · periodic trend</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:system-ui,sans-serif;background:#fff;min-height:100dvh;padding:12px}
    .grid{display:grid;grid-template-columns:1fr;gap:16px;max-width:900px;margin:0 auto}
    @media(min-width:700px){.grid{grid-template-columns:1fr 280px}}
    h2{font-weight:700;font-size:1.3rem;color:#0a1e3c;margin-bottom:12px}
    .panel{background:#fafcff;border-radius:24px;border:1px solid #d0e2ff;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.04)}
    canvas{display:block;width:100%;aspect-ratio:1/1;background:#f8fcff;border-radius:16px;border:1px solid #d0e2ff}
    .ptable{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;margin:16px 0}
    .cell{aspect-ratio:1;background:#fff;border:1.5px solid #d0e2ff;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:0.7rem;font-weight:600}
    .cell.active{background:#3b82f6;border-color:#3b82f6;color:#fff}
    .info-card{background:#f0f6ff;border-radius:18px;padding:18px;text-align:center}
    .element-name{font-size:1.4rem;font-weight:700;color:#3b82f6}
    .stats{display:flex;justify-content:space-around;margin:12px 0}
    .stat{text-align:center}.stat-val{font-size:1.6rem;font-weight:700}
    .proton{color:#ef4444}.radius{color:#3b82f6}
    .legend{display:flex;gap:16px;margin-top:12px;font-size:0.8rem}
  </style>
</head>
<body>
<div class="grid">
  <div class="panel">
    <h2>⚛️ atomic radius · periodic trend</h2>
    <canvas id="atomCanvas"></canvas>
    <div class="legend"><span style="color:#ef4444">● nucleus</span><span style="color:#3b82f6">◯ electron cloud</span></div>
  </div>
  <div>
    <div class="panel">
      <div class="ptable" id="ptableGrid"></div>
      <div class="info-card"><div class="element-name" id="elName">Sodium</div>
      <div class="stats"><div class="stat"><div style="font-size:0.7rem;color:#3a628c">protons</div><div class="stat-val proton" id="protonDisp">11</div></div><div class="stat"><div style="font-size:0.7rem;color:#3a628c">radius</div><div class="stat-val radius" id="radiusDisp">186</div><div style="font-size:0.6rem">pm</div></div></div></div>
      <div style="font-size:0.85rem;color:#3a628c;margin-top:8px">→ across period: radius ↓ · more protons pull tighter</div>
    </div>
  </div>
</div>
<script>
(function(){
  const elements=[{sym:"Li",name:"Lithium",z:3,r:152},{sym:"Be",name:"Beryllium",z:4,r:112},{sym:"B",name:"Boron",z:5,r:88},{sym:"C",name:"Carbon",z:6,r:77},{sym:"N",name:"Nitrogen",z:7,r:70},{sym:"O",name:"Oxygen",z:8,r:66},{sym:"F",name:"Fluorine",z:9,r:64},{sym:"Ne",name:"Neon",z:10,r:58},{sym:"Na",name:"Sodium",z:11,r:186},{sym:"Mg",name:"Magnesium",z:12,r:160},{sym:"Al",name:"Aluminum",z:13,r:143},{sym:"Si",name:"Silicon",z:14,r:118},{sym:"P",name:"Phosphorus",z:15,r:110},{sym:"S",name:"Sulfur",z:16,r:103},{sym:"Cl",name:"Chlorine",z:17,r:99},{sym:"Ar",name:"Argon",z:18,r:97}];
  let active=elements[8];
  const canvas=document.getElementById('atomCanvas'),ctx=canvas.getContext('2d');
  let w=0,h=0,DPR=devicePixelRatio||1,time=0;
  const grid=document.getElementById('ptableGrid'),elName=document.getElementById('elName'),protonD=document.getElementById('protonDisp'),radiusD=document.getElementById('radiusDisp');
  
  function resize(){const r=canvas.parentElement.getBoundingClientRect();w=r.width;h=w;canvas.width=w*DPR;canvas.height=h*DPR;canvas.style.width=w+'px';canvas.style.height=h+'px';ctx.setTransform(DPR,0,0,DPR,0,0)}
  
  function buildTable(){
    grid.innerHTML=''; elements.forEach(el=>{const c=document.createElement('div');c.className='cell'+(el.sym===active.sym?' active':'');c.innerHTML=`<span style="font-size:0.5rem">${el.z}</span><span>${el.sym}</span>`;c.onclick=()=>{active=el; document.querySelectorAll('.cell').forEach(x=>x.classList.remove('active'));c.classList.add('active'); updateUI()}; grid.appendChild(c)})
  }
  
  function updateUI(){elName.textContent=active.name; protonD.textContent=active.z; radiusD.textContent=active.r}
  
  function draw(){
    ctx.clearRect(0,0,w,h); const cx=w/2,cy=h/2,pulse=Math.sin(time*0.008)*2,cloudR=active.r*0.6+pulse; time++;
    const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,cloudR); grad.addColorStop(0,'#3b82f630'); grad.addColorStop(0.6,'#3b82f615'); grad.addColorStop(1,'#3b82f600'); ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(cx,cy,cloudR,0,2*Math.PI); ctx.fill();
    ctx.strokeStyle='#3b82f640'; ctx.lineWidth=1.5; ctx.setLineDash([4,6]); ctx.beginPath(); ctx.arc(cx,cy,cloudR,0,2*Math.PI); ctx.stroke(); ctx.setLineDash([]);
    const nSize=5+active.z*0.35; ctx.beginPath(); ctx.arc(cx,cy,nSize,0,2*Math.PI); ctx.fillStyle='#ef4444'; ctx.shadowColor='#ef444480'; ctx.shadowBlur=12; ctx.fill(); ctx.shadowBlur=0;
    ctx.strokeStyle='#ef444420'; ctx.lineWidth=1; for(let i=0;i<active.z;i++){const a=(i/active.z)*2*Math.PI+time*0.002,ex=cx+Math.cos(a)*cloudR*0.85,ey=cy+Math.sin(a)*cloudR*0.85; ctx.beginPath(); ctx.moveTo(cx+Math.cos(a)*nSize,cy+Math.sin(a)*nSize); ctx.lineTo(ex,ey); ctx.stroke()}
    requestAnimationFrame(draw);
  }
  
  window.onresize=()=>resize();
  buildTable(); updateUI(); resize(); draw();
})();
</script>
</body>
</html>
