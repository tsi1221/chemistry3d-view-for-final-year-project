<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>⚛️ electron config · builder</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:system-ui,sans-serif;background:#fff;min-height:100dvh;padding:12px}
    .grid{display:grid;grid-template-columns:1fr;gap:16px;max-width:700px;margin:0 auto}
    @media(min-width:600px){.grid{grid-template-columns:1fr 200px}}
    h2{font-weight:700;font-size:1.3rem;color:#0a1e3c;margin-bottom:16px}
    .panel{background:#fafcff;border-radius:24px;border:1px solid #d0e2ff;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.04)}
    .stack{display:flex;flex-direction:column-reverse;gap:16px}
    .subshell{display:flex;align-items:center;gap:16px}
    .label{width:36px;font-weight:700;color:#3b82f6}
    .boxes{display:flex;gap:8px}
    .box{width:48px;height:48px;border:2px solid #d0e2ff;background:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;position:relative}
    .box.filled{border-color:#3b82f6;background:#f0f6ff}
    .arrow{font-size:24px;font-weight:700}.up{color:#10b981}.down{color:#ef4444;margin-left:-6px}
    .config{font-family:'JetBrains Mono',monospace;font-size:1.2rem;font-weight:700;color:#3b82f6;text-align:center;margin:16px 0}
    .btn{width:100%;padding:14px;border-radius:40px;border:none;font-weight:700;font-size:1rem;cursor:pointer;background:#3b82f6;color:#fff;margin-bottom:8px}
    .btn-outline{background:#fff;border:1.5px solid #d0e2ff;color:#3a628c}
    .error{color:#ef4444;font-size:0.8rem;text-align:center;min-height:20px}
    .legend{display:flex;gap:16px;margin-top:12px;font-size:0.8rem}
  </style>
</head>
<body>
<div class="grid">
  <div class="panel">
    <h2>⚛️ configuration builder</h2>
    <div class="stack">
      <div class="subshell" id="shell-2p"><span class="label">2p</span><div class="boxes"><div class="box" data-shell="2p" data-idx="0"></div><div class="box" data-shell="2p" data-idx="1"></div><div class="box" data-shell="2p" data-idx="2"></div></div></div>
      <div class="subshell" id="shell-2s"><span class="label">2s</span><div class="boxes"><div class="box" data-shell="2s" data-idx="0"></div></div></div>
      <div class="subshell" id="shell-1s"><span class="label">1s</span><div class="boxes"><div class="box" data-shell="1s" data-idx="0"></div></div></div>
    </div>
    <div class="legend"><span>↑ spin up</span><span>↓ spin down</span></div>
  </div>
  <div>
    <div class="panel">
      <div class="config" id="configOut">1s⁰</div>
      <button class="btn" id="addBtn">➕ add electron</button>
      <button class="btn-outline" id="resetBtn">↻ reset</button>
      <div class="error" id="errorMsg"></div>
      <div style="font-size:0.8rem;color:#3a628c;margin-top:16px">aufbau · pauli · hund</div>
    </div>
  </div>
</div>
<script>
(function(){
  const order=[{sh:'1s',idx:0,sp:'up'},{sh:'1s',idx:0,sp:'down'},{sh:'2s',idx:0,sp:'up'},{sh:'2s',idx:0,sp:'down'},{sh:'2p',idx:0,sp:'up'},{sh:'2p',idx:1,sp:'up'},{sh:'2p',idx:2,sp:'up'},{sh:'2p',idx:0,sp:'down'},{sh:'2p',idx:1,sp:'down'},{sh:'2p',idx:2,sp:'down'}];
  let step=0;
  const boxes=document.querySelectorAll('.box'),configOut=document.getElementById('configOut'),errorMsg=document.getElementById('errorMsg');
  const subs=[{id:'1s',lim:2},{id:'2s',lim:2},{id:'2p',lim:6}];
  
  function getCounts(){const c={}; boxes.forEach(b=>{const sh=b.dataset.shell; c[sh]=(c[sh]||0)+b.querySelectorAll('.arrow').length}); return c}
  
  function updateConfig(){const c=getCounts(),p=[]; if(c['1s'])p.push(`1s${c['1s']}`); if(c['2s'])p.push(`2s${c['2s']}`); if(c['2p'])p.push(`2p${c['2p']}`); configOut.textContent=p.join(' ')||'1s⁰'}
  
  function reset(){step=0; boxes.forEach(b=>{b.innerHTML=''; b.classList.remove('filled')}); errorMsg.textContent=''; updateConfig()}
  
  function add(){
    if(step>=order.length){errorMsg.textContent='atom full · neon'; return}
    errorMsg.textContent=''; const cur=order[step],target=Array.from(boxes).find(b=>b.dataset.shell===cur.sh&&parseInt(b.dataset.idx)===cur.idx);
    if(target){const a=document.createElement('span'); a.className=`arrow ${cur.sp}`; a.textContent=cur.sp==='up'?'↑':'↓'; target.appendChild(a); target.classList.add('filled')}
    step++; updateConfig(); if(step===order.length)errorMsg.textContent='✨ neon · stable';
  }
  
  document.getElementById('addBtn').onclick=add; document.getElementById('resetBtn').onclick=reset;
  updateConfig();
})();
</script>
</body>
</html>
