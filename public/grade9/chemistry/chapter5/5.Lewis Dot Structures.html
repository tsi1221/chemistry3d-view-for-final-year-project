<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>⚛️ lewis dot · octet</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:system-ui,sans-serif;background:#fff;min-height:100dvh;padding:12px}
    .grid{display:grid;grid-template-columns:1fr;gap:16px;max-width:700px;margin:0 auto}
    @media(min-width:600px){.grid{grid-template-columns:1fr 220px}}
    h2{font-weight:700;font-size:1.3rem;color:#0a1e3c;margin-bottom:16px}
    .panel{background:#fafcff;border-radius:24px;border:1px solid #d0e2ff;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.04)}
    .lewis{position:relative;width:240px;height:240px;margin:0 auto;display:flex;align-items:center;justify-content:center}
    .symbol{font-size:4rem;font-weight:800;color:#3b82f6}
    .dot{position:absolute;width:18px;height:18px;background:#3b82f6;border-radius:50%;box-shadow:0 4px 10px rgba(59,130,246,0.3)}
    .charge{position:absolute;top:10px;right:10px;font-size:1.8rem;font-weight:700;color:#f59e0b}
    select{width:100%;padding:12px;border-radius:40px;border:1.5px solid #d0e2ff;background:#fff;font-size:0.9rem;margin-bottom:12px}
    .btn{width:100%;padding:12px;border-radius:40px;border:none;font-weight:600;cursor:pointer;background:#3b82f6;color:#fff;margin-bottom:8px}
    .btn-outline{background:#fff;border:1.5px solid #d0e2ff;color:#3a628c}
    .stats{background:#f0f6ff;border-radius:16px;padding:14px;text-align:center;margin:16px 0}
    .valence{font-size:1.8rem;font-weight:700;color:#3b82f6}
    .status{padding:8px;border-radius:20px;font-weight:700;font-size:0.8rem}
    .stable{background:#d1fae5;color:#065f46}.unstable{background:#e2e8f0;color:#475569}
  </style>
</head>
<body>
<div class="grid">
  <div class="panel">
    <h2>⚛️ lewis dot lab</h2>
    <div class="lewis" id="lewisContainer"><div class="symbol" id="symbol">O</div><div class="charge" id="chargeDisp"></div></div>
    <div style="text-align:center;margin-top:8px;font-size:0.8rem;color:#3a628c">● valence electron</div>
  </div>
  <div>
    <div class="panel">
      <select id="elSelect"><optgroup label="period 1-2"><option value="H">Hydrogen (1)</option><option value="He">Helium (2)</option><option value="Li">Lithium (1)</option><option value="Be">Beryllium (2)</option><option value="B">Boron (3)</option><option value="C">Carbon (4)</option><option value="N">Nitrogen (5)</option><option value="O" selected>Oxygen (6)</option><option value="F">Fluorine (7)</option><option value="Ne">Neon (8)</option></optgroup><optgroup label="period 3"><option value="Na">Sodium (1)</option><option value="Mg">Magnesium (2)</option><option value="Al">Aluminum (3)</option><option value="Si">Silicon (4)</option><option value="P">Phosphorus (5)</option><option value="S">Sulfur (6)</option><option value="Cl">Chlorine (7)</option><option value="Ar">Argon (8)</option></optgroup></select>
      <button class="btn" id="addBtn">➕ add electron</button>
      <button class="btn-outline" id="resetBtn">↻ reset</button>
      <div class="stats"><div style="font-size:0.7rem;color:#3a628c">valence</div><div class="valence" id="dotCount">6</div><div id="statusDisp" class="status unstable">unstable</div></div>
      <div style="font-size:0.8rem;color:#3a628c">octet: 8 e⁻ (2 for H,He)</div>
    </div>
  </div>
</div>
<script>
(function(){
  const elements={H:1,He:2,Li:1,Be:2,B:3,C:4,N:5,O:6,F:7,Ne:8,Na:1,Mg:2,Al:3,Si:4,P:5,S:6,Cl:7,Ar:8};
  const pos=[{t:'15%',l:'42%'},{t:'15%',l:'54%'},{t:'42%',r:'15%'},{t:'54%',r:'15%'},{b:'15%',l:'42%'},{b:'15%',l:'54%'},{t:'42%',l:'15%'},{t:'54%',l:'15%'}];
  let dots=6,el='O'; const container=document.getElementById('lewisContainer'),symbol=document.getElementById('symbol'),chargeD=document.getElementById('chargeDisp'),dotC=document.getElementById('dotCount'),statusD=document.getElementById('statusDisp'),select=document.getElementById('elSelect');
  
  function render(){
    container.querySelectorAll('.dot').forEach(d=>d.remove());
    for(let i=0;i<Math.min(dots,8);i++){const d=document.createElement('div');d.className='dot'; const p=pos[i]; if(p.t)d.style.top=p.t; if(p.b)d.style.bottom=p.b; if(p.l)d.style.left=p.l; if(p.r)d.style.right=p.r; container.appendChild(d)}
    dotC.textContent=dots; const val=elements[el],stable=(dots===8)||(dots===2&&(el==='H'||el==='He'||el==='Li'||el==='Be')); statusD.textContent=stable?'✨ stable':'⚡ unstable'; statusD.className=stable?'status stable':'status unstable';
    const ch=val-dots; chargeD.textContent=ch===0?'':(ch>0?'+':'-')+(Math.abs(ch)===1?'':Math.abs(ch));
  }
  
  function reset(){el=select.value; symbol.textContent=el; dots=elements[el]; render()}
  
  select.onchange=reset; document.getElementById('addBtn').onclick=()=>{if(dots<8){dots++; render()}}; document.getElementById('resetBtn').onclick=reset;
  render();
})();
</script>
</body>
</html>
