<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>⚡ ion formation · cation & anion</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:system-ui,sans-serif;background:#fff;min-height:100dvh;padding:12px}
    .grid{display:grid;grid-template-columns:1fr;gap:16px;max-width:800px;margin:0 auto}
    @media(min-width:700px){.grid{grid-template-columns:1fr 220px}}
    h2{font-weight:700;font-size:1.3rem;color:#0a1e3c;margin-bottom:12px}
    .panel{background:#fafcff;border-radius:24px;border:1px solid #d0e2ff;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.04)}
    canvas{display:block;width:100%;aspect-ratio:1/1;background:#f8fcff;border-radius:16px;border:1px solid #d0e2ff}
    .btn{width:100%;padding:16px;border-radius:40px;border:none;font-weight:700;font-size:1rem;cursor:pointer;margin-bottom:8px}
    .btn-gain{background:#3b82f6;color:#fff}.btn-lose{background:#ef4444;color:#fff}
    .charge-card{background:#f0f6ff;border-radius:18px;padding:20px;text-align:center;margin:16px 0}
    .charge-val{font-size:3.5rem;font-weight:800;font-family:'JetBrains Mono',monospace}
    .neutral{color:#3a628c}.positive{color:#10b981}.negative{color:#f59e0b}
    .ion-label{font-weight:700;text-transform:uppercase;letter-spacing:1px}
    .legend{display:flex;gap:16px;margin-top:12px;font-size:0.8rem}
  </style>
</head>
<body>
<div class="grid">
  <div class="panel">
    <h2>⚡ ion architect</h2>
    <canvas id="ionCanvas"></canvas>
    <div class="legend"><span style="color:#ef4444">● protons (10)</span><span style="color:#3b82f6">● electrons</span></div>
  </div>
  <div>
    <div class="panel">
      <div class="charge-card"><div class="ion-label" id="typeLabel">neutral atom</div><div class="charge-val neutral" id="chargeDisp">0</div><div style="color:#3a628c">net charge</div></div>
      <button class="btn btn-gain" id="gainBtn">➕ gain e⁻</button>
      <button class="btn btn-lose" id="loseBtn">➖ lose e⁻</button>
      <div style="font-size:0.85rem;color:#3a628c;margin-top:12px">lose e⁻ → cation (+) · gain e⁻ → anion (−)</div>
    </div>
  </div>
</div>
<script>
(function(){
  const canvas=document.getElementById('ionCanvas'),ctx=canvas.getContext('2d');
  let w=0,h=0,DPR=devicePixelRatio||1,protons=10,electrons=10,time=0;
  const typeL=document.getElementById('typeLabel'),chargeD=document.getElementById('chargeDisp');
  
  function resize(){const r=canvas.parentElement.getBoundingClientRect();w=r.width;h=w;canvas.width=w*DPR;canvas.height=h*DPR;canvas.style.width=w+'px';canvas.style.height=h+'px';ctx.setTransform(DPR,0,0,DPR,0,0)}
  
  function updateUI(){
    const ch=protons-electrons; chargeD.textContent=ch>0?`+${ch}`:ch;
    if(ch===0){chargeD.className='charge-val neutral'; typeL.textContent='⚛️ neutral atom'; typeL.style.color='#3a628c'}
    else if(ch>0){chargeD.className='charge-val positive'; typeL.textContent='✨ cation (+)'; typeL.style.color='#10b981'}
    else{chargeD.className='charge-val negative'; typeL.textContent='💫 anion (−)'; typeL.style.color='#f59e0b'}
  }
  
  function change(d){electrons=Math.max(0,Math.min(20,electrons+d)); updateUI()}
  
  function draw(){
    ctx.clearRect(0,0,w,h); const cx=w/2,cy=h/2,ch=protons-electrons; time+=0.012;
    ctx.beginPath(); ctx.arc(cx,cy,20,0,2*Math.PI); ctx.fillStyle='#ef4444'; ctx.shadowColor='#ef444480'; ctx.shadowBlur=16; ctx.fill(); ctx.shadowBlur=0;
    ctx.fillStyle='#fff'; ctx.font='bold 12px system-ui'; ctx.textAlign='center'; ctx.fillText(`${protons}p⁺`,cx,cy+4);
    const caps=[2,8,8,2]; let rem=electrons; caps.forEach((cap,i)=>{const cnt=Math.min(rem,cap); if(cnt<=0)return; const rad=50+i*32;
      ctx.beginPath(); ctx.arc(cx,cy,rad,0,2*Math.PI); ctx.strokeStyle='#3b82f620'; ctx.lineWidth=1.5; ctx.setLineDash([3,5]); ctx.stroke(); ctx.setLineDash([]);
      for(let j=0;j<cnt;j++){const a=(j/Math.max(cnt,1))*2*Math.PI+time*(1/(i+1)),ex=cx+Math.cos(a)*rad,ey=cy+Math.sin(a)*rad;
        ctx.beginPath(); ctx.arc(ex,ey,4.5,0,2*Math.PI); ctx.fillStyle='#3b82f6'; ctx.shadowColor='#3b82f6'; ctx.shadowBlur=10; ctx.fill()} rem-=cnt}); ctx.shadowBlur=0;
    if(ch!==0){ctx.font='bold 60px system-ui'; ctx.textAlign='center'; ctx.fillStyle=ch>0?'#10b98120':'#f59e0b20'; ctx.fillText(ch>0?'+':'−',cx,cy+18)}
    requestAnimationFrame(draw);
  }
  
  document.getElementById('gainBtn').onclick=()=>change(1); document.getElementById('loseBtn').onclick=()=>change(-1);
  window.onresize=resize; resize(); updateUI(); draw();
})();
</script>
</body>
</html>
