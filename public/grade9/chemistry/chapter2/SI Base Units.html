<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>📐 SI units · 3D</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:system-ui,sans-serif;background:#fff;min-height:100dvh;padding:12px}
    .grid{display:grid;grid-template-columns:1fr;gap:16px;max-width:1200px;margin:0 auto}
    @media(min-width:800px){.grid{grid-template-columns:1.6fr 1fr}}
    h2{font-weight:700;font-size:1.4rem;color:#0a1e3c;margin-bottom:16px}
    .units-panel{background:#fafcff;border-radius:24px;border:1px solid #d0e2ff;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.04)}
    .units-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:14px}
    .unit-card{background:#fff;border-radius:18px;padding:16px 8px;border:2px solid #d0e2ff;cursor:pointer;text-align:center;transition:0.15s}
    .unit-card.selected{border-color:#3b82f6;background:#eef4ff}
    .cube{width:80px;height:80px;margin:0 auto 10px;perspective:400px}
    .cube-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.5s}
    .face{position:absolute;width:100%;height:100%;background:#3b82f620;border:2px solid #3b82f6;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:700;color:#3b82f6}
    .front{transform:translateZ(40px)} .back{transform:rotateY(180deg)translateZ(40px)}
    .right{transform:rotateY(90deg)translateZ(40px)} .left{transform:rotateY(-90deg)translateZ(40px)}
    .top{transform:rotateX(90deg)translateZ(40px)} .bottom{transform:rotateX(-90deg)translateZ(40px)}
    .unit-symbol{font-size:1.4rem;font-weight:700;color:#3b82f6}
    .unit-name{font-weight:600;margin-top:4px}
    .speaker{position:absolute;top:6px;right:6px;font-size:1.1rem;cursor:pointer;color:#3a628c}
    .control-panel{display:flex;flex-direction:column;gap:16px}
    .info-card{background:#f0f6ff;border-radius:20px;padding:18px;border-left:4px solid #3b82f6}
    .drag-area{background:#fff;border-radius:20px;padding:16px;border:1px dashed #3b82f6}
    .drag-symbols{display:flex;flex-wrap:wrap;gap:10px;margin:12px 0;justify-content:center}
    .drag-item{background:#3b82f6;color:#fff;font-size:1.4rem;font-weight:700;padding:10px 18px;border-radius:14px;cursor:grab;user-select:none;box-shadow:0 4px 0 #1e4a8b}
    .drag-item:active{cursor:grabbing;opacity:0.8;transform:translateY(2px);box-shadow:0 2px 0 #1e4a8b}
    .drag-item.matched{opacity:0.4;pointer-events:none;background:#10b981;box-shadow:0 4px 0 #0b6e4f}
    .btn{background:#3b82f6;color:#fff;border:none;padding:14px;border-radius:40px;font-weight:700;font-size:0.9rem;cursor:pointer;width:100%}
    .btn-outline{background:#fff;border:1.5px solid #d0e2ff;color:#3a628c}
    .btn:active{scale:0.97}
    .feedback{background:#fef9e7;padding:12px;border-radius:16px;font-weight:500;border-left:4px solid #f59e0b}
    .flex-row{display:flex;gap:8px;flex-wrap:wrap}
    .flex-row .btn{flex:1}
    .legend{display:flex;gap:16px;justify-content:center;margin-top:12px;font-size:0.8rem;color:#3a628c}
  </style>
</head>
<body>
<div class="grid">
  <div class="units-panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 style="margin:0">⚡ seven base units</h2>
      <button class="btn" style="width:auto;padding:10px 18px" id="rotateAll">↻ rotate all</button>
    </div>
    <div class="units-grid" id="unitsGrid"></div>
  </div>
  <div class="control-panel">
    <div class="info-card">
      <div style="font-weight:700;color:#3b82f6;margin-bottom:8px">📖 unit info</div>
      <div id="unitDetail">👆 tap a cube</div>
    </div>
    <div class="drag-area">
      <div style="font-weight:600;margin-bottom:8px">🧩 drag symbol → cube</div>
      <div class="drag-symbols" id="dragContainer"></div>
      <button class="btn-outline" id="resetDrag">↻ reset game</button>
    </div>
    <div class="flex-row">
      <button class="btn" id="speakBtn">🔊 pronounce</button>
      <button class="btn" id="factBtn">💡 fact</button>
    </div>
    <div class="feedback" id="feedbackMsg">✨ ready</div>
    <div class="legend">
      <span>● tap cube · drag symbol</span>
    </div>
  </div>
</div>
<script>
(function(){
  const units=[
    {id:'meter',name:'Meter',sym:'m',q:'Length',ex:'door ~2 m',fact:'1/10M of equator-pole',pron:'mee-ter'},
    {id:'kilogram',name:'Kilogram',sym:'kg',q:'Mass',ex:'flour ~1 kg',fact:'prototype until 2019',pron:'kil-uh-gram'},
    {id:'second',name:'Second',sym:'s',q:'Time',ex:'heartbeat ~1 s',fact:'cesium-133',pron:'sek-und'},
    {id:'ampere',name:'Ampere',sym:'A',q:'Current',ex:'charger ~1 A',fact:'Ampère',pron:'am-peer'},
    {id:'kelvin',name:'Kelvin',sym:'K',q:'Temp',ex:'ice 273 K',fact:'absolute zero',pron:'kel-vin'},
    {id:'mole',name:'Mole',sym:'mol',q:'Amount',ex:'12g C = 1 mol',fact:'6.022×10²³',pron:'mohl'},
    {id:'candela',name:'Candela',sym:'cd',q:'Light',ex:'candle ~1 cd',fact:'latin candle',pron:'kan-del-uh'}
  ];
  let selected='meter';
  const grid=document.getElementById('unitsGrid'),detail=document.getElementById('unitDetail');
  const dragC=document.getElementById('dragContainer'),feedback=document.getElementById('feedbackMsg');
  
  function showInfo(u){detail.innerHTML=`<strong style="color:#3b82f6">${u.name} (${u.sym})</strong><br>📏 ${u.q}<br>🌍 ${u.ex}<br>💡 ${u.fact}`}
  function speak(u){if(window.speechSynthesis){const ut=new SpeechSynthesisUtterance(u.name);ut.rate=0.9;window.speechSynthesis.cancel();window.speechSynthesis.speak(ut);feedback.textContent=`🔊 ${u.name} (${u.pron})`}}
  
  function build(){
    grid.innerHTML='';
    units.forEach((u,i)=>{
      const c=document.createElement('div');c.className='unit-card'+(i===0?' selected':'');
      c.dataset.id=u.id;
      c.innerHTML=`<div class="cube"><div class="cube-inner" id="cube-${u.id}">
        <div class="face front">${u.sym}</div><div class="face back">${u.sym}</div><div class="face right">${u.sym}</div>
        <div class="face left">${u.sym}</div><div class="face top">${u.sym}</div><div class="face bottom">SI</div>
      </div></div><div class="unit-symbol">${u.sym}</div><div class="unit-name">${u.name}</div>
      <span class="speaker" data-id="${u.id}">🔊</span>`;
      c.addEventListener('click',e=>{if(e.target.classList.contains('speaker'))return;
        document.querySelectorAll('.unit-card').forEach(x=>x.classList.remove('selected'));c.classList.add('selected');
        selected=u.id;showInfo(u);feedback.textContent=`🔍 ${u.name}`});
      c.querySelector('.speaker').addEventListener('click',e=>{e.stopPropagation();speak(u)});
      grid.appendChild(c);
    });
    showInfo(units[0]);
  }
  
  function buildDrag(){
    dragC.innerHTML='';
    units.forEach(u=>{const s=document.createElement('span');s.className='drag-item';s.textContent=u.sym;
      s.dataset.id=u.id;s.draggable=true;s.ondragstart=e=>{e.dataTransfer.setData('text/plain',u.id)};dragC.appendChild(s)});
  }
  
  function setupDrop(){
    document.querySelectorAll('.unit-card').forEach(c=>{c.addEventListener('dragover',e=>e.preventDefault());
      c.addEventListener('drop',e=>{e.preventDefault();const id=e.dataTransfer.getData('text/plain');
        const target=c.dataset.id;const el=[...dragC.children].find(x=>x.dataset.id===id);
        if(id===target){if(el&&!el.classList.contains('matched')){el.classList.add('matched');el.draggable=false}
          feedback.textContent=`✅ ${target} matched`;c.style.boxShadow='0 0 16px #10b981';setTimeout(()=>c.style.boxShadow='',500)}
        else{feedback.textContent=`❌ ${id} ≠ ${target}`;c.style.boxShadow='0 0 16px #ef4444';setTimeout(()=>c.style.boxShadow='',400)}})});
  }
  
  function rotateCube(id){const c=document.getElementById(`cube-${id}`);if(c){c.style.transform=`rotateX(${Math.random()*360}deg) rotateY(${Math.random()*360}deg)`}}
  function rotateAll(){units.forEach(u=>rotateCube(u.id));feedback.textContent='🔄 rotated'}
  
  document.getElementById('rotateAll').addEventListener('click',rotateAll);
  document.getElementById('resetDrag').addEventListener('click',()=>{[...dragC.children].forEach(e=>{e.classList.remove('matched');e.draggable=true});feedback.textContent='🔄 game reset'});
  document.getElementById('speakBtn').addEventListener('click',()=>{const u=units.find(x=>x.id===selected);if(u)speak(u)});
  document.getElementById('factBtn').addEventListener('click',()=>{const u=units[Math.floor(Math.random()*units.length)];feedback.textContent=`💡 ${u.name}: ${u.fact}`});
  
  build();buildDrag();setupDrop();
})();
</script>
</body>
</html>
