<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🔢 scientific notation</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:system-ui,sans-serif;background:#fff;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:12px}
    .card{max-width:600px;width:100%;background:#fafcff;border-radius:28px;border:1px solid #d0e2ff;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.04)}
    h2{font-weight:700;font-size:1.4rem;color:#0a1e3c;margin-bottom:4px}
    .sub{color:#3a628c;font-size:0.8rem;margin-bottom:16px}
    .modes{display:flex;gap:8px;margin-bottom:16px}
    .mode{flex:1;padding:12px;border-radius:40px;border:1.5px solid #d0e2ff;background:#fff;font-weight:600;cursor:pointer;color:#3a628c}
    .mode.active{background:#3b82f6;border-color:#3b82f6;color:#fff}
    canvas{display:block;width:100%;height:70px;background:#f8fcff;border-radius:16px;border:1px solid #d0e2ff;margin-bottom:16px}
    .digits{background:#f0f6ff;border-radius:40px;padding:12px 16px;border:1.5px solid #d0e2ff;overflow-x:auto;display:flex;justify-content:center;margin-bottom:20px}
    .digit-container{display:flex;align-items:center}
    .digit{font-family:'JetBrains Mono',monospace;font-size:1.8rem;font-weight:700;color:#0a1e3c;padding:0 2px}
    .gap{width:20px;height:40px;margin:0 4px;display:flex;align-items:center;justify-content:center;border-radius:8px;cursor:pointer}
    .gap:active{background:#d0e2ff}
    .dot{width:12px;height:12px;background:#3b82f6;border-radius:50%;box-shadow:0 0 0 3px rgba(59,130,246,0.2)}
    .result{background:#f0f6ff;border-radius:20px;padding:20px;text-align:center;border-left:4px solid #3b82f6}
    .sci{font-size:1.8rem;font-weight:700;color:#0a1e3c}
    .exp{color:#f59e0b;font-size:1.2rem;vertical-align:super}
    .status{font-size:0.8rem;font-weight:600;padding:4px 12px;border-radius:40px;display:inline-block;margin-top:8px}
    .ok{background:#d1fae5;color:#065f46}
    .warn{background:#fef3c7;color:#92400e}
    @media(max-width:500px){.digit{font-size:1.4rem}.sci{font-size:1.4rem}}
  </style>
</head>
<body>
<div class="card">
  <h2>🔢 scientific notation</h2>
  <div class="sub">tap gaps · move decimal</div>
  <div class="modes">
    <button class="mode active" data-mode="large">📈 large</button>
    <button class="mode" data-mode="small">📉 small</button>
  </div>
  <canvas id="magCanvas"></canvas>
  <div class="digits"><div class="digit-container" id="digitStrip"></div></div>
  <div class="result">
    <div class="sci" id="sciOutput">6.022 × 10<span class="exp" id="expValue">9</span></div>
    <div id="statusMsg" class="status ok">✓ proper notation</div>
  </div>
</div>
<script>
(function(){
  const canvas=document.getElementById('magCanvas'),ctx=canvas.getContext('2d');
  const strip=document.getElementById('digitStrip'),sciOut=document.getElementById('sciOutput');
  const expSpan=document.getElementById('expValue'),statusMsg=document.getElementById('statusMsg');
  let mode='large',digits=[],decimal=9,DPR=devicePixelRatio||1;
  
  function setMode(m){
    mode=m;
    document.querySelectorAll('.mode').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));
    digits=m==='large'?"6022000000".split(""):"0000000125".split("");
    decimal=m==='large'?digits.length:1;
    render();
  }
  
  function firstSig(){return digits.findIndex(d=>d!=='0')}
  
  function compute(){
    const sig=firstSig();
    if(sig===-1)return{mantissa:'0',exponent:0};
    const mantDigits=digits.slice(sig);
    const exp=mode==='large'?decimal-(sig+1):decimal-(sig+1);
    let mant=mantDigits[0];
    if(mantDigits.length>1)mant+='.'+mantDigits.slice(1).join('').replace(/0+$/,'');
    if(mant.endsWith('.'))mant=mant.slice(0,-1);
    return{mantissa:mant,exponent:exp};
  }
  
  function update(){
    const {mantissa,exponent}=compute(),sig=firstSig(),proper=sig+1;
    sciOut.innerHTML=`${mantissa} × 10<span class="exp">${exponent}</span>`;
    expSpan.textContent=exponent;
    if(decimal===proper){statusMsg.textContent='✓ proper notation';statusMsg.className='status ok'}
    else{statusMsg.textContent=`⚠ move after '${digits[sig]}'`;statusMsg.className='status warn'}
    drawMag(exponent);
  }
  
  function drawMag(exp){
    const w=canvas.width=canvas.offsetWidth*DPR,h=canvas.height=canvas.offsetHeight*DPR;
    canvas.style.width=canvas.offsetWidth+'px';canvas.style.height=canvas.offsetHeight+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
    ctx.clearRect(0,0,w/DPR,h/DPR);
    const cnt=Math.abs(exp),r=12,sp=32,start=(w/DPR-cnt*sp)/2;
    ctx.shadowBlur=12;ctx.shadowColor=exp>=0?'#3b82f6':'#ef4444';ctx.fillStyle=exp>=0?'#3b82f6':'#ef4444';
    for(let i=0;i<cnt;i++){ctx.beginPath();ctx.arc(start+i*sp,h/DPR/2,r,0,2*Math.PI);ctx.fill()}
    ctx.shadowBlur=0;ctx.fillStyle='#64748b';ctx.font='11px system-ui';ctx.textAlign='center';
    ctx.fillText(exp===0?'10⁰':`10${exp>0?'⁺':''}${exp}`,w/DPR/2,h/DPR-8);
  }
  
  function render(){
    strip.innerHTML='';
    const addGap=p=>{
      const g=document.createElement('div');g.className='gap';g.dataset.pos=p;
      if(p===decimal){const d=document.createElement('div');d.className='dot';g.appendChild(d)}
      g.addEventListener('click',()=>{decimal=+g.dataset.pos;render()});
      strip.appendChild(g);
    };
    addGap(0);
    digits.forEach((d,i)=>{const s=document.createElement('span');s.className='digit';s.textContent=d;strip.appendChild(s);addGap(i+1)});
    update();
  }
  
  document.querySelectorAll('.mode').forEach(b=>b.addEventListener('click',()=>setMode(b.dataset.mode)));
  window.addEventListener('resize',()=>{const exp=compute().exponent;drawMag(exp)});
  setMode('large');
})();
</script>
</body>
</html>
