<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>📏 sig figs · measurement</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:system-ui,sans-serif;background:#fff;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:12px}
    .card{max-width:600px;width:100%;background:#fafcff;border-radius:28px;border:1px solid #d0e2ff;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.04)}
    h2{font-weight:700;font-size:1.3rem;color:#0a1e3c;margin-bottom:12px}
    canvas{display:block;width:100%;aspect-ratio:16/5;background:#f8fcff;border-radius:16px;border:1px solid #d0e2ff;margin:16px 0}
    .readout{background:#f0f6ff;border-radius:40px;padding:18px;text-align:center;font-size:1.8rem;font-weight:600;margin:16px 0}
    .certain{color:#3b82f6;border-bottom:3px solid #3b82f6}
    .uncertain{color:#f59e0b;border-bottom:3px dashed #f59e0b}
    select{width:100%;padding:14px;border-radius:40px;border:1.5px solid #d0e2ff;background:#fff;font-size:1rem;margin:12px 0}
    .slider-item{display:flex;flex-direction:column;gap:8px;margin-top:12px}
    .slider-head{display:flex;justify-content:space-between;font-weight:500}
    input[type=range]{width:100%;height:5px;background:#d4e2fa;border-radius:10px;-webkit-appearance:none;appearance:none}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;background:#3b82f6;border-radius:22px;border:3px solid #fff;cursor:grab}
    .legend{display:flex;gap:20px;justify-content:center;margin-top:16px;font-size:0.8rem;color:#3a628c}
  </style>
</head>
<body>
<div class="card">
  <h2>📏 significant figures</h2>
  <canvas id="rulerCanvas"></canvas>
  <div class="readout" id="readout"><span class="certain" id="certainPart">42.3</span><span class="uncertain" id="uncertainPart">5</span> cm</div>
  <select id="precisionSelect">
    <option value="10">10 units · low precision</option>
    <option value="1">1 unit · standard</option>
    <option value="0.1" selected>0.1 units · high precision</option>
  </select>
  <div class="slider-item">
    <div class="slider-head"><span>📍 measurement</span><span id="sliderValue">42.35</span></div>
    <input type="range" id="measureSlider" min="0" max="100" value="42.35" step="0.01">
  </div>
  <div class="legend"><span>● certain</span><span style="color:#f59e0b">● estimated</span></div>
</div>
<script>
(function(){
  const canvas=document.getElementById('rulerCanvas'),ctx=canvas.getContext('2d');
  const slider=document.getElementById('measureSlider'),sliderVal=document.getElementById('sliderValue');
  const select=document.getElementById('precisionSelect'),certainSpan=document.getElementById('certainPart'),uncertainSpan=document.getElementById('uncertainPart');
  let w=0,h=0,DPR=devicePixelRatio||1;
  
  function resize(){const r=canvas.parentElement.getBoundingClientRect();w=r.width;h=r.width*5/16;canvas.width=w*DPR;canvas.height=h*DPR;canvas.style.width=w+'px';canvas.style.height=h+'px';ctx.setTransform(DPR,0,0,DPR,0,0)}
  
  function draw(){
    ctx.clearRect(0,0,w,h);
    const val=parseFloat(slider.value),prec=parseFloat(select.value);
    sliderVal.textContent=val.toFixed(2);
    
    ctx.fillStyle='#3b82f6';ctx.fillRect(0,h*0.25,(val/100)*w,h*0.25);
    ctx.fillStyle='#1e293b';ctx.fillRect(0,h*0.6,w,h*0.3);
    
    ctx.strokeStyle='#fff';ctx.fillStyle='#fff';ctx.font='11px system-ui';ctx.textAlign='center';
    for(let i=0;i<=100;i+=prec){
      const x=(i/100)*w;let tick=8;
      if(i%10===0)tick=20;
      ctx.beginPath();ctx.moveTo(x,h*0.6);ctx.lineTo(x,h*0.6+tick);ctx.stroke();
      if(i%10===0)ctx.fillText(i,x,h*0.6+32);
    }
    
    const arrowX=(val/100)*w;
    ctx.strokeStyle='#ef4444';ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(arrowX,h*0.15);ctx.lineTo(arrowX,h*0.65);ctx.stroke();
    
    let decimals=prec===0.1?2:(prec===1?1:0),formatted=val.toFixed(decimals);
    if(decimals===0){certainSpan.textContent=formatted;uncertainSpan.textContent=''}else{certainSpan.textContent=formatted.slice(0,-1);uncertainSpan.textContent=formatted.slice(-1)}
  }
  
  slider.addEventListener('input',draw);select.addEventListener('change',draw);
  window.addEventListener('resize',()=>{resize();draw()});
  resize();draw();
})();
</script>
</body>
</html>
