<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>📐 area & volume · derived units</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-page: #ffffff;
      --surface: #fafcff;
      --border-light: #d0e2ff;
      --text-dark: #0a1e3c;
      --text-soft: #3a628c;
      --accent: #3b82f6;
      --area: #ec4899;
      --volume: #10b981;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-page);
      color: var(--text-dark);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .app-card {
      width: 100%;
      max-width: 800px;
      background: var(--surface);
      border-radius: 28px;
      border: 1px solid var(--border-light);
      box-shadow: 0 12px 30px rgba(0, 60, 130, 0.04);
      padding: 28px 24px;
    }

    h2 {
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.02em;
      color: var(--text-dark);
      margin-bottom: 6px;
    }

    .subhead {
      color: var(--text-soft);
      margin-bottom: 24px;
      font-size: 0.9rem;
    }

    canvas {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #ffffff;
      border-radius: 20px;
      border: 1px solid var(--border-light);
      touch-action: none;
      cursor: grab;
    }

    canvas:active { cursor: grabbing; }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin: 20px 0;
    }

    .stat-card {
      background: #f8fcff;
      padding: 16px 8px;
      border-radius: 18px;
      border: 1px solid var(--border-light);
      text-align: center;
    }

    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-soft);
    }

    .stat-value {
      font-size: 1.4rem;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
    }

    .dim-value { color: var(--accent); }
    .area-value { color: var(--area); }
    .volume-value { color: var(--volume); }

    .sliders {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
    }

    .slider-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .slider-header {
      display: flex;
      justify-content: space-between;
      font-weight: 500;
      font-size: 0.85rem;
    }

    input[type="range"] {
      width: 100%;
      height: 5px;
      background: #d4e2fa;
      border-radius: 5px;
      appearance: none;
      -webkit-appearance: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: var(--accent);
      border-radius: 18px;
      border: 3px solid white;
      cursor: grab;
    }

    .legend {
      display: flex;
      gap: 24px;
      justify-content: center;
      margin-top: 16px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: var(--text-soft);
    }

    @media (max-width: 600px) {
      .stats-grid { gap: 8px; }
      .stat-value { font-size: 1.1rem; }
      .sliders { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="app-card">
  <h2>📐 derived units</h2>
  <div class="subhead">1D length → 2D area → 3D volume</div>

  <canvas id="cubeCanvas"></canvas>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">dimensions</div>
      <div class="stat-value dim-value" id="dimDisplay">5 × 4 × 3</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">surface area</div>
      <div class="stat-value area-value" id="areaDisplay">94.0</div>
      <div style="font-size:0.7rem; color:var(--text-soft);">units²</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">volume</div>
      <div class="stat-value volume-value" id="volumeDisplay">60.0</div>
      <div style="font-size:0.7rem; color:var(--text-soft);">units³</div>
    </div>
  </div>

  <div class="sliders">
    <div class="slider-item">
      <div class="slider-header"><span>length (X)</span><span id="lenVal">5.0</span></div>
      <input type="range" id="lenSlider" min="1" max="8" value="5" step="0.5">
    </div>
    <div class="slider-item">
      <div class="slider-header"><span>width (Y)</span><span id="widVal">4.0</span></div>
      <input type="range" id="widSlider" min="1" max="8" value="4" step="0.5">
    </div>
    <div class="slider-item">
      <div class="slider-header"><span>height (Z)</span><span id="heiVal">3.0</span></div>
      <input type="range" id="heiSlider" min="1" max="8" value="3" step="0.5">
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><span style="color:var(--accent); opacity:0.3;">▣</span> top</div>
    <div class="legend-item"><span style="color:var(--area); opacity:0.4;">▣</span> right</div>
    <div class="legend-item"><span style="color:var(--volume); opacity:0.4;">▣</span> front</div>
  </div>
</div>

<script>
  (function(){
    const canvas = document.getElementById('cubeCanvas');
    const ctx = canvas.getContext('2d');
    
    const lenSlider = document.getElementById('lenSlider');
    const widSlider = document.getElementById('widSlider');
    const heiSlider = document.getElementById('heiSlider');
    const lenVal = document.getElementById('lenVal');
    const widVal = document.getElementById('widVal');
    const heiVal = document.getElementById('heiVal');
    const dimDisplay = document.getElementById('dimDisplay');
    const areaDisplay = document.getElementById('areaDisplay');
    const volumeDisplay = document.getElementById('volumeDisplay');
    
    let width = 0, height = 0;
    const DPR = devicePixelRatio || 1;
    
    let rotationY = 0.3, rotationX = -0.2;
    let isDragging = false, lastX = 0, lastY = 0;
    
    function resizeCanvas() {
      const rect = canvas.parentElement.getBoundingClientRect();
      width = rect.width;
      height = rect.width * 9 / 16;
      canvas.width = width * DPR;
      canvas.height = height * DPR;
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
    
    function updateUI() {
      const l = parseFloat(lenSlider.value);
      const w = parseFloat(widSlider.value);
      const h = parseFloat(heiSlider.value);
      
      lenVal.textContent = l.toFixed(1);
      widVal.textContent = w.toFixed(1);
      heiVal.textContent = h.toFixed(1);
      dimDisplay.textContent = `${l.toFixed(1)} × ${w.toFixed(1)} × ${h.toFixed(1)}`;
      
      const area = 2 * (l*w + l*h + w*h);
      const volume = l * w * h;
      areaDisplay.textContent = area.toFixed(1);
      volumeDisplay.textContent = volume.toFixed(1);
      
      return { l, w, h };
    }
    
    class Vec3 {
      constructor(x,y,z){ this.x=x; this.y=y; this.z=z; }
      rotateX(a){ const c=Math.cos(a), s=Math.sin(a); return new Vec3(this.x, this.y*c-this.z*s, this.y*s+this.z*c); }
      rotateY(a){ const c=Math.cos(a), s=Math.sin(a); return new Vec3(this.x*c+this.z*s, this.y, -this.x*s+this.z*c); }
      project(){ const s = 600/(600-this.z); return { x: width/2 + this.x*s, y: height/2 + this.y*s }; }
    }
    
    function draw() {
      ctx.clearRect(0, 0, width, height);
      
      const { l, w, h } = updateUI();
      const scale = 28;
      const L = l * scale, W = w * scale, H = h * scale;
      
      const vertices = [
        new Vec3(-L/2, -H/2, -W/2), new Vec3( L/2, -H/2, -W/2), new Vec3( L/2,  H/2, -W/2), new Vec3(-L/2,  H/2, -W/2),
        new Vec3(-L/2, -H/2,  W/2), new Vec3( L/2, -H/2,  W/2), new Vec3( L/2,  H/2,  W/2), new Vec3(-L/2,  H/2,  W/2)
      ];
      
      const proj = vertices.map(v => v.rotateY(rotationY).rotateX(rotationX).project());
      
      const faces = [
        { idx: [0,1,2,3], color: '#3b82f620', stroke: '#3b82f6' },
        { idx: [4,5,6,7], color: '#3b82f610', stroke: '#3b82f6' },
        { idx: [1,5,6,2], color: '#ec489920', stroke: '#ec4899' },
        { idx: [0,4,7,3], color: '#10b98120', stroke: '#10b981' },
        { idx: [3,2,6,7], color: '#3b82f618', stroke: '#3b82f6' },
        { idx: [0,1,5,4], color: '#10b98118', stroke: '#10b981' }
      ];
      
      faces.sort((a,b) => {
        const az = a.idx.reduce((s,i) => s + vertices[i].z, 0)/4;
        const bz = b.idx.reduce((s,i) => s + vertices[i].z, 0)/4;
        return az - bz;
      });
      
      faces.forEach(f => {
        ctx.beginPath();
        ctx.moveTo(proj[f.idx[0]].x, proj[f.idx[0]].y);
        for (let i=1; i<4; i++) ctx.lineTo(proj[f.idx[i]].x, proj[f.idx[i]].y);
        ctx.closePath();
        ctx.fillStyle = f.color;
        ctx.fill();
        ctx.strokeStyle = f.stroke;
        ctx.lineWidth = 2;
        ctx.stroke();
      });
    }
    
    function animate() {
      draw();
      requestAnimationFrame(animate);
    }
    
    canvas.addEventListener('pointerdown', e => {
      isDragging = true;
      lastX = e.clientX; lastY = e.clientY;
      canvas.setPointerCapture(e.pointerId);
    });
    
    canvas.addEventListener('pointermove', e => {
      if (!isDragging) return;
      rotationY += (e.clientX - lastX) * 0.006;
      rotationX += (e.clientY - lastY) * 0.005;
      lastX = e.clientX; lastY = e.clientY;
    });
    
    canvas.addEventListener('pointerup', () => isDragging = false);
    
    [lenSlider, widSlider, heiSlider].forEach(s => s.addEventListener('input', draw));
    window.addEventListener('resize', () => { resizeCanvas(); draw(); });
    
    resizeCanvas();
    animate();
  })();
</script>
</body>
</html>
