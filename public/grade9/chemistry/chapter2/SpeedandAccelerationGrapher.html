<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🏎️ kinematics · v & a</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:system-ui,sans-serif;background:#fff;min-height:100dvh;padding:12px}
    .card{max-width:700px;margin:0 auto;background:#fafcff;border-radius:28px;border:1px solid #d0e2ff;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.04)}
    h2{font-weight:700;font-size:1.3rem;color:#0a1e3c;margin-bottom:16px}
    .track{background:#e8f2ff;height:90px;border-radius:20px;border:2px solid #d0e2ff;margin-bottom:16px;position:relative;overflow:hidden}
    #car{position:absolute;bottom:14px;left:0;width:60px;height:30px;background:#3b82f6;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 12px rgba(59,130,246,0.3);transition:left 0.05s}
    .charts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}
    .chart-box{background:#f8fcff;border-radius:16px;padding:10px;border:1px solid #d0e2ff}
    canvas{width:100%;height:120px;background:#fff;border-radius:12px}
    .sliders{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}
    .slider-item{display:flex;flex-direction:column;gap:6px}
    .slider-head{display:flex;justify-content:space-between;font-weight:500;font-size:0.85rem}
    input[type=range]{width:100%;height:5px;background:#d4e2fa;border-radius:10px;-webkit-appearance:none;appearance:none}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;background:#3b82f6;border-radius:20px;border:3px solid #fff;cursor:grab}
    .stats{display:flex;justify-content:space-around;background:#f0f6ff;border-radius:20px;padding:16px;margin:16px 0}
    .stat{text-align:center}.stat-label{font-size:0.7rem;color:#3a628c}.stat-val{font-size:1.3rem;font-weight:700;color:#3b82f6}
    .btns{display:flex;gap:10px}.btn{flex:1;padding:14px;border-radius:40px;border:none;font-weight:700;font-size:1rem;cursor:pointer;background:#3b82f6;color:#fff}.btn-outline{background:#fff;border:1.5px solid #d0e2ff;color:#3a628c}.btn:active{scale:0.97}
  </style>
</head>
<body>
<div class="card">
  <h2>🏎️ kinematics · v = u + at</h2>
  <div class="track"><div id="car">🏎️</div><div style="position:absolute;bottom:4px;width:100%;height:2px;background:repeating-linear-gradient(90deg,#3b82f6 0 10px,transparent 10px 20px)"></div></div>
  <div class="charts">
    <div class="chart-box"><div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><span style="width:10px;height:10px;background:#10b981;border-radius:10px"></span>velocity</div><canvas id="vCanvas"></canvas></div>
    <div class="chart-box"><div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><span style="width:10px;height:10px;background:#ef4444;border-radius:10px"></span>acceleration</div><canvas id="aCanvas"></canvas></div>
  </div>
  <div class="sliders">
    <div class="slider-item"><div class="slider-head"><span>🚀 u (m/s)</span><span id="uVal">0</span></div><input type="range" id="uSlider" min="0" max="30" value="0"></div>
    <div class="slider-item"><div class="slider-head"><span>⚡ a (m/s²)</span><span id="aVal">2</span></div><input type="range" id="aSlider" min="-8" max="8" value="2" step="0.5"></div>
  </div>
  <div class="stats"><div class="stat"><div class="stat-label">time</div><div class="stat-val" id="timeDisp">0.00</div></div><div class="stat"><div class="stat-label">velocity</div><div class="stat-val" id="velDisp">0.0</div></div><div class="stat"><div class="stat-label">distance</div><div class="stat-val" id="distDisp">0.0</div></div></div>
  <div class="btns"><button class="btn-outline" id="resetBtn">↻ reset</button><button class="btn" id="playBtn">▶ start</button></div>
</div>
<script>
(function(){
  const vCanvas=document.getElementById('vCanvas'),aCanvas=document.getElementById('aCanvas'),vCtx=vCanvas.getContext('2d'),aCtx=aCanvas.getContext('2d'),car=document.getElementById('car');
  const uSlider=document.getElementById('uSlider'),aSlider=document.getElementById('aSlider'),uVal=document.getElementById('uVal'),aVal=document.getElementById('aVal');
  const timeDisp=document.getElementById('timeDisp'),velDisp=document.getElementById('velDisp'),distDisp=document.getElementById('distDisp'),playBtn=document.getElementById('playBtn');
  let isRunning=false,time=0,u=0,a=2,vel=0,dist=0,vHist=[],aHist=[],anim=null,DPR=devicePixelRatio||1;
  
  function resize(){[vCanvas,aCanvas].forEach(c=>{const r=c.parentElement.getBoundingClientRect();c.width=r.width*DPR;c.height=120*DPR;c.style.width=r.width+'px';c.getContext('2d').setTransform(DPR,0,0,DPR,0,0)})}
  
  function drawChart(ctx,data,color,maxY){
    const w=ctx.canvas.width/DPR,h=ctx.canvas.height/DPR;ctx.clearRect(0,0,w,h);ctx.strokeStyle='#d0e2ff';ctx.lineWidth=0.5;
    for(let i=0;i<w;i+=35){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,h);ctx.stroke()}
    if(data.length<2)return;ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2.5;
    data.forEach((p,i)=>{const x=(i/199)*w,y=h/2-(p.v/maxY)*(h*0.4);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});ctx.stroke()
  }
  
  function updateUI(){uVal.textContent=u; aVal.textContent=a; timeDisp.textContent=time.toFixed(2); velDisp.textContent=vel.toFixed(1); distDisp.textContent=Math.max(0,dist).toFixed(1)}
  
  function physics(dt){vel=u+a*time; dist=u*time+0.5*a*time*time; vHist.push({v:vel}); aHist.push({v:a}); if(vHist.length>200)vHist.shift(); if(aHist.length>200)aHist.shift()}
  
  function render(){if(!isRunning)return; time+=0.016; physics(); updateUI();
    const track=document.querySelector('.track').offsetWidth; car.style.left=Math.min(track-60,Math.max(0,(dist*8)%(track+100)))+'px';
    drawChart(vCtx,vHist,'#10b981',Math.max(30,Math.max(...vHist.map(p=>Math.abs(p.v)))+2));
    drawChart(aCtx,aHist,'#ef4444',Math.max(8,Math.max(...aHist.map(p=>Math.abs(p.v)))+1));
    anim=requestAnimationFrame(render)
  }
  
  function toggle(){isRunning=!isRunning; playBtn.textContent=isRunning?'⏸ pause':'▶ start';
    if(isRunning){u=parseFloat(uSlider.value);a=parseFloat(aSlider.value);render()}else cancelAnimationFrame(anim)}
  
  function reset(){isRunning=false;cancelAnimationFrame(anim);time=0;vel=0;dist=0;u=parseFloat(uSlider.value);a=parseFloat(aSlider.value);
    vHist=[{v:u}];aHist=[{v:a}];car.style.left='0';updateUI();playBtn.textContent='▶ start';
    drawChart(vCtx,vHist,'#10b981',30);drawChart(aCtx,aHist,'#ef4444',8)}
  
  uSlider.oninput=()=>{u=parseFloat(uSlider.value);uVal.textContent=u;if(!isRunning){vel=u;vHist=[{v:u}];drawChart(vCtx,vHist,'#10b981',30)}};
  aSlider.oninput=()=>{a=parseFloat(aSlider.value);aVal.textContent=a;if(!isRunning){aHist=[{v:a}];drawChart(aCtx,aHist,'#ef4444',8)}};
  playBtn.onclick=toggle;document.getElementById('resetBtn').onclick=reset;
  window.onresize=()=>{resize(); if(!isRunning){drawChart(vCtx,vHist,'#10b981',30);drawChart(aCtx,aHist,'#ef4444',8)}};
  resize();vHist=[{v:0}];aHist=[{v:2}];updateUI();drawChart(vCtx,vHist,'#10b981',30);drawChart(aCtx,aHist,'#ef4444',8);
})();
</script>
</body>
</html>
