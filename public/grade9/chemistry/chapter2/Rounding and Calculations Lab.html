<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🔢 precision rounding · touch lab</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-page: #ffffff;
      --surface: #fafcff;
      --border-light: #d0e2ff;
      --text-dark: #0a1e3c;
      --text-soft: #3a628c;
      --accent: #3b82f6;
      --marker: #f59e0b;
      --success: #10b981;
      --shadow-card: 0 8px 24px rgba(0,0,0,0.04);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-page);
      color: var(--text-dark);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .app-card {
      width: 100%;
      max-width: 700px;
      background: var(--surface);
      border-radius: 32px;
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow-card);
      padding: 24px;
    }

    h2 {
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.02em;
      color: var(--text-dark);
      margin-bottom: 4px;
    }

    .subhead {
      color: var(--text-soft);
      margin-bottom: 20px;
      font-size: 0.9rem;
    }

    .input-area {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .number-input {
      display: flex;
      align-items: center;
      background: #f0f6ff;
      border-radius: 60px;
      padding: 4px 4px 4px 20px;
      border: 1.5px solid var(--border-light);
    }

    .number-input input {
      flex: 1;
      background: transparent;
      border: none;
      font-size: 1.2rem;
      font-family: 'JetBrains Mono', monospace;
      padding: 12px 0;
      outline: none;
      color: var(--text-dark);
    }

    .number-input button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
    }

    .precision-selector {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 4px;
    }

    .precision-label {
      font-weight: 500;
      color: var(--text-soft);
    }

    .precision-control {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .precision-btn {
      width: 44px;
      height: 44px;
      border-radius: 30px;
      border: 1.5px solid var(--border-light);
      background: white;
      font-size: 22px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
    }

    .precision-btn:active {
      background: var(--accent);
      color: white;
    }

    .precision-value {
      font-weight: 700;
      font-size: 1.1rem;
      min-width: 70px;
      text-align: center;
      color: var(--accent);
    }

    .number-line {
      position: relative;
      height: 120px;
      background: #f8fcff;
      border-radius: 20px;
      margin: 20px 0;
      display: flex;
      align-items: center;
      padding: 0 40px;
      border: 1px solid var(--border-light);
    }

    .line-track {
      width: 100%;
      height: 4px;
      background: #d0e2ff;
      border-radius: 4px;
      position: relative;
    }

    .endpoint {
      position: absolute;
      top: -28px;
      transform: translateX(-50%);
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--accent);
      white-space: nowrap;
    }

    .midpoint {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem;
      color: var(--text-soft);
    }

    #marker {
      position: absolute;
      top: -14px;
      width: 32px;
      height: 32px;
      background: var(--marker);
      border-radius: 50%;
      box-shadow: 0 4px 16px var(--marker);
      border: 3px solid white;
      transition: left 0.4s ease;
      z-index: 10;
      transform: translateX(-50%);
    }

    .result-panel {
      background: #f0f6ff;
      border-radius: 24px;
      padding: 20px;
      text-align: center;
      margin: 16px 0;
    }

    .rounded-value {
      font-size: 2.5rem;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: var(--success);
      margin: 8px 0;
    }

    .explanation {
      color: var(--text-soft);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .insight-btn {
      width: 100%;
      padding: 14px;
      border-radius: 40px;
      border: 1.5px solid var(--border-light);
      background: white;
      font-weight: 600;
      cursor: pointer;
      color: var(--accent);
    }

    .insight-btn:active {
      background: #f0f6ff;
    }

    @media (max-width: 500px) {
      .number-input { flex-direction: column; padding: 12px; gap: 8px; }
      .number-input input { text-align: center; }
      .number-input button { width: 100%; }
    }
  </style>
</head>
<body>

<div class="app-card">
  <h2>🔢 precision rounding</h2>
  <div class="subhead">zoom in · see the rounding decision</div>

  <div class="input-area">
    <div class="number-input">
      <input type="text" id="numberInput" value="3.1415926535" inputmode="decimal">
      <button id="analyzeBtn">analyze</button>
    </div>

    <div class="precision-selector">
      <span class="precision-label">decimal places</span>
      <div class="precision-control">
        <div class="precision-btn" id="precDown">−</div>
        <span class="precision-value" id="precDisplay">2 places</span>
        <div class="precision-btn" id="precUp">+</div>
      </div>
    </div>
  </div>

  <div class="number-line">
    <div class="line-track">
      <span class="endpoint" id="leftEndpoint" style="left:0;">0.00</span>
      <span class="endpoint" id="rightEndpoint" style="left:100%;">1.00</span>
      <span class="midpoint">⚫ midpoint (5)</span>
      <div id="marker"></div>
    </div>
  </div>

  <div class="result-panel">
    <div style="font-size:0.7rem; text-transform:uppercase; color:var(--text-soft);">rounded value</div>
    <div class="rounded-value" id="roundedDisplay">3.14</div>
    <div class="explanation" id="explanationText">
      Looking at the thousandths place (1) → round down
    </div>
  </div>

  <button class="insight-btn" id="insightBtn">💡 learning insight</button>
</div>

<script>
  (function(){
    const numberInput = document.getElementById('numberInput');
    const precDisplay = document.getElementById('precDisplay');
    const leftEndpoint = document.getElementById('leftEndpoint');
    const rightEndpoint = document.getElementById('rightEndpoint');
    const marker = document.getElementById('marker');
    const roundedDisplay = document.getElementById('roundedDisplay');
    const explanationText = document.getElementById('explanationText');
    
    let currentPrecision = 2;
    const maxPrecision = 8;
    
    const placeNames = ['whole', 'tenths', 'hundredths', 'thousandths', 'ten-thousandths', 'hundred-thousandths', 'millionths', 'ten-millionths', 'hundred-millionths'];
    
    function updatePrecisionDisplay() {
      precDisplay.textContent = `${currentPrecision} ${currentPrecision === 1 ? 'place' : 'places'}`;
    }
    
    function analyze() {
      const inputStr = numberInput.value.trim();
      const val = parseFloat(inputStr);
      
      if (isNaN(val)) {
        roundedDisplay.textContent = '—';
        explanationText.textContent = 'Please enter a valid number';
        return;
      }
      
      // calculate rounded value
      const rounded = val.toFixed(currentPrecision);
      roundedDisplay.textContent = rounded;
      
      // calculate boundaries for zoomed view
      const factor = Math.pow(10, currentPrecision);
      const floor = Math.floor(val * factor) / factor;
      const ceil = floor + 1 / factor;
      
      leftEndpoint.textContent = floor.toFixed(currentPrecision);
      rightEndpoint.textContent = ceil.toFixed(currentPrecision);
      
      // marker position
      const range = ceil - floor;
      let percent = range > 0 ? ((val - floor) / range) * 100 : 50;
      percent = Math.max(-2, Math.min(102, percent));
      marker.style.left = percent + '%';
      
      // explanation
      const parts = inputStr.split('.');
      let msg = '';
      
      if (parts.length < 2 || parts[1].length <= currentPrecision) {
        msg = `The number already has ≤ ${currentPrecision} decimal places. No rounding needed.`;
      } else {
        const criticalDigit = parts[1][currentPrecision];
        const criticalNum = parseInt(criticalDigit);
        const direction = criticalNum >= 5 ? 'up' : 'down';
        const placeName = placeNames[currentPrecision] || `${currentPrecision}th`;
        
        msg = `Looking at the ${placeName} place: <strong>${criticalDigit}</strong> → round ${direction}.`;
      }
      
      explanationText.innerHTML = msg;
    }
    
    document.getElementById('precUp').addEventListener('click', () => {
      if (currentPrecision < maxPrecision) {
        currentPrecision++;
        updatePrecisionDisplay();
        analyze();
      }
    });
    
    document.getElementById('precDown').addEventListener('click', () => {
      if (currentPrecision > 0) {
        currentPrecision--;
        updatePrecisionDisplay();
        analyze();
      }
    });
    
    document.getElementById('analyzeBtn').addEventListener('click', analyze);
    numberInput.addEventListener('change', analyze);
    
    document.getElementById('insightBtn').addEventListener('click', () => {
      alert('📐 ROUNDING INSIGHT\n\n' +
            '• As you increase decimal places, you are "zooming in" on a smaller slice of the number line.\n\n' +
            '• The marker shows exactly where your number falls between two possible rounded values.\n\n' +
            '• Standard rounding: ≥ 5 rounds up, < 5 rounds down.\n\n' +
            '• This is the same logic used in calculators, spreadsheets, and scientific measurements.');
    });
    
    // initial
    updatePrecisionDisplay();
    analyze();
  })();
</script>
</body>
</html>
