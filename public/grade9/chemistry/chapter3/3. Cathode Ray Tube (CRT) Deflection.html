<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>⚡ crt · e/m deflection</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:system-ui,sans-serif;background:#fff;min-height:100dvh;padding:12px}
    .grid{display:grid;grid-template-columns:1fr;gap:16px;max-width:900px;margin:0 auto}
    @media(min-width:700px){.grid{grid-template-columns:1fr 260px}}
    h2{font-weight:700;font-size:1.3rem;color:#0a1e3c;margin-bottom:12px}
    .panel{background:#fafcff;border-radius:24px;border:1px solid #d0e2ff;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.04)}
    canvas{display:block;width:100%;aspect-ratio:16/10;background:#f8fcff;border-radius:16px;border:1px solid #d0e2ff}
    .mode-btn{display:flex;gap:8px;margin-bottom:16px}
    .btn{flex:1;padding:12px;border-radius:40px;border:1.5px solid #d0e2ff;background:#fff;font-weight:600;cursor:pointer;color:#3a628c}
    .btn.active{background:#3b82f6;border-color:#3b82f6;color:#fff}
    .slider-item{margin:16px 0}
    .slider-head{display:flex;justify-content:space-between;font-weight:500;margin-bottom:4px}
    input[type=range]{width:100%;height:5px;background:#d4e2fa;border-radius:10px;-webkit-appearance:none;appearance:none}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;background:#3b82f6;border-radius:20px;border:3px solid #fff;cursor:grab}
    .impact{background:#f0f6ff;border-radius:16px;padding:16px;text-align:center}
    .impact-val{font-size:2rem;font-weight:700;color:#3b82f6}
    .notes{font-size:0.85rem;color:#3a628c;margin-top:12px}
    .legend{display:flex;gap:16px;margin-top:12px;font-size:0.8rem}
  </style>
</head>
<body>
<div class="grid">
  <div class="panel">
    <h2>⚡ electron beam · crt</h2>
    <canvas id="crtCanvas"></canvas>
    <div class="legend"><span style="color:#3b82f6">● electron</span><span style="color:#ef4444">▬ plates</span></div>
  </div>
  <div>
    <div class="panel">
      <div class="mode-btn"><button class="btn active" data-mode="E">⚡ electric</button><button class="btn" data-mode="M">🧲 magnetic</button></div>
      <div class="slider-item"><div class="slider-head"><span>field strength</span><span id="fieldVal">0</span></div><input type="range" id="fieldSlider" min="-15" max="15" value="0"></div>
      <div class="slider-item"><div class="slider-head"><span>beam speed</span><span id="speedVal">10</span></div><input type="range" id="speedSlider" min="5" max="18" value="10"></div>
      <div class="impact"><div style="font-size:0.8rem;color:#3a628c">deflection</div><div class="impact-val" id="deflectDisplay">0.0</div><div>mm</div></div>
      <button class="btn-outline" id="clearBtn" style="width:100%;margin-top:12px;padding:12px;border-radius:40px;background:#fff;border:1.5px solid #d0e2ff;font-weight:600;color:#3a628c">🗑️ clear beam</button>
    </div>
    <div class="panel" style="margin-top:16px">
      <div class="notes" id="theoryText"><strong>⚡ electric field</strong> · parabolic path · e⁻ bends toward + plate</div>
    </div>
  </div>
</div>
<script>
(function(){
  const canvas=document.getElementById('crtCanvas'),ctx=canvas.getContext('2d');
  let mode='E',particles=[],w=0,h=0,DPR=devicePixelRatio||1,frame=0;
  const fieldS=document.getElementById('fieldSlider'),speedS=document.getElementById('speedSlider');
  const fieldV=document.getElementById('fieldVal'),speedV=document.getElementById('speedVal'),defD=document.getElementById('deflectDisplay'),theory=document.getElementById('theoryText');
  
  function resize(){const r=canvas.parentElement.getBoundingClientRect();w=r.width;h=r.width*10/16;canvas.width=w*DPR;canvas.height=h*DPR;canvas.style.width=w+'px';canvas.style.height=h+'px';ctx.setTransform(DPR,0,0,DPR,0,0)}
  
  class Particle{
    constructor(){this.x=20; this.y=h/2; this.vx=parseFloat(speedS.value)*0.9; this.vy=0; this.history=[]; this.active=true}
    update(){
      this.history.push({x:this.x,y:this.y}); if(this.history.length>35)this.history.shift();
      const str=parseFloat(fieldS.value),pStart=w*0.2,pEnd=w*0.65;
      if(this.x>pStart&&this.x<pEnd&&Math.abs(str)>0.2){
        if(mode==='E')this.vy+=str*0.045;
        else{const a=Math.atan2(this.vy,this.vx),f=str*0.018; this.vx-=Math.sin(a)*f; this.vy+=Math.cos(a)*f}
      }
      this.x+=this.vx; this.y+=this.vy;
      if(this.x>=w-15){this.active=false; defD.textContent=((h/2-this.y)*0.8).toFixed(1)}
    }
    draw(){
      ctx.beginPath(); ctx.strokeStyle=mode==='E'?'#3b82f6':'#10b981'; ctx.lineWidth=2;
      this.history.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y)); ctx.stroke();
      ctx.beginPath(); ctx.arc(this.x,this.y,3.5,0,2*Math.PI); ctx.fillStyle='#3b82f6'; ctx.shadowColor='#3b82f6'; ctx.shadowBlur=10; ctx.fill(); ctx.shadowBlur=0;
    }
  }
  
  function setMode(m){
    mode=m; document.querySelectorAll('[data-mode]').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));
    theory.innerHTML=m==='E'?'<strong>⚡ electric field</strong> · parabolic path · e⁻ bends toward + plate':'<strong>🧲 magnetic field</strong> · circular arc · force ⟂ velocity';
  }
  
  function draw(){
    ctx.fillStyle='#f8fcff'; ctx.fillRect(0,0,w,h);
    ctx.fillStyle='#334155'; ctx.beginPath(); ctx.rect(5,h/2-8,22,14); ctx.fill();
    const pStart=w*0.2,pWidth=w*0.45; ctx.fillStyle='#64748b'; ctx.fillRect(pStart,h/2-48,pWidth,6); ctx.fillRect(pStart,h/2+42,pWidth,6);
    const str=parseFloat(fieldS.value); if(Math.abs(str)>1){ctx.strokeStyle='#3b82f620'; for(let x=pStart;x<pStart+pWidth;x+=22){ctx.beginPath();ctx.moveTo(x,h/2-35);ctx.lineTo(x,h/2+28);ctx.stroke()}}
    ctx.fillStyle='#1e293b'; ctx.fillRect(w-12,h/2-40,6,80);
    if(frame%2===0)particles.push(new Particle());
    particles=particles.filter(p=>{p.update();p.draw();return p.active}); frame++;
    requestAnimationFrame(draw);
  }
  
  fieldS.oninput=()=>fieldV.textContent=fieldS.value;
  speedS.oninput=()=>speedV.textContent=speedS.value;
  document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>setMode(b.dataset.mode));
  document.getElementById('clearBtn').onclick=()=>{particles=[]; defD.textContent='0.0'};
  window.onresize=resize;
  resize(); setMode('E'); draw();
})();
</script>
</body>
</html>
