<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>⚛️ bohr · quantum jumps</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:system-ui,sans-serif;background:#fff;min-height:100dvh;padding:12px}
    .grid{display:grid;grid-template-columns:1fr;gap:16px;max-width:900px;margin:0 auto}
    @media(min-width:700px){.grid{grid-template-columns:1fr 260px}}
    h2{font-weight:700;font-size:1.3rem;color:#0a1e3c;margin-bottom:12px}
    .panel{background:#fafcff;border-radius:24px;border:1px solid #d0e2ff;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.04)}
    canvas{display:block;width:100%;aspect-ratio:1/1;background:#f8fcff;border-radius:50%;border:2px solid #d0e2ff;touch-action:none}
    .state-card{background:#f0f6ff;border-radius:18px;padding:16px;border-left:4px solid #3b82f6}
    .row{display:flex;justify-content:space-between;padding:6px 0;font-weight:500}
    .val{font-weight:700;color:#3b82f6}
    .photon-card{background:#fff;border-radius:16px;padding:14px;border:1px solid #d0e2ff;margin-top:12px}
    .color-bar{height:8px;border-radius:8px;margin:8px 0;background:#e2e8f0}
    .spectrum{height:30px;background:linear-gradient(to right,#8b5cf6,#3b82f6,#10b981,#f59e0b,#ef4444);border-radius:15px;margin:12px 0;position:relative}
    .line{position:absolute;top:-3px;bottom:-3px;width:3px;border-radius:3px;box-shadow:0 0 8px}
    .btn{width:100%;padding:14px;border-radius:40px;border:none;font-weight:700;background:#3b82f6;color:#fff;cursor:pointer}
    .btn-outline{background:#fff;border:1.5px solid #d0e2ff;color:#3a628c;margin-top:8px}
    .legend{display:flex;gap:16px;justify-content:center;margin-top:12px;font-size:0.8rem}
  </style>
</head>
<body>
<div class="grid">
  <div class="panel">
    <h2>⚛️ bohr atom · tap rings</h2>
    <canvas id="bohrCanvas"></canvas>
    <div class="legend"><span style="color:#ef4444">● nucleus</span><span style="color:#f59e0b">● electron</span><span>👆 tap to jump</span></div>
  </div>
  <div>
    <div class="panel">
      <div class="state-card">
        <div class="row"><span>quantum n</span><span class="val" id="nDisplay">n = 1</span></div>
        <div class="row"><span>energy</span><span class="val" id="eDisplay">-13.6 eV</span></div>
        <div class="row"><span>state</span><span class="val" id="stateDisplay">ground</span></div>
      </div>
      <div class="photon-card">
        <div class="row"><span>transition</span><span id="transDisplay">—</span></div>
        <div class="row"><span>wavelength</span><span id="waveDisplay">— nm</span></div>
        <div class="color-bar" id="colorBar"></div>
        <span id="colorName">—</span>
      </div>
    </div>
    <div class="panel" style="margin-top:16px">
      <div style="font-weight:600;margin-bottom:8px">🌈 emission spectrum</div>
      <div class="spectrum" id="spectrumBar"></div>
      <button class="btn-outline" id="clearBtn">🗑️ clear</button>
    </div>
  </div>
</div>
<script>
(function(){
  const canvas=document.getElementById('bohrCanvas'),ctx=canvas.getContext('2d');
  let w=0,h=0,DPR=devicePixelRatio||1,n=1,angle=0,r=45,baseR=45,spacing=34,photons=[],lines=new Set();
  const nD=document.getElementById('nDisplay'),eD=document.getElementById('eDisplay'),sD=document.getElementById('stateDisplay');
  const tD=document.getElementById('transDisplay'),wD=document.getElementById('waveDisplay'),cBar=document.getElementById('colorBar'),cName=document.getElementById('colorName');
  const spec=document.getElementById('spectrumBar');
  
  function resize(){const rect=canvas.parentElement.getBoundingClientRect();w=rect.width;h=w;canvas.width=w*DPR;canvas.height=h*DPR;canvas.style.width=w+'px';canvas.style.height=h+'px';ctx.setTransform(DPR,0,0,DPR,0,0)}
  
  function energy(n){return -13.6/(n*n)}
  function getRadius(n){return baseR+(n-1)*spacing}
  function updateUI(){
    nD.textContent=`n = ${n}`; eD.textContent=energy(n).toFixed(2)+' eV'; sD.textContent=n===1?'ground':'excited';
  }
  
  function wavelengthToColor(nm){
    if(nm<400)return '#a855f7'; if(nm<480)return '#3b82f6'; if(nm<560)return '#10b981'; if(nm<620)return '#f59e0b'; return '#ef4444';
  }
  
  function getData(from,to){
    const dE=Math.abs(energy(from)-energy(to)),nm=1240/dE;
    let color=wavelengthToColor(nm),name='visible'; if(nm<380){color='#a855f7';name='uv'} if(nm>750){color='#991b1b';name='ir'}
    return{nm:Math.round(nm),color,name};
  }
  
  function jump(target){
    if(target===n)return;
    const old=n; n=target; updateUI();
    if(target<old){
      const d=getData(old,target); tD.textContent=`n=${old}→${target}`; wD.textContent=`${d.nm} nm`; cBar.style.background=d.color; cName.textContent=d.name;
      photons.push({angle,color:d.color,life:1,startR:getRadius(old)});
      if(d.name==='visible'&&!lines.has(d.nm)){lines.add(d.nm); const l=document.createElement('div'); l.className='line'; l.style.background=d.color; l.style.color=d.color; l.style.left=Math.min(100,Math.max(0,((d.nm-380)/370)*100))+'%'; spec.appendChild(l)}
    }
  }
  
  function draw(){
    ctx.clearRect(0,0,w,h); const cx=w/2,cy=h/2;
    ctx.beginPath(); ctx.arc(cx,cy,12,0,2*Math.PI); ctx.fillStyle='#ef4444'; ctx.shadowColor='#ef444480'; ctx.shadowBlur=16; ctx.fill(); ctx.shadowBlur=0;
    for(let i=1;i<=6;i++){const rad=getRadius(i); ctx.beginPath(); ctx.arc(cx,cy,rad,0,2*Math.PI); ctx.strokeStyle=i===n?'#3b82f6':'#cbd5e1'; ctx.lineWidth=i===n?2.5:1; ctx.setLineDash(i===n?[]:[4,6]); ctx.stroke(); ctx.fillStyle='#64748b'; ctx.font='10px system-ui'; ctx.fillText(`n=${i}`,cx+rad+5,cy-3)}
    ctx.setLineDash([]);
    const targetR=getRadius(n); r+=(targetR-r)*0.07; angle+=0.016/Math.sqrt(n);
    const ex=cx+Math.cos(angle)*r,ey=cy+Math.sin(angle)*r;
    photons=photons.filter(p=>{p.life-=0.01; if(p.life<=0)return false; const dist=(1-p.life)*180,px=cx+Math.cos(p.angle)*(p.startR+dist),py=cy+Math.sin(p.angle)*(p.startR+dist);
      ctx.beginPath(); ctx.moveTo(px,py); for(let t=0;t<18;t++){ctx.lineTo(px+Math.cos(p.angle)*t,py+Math.sin(p.angle)*t+Math.sin(t*0.4)*5)} ctx.strokeStyle=p.color; ctx.lineWidth=2.5; ctx.globalAlpha=p.life; ctx.stroke(); return true});
    ctx.globalAlpha=1; ctx.beginPath(); ctx.arc(ex,ey,6,0,2*Math.PI); ctx.fillStyle='#f59e0b'; ctx.shadowColor='#f59e0b80'; ctx.shadowBlur=14; ctx.fill(); ctx.shadowBlur=0;
    requestAnimationFrame(draw);
  }
  
  canvas.addEventListener('click',e=>{
    const rect=canvas.getBoundingClientRect(),x=(e.clientX-rect.left)*(w/rect.width),y=(e.clientY-rect.top)*(h/rect.height);
    const dist=Math.hypot(x-w/2,y-h/2);
    for(let i=1;i<=6;i++){if(Math.abs(dist-getRadius(i))<20){jump(i); break}}
  });
  document.getElementById('clearBtn').onclick=()=>{spec.innerHTML=''; lines.clear()};
  window.onresize=()=>{resize()};
  resize(); updateUI(); draw();
})();
</script>
</body>
</html>
