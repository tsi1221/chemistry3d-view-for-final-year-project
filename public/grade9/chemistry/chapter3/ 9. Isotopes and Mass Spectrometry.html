<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🧬 mass spec · isotopes</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:system-ui,sans-serif;background:#fff;min-height:100dvh;padding:12px}
    .grid{display:grid;grid-template-columns:1fr;gap:16px;max-width:900px;margin:0 auto}
    @media(min-width:700px){.grid{grid-template-columns:280px 1fr}}
    h2{font-weight:700;font-size:1.3rem;color:#0a1e3c;margin-bottom:16px}
    .panel{background:#fafcff;border-radius:24px;border:1px solid #d0e2ff;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.04)}
    .isotope-card{background:#f0f6ff;border-radius:18px;padding:18px;border-left:4px solid #3b82f6}
    .row{display:flex;justify-content:space-between;padding:8px 0;font-weight:500}
    .val{font-weight:700;color:#3b82f6;font-size:1.2rem}
    .btn-group{display:flex;gap:8px;margin:16px 0}
    .btn{flex:1;padding:14px;border-radius:40px;border:none;font-weight:700;font-size:1rem;cursor:pointer;background:#3b82f6;color:#fff}
    .btn-outline{background:#fff;border:1.5px solid #d0e2ff;color:#3a628c}
    .btn-fire{background:#ef4444;color:#fff}
    .btn:active{scale:0.97}
    canvas{display:block;width:100%;aspect-ratio:16/10;background:#f8fcff;border-radius:20px;border:1px solid #d0e2ff}
    .legend{display:flex;gap:16px;margin-top:12px;font-size:0.8rem}
    .formula{font-size:0.8rem;color:#3a628c;margin-top:12px}
  </style>
</head>
<body>
<div class="grid">
  <div class="panel">
    <h2>⚛️ carbon isotopes</h2>
    <div class="isotope-card">
      <div class="row"><span>protons</span><span class="val">6</span></div>
      <div class="row"><span>neutrons</span><span class="val" id="nDisplay">6</span></div>
      <div class="row"><span>mass (A)</span><span class="val" id="mDisplay">12</span></div>
      <div class="row"><span>isotope</span><span class="val" id="isoDisplay" style="color:#3b82f6">¹²C</span></div>
    </div>
    <div class="btn-group">
      <button class="btn-outline" id="nDown">− neutron</button>
      <button class="btn-outline" id="nUp">+ neutron</button>
    </div>
    <button class="btn btn-fire" id="fireBtn">🔥 fire ion</button>
    <button class="btn-outline" id="clearBtn" style="margin-top:8px">🗑️ clear</button>
    <div class="formula">r = mv/qB · heavier = wider arc</div>
    <div class="legend"><span style="color:#3b82f6">● ¹²C</span><span style="color:#f59e0b">● ¹³C</span><span style="color:#8b5cf6">● ¹⁴C</span></div>
  </div>
  <div class="panel" style="padding:12px"><canvas id="specCanvas"></canvas></div>
</div>
<script>
(function(){
  const canvas=document.getElementById('specCanvas'),ctx=canvas.getContext('2d');
  let neutrons=6,particles=[],DPR=devicePixelRatio||1,w=0,h=0;
  const nDisplay=document.getElementById('nDisplay'),mDisplay=document.getElementById('mDisplay'),isoDisplay=document.getElementById('isoDisplay');
  
  function resize(){const r=canvas.parentElement.getBoundingClientRect();w=r.width;h=r.width*10/16;canvas.width=w*DPR;canvas.height=h*DPR;canvas.style.width=w+'px';canvas.style.height=h+'px';ctx.setTransform(DPR,0,0,DPR,0,0)}
  
  function updateUI(){
    const mass=6+neutrons; nDisplay.textContent=neutrons; mDisplay.textContent=mass;
    let iso='¹²C',col='#3b82f6'; if(neutrons===7){iso='¹³C';col='#f59e0b'}else if(neutrons===8){iso='¹⁴C';col='#8b5cf6'}
    isoDisplay.textContent=iso; isoDisplay.style.color=col;
  }
  
  function fire(){
    const mass=6+neutrons,color=neutrons===6?'#3b82f6':(neutrons===7?'#f59e0b':'#8b5cf6');
    particles.push({x:30,y:h*0.75,vx:5.5,vy:0,mass,color,trail:[],active:true});
  }
  
  function draw(){
    ctx.clearRect(0,0,w,h); ctx.fillStyle='#e8f2ff'; ctx.fillRect(0,0,w*0.22,h);
    ctx.fillStyle='#f0f6ff'; ctx.fillRect(w*0.22,0,w*0.78,h);
    ctx.strokeStyle='#3b82f6'; ctx.lineWidth=2; ctx.setLineDash([6,6]); ctx.beginPath(); ctx.moveTo(w*0.22,0); ctx.lineTo(w*0.22,h); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle='#10b981'; ctx.fillRect(w-12,h*0.2,8,h*0.6);
    
    particles=particles.filter(p=>{if(!p.active)return false; if(p.x>w+20||p.y<-20||p.y>h+20){p.active=false;return false} return true});
    particles.forEach(p=>{
      if(p.x>w*0.22){const B=0.1;p.vy-=(1*B)/p.mass*p.vx*0.45}
      p.x+=p.vx; p.y+=p.vy; p.trail.push({x:p.x,y:p.y}); if(p.trail.length>50)p.trail.shift();
      ctx.beginPath(); ctx.strokeStyle=p.color+'80'; ctx.lineWidth=2;
      p.trail.forEach((pt,i)=>i===0?ctx.moveTo(pt.x,pt.y):ctx.lineTo(pt.x,pt.y)); ctx.stroke();
      ctx.beginPath(); ctx.arc(p.x,p.y,5,0,2*Math.PI); ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=12; ctx.fill(); ctx.shadowBlur=0;
    });
    requestAnimationFrame(draw);
  }
  
  document.getElementById('nUp').onclick=()=>{neutrons=Math.min(8,neutrons+1);updateUI()};
  document.getElementById('nDown').onclick=()=>{neutrons=Math.max(6,neutrons-1);updateUI()};
  document.getElementById('fireBtn').onclick=fire;
  document.getElementById('clearBtn').onclick=()=>{particles=[]};
  window.onresize=()=>{resize()};
  resize(); updateUI(); draw();
})();
</script>
</body>
</html>
