<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>📐 heisenberg · uncertainty</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:system-ui,sans-serif;background:#fff;min-height:100dvh;padding:12px}
    .grid{display:grid;grid-template-columns:1fr;gap:16px;max-width:900px;margin:0 auto}
    @media(min-width:700px){.grid{grid-template-columns:1fr 260px}}
    h2{font-weight:700;font-size:1.3rem;color:#0a1e3c;margin-bottom:12px}
    .panel{background:#fafcff;border-radius:24px;border:1px solid #d0e2ff;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.04)}
    canvas{display:block;width:100%;aspect-ratio:16/10;background:#f8fcff;border-radius:16px;border:1px solid #d0e2ff;touch-action:none}
    .slider-item{margin:16px 0}
    .slider-head{display:flex;justify-content:space-between;font-weight:500;margin-bottom:4px}
    input[type=range]{width:100%;height:5px;background:#d4e2fa;border-radius:10px;-webkit-appearance:none;appearance:none}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;background:#3b82f6;border-radius:20px;border:3px solid #fff;cursor:grab}
    .telemetry{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
    .stat{background:#f0f6ff;border-radius:14px;padding:14px;text-align:center}
    .stat-label{font-size:0.7rem;color:#3a628c}.stat-val{font-size:1.4rem;font-weight:700;color:#3b82f6}
    .notes{font-size:0.85rem;color:#3a628c;line-height:1.5}.formula{font-size:1.1rem;text-align:center;margin:10px 0}
    .legend{display:flex;gap:16px;margin-top:12px;font-size:0.8rem}
  </style>
</head>
<body>
<div class="grid">
  <div class="panel">
    <h2>📐 heisenberg uncertainty</h2>
    <canvas id="qCanvas"></canvas>
    <div class="legend"><span style="color:#3b82f6">● electron</span><span style="color:#f59e0b">◯ measurement (Δx)</span></div>
  </div>
  <div>
    <div class="panel">
      <div class="slider-item"><div class="slider-head"><span>🎯 Δx precision</span><span id="precVal">70</span></div><input type="range" id="precSlider" min="8" max="130" value="70"></div>
      <div class="telemetry"><div class="stat"><div class="stat-label">Δx</div><div class="stat-val" id="dxDisplay">70</div></div><div class="stat"><div class="stat-label">Δp</div><div class="stat-val" id="dpDisplay">0.0</div></div></div>
      <button class="btn-outline" id="resetBtn" style="width:100%;padding:14px;border-radius:40px;background:#fff;border:1.5px solid #d0e2ff;font-weight:600;color:#3a628c">↻ reset</button>
    </div>
    <div class="panel" style="margin-top:16px">
      <div class="notes"><strong>💡 principle</strong><br>Measuring position precisely requires high‑energy photons, which kick the electron.</div>
      <div class="formula">Δx · Δp ≥ ℏ/2</div>
      <div class="notes">smaller Δx → larger Δp</div>
    </div>
  </div>
</div>
<script>
(function(){
  const canvas=document.getElementById('qCanvas'),ctx=canvas.getContext('2d');
  let w=0,h=0,DPR=devicePixelRatio||1,e={x:0,y:0,vx:2,vy:1.5,hist:[]},mouse={x:0,y:0,active:!1};
  const precS=document.getElementById('precSlider'),precV=document.getElementById('precVal'),dxD=document.getElementById('dxDisplay'),dpD=document.getElementById('dpDisplay');
  
  function resize(){const r=canvas.parentElement.getBoundingClientRect();w=r.width;h=r.width*10/16;canvas.width=w*DPR;canvas.height=h*DPR;canvas.style.width=w+'px';canvas.style.height=h+'px';ctx.setTransform(DPR,0,0,DPR,0,0);e.x=w/2;e.y=h/2}
  
  function updateUI(){const p=parseInt(precS.value);precV.textContent=p;dxD.textContent=p}
  
  function draw(){
    ctx.fillStyle='#f8fcff'; ctx.fillRect(0,0,w,h);
    const p=parseInt(precS.value); updateUI();
    if(mouse.active){
      const dx=e.x-mouse.x,dy=e.y-mouse.y,dist=Math.hypot(dx,dy);
      if(dist<p){const j=(130-p)*0.03; e.vx+=(Math.random()-0.5)*j; e.vy+=(Math.random()-0.5)*j; dpD.textContent=(j*7).toFixed(1)}else dpD.textContent='0.0';
    }
    e.x+=e.vx; e.y+=e.vy; e.vx*=0.992; e.vy*=0.992;
    if(e.x<5||e.x>w-5)e.vx*=-0.9; if(e.y<5||e.y>h-5)e.vy*=-0.9;
    e.x=Math.min(w-5,Math.max(5,e.x)); e.y=Math.min(h-5,Math.max(5,e.y));
    e.hist.push({x:e.x,y:e.y}); if(e.hist.length>30)e.hist.shift();
    ctx.beginPath(); ctx.strokeStyle='#3b82f660'; ctx.lineWidth=2; e.hist.forEach((pt,i)=>i===0?ctx.moveTo(pt.x,pt.y):ctx.lineTo(pt.x,pt.y)); ctx.stroke();
    const grad=ctx.createRadialGradient(e.x,e.y,0,e.x,e.y,12); grad.addColorStop(0,'#60a5fa'); grad.addColorStop(0.8,'#3b82f6');
    ctx.beginPath(); ctx.arc(e.x,e.y,8,0,2*Math.PI); ctx.fillStyle=grad; ctx.shadowColor='#3b82f6'; ctx.shadowBlur=14; ctx.fill(); ctx.shadowBlur=0;
    if(mouse.active){ctx.beginPath(); ctx.arc(mouse.x,mouse.y,p,0,2*Math.PI); ctx.strokeStyle='#f59e0b'; ctx.lineWidth=2; ctx.setLineDash([6,6]); ctx.stroke(); ctx.setLineDash([]);
      ctx.beginPath(); ctx.moveTo(mouse.x-12,mouse.y); ctx.lineTo(mouse.x+12,mouse.y); ctx.moveTo(mouse.x,mouse.y-12); ctx.lineTo(mouse.x,mouse.y+12); ctx.strokeStyle='#fbbf24'; ctx.lineWidth=1.5; ctx.stroke()}
    requestAnimationFrame(draw);
  }
  
  canvas.addEventListener('mousemove',e=>{const r=canvas.getBoundingClientRect(); mouse.x=(e.clientX-r.left)*(w/r.width); mouse.y=(e.clientY-r.top)*(h/r.height); mouse.active=!0});
  canvas.addEventListener('mouseleave',()=>{mouse.active=!1; dpD.textContent='0.0'});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0],r=canvas.getBoundingClientRect(); mouse.x=(t.clientX-r.left)*(w/r.width); mouse.y=(t.clientY-r.top)*(h/r.height); mouse.active=!0});
  canvas.addEventListener('touchend',()=>{mouse.active=!1; dpD.textContent='0.0'});
  document.getElementById('resetBtn').onclick=()=>{e={x:w/2,y:h/2,vx:(Math.random()-0.5)*2.5,vy:(Math.random()-0.5)*2.5,hist:[]}};
  window.onresize=resize;
  resize(); draw();
})();
</script>
</body>
</html>
