<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Measurement Lab · Subjective vs Objective</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            background: #fafbfc;
            overflow: hidden;
            touch-action: pan-y;
            color: #1a1e2b;
        }
        
        /* Header */
        .app-header {
            padding: 16px 24px;
            background: #ffffff;
            border-bottom: 1px solid #eef2f6;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        
        .app-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .app-title h1 {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #1a1e2b;
        }
        
        .app-title .badge {
            background: #eef2f6;
            color: #5b687c;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        
        /* Tabs */
        .tabs-container {
            padding: 12px 24px 0 24px;
            background: #ffffff;
            border-bottom: 1px solid #eef2f6;
            flex-shrink: 0;
        }
        
        .tab-bar {
            display: flex;
            gap: 8px;
        }
        
        .tab-btn {
            padding: 10px 24px;
            border: none;
            background: transparent;
            color: #7c879c;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            touch-action: manipulation;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .tab-btn:hover {
            color: #1a1e2b;
            background: #f5f7fa;
        }
        
        .tab-btn.active {
            background: #1a1e2b;
            color: white;
        }
        
        /* Main Simulation Area */
        .simulation-container {
            flex-grow: 1;
            background: #fafbfc;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            touch-action: none;
        }
        
        .canvas-card {
            position: relative;
            width: 100%;
            max-width: 1000px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.05);
            border: 1px solid #eef2f6;
            overflow: hidden;
        }
        
        .canvas-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 24 / 10;
        }
        
        #conversionCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
        }
        
        /* Readout Cards */
        .readout-area {
            display: flex;
            gap: 1px;
            background: #eef2f6;
            border-top: 1px solid #eef2f6;
        }
        
        .card {
            flex: 1;
            padding: 20px 24px;
            background: #ffffff;
        }
        
        .local-card {
            border-right: 1px solid #eef2f6;
        }
        
        .card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .card-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        
        .local-card .card-icon {
            background: #fff3e0;
            color: #e67e22;
        }
        
        .standard-card .card-icon {
            background: #e8f5e9;
            color: #2ecc71;
        }
        
        .card h3 {
            font-size: 0.95rem;
            font-weight: 600;
            color: #5b687c;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        
        .val {
            font-family: 'SF Mono', 'Menlo', 'Monaco', 'Cascadia Code', 'Consolas', monospace;
            font-size: 2rem;
            font-weight: 700;
            color: #1a1e2b;
            margin-bottom: 6px;
        }
        
        .standard-card .val {
            color: #2ecc71;
        }
        
        .card small {
            font-size: 0.8rem;
            color: #7c879c;
            display: block;
        }
        
        /* Hint */
        .hint-wrapper {
            padding: 12px 24px 16px 24px;
            text-align: center;
            background: #ffffff;
            border-top: 1px solid #eef2f6;
        }
        
        .hint-text {
            display: inline-block;
            padding: 6px 18px;
            background: #f5f7fa;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #5b687c;
            border: 1px solid #eef2f6;
        }
        
        /* Reset Button */
        .controls-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 24px 14px 24px;
            background: #ffffff;
            border-top: 1px solid #eef2f6;
        }
        
        .control-btn {
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid #eef2f6;
            background: #ffffff;
            font-weight: 500;
            font-size: 0.85rem;
            color: #1a1e2b;
            cursor: pointer;
            transition: all 0.2s ease;
            touch-action: manipulation;
        }
        
        .control-btn:hover {
            background: #f5f7fa;
            border-color: #dce2ec;
        }
        
        /* Mobile Optimizations */
        @media (max-width: 600px) {
            .app-header {
                padding: 12px 16px;
            }
            
            .app-title h1 {
                font-size: 1.1rem;
            }
            
            .tabs-container {
                padding: 8px 16px 0 16px;
            }
            
            .tab-btn {
                padding: 8px 16px;
                font-size: 0.85rem;
            }
            
            .simulation-container {
                padding: 12px;
            }
            
            .readout-area {
                flex-direction: column;
            }
            
            .local-card {
                border-right: none;
                border-bottom: 1px solid #eef2f6;
            }
            
            .card {
                padding: 16px;
            }
            
            .val {
                font-size: 1.6rem;
            }
        }
        
        /* Prevent pull-to-refresh */
        html, body {
            overscroll-behavior: none;
        }
        
        button:focus-visible {
            outline: 2px solid #0066cc;
            outline-offset: 2px;
        }
        
        /* RoundRect polyfill */
        
    </style>
</head>
<body>
    <header class="app-header">
        <div class="app-title">
            <h1>📐 Subjective vs Objective</h1>
            <span class="badge">Measurement Lab</span>
        </div>
    </header>

    <div class="tabs-container">
        <div class="tab-bar">
            <button id="btn-length" class="tab-btn active" data-mode="length">
                <span>📏</span> Length (Hands)
            </button>
            <button id="btn-mass" class="tab-btn" data-mode="mass">
                <span>⚖️</span> Mass (Stones)
            </button>
        </div>
    </div>

    <div class="simulation-container">
        <div class="canvas-card">
            <div class="canvas-wrapper">
                <canvas id="conversionCanvas" width="960" height="400"></canvas>
            </div>
            
            <!-- Readout Cards -->
            <div class="readout-area">
                <div class="card local-card">
                    <div class="card-header">
                        <div class="card-icon">👐</div>
                        <h3>Traditional Count</h3>
                    </div>
                    <div id="local-count" class="val">1 Unit</div>
                    <small>Tap empty space to add · Tap object to remove</small>
                </div>
                <div class="card standard-card">
                    <div class="card-header">
                        <div class="card-icon">🔬</div>
                        <h3>Standard SI Value</h3>
                    </div>
                    <div id="standard-val" class="val">0.45 m</div>
                    <small>The physical quantity remains constant</small>
                </div>
            </div>
            
            <!-- Controls -->
            <div class="controls-bar">
                <button class="control-btn" id="resetBtn">
                    <span>↻</span> Reset to 1 Item
                </button>
            </div>
            
            <!-- Hint -->
            <div class="hint-wrapper">
                <div class="hint-text">
                    <span id="hintMessage">👆 Tap the left side to add · Tap an object to remove</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            return this;
        };
        const canvas = document.getElementById('conversionCanvas');
        const ctx = canvas.getContext('2d');
        
        // Canvas internal dimensions
        const width = 960;
        const height = 400;
        const dividerX = 480;
        
        function resizeCanvas() {
            canvas.width = width;
            canvas.height = height;
        }
        
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        let mode = 'length';
        let items = [{ x: 120, y: 160 }];
        
        function setMode(m) {
            mode = m;
            items = [{ x: 120, y: 160 }];
            
            document.getElementById('btn-length').classList.toggle('active', m === 'length');
            document.getElementById('btn-mass').classList.toggle('active', m === 'mass');
            
            const hint = document.getElementById('hintMessage');
            if (m === 'length') {
                hint.textContent = '👆 Each hand ≈ 0.45 meters · Tap to add/remove hands';
            } else {
                hint.textContent = '👆 Each stone ≈ 7.2 kg · Tap to add/remove stones';
            }
        }
        
        function resetItems() {
            items = [{ x: 120, y: 160 }];
        }

        // Drawing a realistic hand
        function drawHand(x, y) {
            ctx.save();
            ctx.translate(x, y);
            
            // Shadow
            ctx.shadowColor = "rgba(0, 0, 0, 0.1)";
            ctx.shadowBlur = 8;
            ctx.shadowOffsetY = 3;
            
            ctx.fillStyle = "#f5cbad";
            ctx.strokeStyle = "#d49a7a";
            ctx.lineWidth = 2;
            
            // Palm
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(0, -35, 65, -35, 65, 0);
            ctx.lineTo(65, 55);
            ctx.lineTo(0, 55);
            ctx.closePath();
            ctx.fill(); 
            ctx.stroke();
            
            // Fingers
            for(let i = 0; i < 4; i++) {
                ctx.beginPath();
                ctx.roundRect(i * 16, 55, 14, 45, 6);
                ctx.fill(); 
                ctx.stroke();
            }
            
            // Thumb
            ctx.beginPath();
            ctx.roundRect(-15, 20, 18, 30, 6);
            ctx.fill(); 
            ctx.stroke();
            
            ctx.shadowBlur = 0;
            ctx.shadowOffsetY = 0;
            ctx.restore();
        }

        // Drawing a realistic stone
        function drawStone(x, y) {
            ctx.save();
            ctx.translate(x, y);
            
            // Shadow
            ctx.shadowColor = "rgba(0, 0, 0, 0.15)";
            ctx.shadowBlur = 10;
            ctx.shadowOffsetY = 4;
            
            const grad = ctx.createRadialGradient(-8, -8, 3, 0, 0, 30);
            grad.addColorStop(0, "#bdc3c7");
            grad.addColorStop(0.5, "#95a5a6");
            grad.addColorStop(1, "#2c3e50");
            ctx.fillStyle = grad;
            
            ctx.beginPath();
            ctx.moveTo(28, 0);
            ctx.bezierCurveTo(28, 18, 18, 28, 0, 28);
            ctx.bezierCurveTo(-18, 28, -28, 18, -28, 0);
            ctx.bezierCurveTo(-28, -18, -18, -28, 0, -28);
            ctx.bezierCurveTo(18, -28, 28, -18, 28, 0);
            ctx.fill();
            
            // Highlight
            ctx.fillStyle = "rgba(255, 255, 255, 0.15)";
            ctx.beginPath();
            ctx.arc(-8, -8, 10, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.shadowBlur = 0;
            ctx.shadowOffsetY = 0;
            ctx.restore();
        }

        function drawScale(val, unit) {
            // Scale background
            ctx.fillStyle = "#f5f7fa";
            ctx.fillRect(dividerX + 20, 150, 420, 80);
            ctx.strokeStyle = "#cbd5e1";
            ctx.lineWidth = 2;
            ctx.strokeRect(dividerX + 20, 150, 420, 80);
            
            // Value
            ctx.fillStyle = "#2ecc71";
            ctx.font = "600 28px 'SF Mono', Menlo, Monaco, Consolas, monospace";
            ctx.fillText(`${val.toFixed(2)} ${unit}`, dividerX + 45, 200);
            
            // Label
            ctx.fillStyle = "#5b687c";
            ctx.font = "600 13px Inter, sans-serif";
            ctx.fillText("STANDARD SI CONVERSION", dividerX + 45, 140);
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            // Left side background
            ctx.fillStyle = "#fafbfc";
            ctx.fillRect(0, 0, dividerX, height);
            
            // Right side background
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(dividerX, 0, width - dividerX, height);
            
            // Divider line
            ctx.strokeStyle = "#eef2f6";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(dividerX, 20);
            ctx.lineTo(dividerX, height - 20);
            ctx.stroke();
            
            // Section labels
            ctx.fillStyle = "#cbd5e1";
            ctx.font = "500 11px Inter, sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("SUBJECTIVE", dividerX / 2, 30);
            ctx.fillText("OBJECTIVE", dividerX + (width - dividerX) / 2, 30);
            ctx.textAlign = "left";

            // Draw items
            items.forEach(item => {
                if(mode === 'length') drawHand(item.x, item.y);
                else drawStone(item.x, item.y);
            });

            const multiplier = (mode === 'length' ? 0.45 : 7.2);
            const total = items.length * multiplier;
            const unit = (mode === 'length' ? 'm' : 'kg');
            
            drawScale(total, unit);
            
            const unitName = mode === 'length' ? 'Hands' : 'Stones';
            document.getElementById('local-count').innerText = `${items.length} ${unitName}`;
            document.getElementById('standard-val').innerText = `${total.toFixed(2)} ${unit}`;

            requestAnimationFrame(animate);
        }

        // Unified Pointer Events
        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let clientX, clientY;
            
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        function handlePointerDown(e) {
            e.preventDefault();
            
            const coords = getCanvasCoords(e);
            
            if (coords.x > dividerX) return; // Only left side
            
            // Check if clicking existing item
            const hitIndex = items.findIndex(item => {
                const dx = coords.x - item.x;
                const dy = coords.y - item.y;
                return (dx > -25 && dx < 70 && dy > -25 && dy < 85);
            });
            
            if (hitIndex !== -1) {
                items.splice(hitIndex, 1);
            } else {
                if(items.length < 12) {
                    items.push({ x: coords.x - 25, y: coords.y - 35 });
                }
            }
            
            canvas.setPointerCapture(e.pointerId);
        }

        function handlePointerUp(e) {
            e.preventDefault();
            canvas.releasePointerCapture(e.pointerId);
        }

        // Initialize
        canvas.addEventListener('pointerdown', handlePointerDown);
        canvas.addEventListener('pointerup', handlePointerUp);
        canvas.addEventListener('pointercancel', handlePointerUp);
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        
        document.getElementById('btn-length').addEventListener('click', () => setMode('length'));
        document.getElementById('btn-mass').addEventListener('click', () => setMode('mass'));
        document.getElementById('resetBtn').addEventListener('click', resetItems);
        
        // Touch event handlers for buttons
        document.getElementById('btn-length').addEventListener('touchstart', (e) => { e.preventDefault(); setMode('length'); }, { passive: false });
        document.getElementById('btn-mass').addEventListener('touchstart', (e) => { e.preventDefault(); setMode('mass'); }, { passive: false });
        document.getElementById('resetBtn').addEventListener('touchstart', (e) => { e.preventDefault(); resetItems(); }, { passive: false });
        
        animate();
    </script>
</body>
</html>
