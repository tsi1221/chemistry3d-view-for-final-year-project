<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wind Power · Physics Lab</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            background: #fafbfc;
            overflow: hidden;
            touch-action: pan-y;
            color: #1a1e2b;
        }
        
        /* Header */
        .app-header {
            padding: 16px 24px;
            background: #ffffff;
            border-bottom: 1px solid #eef2f6;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        
        .app-title {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .app-title h1 {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #1a1e2b;
        }
        
        .app-title .badge {
            background: #eef2f6;
            color: #5b687c;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        
        /* Main Simulation Area */
        .simulation-container {
            flex-grow: 1;
            background: #fafbfc;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            touch-action: none;
        }
        
        .canvas-card {
            position: relative;
            width: 100%;
            max-width: 1000px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.05);
            border: 1px solid #eef2f6;
            overflow: hidden;
        }
        
        .canvas-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 10;
        }
        
        #physicsCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
        }
        
        /* Hint */
        .hint-wrapper {
            padding: 12px 24px;
            text-align: center;
            background: #ffffff;
            border-top: 1px solid #eef2f6;
        }
        
        .hint-text {
            display: inline-block;
            padding: 6px 18px;
            background: #f5f7fa;
            border-radius: 40px;
            font-size: 0.85rem;
            color: #5b687c;
            border: 1px solid #eef2f6;
        }
        
        /* Reset Button */
        .controls-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 24px 16px 24px;
            background: #ffffff;
            border-top: 1px solid #eef2f6;
        }
        
        .control-btn {
            padding: 10px 24px;
            border-radius: 40px;
            border: 1px solid #eef2f6;
            background: #ffffff;
            font-weight: 500;
            font-size: 0.9rem;
            color: #1a1e2b;
            cursor: pointer;
            transition: all 0.2s ease;
            touch-action: manipulation;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .control-btn:hover {
            background: #f5f7fa;
            border-color: #dce2ec;
        }
        
        .control-btn:active {
            transform: scale(0.96);
        }
        
        /* Mobile Optimizations */
        @media (max-width: 600px) {
            .app-header {
                padding: 12px 16px;
            }
            
            .app-title h1 {
                font-size: 1.1rem;
            }
            
            .simulation-container {
                padding: 16px;
            }
            
            .controls-bar {
                padding: 10px 16px;
            }
        }
        
        html, body {
            overscroll-behavior: none;
        }
        
        button:focus-visible {
            outline: 2px solid #0066cc;
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="app-title">
            <h1>💨 Wind Power Generator</h1>
            <span class="badge">Kinetic → Electrical</span>
        </div>
    </header>

    <div class="simulation-container">
        <div class="canvas-card">
            <div class="canvas-wrapper">
                <canvas id="physicsCanvas" width="800" height="500"></canvas>
            </div>
            
            <!-- Controls -->
            <div class="controls-bar">
                <button class="control-btn" id="resetWindBtn">
                    <span>↻</span> Reset Wind
                </button>
            </div>
            
            <!-- Hint -->
            <div class="hint-wrapper">
                <div class="hint-text">
                    <span id="hintMessage">👆 Drag the cloud toward the turbine to generate power</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('physicsCanvas');
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        const groundY = height - 60;

        // --- State Variables ---
        const windCloud = { 
            x: 100, 
            y: 150, 
            r: 35, 
            isDragging: false,
            initialX: 100,
            initialY: 150
        };
        
        const fan = { x: 500, y: 180, angle: 0, speed: 0 };
        const bulb = { x: 700, y: 180 };
        const obeliskX = 150;

        // --- Unified Pointer Events (Mouse + Touch) ---
        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let clientX, clientY;
            
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }
        
        function handlePointerDown(e) {
            e.preventDefault();
            
            const coords = getCanvasCoords(e);
            const dist = Math.sqrt((coords.x - windCloud.x) ** 2 + (coords.y - windCloud.y) ** 2);
            
            if (dist < windCloud.r * 1.5) {
                windCloud.isDragging = true;
                canvas.setPointerCapture(e.pointerId);
            }
        }
        
        function handlePointerMove(e) {
            e.preventDefault();
            
            if (windCloud.isDragging) {
                const coords = getCanvasCoords(e);
                windCloud.x = Math.max(40, Math.min(width - 40, coords.x));
                windCloud.y = Math.max(40, Math.min(height - 100, coords.y));
            }
        }
        
        function handlePointerUp(e) {
            e.preventDefault();
            windCloud.isDragging = false;
            canvas.releasePointerCapture(e.pointerId);
        }
        
        function resetWind() {
            windCloud.x = windCloud.initialX;
            windCloud.y = windCloud.initialY;
            fan.speed = 0;
        }

        function drawScene() {
            ctx.clearRect(0, 0, width, height);

            // 1. Draw Ground & Obelisk
            ctx.fillStyle = "#2ecc71";
            ctx.fillRect(0, groundY, width, 60);
            
            ctx.fillStyle = "#95a5a6";
            ctx.beginPath();
            ctx.moveTo(obeliskX - 30, groundY);
            ctx.lineTo(obeliskX + 30, groundY);
            ctx.lineTo(obeliskX + 15, groundY - 200);
            ctx.lineTo(obeliskX, groundY - 220);
            ctx.lineTo(obeliskX - 15, groundY - 200);
            ctx.fill();
            ctx.fillStyle = "#2c3e50";
            ctx.font = "14px Inter, Arial, sans-serif";
            ctx.fillText("Axum (Statics)", obeliskX - 45, groundY + 25);

            // 2. Physics Calculation
            const dist = Math.sqrt((windCloud.x - fan.x) ** 2 + (windCloud.y - fan.y) ** 2);
            const effectRadius = 250;
            if (dist < effectRadius) {
                fan.speed = (1 - (dist / effectRadius)) * 0.4;
            } else {
                fan.speed *= 0.95;
            }
            fan.angle += fan.speed;

            // 3. Draw Circuit Wires
            ctx.strokeStyle = "#34495e";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(fan.x, fan.y); 
            ctx.lineTo(fan.x, groundY - 20); 
            ctx.lineTo(bulb.x, groundY - 20);
            ctx.lineTo(bulb.x, bulb.y + 30);
            ctx.stroke();

            // 4. Draw Fan
            ctx.save();
            ctx.translate(fan.x, fan.y);
            ctx.rotate(fan.angle);
            ctx.fillStyle = "#3498db";
            for(let i = 0; i < 3; i++) {
                ctx.beginPath();
                ctx.ellipse(0, 0, 10, 60, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.rotate((Math.PI * 2) / 3);
            }
            ctx.restore();
            
            ctx.fillStyle = "#2c3e50";
            ctx.beginPath(); 
            ctx.arc(fan.x, fan.y, 10, 0, Math.PI*2); 
            ctx.fill();

            // 5. Draw Light Bulb
            const brightness = fan.speed * 5;
            ctx.save();
            ctx.translate(bulb.x, bulb.y);
            
            // Glow effect
            if (brightness > 0.05) {
                const glow = ctx.createRadialGradient(0, 0, 5, 0, 0, 40 * brightness);
                glow.addColorStop(0, `rgba(255, 255, 0, ${brightness})`);
                glow.addColorStop(1, "rgba(255, 255, 0, 0)");
                ctx.fillStyle = glow;
                ctx.beginPath(); 
                ctx.arc(0, 0, 50 * brightness, 0, Math.PI*2); 
                ctx.fill();
            }

            // Bulb Glass
            ctx.strokeStyle = "#333";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0, 0, 25, 0.7 * Math.PI, 0.3 * Math.PI, true);
            ctx.lineTo(10, 30);
            ctx.lineTo(-10, 30);
            ctx.closePath();
            ctx.fillStyle = brightness > 0.1 ? "#f1c40f" : "#ecf0f1";
            ctx.fill();
            ctx.stroke();
            
            // Filament
            if (brightness > 0.1) {
                ctx.strokeStyle = "white";
                ctx.beginPath(); 
                ctx.moveTo(-10, 5); 
                ctx.lineTo(0, -10); 
                ctx.lineTo(10, 5); 
                ctx.stroke();
            }
            ctx.restore();

            // 6. Draw Wind Cloud
            ctx.fillStyle = "#aed6f1";
            ctx.beginPath();
            ctx.arc(windCloud.x, windCloud.y, windCloud.r, 0, Math.PI*2);
            ctx.arc(windCloud.x - 20, windCloud.y + 10, windCloud.r * 0.7, 0, Math.PI*2);
            ctx.arc(windCloud.x + 20, windCloud.y + 10, windCloud.r * 0.7, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#2c3e50";
            ctx.font = "bold 12px Inter, Arial, sans-serif";
            ctx.fillText("WIND", windCloud.x - 17, windCloud.y + 5);

            // 7. Labels
            ctx.fillStyle = "#7f8c8d";
            ctx.font = "14px Inter, Arial, sans-serif";
            ctx.fillText("Kinetic Energy (Wind)", 250, 100);
            ctx.fillText("➞ Electrical Energy (Wire)", 480, groundY - 30);
            
            // Update hint
            const hintEl = document.getElementById('hintMessage');
            if (brightness > 0.5) {
                hintEl.textContent = '✨ Maximum power! The bulb is glowing brightly! ✨';
            } else if (brightness > 0.2) {
                hintEl.textContent = '💡 Good power! Bring the cloud closer for more light!';
            } else if (brightness > 0.05) {
                hintEl.textContent = '🌬️ The turbine is spinning! More wind = more power!';
            } else {
                hintEl.textContent = '👆 Drag the cloud toward the turbine to generate power';
            }
            
            requestAnimationFrame(drawScene);
        }

        // --- Initialize ---
        canvas.addEventListener('pointerdown', handlePointerDown);
        canvas.addEventListener('pointermove', handlePointerMove);
        canvas.addEventListener('pointerup', handlePointerUp);
        canvas.addEventListener('pointercancel', handlePointerUp);
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());
        
        document.getElementById('resetWindBtn').addEventListener('click', resetWind);
        document.getElementById('resetWindBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            resetWind();
        }, { passive: false });
        
        drawScene();
    </script>
</body>
</html>
