            <!DOCTYPE html>
            <html>
            <head>

                <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">

                    }

            <body>
                <div class="viz-card">
                    <div class="viz-title">
                        <h2>Spring Balance</h2>
                        <span class="law-badge">Hooke Law · F = kx</span>
                    </div>
                    <div class="subtitle">Pull the weight down · Spring stretches proportionally</div>
                    
                    <div class="data-panel">
                        <div class="data-item">
                            <div class="data-label">Displacement</div>
                            <div class="data-value"><span id="displacementVal">0.0</span><span class="data-unit">cm</span></div>
                        </div>
                        <div class="data-item">
                            <div class="data-label">Spring Force</div>
                            <div class="data-value"><span id="forceVal">0.0</span><span class="data-unit">N</span></div>
                        </div>
                        <div class="data-item">
                            <div class="data-label">Energy</div>
                            <div class="data-value"><span id="energyVal">0.00</span><span class="data-unit">J</span></div>
                        </div>
                    </div>

                    <div class="canvas-wrapper">
                        <canvas id="springCanvas" width="520" height="420"></canvas>
                    </div>

                    <div class="control-note">
                        <span>Drag the weight downward to stretch the spring</span>
                        <span class="reset-link" id="resetSpring">Reset</span>
                    </div>
                </div>

                <script>
                    (function(){
                        const canvas = document.getElementById("springCanvas");
                        const ctx = canvas.getContext("2d");
                        
                        const TOP_Y = 60;
                        const NATURAL_LENGTH = 140;
                        const K = 2.4; // Spring constant
                        
                        let stretch = 0;
                        let targetStretch = 0;
                        let isDragging = false;
                        let dragStartY = 0;
                        let dragStartStretch = 0;
                        let velocity = 0;

                        const dispSpan = document.getElementById("displacementVal");
                        const forceSpan = document.getElementById("forceVal");
                        const energySpan = document.getElementById("energyVal");

                        function getCanvasY(e) {
                            const rect = canvas.getBoundingClientRect();
                            const scale = canvas.height / rect.height;
                            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                            return (clientY - rect.top) * scale;
                        }

                        function handleStart(e) {
                            e.preventDefault();
                            const canvasY = getCanvasY(e);
                            const weightY = TOP_Y + NATURAL_LENGTH + stretch + 50;
                            
                            if (Math.abs(canvasY - weightY) < 60) {
                                isDragging = true;
                                dragStartY = canvasY;
                                dragStartStretch = stretch;
                                canvas.style.cursor = "grabbing";
                            }
                        }

                        function handleMove(e) {
                            if (!isDragging) return;
                            e.preventDefault();
                            const canvasY = getCanvasY(e);
                            const delta = canvasY - dragStartY;
                            targetStretch = Math.min(180, Math.max(0, dragStartStretch + delta));
                        }

                        function handleEnd(e) {
                            e.preventDefault();
                            isDragging = false;
                            canvas.style.cursor = "grab";
                        }

                        function reset() {
                            targetStretch = 0;
                        }

                        canvas.addEventListener("mousedown", handleStart);
                        canvas.addEventListener("mousemove", handleMove);
                        canvas.addEventListener("mouseup", handleEnd);
                        canvas.addEventListener("mouseleave", handleEnd);
                        canvas.addEventListener("touchstart", handleStart, { passive: false });
                        canvas.addEventListener("touchmove", handleMove, { passive: false });
                        canvas.addEventListener("touchend", handleEnd);
                        canvas.addEventListener("touchcancel", handleEnd);
                        document.getElementById("resetSpring").addEventListener("click", reset);

                        function draw() {
                            stretch += (targetStretch - stretch) * 0.12;
                            
                            ctx.clearRect(0, 0, canvas.width, canvas.height);
                            
                            const springTop = TOP_Y;
                            const springBottom = TOP_Y + NATURAL_LENGTH + stretch;
                            const weightY = springBottom + 40;
                            
                            // Ceiling mount
                            ctx.fillStyle = "#e5e5e5";
                            ctx.fillRect(canvas.width/2 - 50, TOP_Y - 18, 100, 18);
                            ctx.fillStyle = "#d4d4d4";
                            ctx.beginPath();
                            ctx.arc(canvas.width/2, TOP_Y - 8, 6, 0, Math.PI * 2);
                            ctx.fill();
                            
                            // Spring coil drawing
                            ctx.strokeStyle = "#737373";
                            ctx.lineWidth = 3.5;
                            ctx.lineCap = "round";
                            
                            const coils = 14;
                            const totalLength = NATURAL_LENGTH + stretch;
                            const coilSpacing = totalLength / coils;
                            
                            ctx.beginPath();
                            let x = canvas.width/2;
                            let y = springTop;
                            ctx.moveTo(x, y);
                            
                            for (let i = 0; i <= coils; i++) {
                                y = springTop + i * coilSpacing;
                                const offset = (i % 2 === 0) ? 16 : -16;
                                ctx.lineTo(x + offset, y);
                            }
                            ctx.stroke();
                            
                            // Weight (mass block)
                            const blockW = 80;
                            const blockH = 55;
                            const blockX = canvas.width/2 - blockW/2;
                            
                            // Shadow
                            ctx.shadowColor = "rgba(0,0,0,0.08)";
                            ctx.shadowBlur = 12;
                            ctx.shadowOffsetY = 3;
                            
                            // Block gradient
                            const grad = ctx.createLinearGradient(blockX, weightY, blockX + blockW, weightY + blockH);
                            grad.addColorStop(0, "#404040");
                            grad.addColorStop(1, "#262626");
                            ctx.fillStyle = grad;
                            ctx.beginPath();
                            ctx.roundRect(blockX, weightY, blockW, blockH, 8);
                            ctx.fill();
                            
                            ctx.shadowBlur = 0;
                            ctx.shadowOffsetY = 0;
                            
                            // Weight label
                            ctx.fillStyle = "#a3a3a3";
                            ctx.font = "500 14px Inter, sans-serif";
                            ctx.textAlign = "center";
                            ctx.fillText("1.2 kg", canvas.width/2, weightY + blockH/2 + 6);
                            
                            // Force vector arrow
                            if (stretch > 2) {
                                ctx.save();
                                ctx.translate(canvas.width/2 + 50, weightY + blockH/2);
                                
                                ctx.strokeStyle = "#dc2626";
                                ctx.fillStyle = "#dc2626";
                                ctx.lineWidth = 3;
                                
                                ctx.beginPath();
                                ctx.moveTo(0, 0);
                                ctx.lineTo(0, -stretch * 0.7);
                                ctx.stroke();
                                
                                ctx.beginPath();
                                ctx.moveTo(-8, -stretch * 0.7 + 12);
                                ctx.lineTo(0, -stretch * 0.7);
                                ctx.lineTo(8, -stretch * 0.7 + 12);
                                ctx.fill();
                                
                                ctx.fillStyle = "#dc2626";
                                ctx.font = "500 12px Inter, sans-serif";
                                ctx.textAlign = "left";
                                ctx.fillText("F = " + (stretch * K / 10).toFixed(1) + "N", 12, -stretch * 0.35);
                                ctx.restore();
                            }
                            
                            // Update metrics
                            const displacement = stretch / 10;
                            const force = displacement * K;
                            const energy = 0.5 * K * displacement * displacement;
                            
                            dispSpan.textContent = displacement.toFixed(1);
                            forceSpan.textContent = force.toFixed(1);
                            energySpan.textContent = energy.toFixed(2);

                            requestAnimationFrame(draw);
                        }

                        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                            if (w < 2 * r) r = w / 2;
                            if (h < 2 * r) r = h / 2;
                            this.moveTo(x + r, y);
                            this.lineTo(x + w - r, y);
                            this.quadraticCurveTo(x + w, y, x + w, y + r);
                            this.lineTo(x + w, y + h - r);
                            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                            this.lineTo(x + r, y + h);
                            this.quadraticCurveTo(x, y + h, x, y + h - r);
                            this.lineTo(x, y + r);
                            this.quadraticCurveTo(x, y, x + r, y);
                            return this;
                        };

                        draw();
                    })();
                </script>
            </body>
            </html>
        '></iframe>
    </div>

        <iframe srcdoc='
            <!DOCTYPE html>
            <html>
            <head>

            <body>
                <div class="viz-card">
                    <div class="viz-title">
                        <h2>Gear Train</h2>
                        <span class="ratio-badge">Ratio 3:1 · Torque Multiplier</span>
                    </div>
                    <div class="subtitle">Turn the small gear · Large gear moves slower with more force</div>
                    
                    <div class="gear-stats">
                        <div class="stat-card">
                            <div class="stat-label">Input Turns</div>
                            <div class="stat-value"><span id="inputTurns">0.0</span><span class="unit">x</span></div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Output Turns</div>
                            <div class="stat-value"><span id="outputTurns">0.0</span><span class="unit">x</span></div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Torque Gain</div>
                            <div class="stat-value"><span id="torqueGain">1.0</span><span class="unit">x</span></div>
                        </div>
                    </div>

                    <div class="canvas-wrapper">
                        <canvas id="gearCanvas" width="660" height="360"></canvas>
                    </div>

                    <div class="control-note">
                        <span>Drag the small gear handle to rotate</span>
                        <span class="reset-link" id="resetGears">Reset</span>
                    </div>
                </div>

                <script>
                    (function(){
                        const canvas = document.getElementById("gearCanvas");
                        const ctx = canvas.getContext("2d");
                        
                        const GEAR1_X = 200, GEAR1_Y = 200, GEAR1_R = 45, GEAR1_TEETH = 12;
                        const GEAR2_X = 400, GEAR2_Y = 200, GEAR2_R = 90, GEAR2_TEETH = 24;
                        const RATIO = 3.0;
                        
                        let angle1 = 0;
                        let angle2 = 0;
                        let isDragging = false;
                        let lastAngle = 0;
                        let lastDragY = 0;

                        const inputSpan = document.getElementById("inputTurns");
                        const outputSpan = document.getElementById("outputTurns");
                        const torqueSpan = document.getElementById("torqueGain");

                        function getCanvasCoords(e) {
                            const rect = canvas.getBoundingClientRect();
                            const scaleX = canvas.width / rect.width;
                            const scaleY = canvas.height / rect.height;
                            let clientX, clientY;
                            if (e.touches) {
                                clientX = e.touches[0].clientX;
                                clientY = e.touches[0].clientY;
                            } else {
                                clientX = e.clientX;
                                clientY = e.clientY;
                            }
                            return {
                                x: (clientX - rect.left) * scaleX,
                                y: (clientY - rect.top) * scaleY
                            };
                        }

                        function handleStart(e) {
                            e.preventDefault();
                            const coords = getCanvasCoords(e);
                            const dist = Math.hypot(coords.x - GEAR1_X, coords.y - GEAR1_Y);
                            
                            if (dist < GEAR1_R + 40) {
                                isDragging = true;
                                lastAngle = Math.atan2(coords.y - GEAR1_Y, coords.x - GEAR1_X);
                                canvas.style.cursor = "grabbing";
                            }
                        }

                        function handleMove(e) {
                            if (!isDragging) return;
                            e.preventDefault();
                            
                            const coords = getCanvasCoords(e);
                            const currentAngle = Math.atan2(coords.y - GEAR1_Y, coords.x - GEAR1_X);
                            
                            let delta = currentAngle - lastAngle;
                            if (delta > Math.PI) delta -= Math.PI * 2;
                            if (delta < -Math.PI) delta += Math.PI * 2;
                            
                            angle1 += delta;
                            angle2 = -angle1 / RATIO;
                            
                            lastAngle = currentAngle;
                        }

                        function handleEnd(e) {
                            e.preventDefault();
                            isDragging = false;
                            canvas.style.cursor = "grab";
                        }

                        function reset() {
                            angle1 = 0;
                            angle2 = 0;
                        }

                        canvas.addEventListener("mousedown", handleStart);
                        canvas.addEventListener("mousemove", handleMove);
                        canvas.addEventListener("mouseup", handleEnd);
                        canvas.addEventListener("mouseleave", handleEnd);
                        canvas.addEventListener("touchstart", handleStart, { passive: false });
                        canvas.addEventListener("touchmove", handleMove, { passive: false });
                        canvas.addEventListener("touchend", handleEnd);
                        canvas.addEventListener("touchcancel", handleEnd);
                        document.getElementById("resetGears").addEventListener("click", reset);

                        function drawGear(x, y, radius, teeth, angle, color) {
                            ctx.save();
                            ctx.translate(x, y);
                            ctx.rotate(angle);
                            
                            // Teeth
                            ctx.fillStyle = color;
                            for (let i = 0; i < teeth; i++) {
                                const toothAngle = (i / teeth) * Math.PI * 2;
                                const x1 = Math.cos(toothAngle) * (radius - 6);
                                const y1 = Math.sin(toothAngle) * (radius - 6);
                                const x2 = Math.cos(toothAngle) * (radius + 8);
                                const y2 = Math.sin(toothAngle) * (radius + 8);
                                
                                ctx.beginPath();
                                ctx.ellipse((x1 + x2)/2, (y1 + y2)/2, 6, 10, toothAngle, 0, Math.PI * 2);
                                ctx.fill();
                            }
                            
                            // Gear body
                            ctx.fillStyle = "#fafafa";
                            ctx.shadowColor = "rgba(0,0,0,0.06)";
                            ctx.shadowBlur = 10;
                            ctx.beginPath();
                            ctx.arc(0, 0, radius - 4, 0, Math.PI * 2);
                            ctx.fill();
                            ctx.shadowBlur = 0;
                            
                            ctx.strokeStyle = color;
                            ctx.lineWidth = 2;
                            ctx.beginPath();
                            ctx.arc(0, 0, radius - 4, 0, Math.PI * 2);
                            ctx.stroke();
                            
                            // Center hole
                            ctx.fillStyle = "#e5e5e5";
                            ctx.beginPath();
                            ctx.arc(0, 0, 10, 0, Math.PI * 2);
                            ctx.fill();
                            
                            // Spokes
                            ctx.strokeStyle = "#d4d4d4";
                            ctx.lineWidth = 3;
                            for (let i = 0; i < 4; i++) {
                                const spokeAngle = (i * Math.PI / 2);
                                ctx.beginPath();
                                ctx.moveTo(Math.cos(spokeAngle) * 12, Math.sin(spokeAngle) * 12);
                                ctx.lineTo(Math.cos(spokeAngle) * (radius - 14), Math.sin(spokeAngle) * (radius - 14));
                                ctx.stroke();
                            }
                            
                            ctx.restore();
                        }

                        function draw() {
                            ctx.clearRect(0, 0, canvas.width, canvas.height);
                            
                            // Draw connecting line
                            ctx.beginPath();
                            ctx.moveTo(GEAR1_X, GEAR1_Y);
                            ctx.lineTo(GEAR2_X, GEAR2_Y);
                            ctx.strokeStyle = "#f0f0f0";
                            ctx.lineWidth = 3;
                            ctx.setLineDash([8, 6]);
                            ctx.stroke();
                            ctx.setLineDash([]);
                            
                            drawGear(GEAR1_X, GEAR1_Y, GEAR1_R, GEAR1_TEETH, angle1, "#a3a3a3");
                            drawGear(GEAR2_X, GEAR2_Y, GEAR2_R, GEAR2_TEETH, angle2, "#737373");
                            
                            // Handle on small gear
                            ctx.save();
                            ctx.translate(GEAR1_X, GEAR1_Y);
                            ctx.rotate(angle1);
                            
                            ctx.fillStyle = "#dc2626";
                            ctx.shadowColor = "#dc262640";

                            ctx.shadowBlur = 0;
                            
                            ctx.fillStyle = "#171717";
                            ctx.beginPath();
                            ctx.arc(GEAR1_R + 20, 0, 6, 0, Math.PI * 2);
                            ctx.fill();
                            ctx.restore();
                            
                            // Update stats
                            const turns1 = (angle1 / (Math.PI * 2)).toFixed(1);
                            const turns2 = (angle2 / (Math.PI * 2)).toFixed(1);
                            
                            inputSpan.textContent = turns1;
                            outputSpan.textContent = turns2;
                            torqueSpan.textContent = RATIO.toFixed(1);

                            requestAnimationFrame(draw);
                        }

                        draw();
                    })();
