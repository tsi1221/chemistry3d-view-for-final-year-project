<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>∅ empty set · grade 9</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:system-ui,sans-serif;background:#fff;min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:16px}
    .card{max-width:650px;width:100%;background:#fafcff;border-radius:32px;border:1px solid #d0e2ff;padding:24px;box-shadow:0 12px 30px rgba(0,0,0,0.04)}
    h2{font-weight:700;font-size:1.5rem;color:#0a1e3c;text-align:center;margin-bottom:8px}
    .sub{text-align:center;color:#3a628c;margin-bottom:20px}
    canvas{display:block;width:100%;aspect-ratio:5/3;background:#fff;border-radius:20px;border:2px dashed #3b82f6;margin-bottom:20px}
    .formula{background:#f0f6ff;border-radius:16px;padding:14px;text-align:center;font-size:1.3rem;font-weight:600;color:#3b82f6;margin-bottom:16px}
    .btn-group{display:flex;gap:8px;margin-bottom:16px}
    .btn{flex:1;padding:14px;border-radius:40px;border:none;font-weight:600;cursor:pointer;font-size:0.9rem}
    .btn-add{background:#3b82f6;color:#fff}.btn-zero{background:#f59e0b;color:#fff}.btn-clear{background:#ef4444;color:#fff}
    .stats{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#f8fcff;border-radius:20px}
    .cardinality{font-size:1.8rem;font-weight:700;color:#3b82f6}
    .legend{display:flex;gap:16px;font-size:0.8rem;color:#3a628c}
    @media(max-width:500px){.btn-group{flex-direction:column}}
  </style>
</head>
<body>
<div class="card">
  <h2>∅ set visualizer</h2>
  <div class="sub">empty set vs {0}</div>
  <canvas id="setCanvas"></canvas>
  <div class="formula" id="formulaDisp">Set A = ∅</div>
  <div class="btn-group">
    <button class="btn btn-add" id="addBtn">➕ random</button>
    <button class="btn btn-zero" id="zeroBtn">0️⃣ add zero</button>
    <button class="btn btn-clear" id="clearBtn">🗑️ clear</button>
  </div>
  <div class="stats">
    <span>cardinality n(A)</span>
    <span class="cardinality" id="cardDisp">0</span>
  </div>
  <div class="legend"><span>∅ = 0 elements</span><span>{0} = 1 element</span></div>
</div>
<script>
(function(){
  const canvas=document.getElementById('setCanvas'),ctx=canvas.getContext('2d');
  let w=0,h=0,elements=[],DPR=devicePixelRatio||1;
  const formulaD=document.getElementById('formulaDisp'),cardD=document.getElementById('cardDisp');
  
  function resize(){const r=canvas.parentElement.getBoundingClientRect();w=r.width;h=w*3/5;canvas.width=w*DPR;canvas.height=h*DPR;canvas.style.width=w+'px';canvas.style.height=h+'px';ctx.setTransform(DPR,0,0,DPR,0,0)}
  
  function draw(){
    ctx.clearRect(0,0,w,h); ctx.beginPath(); ctx.arc(w/2,h/2,90,0,2*Math.PI); ctx.strokeStyle='#3b82f6'; ctx.lineWidth=3; ctx.setLineDash(elements.length?[]:[6,6]); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle='#3b82f6'; ctx.font='bold 14px system-ui'; ctx.textAlign='center'; ctx.fillText('Set A',w/2,28);
    elements.forEach(e=>{ctx.beginPath(); ctx.arc(e.x,e.y,18,0,2*Math.PI); ctx.fillStyle=e.val===0?'#f59e0b':'#3b82f6'; ctx.fill(); ctx.fillStyle='#fff'; ctx.font='bold 14px system-ui'; ctx.fillText(e.val,e.x,e.y+5)});
    updateUI();
  }
  
  function updateUI(){
    const cnt=elements.length; cardD.textContent=cnt;
    if(cnt===0)formulaD.textContent='Set A = ∅';
    else{const vals=elements.map(e=>e.val).join(', '); formulaD.textContent=`Set A = { ${vals} }`}
  }
  
  function spawn(val){
    if(elements.length>=9)return; const a=Math.random()*2*Math.PI,d=Math.random()*65; elements.push({val,x:w/2+Math.cos(a)*d,y:h/2+Math.sin(a)*d}); draw()
  }
  
  document.getElementById('addBtn').onclick=()=>spawn(Math.floor(Math.random()*15)+1);
  document.getElementById('zeroBtn').onclick=()=>{if(!elements.some(e=>e.val===0))spawn(0)};
  document.getElementById('clearBtn').onclick=()=>{elements=[]; draw()};
  window.onresize=()=>{resize(); draw()};
  resize(); draw();
})();
</script>
</body>
</html>
