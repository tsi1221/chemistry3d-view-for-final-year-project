<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 9 Math Lab: Relative Complement</title>
    <style>
        :root {
            --primary-blue: #0056b3;
            --secondary-blue: #e3f2fd;
            --accent-purple: #7A2CFF;
            --white: #ffffff;
            --text-dark: #2c3e50;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #f0f4f8;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .lab-container {
            width: 95%;
            max-width: 900px;
            margin: 20px;
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 86, 179, 0.1);
            overflow: hidden;
        }

        header {
            background: var(--primary-blue);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .lab-content {
            display: grid;
            grid-template-columns: 1fr 300px;
            padding: 20px;
            gap: 20px;
        }

        @media (max-width: 800px) {
            .lab-content { grid-template-columns: 1fr; }
        }

        /* Visualization Styling */
        .canvas-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        canvas {
            background: white;
            border: 2px solid var(--secondary-blue);
            border-radius: 15px;
            width: 100%;
            height: auto;
            touch-action: none;
        }

        .formula-display {
            width: 100%;
            background: var(--secondary-blue);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--primary-blue);
            border-bottom: 4px solid var(--accent-purple);
        }

        /* Controls */
        .control-panel {
            background: #fdfdfd;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #eee;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .slider-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        .info-box {
            font-size: 0.85rem;
            color: #555;
            padding: 12px;
            background: #fff9db;
            border-radius: 8px;
            border: 1px solid #ffe066;
            line-height: 1.4;
        }

        .btn-alert {
            background: var(--accent-purple);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="lab-container">
    <header>
        <h2 style="margin:0">Set Difference Visualizer</h2>
        <p style="margin:5px 0 0">Understanding $A \setminus B$ (The Slicer)</p>
    </header>

    <div class="lab-content">
        <main class="canvas-section">
            <div class="formula-display" id="formula">A \ B</div>
            <canvas id="diffCanvas" width="500" height="350"></canvas>
        </main>

        <aside class="control-panel">
            <div class="slider-group">
                <label>Move Set B (The Slicer)</label>
                <input type="range" id="posX" min="150" max="450" value="380">
            </div>

            <div class="slider-group">
                <label>Set A Size</label>
                <input type="range" id="radiusA" min="50" max="120" value="90">
            </div>

            <div class="info-box">
                <strong>Rule:</strong> $A \setminus B$ means "Take everything in $A$, but remove anything that belongs to $B$."
            </div>

            <button class="btn-alert" onclick="checkDisjoint()">Check Relationship</button>

            <div style="font-size:0.8rem; color:#888; ">
                Note: Shaded area = $A$ but NOT $B$.
            </div>
        </aside>
    </div>
</div>

<script>
    const canvas = document.getElementById('diffCanvas');
    const ctx = canvas.getContext('2d');
    const posXSlider = document.getElementById('posX');
    const radiusASlider = document.getElementById('radiusA');

    // App State
    let setA = { x: 180, y: 175, r: 90 };
    let setB = { x: 380, y: 175, r: 90 };

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. Draw Set B Outline (The "Cutter")
        ctx.beginPath();
        ctx.arc(setB.x, setB.y, setB.r, 0, Math.PI * 2);
        ctx.strokeStyle = '#7A2CFF';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.fillStyle = '#7A2CFF';
        ctx.fillText("B", setB.x, setB.y - setB.r - 10);

        // 2. Logic for A \ B (Shading A while excluding B)
        ctx.save();
        
        // Create path for Set A
        ctx.beginPath();
        ctx.arc(setA.x, setA.y, setA.r, 0, Math.PI * 2);
        
        // Clip everything inside Set B out
        ctx.clip(); // This makes sure we only draw inside A
        
        // Change composite mode to erase B's area from A
        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(setB.x, setB.y, setB.r, 0, Math.PI * 2);
        ctx.fill();
        
        // Reset and fill the remaining A
        ctx.globalCompositeOperation = 'destination-over';
        ctx.fillStyle = 'rgba(0, 86, 179, 0.4)';
        ctx.beginPath();
        ctx.arc(setA.x, setA.y, setA.r, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.restore();

        // 3. Set A Outline
        ctx.beginPath();
        ctx.arc(setA.x, setA.y, setA.r, 0, Math.PI * 2);
        ctx.strokeStyle = '#0056b3';
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.fillStyle = '#0056b3';
        ctx.font = 'bold 16px Arial';
        ctx.fillText("A", setA.x, setA.y - setA.r - 10);
    }

    function checkDisjoint() {
        const dist = Math.sqrt(Math.pow(setA.x - setB.x, 2) + Math.pow(setA.y - setB.y, 2));
        
        if (dist > (setA.r + setB.r)) {
            alert("The sets are disjoint! Therefore, A \\ B = A.");
        } else if (dist < (setB.r - setA.r) && setB.r > setA.r) {
            alert("A is a subset of B! Therefore, A \\ B is an Empty Set (∅).");
        } else {
            alert("The shaded region shows elements exclusive to Set A.");
        }
    }

    // Input Listeners
    posXSlider.addEventListener('input', (e) => {
        setB.x = parseInt(e.target.value);
        draw();
    });

    radiusASlider.addEventListener('input', (e) => {
        setA.r = parseInt(e.target.value);
        draw();
    });

    // Initial Draw
    draw();
</script>

</body>
</html>
