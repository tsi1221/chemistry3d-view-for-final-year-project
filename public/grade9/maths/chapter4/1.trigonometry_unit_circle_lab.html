<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTwin Lab: Trigonometry Telescope</title>
    <style>
        :root {
            --primary-blue: #0056b3;
            --white: #ffffff;
            --bg: #f8fafc;
            --sine-red: #ef4444;
            --cosine-green: #22c55e;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .lab-shell {
            width: 95%;
            max-width: 1100px;
            margin: 20px;
            background: var(--white);
            border-radius: 24px;
            box-shadow: 0 15px 50px rgba(0, 86, 179, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: var(--primary-blue);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .lab-layout {
            display: grid;
            grid-template-columns: 1fr 340px;
            padding: 20px;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .lab-layout { grid-template-columns: 1fr; }
        }

        .viz-container {
            background: #ffffff;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            position: relative;
        }

        canvas {
            width: 100%;
            height: auto;
            display: block;
        }

        .formula-display {
            display: flex;
            justify-content: space-around;
            background: #f1f5f9;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }

        .control-panel {
            background: #f8fafc;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .slider-group label {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--primary-blue);
        }

        .quadrant-alert {
            background: var(--primary-blue);
            color: white;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            display: none;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
    </style>
</head>
<body>

<div class="lab-shell">
    <header>
        <h2 style="margin:0">Unit Circle Telescope</h2>
        <p style="margin:5px 0 0">Visualizing Sine and Cosine in 3D Space</p>
    </header>

    <div class="lab-layout">
        <main>
            <div class="formula-display">
                <div style="color: var(--sine-red)">sin(θ) = <span id="sinVal">0.00</span></div>
                <div style="color: var(--cosine-green)">cos(θ) = <span id="cosVal">1.00</span></div>
                <div style="color: var(--primary-blue)">θ = <span id="degVal">0°</span></div>
            </div>
            <div class="viz-container">
                <canvas id="trigCanvas" width="600" height="500"></canvas>
            </div>
        </main>

        <aside class="control-panel">
            <div class="slider-group">
                <label>Rotation Angle (θ) <span>0° - 360°</span></label>
                <input type="range" id="angleInput" min="0" max="360" value="0" step="1">
            </div>

            <div id="quadrantMsg" class="quadrant-alert">Quadrant I</div>

            <div style="font-size: 0.85rem; color: #64748b; line-height: 1.6;">
                <strong>Study Tip:</strong> 
                <ul>
                    <li>The <span style="color:var(--sine-red); font-weight:bold;">RED line</span> is the vertical height (Sine).</li>
                    <li>The <span style="color:var(--cosine-green); font-weight:bold;">GREEN line</span> is the horizontal width (Cosine).</li>
                    <li>Watch how they change as the point rotates!</li>
                </ul>
            </div>
        </aside>
    </div>
</div>

<script>
    const canvas = document.getElementById('trigCanvas');
    const ctx = canvas.getContext('2d');
    const angleInput = document.getElementById('angleInput');
    const quadMsg = document.getElementById('quadrantMsg');

    let angle = 0;
    const radius = 150;

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;

        const rad = (angle * Math.PI) / 180;
        const x = Math.cos(rad) * radius;
        const y = -Math.sin(rad) * radius; // Negative because Canvas Y is downward

        // 1. Draw Coordinate System
        ctx.strokeStyle = '#cbd5e1';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(cx - 200, cy); ctx.lineTo(cx + 200, cy);
        ctx.moveTo(cx, cy - 200); ctx.lineTo(cx, cy + 200);
        ctx.stroke();

        // 2. Draw Unit Circle
        ctx.strokeStyle = '#e2e8f0';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.stroke();

        // 3. Draw Cosine (Horizontal - Green)
        ctx.strokeStyle = '#22c55e';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + x, cy);
        ctx.stroke();

        // 4. Draw Sine (Vertical - Red)
        ctx.strokeStyle = '#ef4444';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(cx + x, cy);
        ctx.lineTo(cx + x, cy + y);
        ctx.stroke();

        // 5. Draw Hypotenuse (Radius)
        ctx.strokeStyle = '#0056b3';
        ctx.setLineDash([5, 5]);
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + x, cy + y);
        ctx.stroke();
        ctx.setLineDash([]);

        // 6. Draw the Point
        ctx.fillStyle = '#0056b3';
        ctx.beginPath();
        ctx.arc(cx + x, cy + y, 8, 0, Math.PI * 2);
        ctx.fill();

        // Update Text
        document.getElementById('sinVal').innerText = Math.sin(rad).toFixed(2);
        document.getElementById('cosVal').innerText = Math.cos(rad).toFixed(2);
        document.getElementById('degVal').innerText = angle + "°";

        // Quadrant Alert logic
        quadMsg.style.display = 'block';
        if(angle >= 0 && angle < 90) quadMsg.innerText = "Quadrant I (All Positive)";
        else if(angle >= 90 && angle < 180) quadMsg.innerText = "Quadrant II (Sine is Positive)";
        else if(angle >= 180 && angle < 270) quadMsg.innerText = "Quadrant III (Tan is Positive)";
        else quadMsg.innerText = "Quadrant IV (Cosine is Positive)";
    }

    angleInput.addEventListener('input', (e) => {
        angle = parseInt(e.target.value);
        draw();
    });

    draw();
</script>
</body>
</html>
