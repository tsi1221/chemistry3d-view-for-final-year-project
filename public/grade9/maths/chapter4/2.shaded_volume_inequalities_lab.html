<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 9 Math Lab: Shaded Volume Inequalities</title>
    <style>
        :root {
            --primary-blue: #0056b3;
            --accent-blue: #00a2ff;
            --white: #ffffff;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            color: #333;
        }

        .lab-shell {
            width: 95%;
            max-width: 1100px;
            margin: 20px;
            background: var(--white);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 86, 179, 0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: var(--primary-blue);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .lab-layout {
            display: grid;
            grid-template-columns: 1fr 340px;
            padding: 20px;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .lab-layout { grid-template-columns: 1fr; }
        }

        .canvas-container {
            background: #111827; /* Dark background for 3D pop */
            border-radius: 16px;
            position: relative;
            cursor: move;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: auto;
            display: block;
        }

        .formula-overlay {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 6px solid var(--primary-blue);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .equation-text {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 1.1rem;
            margin: 5px 0;
        }

        .control-panel {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border: 1px solid #e2e8f0;
        }

        .slider-group {
            background: white;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .slider-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: bold;
            color: #475569;
            margin-bottom: 5px;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--primary-blue);
        }

        /* Blue/White Alert Notification */
        #alertContainer {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            pointer-events: none;
        }

        .math-alert {
            background: var(--primary-blue);
            color: white;
            padding: 14px 35px;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(0, 86, 179, 0.3);
            display: none;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

<div id="alertContainer">
    <div id="statusAlert" class="math-alert">Lab Updated</div>
</div>

<div class="lab-shell">
    <header>
        <h2 style="margin:0">Shaded Volume Lab</h2>
        <p style="margin:5px 0 0">Visualizing Systems of Inequalities in 3D Space</p>
    </header>

    <div class="lab-layout">
        <main>
            <div class="formula-overlay">
                <div class="equation-text" style="color: #3b82f6;" id="ineq1Text">Ineq 1: 1.0x + 1.0y < 5</div>
                <div class="equation-text" style="color: #a855f7;" id="ineq2Text">Ineq 2: 1.0x - 1.0y > 2</div>
            </div>
            <div class="canvas-container" id="canvasFrame">
                <canvas id="inequalityCanvas" width="600" height="500"></canvas>
            </div>
        </main>

        <aside class="control-panel">
            <h4 style="margin:0; color: #3b82f6;">Inequality 1 (Blue)</h4>
            <div class="slider-group">
                <label>a1: <span id="v_a1">1.0</span></label>
                <input type="range" id="a1" min="-3" max="3" step="0.1" value="1">
                <label>b1: <span id="v_b1">1.0</span></label>
                <input type="range" id="b1" min="-3" max="3" step="0.1" value="1">
                <label>c1: <span id="v_c1">5.0</span></label>
                <input type="range" id="c1" min="-10" max="10" step="1" value="5">
            </div>

            <h4 style="margin:10px 0 0; color: #a855f7;">Inequality 2 (Purple)</h4>
            <div class="slider-group">
                <label>a2: <span id="v_a2">1.0</span></label>
                <input type="range" id="a2" min="-3" max="3" step="0.1" value="1">
                <label>b2: <span id="v_b2">-1.0</span></label>
                <input type="range" id="b2" min="-3" max="3" step="0.1" value="-1">
                <label>c2: <span id="v_c2">2.0</span></label>
                <input type="range" id="c2" min="-10" max="10" step="1" value="2">
            </div>
            
            <div style="background: #fffbe6; padding: 10px; border-radius: 8px; font-size: 0.8rem; border-left: 4px solid #fbbf24;">
                <strong>Rotation:</strong> Click and drag on the visualization to rotate the 3D view. Overlapping colors show the solution.
            </div>
        </aside>
    </div>
</div>

<script>
    const canvas = document.getElementById('inequalityCanvas');
    const ctx = canvas.getContext('2d');
    const alertBox = document.getElementById('statusAlert');

    // System State: a*x + b*y < c and a*x + b*y > c
    let params = { a1: 1, b1: 1, c1: 5, a2: 1, b2: -1, c2: 2 };
    let rotation = { x: 0.5, y: 0.7 };
    let isDragging = false;
    let lastMouse = { x: 0, y: 0 };
    const scale = 22;

    // Project 3D points to 2D canvas
    function project(x, y, z) {
        // Rotate around Y-axis (yaw)
        let cosY = Math.cos(rotation.y);
        let sinY = Math.sin(rotation.y);
        let x1 = x * cosY - z * sinY;
        let z1 = x * sinY + z * cosY;

        // Rotate around X-axis (pitch)
        let cosX = Math.cos(rotation.x);
        let sinX = Math.sin(rotation.x);
        let y2 = y * cosX - z1 * sinX;
        let z2 = y * sinX + z1 * cosX;

        // Scale and center
        return {
            x: (canvas.width / 2) + x1 * scale,
            y: (canvas.height / 2) - y2 * scale,
            z: z2 // Used for depth sorting or color mixing
        };
    }

    // Draw the 3D-style shaded volume ribbon
    function drawInequalityVolume(a, b, c, color, isLessThan) {
        ctx.fillStyle = color;
        ctx.globalAlpha = 0.25; // Transparent sheets
        const range = 12;

        // In 2D, ax + by = c is a line. We treat it as a vertical ribbon plane.
        // We calculate points for z = -10 and z = 10 to give it depth.
        if (Math.abs(b) > 0.05) {
            // Standard form: y = (c - ax)/b
            const getY = (currX) => (c - a * currX) / b;
            
            // Generate the ribbon boundary
            let p1 = project(-range, getY(-range), -range);
            let p2 = project(range, getY(range), -range);
            let p3 = project(range, getY(range), range);
            let p4 = project(-range, getY(-range), range);
            
            // Draw the ribbon boundary plane
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.lineTo(p3.x, p3.y);
            ctx.lineTo(p4.x, p4.y);
            ctx.closePath();
            ctx.fill();

            // Shading Logic: We draw another, thicker plane "inside" the region.
            // For a1*x + b1*y < c1, we shift y slightly down (if b1 > 0)
            const shiftY = (isLessThan ? -1 : 1) * Math.sign(b) * 2;
            let s1 = project(-range, getY(-range) + shiftY, -range);
            let s2 = project(range, getY(range) + shiftY, -range);
            let s3 = project(range, getY(range) + shiftY, range);
            let s4 = project(-range, getY(-range) + shiftY, range);

            // Shaded inside volume (simple visualization)
            ctx.globalAlpha = 0.1;
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); 
            ctx.lineTo(s2.x, s2.y); ctx.lineTo(s1.x, s1.y);
            ctx.closePath(); ctx.fill();

            ctx.beginPath();
            ctx.moveTo(p2.x, p2.y); ctx.lineTo(p3.x, p3.y); 
            ctx.lineTo(s3.x, s3.y); ctx.lineTo(s2.x, s2.y);
            ctx.closePath(); ctx.fill();

            ctx.beginPath();
            ctx.moveTo(p3.x, p3.y); ctx.lineTo(p4.x, p4.y); 
            ctx.lineTo(s4.x, s4.y); ctx.lineTo(s3.x, s3.y);
            ctx.closePath(); ctx.fill();

            ctx.beginPath();
            ctx.moveTo(p4.x, p4.y); ctx.lineTo(p1.x, p1.y); 
            ctx.lineTo(s1.x, s1.y); ctx.lineTo(s4.x, s4.y);
            ctx.closePath(); ctx.fill();
        }
        ctx.globalAlpha = 1.0;
    }

    function drawGrid() {
        ctx.strokeStyle = '#475569';
        ctx.lineWidth = 1;
        ctx.beginPath();
        // X-Axis (along depth z=0)
        let pX1 = project(-12, 0, 0); let pX2 = project(12, 0, 0);
        ctx.moveTo(pX1.x, pX1.y); ctx.lineTo(pX2.x, pX2.y);
        // Y-Axis (along depth z=0)
        let pY1 = project(0, -12, 0); let pY2 = project(0, 12, 0);
        ctx.moveTo(pY1.x, pY1.y); ctx.lineTo(pY2.x, pY2.y);
        ctx.stroke();
    }

    // Main update/draw loop
    function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        drawGrid();
        
        // Draw volume 1 (a1*x + b1*y < c1)
        drawInequalityVolume(params.a1, params.b1, params.c1, '#3b82f6', true);
        // Draw volume 2 (a2*x + b2*y > c2)
        drawInequalityVolume(params.a2, params.b2, params.c2, '#a855f7', false);

        // Update Equation Text Display
        document.getElementById('ineq1Text').innerText = `Ineq 1: ${params.a1.toFixed(1)}x + ${params.b1.toFixed(1)}y < ${params.c1.toFixed(1)}`;
        document.getElementById('ineq2Text').innerText = `Ineq 2: ${params.a2.toFixed(1)}x + ${params.b2.toFixed(1)}y > ${params.c2.toFixed(1)}`;

        // Cramer's Rule for intersection (just for educational focus on boundaries)
        const det = params.a1 * params.b2 - params.a2 * params.b1;
        if (Math.abs(det) < 0.05) {
            triggerAlert("Parallel Boundary Lines Detected!");
        } else {
            triggerAlert("Lab Updated");
        }
    }

    // Custom Alert Notification system
    let alertTimeout;
    function triggerAlert(message) {
        if(alertTimeout) clearTimeout(alertTimeout);
        alertBox.innerText = message;
        alertBox.style.display = 'block';
        alertTimeout = setTimeout(() => {
            alertBox.style.display = 'none';
        }, 1500);
    }

    // Controls Logic
    ['a1', 'b1', 'c1', 'a2', 'b2', 'c2'].forEach(id => {
        const input = document.getElementById(id);
        const label = document.getElementById('v_' + id);
        input.addEventListener('input', (e) => {
            params[id] = parseFloat(e.target.value);
            label.innerText = params[id].toFixed(1);
            update();
        });
    });

    // 3D Interaction Logic (Mouse/Touch rotation)
    const frame = document.getElementById('canvasFrame');
    function startDrag(e) {
        isDragging = true;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        lastMouse = { x: clientX, y: clientY };
    }

    function endDrag() {
        isDragging = false;
    }

    function moveDrag(e) {
        if (!isDragging) return;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        
        const dx = clientX - lastMouse.x;
        const dy = clientY - lastMouse.y;
        
        rotation.y += dx * 0.01;
        rotation.x += dy * 0.01;
        
        lastMouse = { x: clientX, y: clientY };
        update();
    }

    // Mouse Listeners
    frame.addEventListener('mousedown', startDrag);
    window.addEventListener('mouseup', endDrag);
    window.addEventListener('mousemove', moveDrag);

    // Touch Listeners (Mobile compatibility)
    frame.addEventListener('touchstart', startDrag);
    window.addEventListener('touchend', endDrag);
    window.addEventListener('touchmove', moveDrag);

    // Initial render
    update();
</script>
</body>
</html>
