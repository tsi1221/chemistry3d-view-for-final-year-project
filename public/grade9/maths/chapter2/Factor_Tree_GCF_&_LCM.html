<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Factor Tree GCF & LCM</title>
    <style>
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --surface-secondary: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-tertiary: #94a3b8;
            --accent: #3b82f6;
            --accent-soft: #dbeafe;
            --gold: #f59e0b;
            --gold-soft: #fef3c7;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.05), 0 4px 6px -4px rgb(0 0 0 / 0.05);
            --radius: 16px;
            --radius-sm: 10px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        #canvas {
            display: block;
            touch-action: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .ui-top {
            position: fixed;
            top: 24px;
            left: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: auto;
            z-index: 10;
        }

        .panel {
            background: var(--surface);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: var(--radius);
            backdrop-filter: blur(8px);
            background: rgba(255, 255, 255, 0.95);
        }

        .label {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--text-tertiary);
            margin-bottom: 8px;
        }

        .input-row {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        input {
            width: 90px;
            background: var(--surface-secondary);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            padding: 10px;
            text-align: center;
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 1.2rem;
            font-weight: 500;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        .mode-tabs {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .tab {
            flex: 1;
            background: var(--surface-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            padding: 10px 16px;
            cursor: pointer;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-align: center;
            transition: all 0.15s;
        }

        .tab:hover {
            background: var(--surface);
            border-color: var(--accent);
            color: var(--accent);
        }

        .tab.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.25);
        }

        .logic-view {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 800px;
            text-align: center;
            pointer-events: auto;
            background: var(--surface);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            backdrop-filter: blur(8px);
            background: rgba(255, 255, 255, 0.95);
            z-index: 10;
        }

        .logic-title {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--text-tertiary);
            margin-bottom: 20px;
        }

        .factor-section {
            margin-bottom: 16px;
        }

        .section-label {
            color: var(--text-tertiary);
            font-size: 0.75rem;
            font-weight: 500;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .factor-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 1.4rem;
            flex-wrap: wrap;
        }

        .factor-pill {
            padding: 8px 18px;
            border: 1.5px solid var(--border);
            border-radius: 40px;
            background: var(--surface-secondary);
            color: var(--text-secondary);
            font-weight: 500;
            transition: all 0.2s;
        }

        .factor-pill.highlight {
            background: var(--gold);
            border-color: var(--gold);
            color: white;
            box-shadow: 0 2px 8px rgba(245, 158, 11, 0.25);
        }

        .divider {
            border: 0;
            border-top: 1.5px solid var(--border);
            margin: 20px 0;
        }

        .result-math {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 1.3rem;
            font-family: 'SF Mono', 'Menlo', monospace;
        }

        .result-math span {
            color: var(--gold);
        }

        @media (max-width: 640px) {
            .ui-top { left: 16px; right: 16px; }
            .panel { padding: 16px; }
            .logic-view { padding: 20px 16px; width: calc(100% - 32px); }
            .factor-pill { padding: 6px 14px; font-size: 1.2rem; }
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
</head>
<body>

<canvas id="canvas"></canvas>

<div class="ui-top">
    <div class="panel">
        <div class="label">Research Targets</div>
        <div class="input-row">
            <input type="number" id="numA" value="12" min="2" max="60" placeholder="A">
            <input type="number" id="numB" value="18" min="2" max="60" placeholder="B">
        </div>
        <div class="mode-tabs">
            <div class="tab active" id="tabGCF" onclick="setMode('GCF')">GCF Analysis</div>
            <div class="tab" id="tabLCM" onclick="setMode('LCM')">LCM Analysis</div>
        </div>
    </div>
</div>

<div class="logic-view">
    <div class="logic-title" id="logicTitle">Prime Factor Alignment</div>
    
    <div class="factor-section">
        <div class="section-label">Number A Prime Factors</div>
        <div class="factor-row" id="rowA"></div>
    </div>
    
    <div class="factor-section">
        <div class="section-label">Number B Prime Factors</div>
        <div class="factor-row" id="rowB"></div>
    </div>

    <hr class="divider">
    
    <div class="result-math" id="finalResult">
        <span>GCF:</span> 2 × 3 = 6
    </div>
</div>

<script>
    (function(){
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height, mode = 'GCF';
        let nodes = [];

        // Light mode colors
        const colors = {
            bg: '#f8fafc',
            grid: '#e2e8f0',
            nodeStroke: '#3b82f6',
            nodeFill: '#ffffff',
            nodeText: '#0f172a',
            primeFill: '#dbeafe',
            primeText: '#3b82f6'
        };

        function getPrimeFactors(n) {
            const factors = [];
            let d = 2;
            let temp = n;
            while (temp > 1) {
                while (temp % d === 0) {
                    factors.push(d);
                    temp /= d;
                }
                d++;
            }
            return factors;
        }

        function createTree(val, startX, startY, side) {
            let currentNodes = [];
            const factorize = (n, x, y, level) => {
                currentNodes.push({ v: n, x, y, level, side });
                if (isPrime(n)) return;

                const f1 = getSmallestFactor(n);
                const f2 = n / f1;
                const xOffset = 60 / (level + 1);
                
                factorize(f1, x - xOffset, y + 50, level + 1);
                factorize(f2, x + xOffset, y + 50, level + 1);
            };
            factorize(val, startX, startY, 0);
            return currentNodes;
        }

        function isPrime(n) {
            for(let i = 2; i <= Math.sqrt(n); i++) if(n % i === 0) return false;
            return n > 1;
        }

        function getSmallestFactor(n) {
            for(let i = 2; i <= Math.sqrt(n); i++) if(n % i === 0) return i;
            return n;
        }

        function update() {
            const a = parseInt(document.getElementById('numA').value) || 2;
            const b = parseInt(document.getElementById('numB').value) || 2;
            
            nodes = [...createTree(a, width * 0.3, 100, 'A'), ...createTree(b, width * 0.7, 100, 'B')];

            const factorsA = getPrimeFactors(a);
            const factorsB = getPrimeFactors(b);
            
            const rowA = document.getElementById('rowA');
            const rowB = document.getElementById('rowB');
            rowA.innerHTML = ''; 
            rowB.innerHTML = '';

            if (mode === 'GCF') {
                const shared = [];
                const pA = factorsA.map(f => ({v: f, hl: false}));
                const pB = factorsB.map(f => ({v: f, hl: false}));

                pA.forEach(itemA => {
                    const match = pB.find(itemB => !itemB.hl && itemB.v === itemA.v);
                    if (match) {
                        itemA.hl = true;
                        match.hl = true;
                        shared.push(itemA.v);
                    }
                });

                pA.forEach(f => rowA.innerHTML += `<div class="factor-pill ${f.hl ? 'highlight' : ''}">${f.v}</div>`);
                pB.forEach(f => rowB.innerHTML += `<div class="factor-pill ${f.hl ? 'highlight' : ''}">${f.v}</div>`);
                
                const gcf = shared.reduce((p, c) => p * c, 1) || 1;
                const formula = shared.length ? shared.join(' × ') : '1';
                document.getElementById('finalResult').innerHTML = `<span>GCF:</span> ${formula} = ${gcf}`;
            } else {
                // LCM Logic - Fixed version
                const countsA = {}; 
                const countsB = {}; 
                
                factorsA.forEach(f => countsA[f] = (countsA[f] || 0) + 1);
                factorsB.forEach(f => countsB[f] = (countsB[f] || 0) + 1);
                
                // Get all unique primes from both numbers
                const allPrimesSet = new Set([...factorsA, ...factorsB]);
                const allPrimes = Array.from(allPrimesSet).sort((a, b) => a - b);
                
                const lcmFactors = [];
                allPrimes.forEach(p => {
                    const countA = countsA[p] || 0;
                    const countB = countsB[p] || 0;
                    const maxCount = Math.max(countA, countB);
                    for(let i = 0; i < maxCount; i++) {
                        lcmFactors.push(p);
                    }
                });

                factorsA.forEach(f => rowA.innerHTML += `<div class="factor-pill highlight">${f}</div>`);
                factorsB.forEach(f => rowB.innerHTML += `<div class="factor-pill highlight">${f}</div>`);
                
                const lcm = lcmFactors.reduce((p, c) => p * c, 1);
                const formula = lcmFactors.length > 0 ? lcmFactors.join(' × ') : '1';
                document.getElementById('finalResult').innerHTML = `<span>LCM:</span> ${formula} = ${lcm}`;
            }
        }

        window.setMode = function(m) {
            mode = m;
            document.getElementById('tabGCF').classList.toggle('active', m === 'GCF');
            document.getElementById('tabLCM').classList.toggle('active', m === 'LCM');
            update();
        };

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * devicePixelRatio;
            canvas.height = height * devicePixelRatio;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            ctx.scale(devicePixelRatio, devicePixelRatio);
            update();
        }

        function drawBackground() {
            // Soft grid
            ctx.strokeStyle = colors.grid;
            ctx.lineWidth = 1;
            ctx.beginPath();
            for(let i = 0; i < width; i += 60) { 
                ctx.moveTo(i, 0); 
                ctx.lineTo(i, height); 
            }
            for(let i = 0; i < height; i += 60) { 
                ctx.moveTo(0, i); 
                ctx.lineTo(width, i); 
            }
            ctx.stroke();
        }

        function drawTree() {
            // Draw edges first
            ctx.strokeStyle = colors.nodeStroke;
            ctx.lineWidth = 2;
            nodes.forEach(n => {
                const children = nodes.filter(c => 
                    (c.side === n.side) && 
                    Math.abs(c.level - n.level) === 1 &&
                    Math.abs(c.x - n.x) < 100
                );
                children.forEach(c => {
                    ctx.beginPath();
                    ctx.moveTo(n.x, n.y);
                    ctx.lineTo(c.x, c.y);
                    ctx.stroke();
                });
            });

            // Draw nodes
            nodes.forEach(n => {
                ctx.beginPath();
                ctx.arc(n.x, n.y, 18, 0, Math.PI * 2);
                ctx.fillStyle = isPrime(n.v) ? colors.primeFill : colors.nodeFill;
                ctx.fill();
                ctx.strokeStyle = colors.nodeStroke;
                ctx.lineWidth = 2.5;
                ctx.stroke();
                
                ctx.fillStyle = isPrime(n.v) ? colors.primeText : colors.nodeText;
                ctx.font = '600 14px "SF Mono", "Menlo", monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(n.v, n.x, n.y);
            });
        }

        function loop() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = colors.bg;
            ctx.fillRect(0, 0, width, height);
            
            drawBackground();
            drawTree();

            requestAnimationFrame(loop);
        }

        document.getElementById('numA').oninput = update;
        document.getElementById('numB').oninput = update;
        window.onresize = resize;
        
        resize();
        loop();
    })();
</script>
</body>
</html>
