<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 9 Math Lab: Division Algorithm</title>
    <style>
        :root {
            --primary-blue: #0056b3;
            --liquid-blue: #4da3ff;
            --white: #ffffff;
            --bg: #f4f7f9;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .lab-shell {
            width: 95%;
            max-width: 1000px;
            margin: 20px;
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(0, 86, 179, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--primary-blue);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .lab-layout {
            display: grid;
            grid-template-columns: 1fr 320px;
            padding: 20px;
            gap: 20px;
        }

        @media (max-width: 850px) {
            .lab-layout { grid-template-columns: 1fr; }
        }

        .canvas-container {
            background: #fff;
            border-radius: 15px;
            border: 2px solid #e1e8ed;
            position: relative;
            min-height: 400px;
        }

        canvas {
            width: 100%;
            height: auto;
            display: block;
        }

        .formula-card {
            background: #e7f1ff;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 15px;
            border-bottom: 4px solid var(--primary-blue);
        }

        .equation-text {
            font-size: 1.6rem;
            font-weight: bold;
            color: var(--primary-blue);
        }

        .control-panel {
            background: #fdfdfd;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #eee;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        .info-box {
            font-size: 0.85rem;
            color: #555;
            background: #fffbe6;
            padding: 12px;
            border-radius: 8px;
            border-left: 5px solid #ffc107;
            line-height: 1.4;
        }

        #alertBox {
            display: none;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary-blue);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            z-index: 1000;
        }
    </style>
</head>
<body>

<div id="alertBox">Perfect Divisibility! Remainder is 0.</div>

<div class="lab-shell">
    <header>
        <h2 style="margin:0">Division Algorithm Balance</h2>
        <p style="margin:5px 0 0">Visualizing $a = bq + r$</p>
    </header>

    <div class="lab-layout">
        <main>
            <div class="formula-card">
                <div style="font-size:0.8rem; color:#666; margin-bottom:5px">THE ALGORITHM</div>
                <div class="equation-text" id="formulaDisplay">15 = (4 × 3) + 3</div>
            </div>
            <div class="canvas-container">
                <canvas id="divisionCanvas" width="600" height="400"></canvas>
            </div>
        </main>

        <aside class="control-panel">
            <div class="input-group">
                <label>Total Liquid ($a$)</label>
                <input type="range" id="valA" min="1" max="50" value="15">
                <div style="text-align:right; font-weight:bold; color:var(--primary-blue)" id="labelA">a = 15</div>
            </div>

            <div class="input-group">
                <label>Cup Capacity ($b$)</label>
                <input type="range" id="valB" min="1" max="10" value="4">
                <div style="text-align:right; font-weight:bold; color:var(--primary-blue)" id="labelB">b = 4</div>
            </div>

            <div class="info-box">
                <strong>Concept:</strong> $a$ is the total volume. $b$ is the size of each cup. $q$ is the number of full cups. $r$ is the leftover liquid.
            </div>

            <div style="font-size: 0.85rem; color: #666; margin-top: 10px;">
                <strong>Quotient ($q$):</strong> <span id="resQ" style="font-weight:bold">3</span><br>
                <strong>Remainder ($r$):</strong> <span id="resR" style="font-weight:bold">3</span>
            </div>
        </aside>
    </div>
</div>

<script>
    const canvas = document.getElementById('divisionCanvas');
    const ctx = canvas.getContext('2d');
    const alertBox = document.getElementById('alertBox');

    // State Variables
    let a = 15;
    let b = 4;

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const q = Math.floor(a / b);
        const r = a % b;

        updateUI(q, r);

        // Visualization Constants
        const cupWidth = 50;
        const cupMaxHeight = 80;
        const startX = 50;
        const startY = 100;

        // 1. Draw "Total Liquid" Reservoir (The Dividend 'a')
        ctx.strokeStyle = '#333';
        ctx.lineWidth = 2;
        ctx.strokeRect(startX, startY, 60, 200);
        ctx.fillStyle = 'rgba(77, 163, 255, 0.1)';
        ctx.fillRect(startX, startY, 60, 200);
        
        // Liquid in Tank
        const tankMaxA = 50;
        const liquidLevel = (a / tankMaxA) * 200;
        ctx.fillStyle = '#4da3ff'; // Corrected variable usage
        ctx.fillRect(startX, startY + (200 - liquidLevel), 60, liquidLevel);
        
        ctx.fillStyle = '#333';
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';
        ctx.fillText("Dividend (a)", startX + 30, startY - 10);

        // 2. Draw "Cups" (The Quotient 'q')
        for (let i = 0; i < q; i++) {
            const row = Math.floor(i / 5);
            const col = i % 5;
            const x = 160 + col * 80;
            const y = startY + row * 120;
            
            drawCup(x, y, cupWidth, cupMaxHeight, 1); // 1 = 100% full
        }

        // 3. Draw "Remainder Cup" (The Remainder 'r')
        if (r > 0) {
            const nextIdx = q;
            const row = Math.floor(nextIdx / 5);
            const col = nextIdx % 5;
            const rx = 160 + col * 80;
            const ry = startY + row * 120;
            drawCup(rx, ry, cupWidth, cupMaxHeight, r / b);
            
            ctx.fillStyle = '#d9534f'; // Red color for remainder
            ctx.font = 'italic 12px Arial';
            ctx.fillText("rem (r)", rx + cupWidth/2, ry + cupMaxHeight + 15);
        }

        // Legend Text
        ctx.fillStyle = '#0056b3';
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'left';
        ctx.fillText(`Quotient (q) = ${q} full cups`, 160, startY - 10);
    }

    function drawCup(x, y, w, h, fillPercent) {
        // Cup Geometry (Trapezoid)
        const taper = 10;
        
        // Draw Liquid First (so outline is on top)
        if (fillPercent > 0) {
            const fillH = h * fillPercent;
            ctx.fillStyle = '#4da3ff';
            ctx.beginPath();
            ctx.moveTo(x + taper, y + h);
            ctx.lineTo(x + w - taper, y + h);
            // Calculate side points based on fill height
            const topTaper = taper * (1 - fillPercent);
            ctx.lineTo(x + w - topTaper, y + h - fillH);
            ctx.lineTo(x + topTaper, y + h - fillH);
            ctx.closePath();
            ctx.fill();
        }

        // Draw Cup Outline
        ctx.strokeStyle = '#004085';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + taper, y + h);
        ctx.lineTo(x + w - taper, y + h);
        ctx.lineTo(x + w, y);
        ctx.stroke();
    }

    function updateUI(q, r) {
        document.getElementById('formulaDisplay').innerText = `${a} = (${b} × ${q}) + ${r}`;
        document.getElementById('labelA').innerText = `a = ${a}`;
        document.getElementById('labelB').innerText = `b = ${b}`;
        document.getElementById('resQ').innerText = q;
        document.getElementById('resR').innerText = r;

        // Perfect Divisibility Alert
        if (r === 0 && a > 0) {
            alertBox.style.display = 'block';
            setTimeout(() => { alertBox.style.display = 'none'; }, 2000);
        }
    }

    // Event Listeners for Controls
    document.getElementById('valA').addEventListener('input', (e) => {
        a = parseInt(e.target.value);
        draw();
    });

    document.getElementById('valB').addEventListener('input', (e) => {
        b = parseInt(e.target.value);
        draw();
    });

    // Initial Trigger
    draw();
</script>

</body>
</html>
