<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rational Spiral | Interactive Math</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');

        :root {
            --neon-cyan: #00f2ff;
            --neon-purple: #bc13fe;
            --bg-deep: #05070a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(188, 19, 254, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 0% 0%, rgba(0, 242, 255, 0.05) 0%, transparent 30%);
            color: white;
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
        }

        /* Interactive HUD */
        .hud {
            position: absolute;
            top: 40px;
            left: 40px;
            padding: 30px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            z-index: 10;
            transition: transform 0.3s ease;
        }

        .hud:hover { transform: scale(1.02); }

        .input-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        input {
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--glass-border);
            color: var(--neon-cyan);
            font-size: 3rem;
            font-weight: 700;
            width: 80px;
            text-align: center;
            font-family: 'Space Grotesk', sans-serif;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus { border-color: var(--neon-purple); }

        .divider { font-size: 3rem; color: rgba(255,255,255,0.2); }

        .decimal-sub {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.5);
            font-family: monospace;
            margin-top: 5px;
        }

        #alert {
            position: absolute;
            top: 40px;
            right: 40px;
            padding: 10px 25px;
            background: rgba(188, 19, 254, 0.1);
            border: 1px solid var(--neon-purple);
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--neon-purple);
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0;
            transition: 0.5s;
        }

        .active-alert { opacity: 1 !important; }

        .controls-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            pointer-events: none;
        }

        canvas { width: 100vw; height: 100vh; cursor: crosshair; }
    </style>
</head>
<body>

    <div id="alert">Periodicity Sync Active</div>

    <div class="hud">
        <div style="font-size: 0.7rem; letter-spacing: 2px; color: var(--neon-cyan); margin-bottom: 10px;">RATIONAL INPUT</div>
        <div class="input-container">
            <input type="number" id="numIn" value="1" min="1" max="999">
            <span class="divider">/</span>
            <input type="number" id="denIn" value="7" min="2" max="999">
        </div>
        <div class="decimal-sub" id="decDisplay">0.142857...</div>
    </div>

    <div class="controls-hint">
        Type Numbers Above OR Drag Canvas to Explore
    </div>

    <canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const numIn = document.getElementById('numIn');
    const denIn = document.getElementById('denIn');
    const decDisplay = document.getElementById('decDisplay');
    const alert = document.getElementById('alert');

    let w, h, num = 1, den = 7, rotation = 0, isDragging = false, lastX, lastY, zoom = 1.2;

    function resize() {
        w = window.innerWidth; h = window.innerHeight;
        canvas.width = w * devicePixelRatio; canvas.height = h * devicePixelRatio;
        ctx.scale(devicePixelRatio, devicePixelRatio);
    }

    function calculateExpansion(n, d) {
        let digits = [], remainder = n % d, seen = new Map(), loopIdx = -1;
        for (let i = 0; i < 200; i++) {
            if (remainder === 0) break;
            if (seen.has(remainder)) { loopIdx = seen.get(remainder); break; }
            seen.set(remainder, i);
            remainder *= 10;
            digits.push(Math.floor(remainder / d));
            remainder %= d;
        }
        return { digits, loopIdx, isTerm: remainder === 0 };
    }

    function draw() {
        ctx.clearRect(0, 0, w, h);
        rotation += 0.005;
        
        const data = calculateExpansion(num, den);
        const centerX = w / 2, centerY = h / 2;

        let points = [];
        data.digits.forEach((digit, i) => {
            let angle = (digit * Math.PI * 2 / 10) + rotation + (i * 0.02);
            let radius = (60 + i * 1.2) * zoom;
            let z = Math.sin(angle) * radius;
            let x = Math.cos(angle) * radius;
            let y = (i * 4 - (data.digits.length * 2)) * zoom;
            let pScale = (z + 400) / 800;
            points.push({ x: centerX + x * pScale, y: centerY + y * pScale, p: pScale, val: digit, isLoop: i >= data.loopIdx && data.loopIdx !== -1 });
        });

        // Update HUD
        let dStr = "0.";
        data.digits.slice(0, 15).forEach(d => dStr += d);
        decDisplay.innerText = dStr + (data.isTerm ? "" : "...");
        if (data.loopIdx !== -1) alert.classList.add('active-alert');
        else alert.classList.remove('active-alert');

        // Draw Lines
        for (let i = 1; i < points.length; i++) {
            const p1 = points[i-1], p2 = points[i];
            ctx.beginPath();
            ctx.strokeStyle = p2.isLoop ? `hsla(280, 80%, 60%, ${p2.p * 0.6})` : `hsla(180, 80%, 60%, ${p2.p * 0.4})`;
            ctx.lineWidth = p2.p * 3;
            ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
            ctx.stroke();
        }

        // Draw Nodes
        points.forEach((p, i) => {
            ctx.fillStyle = p.isLoop ? `hsla(280, 100%, 70%, ${p.p})` : `hsla(180, 100%, 70%, ${p.p})`;
            ctx.beginPath();
            ctx.arc(p.x, p.y, (p.isLoop ? 3.5 : 1.5) * p.p, 0, Math.PI * 2);
            ctx.fill();
        });

        requestAnimationFrame(draw);
    }

    // Controls
    [numIn, denIn].forEach(el => el.addEventListener('input', () => {
        num = parseInt(numIn.value) || 1;
        den = parseInt(denIn.value) || 2;
    }));

    window.addEventListener('mousedown', e => { 
        if(e.target.tagName !== 'INPUT') { isDragging = true; lastX = e.clientX; lastY = e.clientY; }
    });
    window.addEventListener('mousemove', e => {
        if (!isDragging) return;
        let dx = e.clientX - lastX, dy = e.clientY - lastY;
        if (Math.abs(dx) > 30) { num = Math.max(1, num + (dx > 0 ? 1 : -1)); numIn.value = num; lastX = e.clientX; }
        if (Math.abs(dy) > 30) { den = Math.max(2, den + (dy > 0 ? 1 : -1)); denIn.value = den; lastY = e.clientY; }
    });
    window.addEventListener('mouseup', () => isDragging = false);
    window.addEventListener('wheel', e => { zoom = Math.max(0.3, Math.min(4, zoom - e.deltaY * 0.001)); });
    window.addEventListener('resize', resize);
    resize(); draw();
</script>
</body>
</html>
