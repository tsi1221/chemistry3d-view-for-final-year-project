<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> Prime factorization</title>
    <style>
        :root {
            --bg: #f8f9fa;
            --surface: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #6b7280;
            --accent-blue: #3b82f6;
            --accent-gold: #e6a700;
            --danger: #ef4444;
            --border-light: #e5e7eb;
            --border-medium: #d1d5db;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06);
            --font-sans: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text-primary);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #canvas { 
            display: block; 
            touch-action: none; 
            background: linear-gradient(135deg, #fafbfc 0%, #f0f2f5 100%);
            cursor: default;
        }
        
        #canvas.dragging-node {
            cursor: grabbing;
        }

        .ui-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border-light);
            border-radius: 14px;
            padding: 18px;
            pointer-events: auto;
            box-shadow: var(--shadow-sm);
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
        }

        .lab-title h1 { 
            font-size: 1rem; 
            font-weight: 600;
            letter-spacing: -0.01em;
            color: var(--accent-blue); 
            text-transform: uppercase; 
        }
        .lab-title p { 
            font-size: 0.7rem; 
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .controls { 
            width: 300px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }

        .input-group { 
            display: flex; 
            gap: 8px; 
        }
        
        input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border-medium);
            border-radius: 8px;
            padding: 8px 12px;
            color: var(--text-primary);
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.15s;
        }

        input:focus { 
            border-color: var(--accent-blue); 
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        button {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.15s;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        button:hover { 
            background: #2563eb; 
        }
        button:active { 
            transform: scale(0.98); 
        }
        button.secondary { 
            background: transparent; 
            border: 1px solid var(--border-medium); 
            color: var(--text-primary);
        }
        button.secondary:hover {
            background: var(--bg);
            border-color: var(--border-medium);
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        #decomposeBtn {
            background: var(--danger);
            flex: 1;
        }
        #decomposeBtn:hover {
            background: #dc2626;
        }

        .instructions {
            font-size: 0.7rem;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-top: 4px;
        }

        .overlay-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .msg-text { 
            font-size: 1.4rem; 
            font-weight: 500;
            letter-spacing: -0.02em;
        }

        .footer { 
            display: flex; 
            justify-content: space-between;
            align-items: flex-end; 
        }

        .footer .panel {
            text-align: right;
            min-width: 180px;
        }

        #formula-display {
            font-family: 'SF Mono', 'Monaco', monospace;
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--accent-gold);
        }

        #type-label {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--accent-blue);
        }

        .zoom-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            pointer-events: auto;
        }

        .zoom-btn {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            background: var(--surface);
            border: 1px solid var(--border-light);
            color: var(--text-primary);
            font-size: 1.2rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: all 0.15s;
            padding: 0;
        }

        .zoom-btn:hover {
            background: var(--bg);
            border-color: var(--border-medium);
        }

        .zoom-level {
            background: var(--surface);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            box-shadow: var(--shadow-sm);
        }

        .drag-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: var(--surface);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 0.7rem;
            color: var(--text-secondary);
            pointer-events: none;
            box-shadow: var(--shadow-sm);
            opacity: 0.7;
        }

        @media (max-width: 600px) {
            .controls { width: 100%; }
            .header { flex-direction: column; gap: 12px; }
            .footer { flex-direction: column; align-items: flex-start; gap: 8px; }
            .drag-hint { display: none; }
            .zoom-controls { bottom: 80px; }
            .panel { padding: 14px; }
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="ui-container">
    <div class="header">
        <div class="lab-title">
            <h1>Factor Tree Lab</h1>
            <p>Visual prime decomposition</p>
        </div>
        
        <div class="panel controls">
            <div class="input-group">
                <input type="number" id="numInput" value="60" min="2" max="1000" placeholder="Enter number">
                <button id="spawnBtn">Go</button>
            </div>
            <div class="btn-group">
                <button id="decomposeBtn">Grow tree</button>
                <button id="clearBtn" class="secondary">Reset</button>
                <button id="resetPositionsBtn" class="secondary">↻</button>
            </div>
            <p class="instructions">
                Enter a number (2–1000) → Grow tree<br>
                Drag nodes to reposition · Scroll to zoom · ↻ to reset positions
            </p>
        </div>
    </div>

    <div class="overlay-msg" id="overlay" style="opacity: 0;">
        <div class="msg-text" id="statusText"></div>
    </div>

    <div class="footer">
        <div class="drag-hint">
            ✥ Drag nodes to arrange · Scroll to zoom
        </div>
        <div class="panel">
            <div id="formula-display"></div>
            <div id="type-label">—</div>
        </div>
    </div>
</div>

<div class="zoom-controls">
    <button class="zoom-btn" id="zoomOut">−</button>
    <div class="zoom-level" id="zoomLevel">100%</div>
    <button class="zoom-btn" id="zoomIn">+</button>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const numInput = document.getElementById('numInput');
    const spawnBtn = document.getElementById('spawnBtn');
    const decomposeBtn = document.getElementById('decomposeBtn');
    const clearBtn = document.getElementById('clearBtn');
    const resetPositionsBtn = document.getElementById('resetPositionsBtn');
    const formulaDisplay = document.getElementById('formula-display');
    const typeLabel = document.getElementById('type-label');
    const statusText = document.getElementById('statusText');
    const overlay = document.getElementById('overlay');
    const zoomInBtn = document.getElementById('zoomIn');
    const zoomOutBtn = document.getElementById('zoomOut');
    const zoomLevelEl = document.getElementById('zoomLevel');

    let width, height;
    let treeRoot = null;
    let nodes = [];
    let mouse = { x: 0, y: 0 };
    let laserAlpha = 0;
    let targetX = 0;

    // Transform variables
    let panX = 0;
    let panY = 0;
    let zoom = 1.0;
    const MIN_ZOOM = 0.3;
    const MAX_ZOOM = 2.0;
    const ZOOM_STEP = 0.1;
    
    // Dragging variables
    let draggedNode = null;
    let isDraggingNode = false;
    let dragOffsetX = 0;
    let dragOffsetY = 0;

    const NODE_RADIUS = 26;
    const LEVEL_HEIGHT = 100;
    const HORIZONTAL_SPACING = 1.4;

    function isPrime(n) {
        if (n < 2) return false;
        for (let i = 2; i <= Math.sqrt(n); i++) if (n % i === 0) return false;
        return true;
    }

    function getSmallestFactor(n) {
        for (let i = 2; i <= Math.sqrt(n); i++) if (n % i === 0) return i;
        return n;
    }

    class TreeNode {
        constructor(val, level, x, y, parent = null) {
            this.val = val;
            this.level = level;
            this.originalX = x;
            this.originalY = y;
            this.userOffsetX = 0;
            this.userOffsetY = 0;
            this.x = x;
            this.y = y;
            this.parent = parent;
            this.isPrime = isPrime(val);
            this.left = null;
            this.right = null;
            this.t = 0;
        }

        // Apply user offset to current position
        applyUserOffset() {
            this.x = (this.originalX + this.userOffsetX + panX) * zoom;
            this.y = (this.originalY + this.userOffsetY + panY) * zoom;
        }

        // Update positions for zoom/pan changes
        updateTransform() {
            this.x = (this.originalX + this.userOffsetX + panX) * zoom;
            this.y = (this.originalY + this.userOffsetY + panY) * zoom;
            
            if (this.left) this.left.updateTransform();
            if (this.right) this.right.updateTransform();
        }

        resetUserOffset() {
            this.userOffsetX = 0;
            this.userOffsetY = 0;
            if (this.left) this.left.resetUserOffset();
            if (this.right) this.right.resetUserOffset();
            this.updateTransform();
        }

        update() {
            // No automatic movement - nodes stay where user puts them
            // Only update if not being dragged
            if (!isDraggingNode || this !== draggedNode) {
                // Keep current position
            }
        }

        draw() {
            // Draw connections
            if (this.left && this.right) {
                ctx.beginPath();
                ctx.strokeStyle = '#d4d4d8';
                ctx.lineWidth = 1.5 * zoom;
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.left.x, this.left.y);
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.right.x, this.right.y);
                ctx.stroke();
            }

            const scaledMouseX = mouse.x / zoom;
            const scaledMouseY = mouse.y / zoom;
            const scaledNodeX = this.x / zoom;
            const scaledNodeY = this.y / zoom;
            
            const isHovered = Math.hypot(scaledNodeX - scaledMouseX, scaledNodeY - scaledMouseY) < NODE_RADIUS;
            
            ctx.save();
            ctx.translate(this.x, this.y);
            
            if (this.isPrime) {
                this.drawPrimeNode(isHovered || this === draggedNode);
            } else {
                this.drawCompositeNode(isHovered || this === draggedNode);
            }

            ctx.font = `600 ${NODE_RADIUS * 0.55 * zoom}px 'SF Mono', Monaco, monospace`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = this.isPrime ? '#ffffff' : '#1a1a1a';
            ctx.fillText(this.val, 0, 0);

            ctx.restore();

            if (isHovered) this.updateInfo();
        }

        drawPrimeNode(hovered) {
            const r = (NODE_RADIUS + (hovered ? 2 : 0)) * zoom;
            
            const grad = ctx.createRadialGradient(-5 * zoom, -5 * zoom, 0, 0, 0, r);
            grad.addColorStop(0, '#60a5fa');
            grad.addColorStop(1, '#2563eb');

            ctx.shadowColor = 'rgba(59, 130, 246, 0.2)';
            ctx.shadowBlur = (hovered ? 12 : 6) * zoom;
            ctx.shadowOffsetY = 2 * zoom;
            
            ctx.beginPath();
            ctx.arc(0, 0, r, 0, Math.PI * 2);
            ctx.fillStyle = grad;
            ctx.fill();
            
            ctx.shadowBlur = 0;
            ctx.shadowOffsetY = 0;
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2.5 * zoom;
            ctx.stroke();
        }

        drawCompositeNode(hovered) {
            const r = NODE_RADIUS * zoom;
            
            ctx.shadowColor = 'rgba(0, 0, 0, 0.05)';
            ctx.shadowBlur = 6 * zoom;
            ctx.shadowOffsetY = 2 * zoom;
            
            ctx.beginPath();
            ctx.arc(0, 0, r, 0, Math.PI * 2);
            ctx.fillStyle = hovered ? '#fef9c3' : '#ffffff';
            ctx.fill();
            
            ctx.shadowBlur = 0;
            ctx.shadowOffsetY = 0;
            ctx.strokeStyle = hovered ? '#e6a700' : '#d4d4d8';
            ctx.lineWidth = (hovered ? 2 : 1.5) * zoom;
            ctx.setLineDash(hovered ? [] : [4 * zoom, 3 * zoom]);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        updateInfo() {
            if (this.isPrime) {
                formulaDisplay.textContent = `${this.val} · prime`;
                typeLabel.textContent = 'Prime leaf';
                typeLabel.style.color = '#3b82f6';
            } else {
                formulaDisplay.textContent = `${this.left.val} × ${this.right.val}`;
                typeLabel.textContent = 'Composite branch';
                typeLabel.style.color = '#e6a700';
            }
        }
    }

    function getPrimeFactors(n) {
        const factors = [];
        let d = 2;
        let temp = n;
        while (temp > 1) {
            while (temp % d === 0) {
                factors.push(d);
                temp /= d;
            }
            d++;
        }
        return factors;
    }

    function buildTree(node, widthAlloc, startX) {
        nodes.push(node);
        if (node.isPrime) return;

        const factor = getSmallestFactor(node.val);
        const otherFactor = node.val / factor;

        const nextY = node.originalY + LEVEL_HEIGHT;
        const leftX = startX + widthAlloc / (2 * HORIZONTAL_SPACING);
        const rightX = startX + widthAlloc * (1 - 1 / (2 * HORIZONTAL_SPACING));

        node.left = new TreeNode(factor, node.level + 1, leftX, nextY, node);
        node.right = new TreeNode(otherFactor, node.level + 1, rightX, nextY, node);

        buildTree(node.left, widthAlloc / 2, startX);
        buildTree(node.right, widthAlloc / 2, startX + widthAlloc / 2);
    }

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width * devicePixelRatio;
        canvas.height = height * devicePixelRatio;
        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';
        ctx.scale(devicePixelRatio, devicePixelRatio);
        if (treeRoot) resetTree();
    }

    function resetTree() {
        nodes = [];
        treeRoot = null;
        formulaDisplay.textContent = '';
        typeLabel.textContent = '—';
        panX = width / 2;
        panY = 100;
        draggedNode = null;
        isDraggingNode = false;
    }

    function resetNodePositions() {
        if (!treeRoot) return;
        treeRoot.resetUserOffset();
        showStatus('Positions reset', '#6b7280');
    }

    function updateZoomDisplay() {
        zoomLevelEl.textContent = Math.round(zoom * 100) + '%';
    }

    function setZoom(newZoom) {
        zoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, newZoom));
        updateZoomDisplay();
        
        if (treeRoot) {
            treeRoot.updateTransform();
        }
    }

    function growTree() {
        resetTree();
        const val = parseInt(numInput.value);
        if (isNaN(val) || val < 2) {
            showStatus('Enter a number ≥ 2', '#ef4444');
            return;
        }

        if (val > 1000) {
            showStatus('Maximum: 1000', '#ef4444');
            return;
        }

        panX = width / 2;
        panY = 100;
        
        const baseX = 0;
        const baseY = 0;
        
        treeRoot = new TreeNode(val, 0, baseX, baseY);
        buildTree(treeRoot, width * 1.0, -width * 0.5);
        
        treeRoot.updateTransform();
        
        targetX = treeRoot.x;
        laserAlpha = 0.6;

        if (treeRoot.isPrime) {
            showStatus(`${val} is prime`, '#3b82f6');
        } else {
            const factors = getPrimeFactors(val);
            showStatus(`${val} = ${factors.join(' × ')}`, '#e6a700');
        }
    }

    function showStatus(text, color) {
        statusText.textContent = text;
        statusText.style.color = color;
        overlay.style.opacity = '1';
        setTimeout(() => overlay.style.opacity = '0', 2000);
    }

    function findNodeUnderMouse(px, py) {
        for (let i = nodes.length - 1; i >= 0; i--) {
            const node = nodes[i];
            const scaledX = node.x / zoom;
            const scaledY = node.y / zoom;
            const scaledMouseX = px / zoom;
            const scaledMouseY = py / zoom;
            const dist = Math.hypot(scaledX - scaledMouseX, scaledY - scaledMouseY);
            if (dist < NODE_RADIUS) {
                return node;
            }
        }
        return null;
    }

    function startDrag(px, py) {
        const node = findNodeUnderMouse(px, py);
        if (node) {
            draggedNode = node;
            isDraggingNode = true;
            
            const scaledX = node.x / zoom;
            const scaledY = node.y / zoom;
            const scaledMouseX = px / zoom;
            const scaledMouseY = py / zoom;
            
            dragOffsetX = scaledX - scaledMouseX;
            dragOffsetY = scaledY - scaledMouseY;
            
            canvas.classList.add('dragging-node');
        }
    }

    function updateDrag(px, py) {
        if (!isDraggingNode || !draggedNode) return;
        
        const scaledMouseX = px / zoom;
        const scaledMouseY = py / zoom;
        
        // Calculate new position in world space
        const newWorldX = scaledMouseX + dragOffsetX;
        const newWorldY = scaledMouseY + dragOffsetY;
        
        // Update user offset based on new position
        draggedNode.userOffsetX = newWorldX - draggedNode.originalX - panX;
        draggedNode.userOffsetY = newWorldY - draggedNode.originalY - panY;
        
        // Update this node's position
        draggedNode.x = (draggedNode.originalX + draggedNode.userOffsetX + panX) * zoom;
        draggedNode.y = (draggedNode.originalY + draggedNode.userOffsetY + panY) * zoom;
    }

    function endDrag() {
        draggedNode = null;
        isDraggingNode = false;
        canvas.classList.remove('dragging-node');
    }

    function loop() {
        ctx.clearRect(0, 0, width, height);

        if (laserAlpha > 0) {
            ctx.beginPath();
            const grad = ctx.createLinearGradient(targetX, 0, targetX, height);
            grad.addColorStop(0, 'rgba(239, 68, 68, 0)');
            grad.addColorStop(0.15, `rgba(239, 68, 68, ${laserAlpha * 0.3})`);
            grad.addColorStop(1, 'rgba(239, 68, 68, 0)');
            ctx.strokeStyle = grad;
            ctx.lineWidth = 1.5;
            ctx.moveTo(targetX, 0);
            ctx.lineTo(targetX, height);
            ctx.stroke();
            laserAlpha -= 0.015;
        }

        nodes.forEach(n => {
            n.update();
            n.draw();
        });

        requestAnimationFrame(loop);
    }

    // Event listeners
    window.addEventListener('resize', resize);
    
    spawnBtn.onclick = decomposeBtn.onclick = growTree;
    
    clearBtn.onclick = () => {
        resetTree();
        showStatus('Cleared', '#6b7280');
        setZoom(1.0);
    };
    
    resetPositionsBtn.onclick = resetNodePositions;

    // Zoom controls
    zoomInBtn.onclick = () => setZoom(zoom + ZOOM_STEP);
    zoomOutBtn.onclick = () => setZoom(zoom - ZOOM_STEP);

    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? -ZOOM_STEP : ZOOM_STEP;
        setZoom(zoom + delta);
    }, { passive: false });

    const getCoord = (e) => {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    };

    canvas.addEventListener('mousedown', (e) => {
        const pos = getCoord(e);
        startDrag(pos.x, pos.y);
    });

    window.addEventListener('mousemove', (e) => {
        const pos = getCoord(e);
        mouse.x = pos.x;
        mouse.y = pos.y;
        
        if (isDraggingNode) {
            updateDrag(pos.x, pos.y);
        }
    });

    window.addEventListener('mouseup', () => {
        endDrag();
    });

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const pos = getCoord(e);
        startDrag(pos.x, pos.y);
    });

    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const pos = getCoord(e);
        mouse.x = pos.x;
        mouse.y = pos.y;
        
        if (isDraggingNode) {
            updateDrag(pos.x, pos.y);
        }
    });

    canvas.addEventListener('touchend', (e) => {
        e.preventDefault();
        endDrag();
    });

    // Initialize
    resize();
    setZoom(1.0);
    loop();
</script>
</body>
</html>
