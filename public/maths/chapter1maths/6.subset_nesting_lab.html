<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 9 Math Lab: Subset Nesting</title>
    <style>
        :root {
            --primary: #0056b3;
            --secondary: #7A2CFF;
            --bg: #f0f7ff;
            --white: #ffffff;
            --success: #28a745;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: #333;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .lab-wrapper {
            width: 95%;
            max-width: 950px;
            margin: 25px auto;
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(0, 86, 179, 0.12);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--primary);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 300px;
            padding: 20px;
            gap: 20px;
        }

        @media (max-width: 800px) {
            .main-content { grid-template-columns: 1fr; }
        }

        /* Visualization Area */
        .viz-area {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .formula-container {
            width: 100%;
            background: #eef6ff;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            text-align: center;
            border-bottom: 4px solid var(--primary);
        }

        .formula-text {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary);
            letter-spacing: 2px;
        }

        canvas {
            background: white;
            border: 2px solid #ddecff;
            border-radius: 15px;
            width: 100%;
            height: auto;
            max-width: 500px;
            touch-action: none;
        }

        /* Controls Area */
        .controls {
            background: #fdfdfd;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #eee;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .slider-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 10px;
            background: #eee;
        }

        .is-subset { background: #d4edda; color: #155724; }
        .not-subset { background: #f8d7da; color: #721c24; }

        .educational-note {
            font-size: 0.85rem;
            line-height: 1.5;
            color: #555;
            padding: 10px;
            background: #fff9db;
            border-radius: 8px;
            border: 1px solid #ffe066;
        }
    </style>
</head>
<body>

<div class="lab-wrapper">
    <header>
        <h2 style="margin:0">Subset Nesting Lab</h2>
        <p style="margin:5px 0 0">Understanding $A \subseteq B$ through containment</p>
    </header>

    <div class="main-content">
        <main class="viz-area">
            <div class="formula-container">
                <div id="subsetStatus" class="status-badge not-subset">Not a Subset</div>
                <div class="formula-text" id="notation">A ⊈ B</div>
            </div>
            <canvas id="nestingCanvas" width="500" height="400"></canvas>
        </main>

        <aside class="controls">
            <div class="slider-group">
                <label>Set A Size (Radius)</label>
                <input type="range" id="radiusA" min="30" max="120" value="60">
            </div>

            <div class="slider-group">
                <label>Set A Position (Horizontal)</label>
                <input type="range" id="posXA" min="100" max="400" value="150">
            </div>

            <div class="slider-group">
                <label>Set B Size (Fixed Boundary)</label>
                <input type="range" id="radiusB" min="100" max="180" value="140">
            </div>

            <div class="educational-note">
                <strong>Concept:</strong> $A$ is a subset of $B$ ($A \subseteq B$) only if every point in $A$ is also inside $B$. Move Set A inside B to see it in action!
            </div>
        </aside>
    </div>
</div>

<script>
    const canvas = document.getElementById('nestingCanvas');
    const ctx = canvas.getContext('2d');
    const notation = document.getElementById('notation');
    const subsetStatus = document.getElementById('subsetStatus');

    // Set Properties
    let setB = { x: 250, y: 200, r: 140, color: 'rgba(0, 86, 179, 0.05)', stroke: '#0056b3' };
    let setA = { x: 150, y: 200, r: 60, color: 'rgba(122, 44, 255, 0.2)', stroke: '#7A2CFF' };

    function checkSubset() {
        // Distance between centers
        const d = Math.sqrt(Math.pow(setA.x - setB.x, 2) + Math.pow(setA.y - setB.y, 2));
        
        // A is a subset of B if the distance + radiusA <= radiusB
        if (d + setA.r <= setB.r) {
            if (setA.r < setB.r) {
                notation.innerHTML = "A ⊂ B";
                subsetStatus.innerText = "Proper Subset";
            } else {
                notation.innerHTML = "A ⊆ B";
                subsetStatus.innerText = "Subset (Equal)";
            }
            subsetStatus.className = "status-badge is-subset";
            setB.color = 'rgba(40, 167, 69, 0.1)';
        } else {
            notation.innerHTML = "A ⊈ B";
            subsetStatus.innerText = "Not a Subset";
            subsetStatus.className = "status-badge not-subset";
            setB.color = 'rgba(0, 86, 179, 0.05)';
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Coordinate Grid
        ctx.strokeStyle = "#f0f0f0";
        ctx.lineWidth = 1;
        for(let i=0; i<canvas.width; i+=50) {
            ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width, i); ctx.stroke();
        }

        checkSubset();

        // Draw Set B (The Container)
        ctx.beginPath();
        ctx.arc(setB.x, setB.y, setB.r, 0, Math.PI * 2);
        ctx.fillStyle = setB.color;
        ctx.fill();
        ctx.strokeStyle = setB.stroke;
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.fillStyle = setB.stroke;
        ctx.font = "bold 16px sans-serif";
        ctx.fillText("Set B", setB.x - 20, setB.y - setB.r - 10);

        // Draw Set A (The Nested Set)
        ctx.beginPath();
        ctx.arc(setA.x, setA.y, setA.r, 0, Math.PI * 2);
        ctx.fillStyle = setA.color;
        ctx.fill();
        ctx.strokeStyle = setA.stroke;
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.fillStyle = setA.stroke;
        ctx.fillText("Set A", setA.x - 20, setA.y - setA.r - 10);
    }

    // Event Listeners for Controls
    document.getElementById('radiusA').addEventListener('input', (e) => {
        setA.r = parseInt(e.target.value);
        draw();
    });

    document.getElementById('posXA').addEventListener('input', (e) => {
        setA.x = parseInt(e.target.value);
        draw();
    });

    document.getElementById('radiusB').addEventListener('input', (e) => {
        setB.r = parseInt(e.target.value);
        draw();
    });

    // Initial Draw
    draw();
</script>

</body>
</html>
