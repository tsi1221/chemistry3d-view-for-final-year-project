<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AI Lip Movement Detector</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

  <style>
    body { margin: 0; background: #000; font-family: sans-serif; display: flex; justify-content: center; }
    .container { position: relative; width: 640px; height: 480px; margin-top: 50px; }
    video, canvas { position: absolute; left: 0; top: 0; width: 640px; height: 480px; border-radius: 15px; }
    
    #status-box {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      z-index: 10;
    }

    .subtitle {
      background: rgba(0, 0, 0, 0.7);
      color: #00ff00;
      padding: 10px 20px;
      font-size: 24px;
      border-radius: 10px;
      display: inline-block;
      border: 1px solid #00ff00;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
  </style>
</head>

<body>
  <div class="container">
    <video id="input_video"></video>
    <canvas id="output_canvas"></canvas>
    <div id="status-box">
      <span id="subtitle" class="subtitle">Waiting for Face...</span>
    </div>
  </div>

<script>
const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');
const subtitle = document.getElementById('subtitle');

// Indices for the lips in MediaPipe Face Mesh
const UPPER_LIP = 13; 
const LOWER_LIP = 14;

function onResults(results) {
  canvasCtx.save();
  canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
  
  // Draw the camera feed
  canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

  if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
    const landmarks = results.multiFaceLandmarks[0];
    
    // Calculate the distance between top and bottom inner lip
    const topLip = landmarks[UPPER_LIP];
    const bottomLip = landmarks[LOWER_LIP];
    
    // Simple vertical distance calculation
    const lipDistance = Math.abs(topLip.y - bottomLip.y);

    // Threshold: if distance is more than 0.02, lips are moving/open
    if (lipDistance > 0.025) {
      subtitle.innerText = "👄 LIPS MOVING / SPEAKING";
      subtitle.style.color = "#00ff00";
      
      // Draw a small indicator on the lips
      canvasCtx.fillStyle = "#00ff00";
      canvasCtx.beginPath();
      canvasCtx.arc(topLip.x * canvasElement.width, topLip.y * canvasElement.height, 4, 0, 2 * Math.PI);
      canvasCtx.arc(bottomLip.x * canvasElement.width, bottomLip.y * canvasElement.height, 4, 0, 2 * Math.PI);
      canvasCtx.fill();
    } else {
      subtitle.innerText = "LIPS STILL";
      subtitle.style.color = "#ff4444";
    }
  }
  canvasCtx.restore();
}

const faceMesh = new FaceMesh({locateFile: (file) => {
  return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
}});

faceMesh.setOptions({
  maxNumFaces: 1,
  refineLandmarks: true,
  minDetectionConfidence: 0.5,
  minTrackingConfidence: 0.5
});
faceMesh.onResults(onResults);

const camera = new Camera(videoElement, {
  onFrame: async () => {
    await faceMesh.send({image: videoElement});
  },
  width: 640,
  height: 480
});
camera.start();
</script>
</body>
</html>
