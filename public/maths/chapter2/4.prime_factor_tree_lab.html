<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade 9 Math Lab: Prime Factor Trees</title>
    <style>
        :root {
            --primary-blue: #0056b3;
            --white: #ffffff;
            --accent-blue: #00a2ff;
            --bg-light: #f4f7f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .lab-container {
            width: 95%;
            max-width: 900px;
            margin: 20px auto;
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 86, 179, 0.1);
            overflow: hidden;
        }

        header {
            background: var(--primary-blue);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 280px;
            padding: 20px;
            gap: 20px;
        }

        @media (max-width: 800px) {
            .main-layout { grid-template-columns: 1fr; }
        }

        /* Visualization Area */
        .viz-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        canvas {
            background: white;
            border: 2px solid #e1e8ed;
            border-radius: 15px;
            width: 100%;
            height: auto;
            touch-action: none;
        }

        .formula-bar {
            background: #e7f1ff;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--primary-blue);
            border-bottom: 4px solid var(--accent-blue);
        }

        /* Controls */
        .control-panel {
            background: #fdfdfd;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #eee;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .btn-grow {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-grow:hover { background: var(--accent-blue); }

        .educational-box {
            font-size: 0.85rem;
            color: #555;
            background: #fffbe6;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ffe58f;
        }

        /* Alert Notification */
        #blueAlert {
            display: none;
            position: fixed;
            top: 20px;
            background: var(--primary-blue);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            z-index: 1000;
        }
    </style>
</head>
<body>

<div id="blueAlert">Prime Number Detected!</div>

<div class="lab-container">
    <header>
        <h2 style="margin:0">Prime Factor Tree Lab</h2>
        <p style="margin:5px 0 0">Visualizing the Fundamental Theorem of Arithmetic</p>
    </header>

    <div class="main-layout">
        <main class="viz-area">
            <div class="formula-bar" id="factorString">Result: ?</div>
            <canvas id="treeCanvas" width="500" height="500"></canvas>
        </main>

        <aside class="control-panel">
            <div class="input-group">
                <label>Enter Number (2 - 500)</label>
                <input type="number" id="numInput" value="60" min="2" max="500">
            </div>
            
            <button class="btn-grow" onclick="startFactorization()">Grow Factor Tree</button>

            <div class="educational-box">
                <strong>The Theorem:</strong> Every composite number can be expressed uniquely as a product of prime numbers.
            </div>

            <div style="font-size: 0.8rem; color: #888;">
                The branches split until they reach a prime number (the fruit).
            </div>
        </aside>
    </div>
</div>

<script>
    const canvas = document.getElementById('treeCanvas');
    const ctx = canvas.getContext('2d');
    const alertBox = document.getElementById('blueAlert');
    const factorDisplay = document.getElementById('factorString');

    function isPrime(n) {
        if (n < 2) return false;
        for (let i = 2; i <= Math.sqrt(n); i++) {
            if (n % i === 0) return false;
        }
        return true;
    }

    function triggerAlert(msg) {
        alertBox.innerText = msg;
        alertBox.style.display = 'block';
        setTimeout(() => alertBox.style.display = 'none', 2500);
    }

    function startFactorization() {
        const num = parseInt(document.getElementById('numInput').value);
        if (isNaN(num) || num < 2 || num > 500) {
            alert("Please enter a number between 2 and 500.");
            return;
        }

        if (isPrime(num)) {
            triggerAlert(`${num} is a Prime Number!`);
        } else {
            triggerAlert("Factorizing Composite Number...");
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const primes = [];
        drawNode(num, canvas.width / 2, 60, canvas.width / 4, 80, primes);
        
        factorDisplay.innerText = `${num} = ` + (primes.length > 0 ? primes.sort((a,b)=>a-b).join(" × ") : num);
    }

    function drawNode(n, x, y, xOffset, yOffset, primes) {
        // Find smallest factor
        let factor = -1;
        for (let i = 2; i <= Math.sqrt(n); i++) {
            if (n % i === 0) {
                factor = i;
                break;
            }
        }

        // Draw Circle
        ctx.beginPath();
        ctx.arc(x, y, 22, 0, Math.PI * 2);
        
        if (isPrime(n)) {
            ctx.fillStyle = '#00a2ff'; // Prime Fruit
            primes.push(n);
        } else {
            ctx.fillStyle = '#ffffff'; // Composite Branch
        }
        
        ctx.fill();
        ctx.strokeStyle = '#0056b3';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Text
        ctx.fillStyle = isPrime(n) ? '#ffffff' : '#0056b3';
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(n, x, y + 5);

        if (factor !== -1) {
            const leftX = x - xOffset;
            const rightX = x + xOffset;
            const nextY = y + yOffset;

            // Draw Branches
            ctx.beginPath();
            ctx.moveTo(x, y + 22);
            ctx.lineTo(leftX, nextY - 22);
            ctx.moveTo(x, y + 22);
            ctx.lineTo(rightX, nextY - 22);
            ctx.strokeStyle = '#ccc';
            ctx.stroke();

            // Recursive Draw
            drawNode(factor, leftX, nextY, xOffset * 0.5, yOffset, primes);
            drawNode(n / factor, rightX, nextY, xOffset * 0.5, yOffset, primes);
        }
    }

    // Initial load
    startFactorization();
</script>

</body>
</html>
