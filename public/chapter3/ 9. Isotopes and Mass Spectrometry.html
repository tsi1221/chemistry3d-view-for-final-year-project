<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mass Spectrometry Visualizer</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --primary: #38bdf8;
            --secondary: #fbbf24;
            --text: #f1f5f9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 350px;
            background: var(--panel);
            padding: 25px;
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
        }

        .viewport {
            flex-grow: 1;
            position: relative;
            background: #000;
        }

        canvas { width: 100%; height: 100%; }

        .card {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        h1 { font-size: 1.2rem; color: var(--primary); margin: 0; }
        .stat-row { display: flex; justify-content: space-between; margin: 5px 0; font-family: monospace; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        button {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        .add { background: var(--primary); color: #000; }
        .fire { background: #22c55e; color: #000; }
        
        .magnetic-field {
            position: absolute;
            top: 10%; left: 30%; width: 60%; height: 80%;
            border: 2px dashed rgba(56, 189, 248, 0.3);
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(56, 189, 248, 0.2);
            font-size: 5rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h1>Mass Spectrometer</h1>
    
    <div class="card">
        <h2 style="font-size: 0.9rem; margin-top: 0;">Isotope Configuration</h2>
        <div class="stat-row"><span>Protons (Fixed):</span> <span>6 (Carbon)</span></div>
        <div class="stat-row"><span>Neutrons:</span> <span id="nLabel" style="color:var(--secondary)">6</span></div>
        <div class="stat-row"><span>Mass (u):</span> <span id="mLabel">12</span></div>
        
        <div class="btn-group">
            <button class="add" onclick="changeNeutrons(1)">+ Neutron</button>
            <button class="add" onclick="changeNeutrons(-1)">- Neutron</button>
        </div>
    </div>

    <div class="card">
        <button class="fire" style="width:100%" onclick="fireIon()">FIRE ION</button>
        <p style="font-size: 0.8rem; color: #94a3b8; margin-top: 10px;">
            <b>Magnetic Force:</b> $F = qvB$ <br>
            <b>Centripetal Radius:</b> $r = \frac{mv}{qB}$
        </p>
    </div>

    <div class="card" style="font-size: 0.85rem; color: #94a3b8;">
        Notice: <b>C-12</b> (Lighter) takes a sharp turn. <br>
        <b>C-14</b> (Heavier) takes a wider turn.
    </div>
</div>

<div class="viewport">
    <div class="magnetic-field">× × ×</div>
    <canvas id="specCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('specCanvas');
    const ctx = canvas.getContext('2d');
    
    let neutrons = 6;
    let particles = [];
    const protons = 6;

    function resize() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function changeNeutrons(amt) {
        neutrons = Math.max(4, Math.min(8, neutrons + amt));
        document.getElementById('nLabel').innerText = neutrons;
        document.getElementById('mLabel').innerText = protons + neutrons;
    }

    function fireIon() {
        particles.push({
            x: 50,
            y: canvas.height * 0.8,
            vx: 6,
            vy: 0,
            mass: (protons + neutrons),
            history: [],
            active: true,
            color: neutrons === 6 ? '#38bdf8' : (neutrons === 7 ? '#fbbf24' : '#f472b6')
        });
    }

    function update() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw Detector Plate
        ctx.fillStyle = '#334155';
        ctx.fillRect(canvas.width - 20, 0, 20, canvas.height);

        particles.forEach((p, i) => {
            if (!p.active) return;

            // Magnetic field region logic
            if (p.x > canvas.width * 0.3) {
                // Apply a force perpendicular to velocity
                const magneticStrength = 0.08;
                const acceleration = (magneticStrength * p.vx) / (p.mass * 0.1);
                p.vy -= acceleration;
            }

            p.x += p.vx;
            p.y += p.vy;
            p.history.push({x: p.x, y: p.y});

            // Draw Tail
            ctx.beginPath();
            ctx.strokeStyle = p.color;
            ctx.lineWidth = 2;
            p.history.forEach((pos, idx) => {
                if (idx === 0) ctx.moveTo(pos.x, pos.y);
                else ctx.lineTo(pos.x, pos.y);
            });
            ctx.stroke();

            // Draw Ion
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
            ctx.fill();

            if (p.x > canvas.width || p.y < 0) p.active = false;
        });

        requestAnimationFrame(update);
    }

    update();
</script>
</body>
</html>
