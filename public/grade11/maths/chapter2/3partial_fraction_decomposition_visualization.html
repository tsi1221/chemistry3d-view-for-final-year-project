<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🧩 partial fractions · decomposition</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .card {
      max-width: 800px;
      width: 100%;
      background: #fafcff;
      border-radius: 28px;
      border: 1px solid #d0e2ff;
      padding: 20px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.04);
    }

    h2 {
      font-weight: 700;
      font-size: 1.4rem;
      color: #0a1e3c;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .subhead {
      color: #3a628c;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }

    .control-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    .mode-btn {
      flex: 1;
      min-width: 110px;
      padding: 12px 8px;
      border-radius: 40px;
      border: 1.5px solid #d0e2ff;
      background: #fff;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      color: #3a628c;
      transition: 0.15s;
      text-align: center;
    }

    .mode-btn.active {
      background: #3b82f6;
      border-color: #3b82f6;
      color: #fff;
    }

    .decomp-flow {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 20px 0;
    }

    .flow-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .frac-box {
      background: #f0f6ff;
      border: 2px solid #3b82f6;
      border-radius: 16px;
      padding: 16px 24px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.3rem;
      font-weight: 700;
      color: #0a1e3c;
      text-align: center;
    }

    .arrow {
      font-size: 2rem;
      color: #3b82f6;
    }

    .decomp-result {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      flex-wrap: wrap;
      background: #fef9e7;
      border-radius: 20px;
      padding: 20px;
      border: 2px dashed #f59e0b;
    }

    .partial-frac {
      background: #fff;
      border-radius: 14px;
      padding: 12px 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.2rem;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .plus-sign {
      font-size: 1.8rem;
      font-weight: 700;
      color: #f59e0b;
      margin: 0 4px;
    }

    .steps-panel {
      background: #ffffff;
      border-radius: 18px;
      border: 1px solid #d0e2ff;
      padding: 18px;
      margin-top: 20px;
    }

    .step {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      align-items: flex-start;
    }

    .step-num {
      width: 24px;
      height: 24px;
      background: #3b82f6;
      color: #fff;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.8rem;
      flex-shrink: 0;
    }

    .step-content {
      font-size: 0.9rem;
      color: #0a1e3c;
      line-height: 1.5;
    }

    .step-math {
      font-family: 'JetBrains Mono', monospace;
      background: #f8fcff;
      padding: 2px 8px;
      border-radius: 8px;
      margin: 4px 0;
    }

    .legend {
      display: flex;
      gap: 20px;
      margin-top: 16px;
      font-size: 0.75rem;
      color: #3a628c;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    @media (max-width: 600px) {
      .frac-box { font-size: 1rem; padding: 12px 16px; }
      .partial-frac { font-size: 1rem; padding: 8px 14px; }
      .mode-btn { min-width: 80px; font-size: 0.75rem; }
    }
  </style>
</head>
<body>
<div class="card">
  <h2>🧩 partial fraction decomposition</h2>
  <div class="subhead">break complex rational expressions into simpler parts</div>

  <div class="control-row">
    <button class="mode-btn active" data-mode="linear">📏 linear factors</button>
    <button class="mode-btn" data-mode="repeated">🔁 repeated factor</button>
    <button class="mode-btn" data-mode="quadratic">📐 irreducible quadratic</button>
    <button class="mode-btn" data-mode="mixed">🧪 mixed case</button>
  </div>

  <div class="decomp-flow">
    <div class="flow-row">
      <div class="frac-box" id="originalExpr">(6x + 2) / (x + 1)(x + 5)</div>
    </div>
    <div class="flow-row">
      <span class="arrow">↓</span>
    </div>
    <div class="flow-row">
      <div class="decomp-result" id="decompResult">
        <span class="partial-frac">-1/(x+1)</span>
        <span class="plus-sign">+</span>
        <span class="partial-frac">7/(x+5)</span>
      </div>
    </div>
  </div>

  <div class="steps-panel" id="stepsPanel">
    <!-- dynamically filled -->
  </div>

  <div class="legend">
    <div class="legend-item"><span style="color:#3b82f6;">●</span> original expression</div>
    <div class="legend-item"><span style="color:#f59e0b;">●</span> decomposed fractions</div>
    <div class="legend-item"><span>🧮 A, B, C = unknown constants</span></div>
  </div>
</div>

<script>
  (function(){
    const originalExpr = document.getElementById('originalExpr');
    const decompResult = document.getElementById('decompResult');
    const stepsPanel = document.getElementById('stepsPanel');
    
    const examples = {
      linear: {
        expr: '(6x + 2) / ((x + 1)(x + 5))',
        display: '6x + 2', denom: '(x + 1)(x + 5)',
        form: 'A/(x+1) + B/(x+5)',
        solve: () => ({ A: -1, B: 7 }),
        formatResult: (c) => `${c.A}/(x+1) + ${c.B}/(x+5)`,
        formatFracs: (c) => [
          { num: c.A, den: 'x+1' },
          { num: c.B, den: 'x+5' }
        ],
        steps: [
          'Factor denominator: (x+1)(x+5) — already factored.',
          'Set up form: A/(x+1) + B/(x+5)',
          'Multiply by LCD: 6x+2 = A(x+5) + B(x+1)',
          'Expand: 6x+2 = Ax+5A + Bx+B = (A+B)x + (5A+B)',
          'Match coefficients: A+B = 6, 5A+B = 2',
          'Solve: subtract → 4A = -4 → A = -1, then B = 7',
          'Result: -1/(x+1) + 7/(x+5)'
        ]
      },
      repeated: {
        expr: '(5x + 1) / ((x - 2)²)',
        display: '5x + 1', denom: '(x - 2)²',
        form: 'A/(x-2) + B/(x-2)²',
        solve: () => ({ A: 5, B: 11 }),
        formatResult: (c) => `${c.A}/(x-2) + ${c.B}/(x-2)²`,
        formatFracs: (c) => [
          { num: c.A, den: 'x-2' },
          { num: c.B, den: '(x-2)²' }
        ],
        steps: [
          'Denominator has repeated linear factor (x-2)².',
          'Set up form: A/(x-2) + B/(x-2)²',
          'Multiply by (x-2)²: 5x+1 = A(x-2) + B',
          'Expand: 5x+1 = Ax - 2A + B',
          'Match coefficients: A = 5, -2A+B = 1 → -10+B=1 → B=11',
          'Result: 5/(x-2) + 11/(x-2)²'
        ]
      },
      quadratic: {
        expr: '(2x + 3) / ((x² + 1)(x - 1))',
        display: '2x + 3', denom: '(x² + 1)(x - 1)',
        form: '(Ax+B)/(x²+1) + C/(x-1)',
        solve: () => ({ A: -2, B: 1, C: 2 }),
        formatResult: (c) => `(${c.A}x+${c.B})/(x²+1) + ${c.C}/(x-1)`,
        formatFracs: (c) => [
          { num: `${c.A}x + ${c.B}`, den: 'x²+1' },
          { num: c.C, den: 'x-1' }
        ],
        steps: [
          'Denominator has irreducible quadratic x²+1.',
          'Set up form: (Ax+B)/(x²+1) + C/(x-1)',
          'Multiply by LCD: 2x+3 = (Ax+B)(x-1) + C(x²+1)',
          'Expand: (Ax+B)(x-1) = Ax² - Ax + Bx - B',
          'Add Cx² + C: = (A+C)x² + (-A+B)x + (-B+C)',
          'Match: A+C=0, -A+B=2, -B+C=3',
          'Solve: A=-2, B=1, C=2',
          'Result: (-2x+1)/(x²+1) + 2/(x-1)'
        ]
      },
      mixed: {
        expr: '(x² + 1) / (x(x + 1)²)',
        display: 'x² + 1', denom: 'x(x + 1)²',
        form: 'A/x + B/(x+1) + C/(x+1)²',
        solve: () => ({ A: 1, B: 0, C: -2 }),
        formatResult: (c) => `${c.A}/x + ${c.B}/(x+1) + ${c.C}/(x+1)²`,
        formatFracs: (c) => [
          { num: c.A, den: 'x' },
          { num: c.B, den: 'x+1' },
          { num: c.C, den: '(x+1)²' }
        ],
        steps: [
          'Denominator: x (distinct) and (x+1)² (repeated).',
          'Set up form: A/x + B/(x+1) + C/(x+1)²',
          'Multiply by x(x+1)²: x²+1 = A(x+1)² + Bx(x+1) + Cx',
          'Expand: A(x²+2x+1) + B(x²+x) + Cx',
          '= (A+B)x² + (2A+B+C)x + A',
          'Match: A+B=1, 2A+B+C=0, A=1',
          'Solve: A=1, B=0, C=-2',
          'Result: 1/x + 0/(x+1) - 2/(x+1)² = 1/x - 2/(x+1)²'
        ]
      }
    };
    
    let currentMode = 'linear';
    
    function formatFraction(frac) {
      const num = frac.num;
      const den = frac.den;
      if (num === 0) return null;
      if (num === 1) return `1/(${den})`;
      if (num === -1) return `-1/(${den})`;
      if (typeof num === 'string') return `(${num})/(${den})`;
      return `${num}/(${den})`;
    }
    
    function updateUI() {
      const ex = examples[currentMode];
      const coeffs = ex.solve();
      
      originalExpr.textContent = ex.expr;
      
      const fracs = ex.formatFracs(coeffs);
      const parts = [];
      fracs.forEach(f => {
        const str = formatFraction(f);
        if (str) parts.push(str);
      });
      
      let html = '';
      parts.forEach((p, i) => {
        if (i > 0) html += '<span class="plus-sign">+</span>';
        html += `<span class="partial-frac">${p}</span>`;
      });
      decompResult.innerHTML = html;
      
      // build steps
      let stepsHtml = '';
      ex.steps.forEach((step, idx) => {
        stepsHtml += `
          <div class="step">
            <div class="step-num">${idx + 1}</div>
            <div class="step-content">${step}</div>
          </div>
        `;
      });
      stepsPanel.innerHTML = stepsHtml;
    }
    
    function setMode(m) {
      currentMode = m;
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === m);
      });
      updateUI();
    }
    
    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => setMode(btn.dataset.mode));
    });
    
    setMode('linear');
  })();
</script>
</body>
</html>
