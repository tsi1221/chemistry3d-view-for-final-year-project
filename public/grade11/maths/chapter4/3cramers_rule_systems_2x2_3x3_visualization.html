<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>cramer's rule · 2×2 & 3×3</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      touch-action: none;
    }
    canvas {
      display: block;
      width: min(96vw, 96vh);
      height: min(96vw, 96vh);
      background: #ffffff;
      border-radius: 2.5rem;
      box-shadow: 0 8px 30px rgba(0,0,0,0.04);
      touch-action: none;
      cursor: grab;
    }
    canvas:active { cursor: grabbing; }
  </style>
</head>
<body>
<canvas id="canvas" width="800" height="800"></canvas>
<script>
  (function(){
    "use strict";

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let W = 800, H = 800;
    const dpr = window.devicePixelRatio || 1;
    
    function resize() {
      const s = Math.min(window.innerWidth * 0.96, window.innerHeight * 0.96);
      canvas.style.width = `${s}px`;
      canvas.style.height = `${s}px`;
      canvas.width = 800 * dpr;
      canvas.height = 800 * dpr;
      ctx.scale(dpr, dpr);
      W = 800; H = 800;
    }

    // ----- state: 2x2 or 3x3 -----
    let dim = 2; // 2 or 3 — tap title to toggle
    
    // 2x2 system
    let A2 = [[2, 3], [1, -1]];
    let b2 = [8, -1];
    
    // 3x3 system
    let A3 = [[2, 1, -1], [-3, -1, 2], [-2, 1, 2]];
    let b3 = [8, -11, -3];
    
    // dragging constants vector
    let draggingConst = false;
    let dragIndex = 0;
    
    // hold to reset
    let holdTimer = null;
    let holding = false;
    let pointerDown = false;
    const HOLD_MS = 500;

    // colors — minimal blue on white
    const C = {
      primary: '#2563eb',
      replace: '#0ea5e9',
      accent: '#f59e0b',
      dark: '#1e293b',
      dim: '#94a3b8',
      light: '#f0f9ff',
      border: '#e2e8f0'
    };

    // ----- determinants -----
    function det2(m) {
      return m[0][0] * m[1][1] - m[0][1] * m[1][0];
    }
    
    function det3(m) {
      return m[0][0] * (m[1][1]*m[2][2] - m[1][2]*m[2][1])
           - m[0][1] * (m[1][0]*m[2][2] - m[1][2]*m[2][0])
           + m[0][2] * (m[1][0]*m[2][1] - m[1][1]*m[2][0]);
    }

    // replace column k with constants
    function replaceCol(A, b, k) {
      return A.map((row, i) => row.map((val, j) => j === k ? b[i] : val));
    }

    // solutions via Cramer
    function solve2() {
      const D = det2(A2);
      if (Math.abs(D) < 0.001) return [NaN, NaN];
      const Dx = det2(replaceCol(A2, b2, 0));
      const Dy = det2(replaceCol(A2, b2, 1));
      return [Dx/D, Dy/D];
    }

    function solve3() {
      const D = det3(A3);
      if (Math.abs(D) < 0.001) return [NaN, NaN, NaN];
      const Dx = det3(replaceCol(A3, b3, 0));
      const Dy = det3(replaceCol(A3, b3, 1));
      const Dz = det3(replaceCol(A3, b3, 2));
      return [Dx/D, Dy/D, Dz/D];
    }

    // ----- hit test for constant vector handles -----
    function hitConst(px, py) {
      const startY = dim === 2 ? 380 : 440;
      const gap = 52;
      for (let i=0; i<dim; i++) {
        const y = startY + i*gap;
        if (px >= 440 && px <= 500 && py >= y-20 && py <= y+20) {
          return i;
        }
      }
      return null;
    }

    // ----- drawing -----
    function drawMatrix(mat, cx, cy, label, highlightCol = -1) {
      const n = mat.length;
      const cw = 52, ch = 42, gap = 8;
      const tw = n*cw + (n-1)*gap;
      const sx = cx - tw/2;
      
      ctx.font = "500 13px system-ui";
      ctx.fillStyle = C.dim;
      ctx.textAlign = "center";
      ctx.fillText(label, cx, cy-18);
      
      for (let r=0; r<n; r++) {
        for (let c=0; c<n; c++) {
          const x = sx + c*(cw+gap);
          const y = cy + r*(ch+gap);
          
          const isHighlight = (c === highlightCol);
          ctx.fillStyle = isHighlight ? C.light : '#ffffff';
          ctx.beginPath();
          ctx.roundRect(x, y, cw, ch, 8);
          ctx.fill();
          ctx.strokeStyle = isHighlight ? C.replace : C.border;
          ctx.lineWidth = isHighlight ? 2.5 : 1.5;
          ctx.stroke();
          
          ctx.font = "600 16px 'Segoe UI', monospace";
          ctx.fillStyle = isHighlight ? C.replace : C.dark;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(mat[r][c], x+cw/2, y+ch/2);
        }
      }
      
      // brackets
      ctx.font = `${n*16+8}px serif`;
      ctx.fillStyle = '#cbd5e1';
      ctx.fillText('[', sx-22, cy + n*ch/2 + (n-1)*gap/2 - 4);
      ctx.fillText(']', sx+tw+8, cy + n*ch/2 + (n-1)*gap/2 - 4);
    }

    function drawConstants(b, startY) {
      const gap = 52;
      ctx.font = "500 14px system-ui";
      ctx.fillStyle = C.dark;
      ctx.textAlign = "right";
      ctx.fillText('b =', 420, startY + (dim-1)*gap/2 + 8);
      
      for (let i=0; i<dim; i++) {
        const y = startY + i*gap;
        
        // draggable pill
        ctx.fillStyle = '#f8fafc';
        ctx.beginPath();
        ctx.roundRect(440, y-18, 60, 36, 18);
        ctx.fill();
        ctx.strokeStyle = C.primary;
        ctx.lineWidth = 2;
        ctx.stroke();
        
        ctx.font = "600 15px monospace";
        ctx.fillStyle = C.primary;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        const val = dim === 2 ? b2[i] : b3[i];
        ctx.fillText(val.toFixed(1), 470, y);
        
        // drag hint
        ctx.beginPath();
        ctx.arc(505, y, 8, 0, 2*Math.PI);
        ctx.fillStyle = '#e0f2fe';
        ctx.fill();
        ctx.fillStyle = C.primary;
        ctx.font = "14px system-ui";
        ctx.fillText('↕', 505, y+1);
      }
    }

    function drawFormulas() {
      const sol = dim === 2 ? solve2() : solve3();
      const D = dim === 2 ? det2(A2) : det3(A3);
      
      let text = '';
      if (dim === 2) {
        const Dx = det2(replaceCol(A2, b2, 0));
        const Dy = det2(replaceCol(A2, b2, 1));
        text = `D = ${D.toFixed(1)}  ·  Dx = ${Dx.toFixed(1)}  ·  Dy = ${Dy.toFixed(1)}`;
      } else {
        const Dx = det3(replaceCol(A3, b3, 0));
        const Dy = det3(replaceCol(A3, b3, 1));
        const Dz = det3(replaceCol(A3, b3, 2));
        text = `D = ${D.toFixed(1)}  ·  Dx = ${Dx.toFixed(1)}  ·  Dy = ${Dy.toFixed(1)}  ·  Dz = ${Dz.toFixed(1)}`;
      }
      
      ctx.font = "500 14px system-ui";
      ctx.fillStyle = '#475569';
      ctx.textAlign = "center";
      ctx.fillText(text, W/2, dim === 2 ? 320 : 390);
      
      // solution
      ctx.font = "600 18px system-ui";
      ctx.fillStyle = C.dark;
      if (dim === 2) {
        ctx.fillText(`x = ${sol[0].toFixed(3)}    y = ${sol[1].toFixed(3)}`, W/2, dim === 2 ? 350 : 420);
      } else {
        ctx.fillText(`x = ${sol[0].toFixed(3)}    y = ${sol[1].toFixed(3)}    z = ${sol[2].toFixed(3)}`, W/2, 420);
      }
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      
      // subtle grid
      ctx.save();
      ctx.strokeStyle = '#f1f5f9';
      ctx.lineWidth = 0.8;
      for (let i=0; i<W; i+= 40) {
        ctx.beginPath();
        ctx.moveTo(i,0); ctx.lineTo(i,H);
        ctx.stroke();
      }
      ctx.restore();
      
      // title
      ctx.font = "600 20px system-ui";
      ctx.fillStyle = C.dark;
      ctx.textAlign = "center";
      ctx.fillText(`Cramer's Rule · ${dim}×${dim}`, W/2, 50);
      ctx.font = "12px system-ui";
      ctx.fillStyle = C.dim;
      ctx.fillText('tap title to toggle 2×2 / 3×3', W/2, 72);
      
      if (dim === 2) {
        // A
        drawMatrix(A2, 160, 150, 'A');
        // Ax
        drawMatrix(replaceCol(A2, b2, 0), 360, 150, 'Aₓ', 0);
        // Ay
        drawMatrix(replaceCol(A2, b2, 1), 560, 150, 'Aᵧ', 1);
        
        drawConstants(b2, 380);
      } else {
        // 3x3 layout
        drawMatrix(A3, 120, 180, 'A');
        drawMatrix(replaceCol(A3, b3, 0), 300, 180, 'Aₓ', 0);
        drawMatrix(replaceCol(A3, b3, 1), 480, 180, 'Aᵧ', 1);
        drawMatrix(replaceCol(A3, b3, 2), 660, 180, 'A₂', 2);
        
        drawConstants(b3, 440);
      }
      
      drawFormulas();
      
      // hint
      ctx.font = "13px system-ui";
      ctx.fillStyle = '#94a3b8';
      ctx.textAlign = "center";
      ctx.fillText('drag bᵢ to change constants · hold to reset', W/2, H-30);
      
      if (holding) {
        ctx.beginPath();
        ctx.arc(W/2, H/2, 80, 0, 2*Math.PI);
        ctx.strokeStyle = C.primary;
        ctx.lineWidth = 3;
        ctx.setLineDash([10, 12]);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    }

    // ----- interaction -----
    function ptrDown(e) {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const sx = W / rect.width, sy = H / rect.height;
      const cx = (e.clientX ?? e.touches[0].clientX) - rect.left;
      const cy = (e.clientY ?? e.touches[0].clientY) - rect.top;
      const px = cx * sx, py = cy * sy;
      
      // toggle dimension on title tap
      if (py < 80) {
        dim = dim === 2 ? 3 : 2;
      }
      
      const hit = hitConst(px, py);
      if (hit !== null) {
        draggingConst = true;
        dragIndex = hit;
      }
      
      pointerDown = true;
      
      if (holdTimer) clearTimeout(holdTimer);
      holding = true;
      holdTimer = setTimeout(() => {
        if (pointerDown && !draggingConst) {
          A2 = [[2, 3], [1, -1]]; b2 = [8, -1];
          A3 = [[2, 1, -1], [-3, -1, 2], [-2, 1, 2]]; b3 = [8, -11, -3];
        }
        holding = false;
        holdTimer = null;
      }, HOLD_MS);
    }

    function ptrMove(e) {
      e.preventDefault();
      if (!draggingConst) return;
      
      const rect = canvas.getBoundingClientRect();
      const sy = H / rect.height;
      const cy = (e.clientY ?? e.touches[0].clientY) - rect.top;
      const py = cy * sy;
      
      const startY = dim === 2 ? 380 : 440;
      const val = Math.round(((startY + dragIndex*52 - py) / 20) * 10) / 10;
      const newVal = Math.max(-15, Math.min(15, -val));
      
      if (dim === 2) {
        b2[dragIndex] = newVal;
      } else {
        b3[dragIndex] = newVal;
      }
      
      if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; holding = false; }
    }

    function ptrUp(e) {
      e.preventDefault();
      if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
      draggingConst = false;
      pointerDown = false;
      holding = false;
    }

    // roundRect
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
      if (w < 2*r) r = w/2;
      if (h < 2*r) r = h/2;
      this.moveTo(x+r, y);
      this.lineTo(x+w-r, y);
      this.quadraticCurveTo(x+w, y, x+w, y+r);
      this.lineTo(x+w, y+h-r);
      this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
      this.lineTo(x+r, y+h);
      this.quadraticCurveTo(x, y+h, x, y+h-r);
      this.lineTo(x, y+r);
      this.quadraticCurveTo(x, y, x+r, y);
      return this;
    };

    function bind() {
      canvas.addEventListener('touchstart', ptrDown, {passive: false});
      canvas.addEventListener('touchmove', ptrMove, {passive: false});
      canvas.addEventListener('touchend', ptrUp);
      canvas.addEventListener('touchcancel', ptrUp);
      canvas.addEventListener('mousedown', ptrDown);
      window.addEventListener('mousemove', ptrMove);
      window.addEventListener('mouseup', ptrUp);
      canvas.addEventListener('contextmenu', e => e.preventDefault());
    }

    function animate() {
      draw();
      requestAnimationFrame(animate);
    }

    resize();
    bind();
    animate();
    window.addEventListener('resize', resize);
  })();
</script>
</body>
</html>
