<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>determinant · 2×2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      touch-action: none;
    }
    canvas {
      display: block;
      width: min(96vw, 96vh);
      height: min(96vw, 96vh);
      background: #ffffff;
      border-radius: 2.5rem;
      box-shadow: 0 8px 30px rgba(0,0,0,0.04);
      touch-action: none;
      cursor: grab;
    }
    canvas:active { cursor: grabbing; }
  </style>
</head>
<body>
<canvas id="canvas" width="800" height="800"></canvas>
<script>
  (function(){
    "use strict";

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let W = 800, H = 800;
    const dpr = window.devicePixelRatio || 1;
    
    function resize() {
      const s = Math.min(window.innerWidth * 0.96, window.innerHeight * 0.96);
      canvas.style.width = `${s}px`;
      canvas.style.height = `${s}px`;
      canvas.width = 800 * dpr;
      canvas.height = 800 * dpr;
      ctx.scale(dpr, dpr);
      W = 800; H = 800;
    }

    // ----- matrix values (draggable via vectors) -----
    let a = 3, b = 1;  // first row
    let c = 2, d = 4;  // second row
    
    // visual scale for vectors
    const SCALE = 42;
    
    // interaction: drag the vector endpoints
    let dragging = false;
    let dragTarget = null; // 'a', 'b', 'c', 'd', or 'v1', 'v2'
    let dragOffsetX = 0, dragOffsetY = 0;
    
    // hold to reset
    let holdTimer = null;
    let holding = false;
    let pointerDown = false;
    const HOLD_MS = 500;

    // origin for parallelogram
    const OX = 190, OY = 360;
    
    // colors — minimal blue on white
    const C = {
      primary: '#2563eb',
      secondary: '#0891b2',
      accent: '#0ea5e9',
      light: '#e0f2fe',
      dark: '#1e293b',
      dim: '#94a3b8',
      area: 'rgba(37, 99, 235, 0.08)',
      diag1: '#3b82f6',
      diag2: '#f59e0b'
    };

    // ----- determinant -----
    function det() {
      return a * d - b * c;
    }

    // ----- vector endpoints -----
    function v1() { return { x: OX + a * SCALE, y: OY - c * SCALE }; }
    function v2() { return { x: OX + b * SCALE, y: OY - d * SCALE }; }
    function vSum() { 
      const p1 = v1(), p2 = v2();
      return { x: OX + (a+b) * SCALE, y: OY - (c+d) * SCALE };
    }

    // ----- hit test for draggable points -----
    function hitTest(px, py) {
      const pts = [
        { id: 'a', x: OX + a*SCALE, y: OY - c*SCALE, label: 'a,c' },
        { id: 'b', x: OX + b*SCALE, y: OY - d*SCALE, label: 'b,d' },
        { id: 'sum', x: vSum().x, y: vSum().y, label: 'sum' }
      ];
      for (let p of pts) {
        const dx = px - p.x, dy = py - p.y;
        if (Math.sqrt(dx*dx + dy*dy) < 28) return p.id;
      }
      return null;
    }

    // ----- update matrix from vector positions (drag) -----
    function updateFromDrag(id, px, py) {
      const dx = (px - OX) / SCALE;
      const dy = (OY - py) / SCALE;
      
      if (id === 'a') { a = Math.max(-5, Math.min(8, dx)); c = Math.max(-5, Math.min(8, dy)); }
      else if (id === 'b') { b = Math.max(-5, Math.min(8, dx)); d = Math.max(-5, Math.min(8, dy)); }
      else if (id === 'sum') {
        const newA = Math.max(-5, Math.min(8, dx - b));
        const newC = Math.max(-5, Math.min(8, dy - d));
        a = newA; c = newC;
      }
    }

    // ----- drawing (clean, minimal) -----
    function draw() {
      ctx.clearRect(0, 0, W, H);
      
      // subtle grid (barely visible)
      ctx.save();
      ctx.strokeStyle = '#eef2f6';
      ctx.lineWidth = 0.8;
      for (let i=0; i<W; i+= 40) {
        ctx.beginPath();
        ctx.moveTo(i,0); ctx.lineTo(i,H);
        ctx.stroke();
      }
      for (let i=0; i<H; i+= 40) {
        ctx.beginPath();
        ctx.moveTo(0,i); ctx.lineTo(W,i);
        ctx.stroke();
      }
      
      // axes hints
      ctx.beginPath();
      ctx.strokeStyle = '#cbd5e1';
      ctx.lineWidth = 1.5;
      ctx.moveTo(OX-20, OY); ctx.lineTo(OX+400, OY);
      ctx.moveTo(OX, OY-250); ctx.lineTo(OX, OY+20);
      ctx.stroke();

      const p1 = v1(), p2 = v2(), p3 = vSum();
      
      // ----- parallelogram (area = |det|) -----
      ctx.fillStyle = C.area;
      ctx.beginPath();
      ctx.moveTo(OX, OY);
      ctx.lineTo(p1.x, p1.y);
      ctx.lineTo(p3.x, p3.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#3b82f6';
      ctx.lineWidth = 2;
      ctx.stroke();

      // ----- vectors -----
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      
      // v1 (a,c)
      ctx.beginPath();
      ctx.moveTo(OX, OY);
      ctx.lineTo(p1.x, p1.y);
      ctx.strokeStyle = C.diag1;
      ctx.stroke();
      
      // v2 (b,d)
      ctx.beginPath();
      ctx.moveTo(OX, OY);
      ctx.lineTo(p2.x, p2.y);
      ctx.strokeStyle = C.diag2;
      ctx.stroke();
      
      // dashed parallel lines
      ctx.setLineDash([6, 5]);
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y); ctx.lineTo(p3.x, p3.y);
      ctx.strokeStyle = C.diag1;
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(p2.x, p2.y); ctx.lineTo(p3.x, p3.y);
      ctx.strokeStyle = C.diag2;
      ctx.stroke();
      ctx.setLineDash([]);

      // ----- cross multiplication arrows (ad and bc) -----
      ctx.font = "500 15px system-ui";
      ctx.fillStyle = C.dark;
      ctx.textAlign = "center";
      
      // main diagonal product: a×d
      const adX = OX + 180, adY = OY - 200;
      ctx.fillStyle = C.diag1;
      ctx.font = "600 16px system-ui";
      ctx.fillText(`${a.toFixed(1)} × ${d.toFixed(1)} = ${(a*d).toFixed(1)}`, adX+20, adY-10);
      
      // anti-diagonal: b×c
      ctx.fillStyle = C.diag2;
      ctx.fillText(`${b.toFixed(1)} × ${c.toFixed(1)} = ${(b*c).toFixed(1)}`, adX+20, adY+20);

      // ----- matrix display (clean card) -----
      drawMatrixCard();
      
      // ----- determinant result -----
      const detVal = det();
      ctx.font = "600 22px system-ui";
      ctx.fillStyle = '#0f172a';
      ctx.fillText(`det = ${detVal.toFixed(2)}`, W/2 + 80, 220);
      ctx.font = "400 14px system-ui";
      ctx.fillStyle = '#64748b';
      ctx.fillText(`area = |${Math.abs(detVal).toFixed(2)}|`, W/2 + 80, 248);

      // ----- draggable handles -----
      [p1, p2, p3].forEach((p, i) => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 12, 0, 2*Math.PI);
        ctx.fillStyle = i===0 ? C.diag1 : (i===1 ? C.diag2 : '#64748b');
        ctx.shadowColor = 'rgba(0,0,0,0.1)';
        ctx.shadowBlur = 8;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2.5;
        ctx.stroke();
      });

      // labels
      ctx.font = "500 13px system-ui";
      ctx.fillStyle = '#334155';
      ctx.fillText(`(${a.toFixed(1)}, ${c.toFixed(1)})`, p1.x+18, p1.y-8);
      ctx.fillText(`(${b.toFixed(1)}, ${d.toFixed(1)})`, p2.x+18, p2.y-8);
      
      // origin
      ctx.beginPath();
      ctx.arc(OX, OY, 5, 0, 2*Math.PI);
      ctx.fillStyle = '#475569';
      ctx.fill();
      
      // hold indicator
      if (holding) {
        ctx.beginPath();
        ctx.arc(OX+200, OY-160, 60, 0, 2*Math.PI);
        ctx.strokeStyle = C.primary;
        ctx.lineWidth = 3;
        ctx.setLineDash([10, 12]);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      // hint
      ctx.font = "13px system-ui";
      ctx.fillStyle = '#94a3b8';
      ctx.fillText('drag points · hold to reset', W/2, H-30);
      
      ctx.restore();
    }

    function drawMatrixCard() {
      const cx = W/2 + 100, cy = 150;
      const w = 110, h = 80;
      
      ctx.save();
      ctx.fillStyle = '#f8fafc';
      ctx.shadowColor = 'rgba(0,0,0,0.04)';
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.roundRect(cx-w/2, cy-h/2, w, h, 14);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#e2e8f0';
      ctx.lineWidth = 1;
      ctx.stroke();
      
      ctx.font = "600 18px 'Segoe UI', monospace";
      ctx.fillStyle = '#1e293b';
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(`${a.toFixed(1)}  ${b.toFixed(1)}`, cx, cy-12);
      ctx.fillText(`${c.toFixed(1)}  ${d.toFixed(1)}`, cx, cy+18);
      
      // brackets
      ctx.font = "24px serif";
      ctx.fillStyle = '#64748b';
      ctx.fillText('[', cx-62, cy+2);
      ctx.fillText(']', cx+62, cy+2);
      ctx.restore();
    }

    // ----- interaction -----
    function ptrDown(e) {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const sx = W / rect.width, sy = H / rect.height;
      const cx = (e.clientX ?? e.touches[0].clientX) - rect.left;
      const cy = (e.clientY ?? e.touches[0].clientY) - rect.top;
      const px = cx * sx, py = cy * sy;
      
      dragTarget = hitTest(px, py);
      dragging = true;
      pointerDown = true;
      canvas.style.cursor = 'grabbing';
      
      if (dragTarget) {
        dragOffsetX = px - (dragTarget==='a' ? v1().x : (dragTarget==='b' ? v2().x : vSum().x));
        dragOffsetY = py - (dragTarget==='a' ? v1().y : (dragTarget==='b' ? v2().y : vSum().y));
      }
      
      if (holdTimer) clearTimeout(holdTimer);
      holding = true;
      holdTimer = setTimeout(() => {
        if (pointerDown && !dragging) {
          a=3; b=1; c=2; d=4;
        }
        holding = false;
        holdTimer = null;
      }, HOLD_MS);
    }

    function ptrMove(e) {
      e.preventDefault();
      if (!dragging || !dragTarget) return;
      
      const rect = canvas.getBoundingClientRect();
      const sx = W / rect.width, sy = H / rect.height;
      const cx = (e.clientX ?? e.touches[0].clientX) - rect.left;
      const cy = (e.clientY ?? e.touches[0].clientY) - rect.top;
      const px = cx * sx, py = cy * sy;
      
      updateFromDrag(dragTarget, px - dragOffsetX, py - dragOffsetY);
      
      if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; holding = false; }
    }

    function ptrUp(e) {
      e.preventDefault();
      if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
      dragging = false;
      dragTarget = null;
      pointerDown = false;
      holding = false;
      canvas.style.cursor = 'grab';
    }

    // roundRect
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
      if (w < 2*r) r = w/2;
      if (h < 2*r) r = h/2;
      this.moveTo(x+r, y);
      this.lineTo(x+w-r, y);
      this.quadraticCurveTo(x+w, y, x+w, y+r);
      this.lineTo(x+w, y+h-r);
      this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
      this.lineTo(x+r, y+h);
      this.quadraticCurveTo(x, y+h, x, y+h-r);
      this.lineTo(x, y+r);
      this.quadraticCurveTo(x, y, x+r, y);
      return this;
    };

    function bind() {
      canvas.addEventListener('touchstart', ptrDown, {passive: false});
      canvas.addEventListener('touchmove', ptrMove, {passive: false});
      canvas.addEventListener('touchend', ptrUp);
      canvas.addEventListener('touchcancel', ptrUp);
      canvas.addEventListener('mousedown', ptrDown);
      window.addEventListener('mousemove', ptrMove);
      window.addEventListener('mouseup', ptrUp);
      canvas.addEventListener('contextmenu', e => e.preventDefault());
    }

    function animate() {
      draw();
      requestAnimationFrame(animate);
    }

    resize();
    bind();
    animate();
    window.addEventListener('resize', resize);
  })();
</script>
</body>
</html>
