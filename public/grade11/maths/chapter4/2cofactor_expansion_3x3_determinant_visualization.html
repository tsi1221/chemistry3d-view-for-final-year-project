<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>📐 cofactor expansion · 3×3 determinant</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .card {
      max-width: 850px;
      width: 100%;
      background: #fafcff;
      border-radius: 28px;
      border: 1px solid #d0e2ff;
      padding: 20px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.04);
    }

    h2 {
      font-weight: 700;
      font-size: 1.4rem;
      color: #0a1e3c;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .subhead {
      color: #3a628c;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }

    .main-panel {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    @media (max-width: 650px) {
      .main-panel { grid-template-columns: 1fr; }
    }

    .matrix-section {
      background: #f8fcff;
      border-radius: 20px;
      padding: 20px;
      border: 1px solid #d0e2ff;
    }

    .matrix-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 16px 0;
    }

    .matrix-cell {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.4rem;
      font-weight: 600;
      background: #fff;
      border-radius: 12px;
      border: 2px solid #d0e2ff;
      transition: 0.2s;
      position: relative;
    }

    .matrix-cell.selected-row {
      background: #dbeafe;
      border-color: #3b82f6;
    }

    .matrix-cell.selected-col {
      background: #fef3c7;
      border-color: #f59e0b;
    }

    .matrix-cell.pivot {
      background: #d1fae5;
      border-color: #10b981;
    }

    .sign-badge {
      position: absolute;
      top: -8px;
      left: -8px;
      width: 22px;
      height: 22px;
      border-radius: 22px;
      background: #fff;
      border: 2px solid #3b82f6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      color: #3b82f6;
    }

    .expansion-panel {
      background: #f8fcff;
      border-radius: 20px;
      padding: 20px;
      border: 1px solid #d0e2ff;
    }

    .minor-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 12px 0;
    }

    .minor-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 4px;
      background: #fff;
      padding: 8px;
      border-radius: 12px;
      border: 2px solid #f59e0b;
    }

    .minor-cell {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1rem;
      font-weight: 600;
      background: #fef3c7;
      border-radius: 8px;
    }

    .expansion-formula {
      background: #f0f6ff;
      border-radius: 16px;
      padding: 16px;
      margin-top: 16px;
    }

    .formula-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1rem;
      font-weight: 600;
    }

    .term {
      padding: 6px 12px;
      border-radius: 10px;
    }

    .term.positive {
      background: #d1fae5;
      color: #065f46;
    }

    .term.negative {
      background: #fee2e2;
      color: #991b1b;
    }

    .result-box {
      background: #fef9e7;
      border-radius: 16px;
      padding: 16px;
      margin-top: 16px;
      text-align: center;
      border-left: 4px solid #f59e0b;
    }

    .result-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2rem;
      font-weight: 700;
      color: #0a1e3c;
    }

    .row-selector {
      display: flex;
      gap: 8px;
      margin: 12px 0;
    }

    .row-btn {
      flex: 1;
      padding: 10px;
      border-radius: 30px;
      border: 1.5px solid #d0e2ff;
      background: #fff;
      font-weight: 600;
      cursor: pointer;
      color: #3a628c;
    }

    .row-btn.active {
      background: #3b82f6;
      border-color: #3b82f6;
      color: #fff;
    }

    .legend {
      display: flex;
      gap: 20px;
      margin-top: 16px;
      font-size: 0.75rem;
      color: #3a628c;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .example-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .example-btn {
      flex: 1;
      padding: 8px;
      border-radius: 30px;
      border: 1.5px solid #d0e2ff;
      background: #fff;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      color: #3a628c;
    }

    .example-btn.active {
      background: #3b82f6;
      border-color: #3b82f6;
      color: #fff;
    }

    .term-selector {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin: 12px 0;
    }

    .term-btn {
      padding: 8px 16px;
      border-radius: 30px;
      border: 1.5px solid #d0e2ff;
      background: #fff;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      color: #3a628c;
    }

    .term-btn.active {
      background: #10b981;
      border-color: #10b981;
      color: #fff;
    }
  </style>
</head>
<body>
<div class="card">
  <h2>📐 cofactor expansion · 3×3 determinant</h2>
  <div class="subhead">expand along row · checkerboard signs · minors</div>

  <div class="example-row">
    <button class="example-btn active" data-ex="ex1">🧮 example 1</button>
    <button class="example-btn" data-ex="ex2">📊 example 2</button>
    <button class="example-btn" data-ex="ex3">🔄 example 3</button>
  </div>

  <div class="main-panel">
    <div class="matrix-section">
      <div class="row-selector">
        <button class="row-btn active" data-row="0">expand row 1</button>
        <button class="row-btn" data-row="1">expand row 2</button>
        <button class="row-btn" data-row="2">expand row 3</button>
      </div>

      <div class="matrix-grid" id="matrixGrid"></div>

      <div class="term-selector" id="termSelector">
        <button class="term-btn active" data-term="0">term 1</button>
        <button class="term-btn" data-term="1">term 2</button>
        <button class="term-btn" data-term="2">term 3</button>
      </div>
    </div>

    <div class="expansion-panel">
      <div id="minorDisplay">
        <div style="font-size:0.75rem; color:#3a628c; text-align:center;">minor for selected element</div>
        <div class="minor-container">
          <span style="font-size:1.2rem;">det</span>
          <div class="minor-grid" id="minorGrid"></div>
        </div>
      </div>

      <div class="expansion-formula">
        <div class="formula-line" id="expansionLine"></div>
      </div>

      <div class="result-box">
        <div style="font-size:0.7rem; color:#92400e;">determinant</div>
        <div class="result-value" id="detResult">0</div>
      </div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><span style="background:#dbeafe; width:20px; height:10px; border-radius:5px;"></span> selected row</div>
    <div class="legend-item"><span style="background:#fef3c7; width:20px; height:10px; border-radius:5px;"></span> selected column</div>
    <div class="legend-item"><span style="background:#d1fae5; width:20px; height:10px; border-radius:5px;"></span> pivot element</div>
    <div class="legend-item"><span style="color:#3b82f6;">±</span> checkerboard sign</div>
  </div>
</div>

<script>
  (function(){
    const matrixGrid = document.getElementById('matrixGrid');
    const minorGrid = document.getElementById('minorGrid');
    const expansionLine = document.getElementById('expansionLine');
    const detResult = document.getElementById('detResult');
    
    const examples = {
      ex1: {
        matrix: [[1, 2, 3], [4, 5, 6], [7, 8, 9]],
        det: 0
      },
      ex2: {
        matrix: [[2, 1, 1], [1, -1, 0], [3, 2, 1]],
        det: -2
      },
      ex3: {
        matrix: [[3, 0, 2], [2, 0, -2], [0, 1, 1]],
        det: -10
      }
    };
    
    let currentEx = 'ex1';
    let selectedRow = 0;
    let selectedTerm = 0;
    
    const signMatrix = [
      ['+', '−', '+'],
      ['−', '+', '−'],
      ['+', '−', '+']
    ];
    
    function getMinor(matrix, row, col) {
      return matrix.filter((_, i) => i !== row)
                   .map(r => r.filter((_, j) => j !== col));
    }
    
    function det2x2(m) {
      return m[0][0] * m[1][1] - m[0][1] * m[1][0];
    }
    
    function computeDeterminant(matrix, row) {
      let det = 0;
      for (let j = 0; j < 3; j++) {
        const minor = getMinor(matrix, row, j);
        const minorDet = det2x2(minor);
        const sign = (row + j) % 2 === 0 ? 1 : -1;
        det += sign * matrix[row][j] * minorDet;
      }
      return det;
    }
    
    function render() {
      const ex = examples[currentEx];
      const matrix = ex.matrix;
      
      // render main matrix
      matrixGrid.innerHTML = '';
      matrix.forEach((row, i) => {
        row.forEach((val, j) => {
          const cell = document.createElement('div');
          cell.className = 'matrix-cell';
          
          if (i === selectedRow) cell.classList.add('selected-row');
          
          const isSelectedTerm = (i === selectedRow && j === selectedTerm);
          if (isSelectedTerm) {
            cell.classList.add('pivot');
          }
          
          // sign badge
          const signSpan = document.createElement('span');
          signSpan.className = 'sign-badge';
          signSpan.textContent = signMatrix[i][j];
          signSpan.style.color = signMatrix[i][j] === '+' ? '#10b981' : '#ef4444';
          signSpan.style.borderColor = signMatrix[i][j] === '+' ? '#10b981' : '#ef4444';
          cell.appendChild(signSpan);
          
          const valSpan = document.createElement('span');
          valSpan.textContent = val;
          cell.appendChild(valSpan);
          
          matrixGrid.appendChild(cell);
        });
      });
      
      // render minor for selected term
      const selectedMinor = getMinor(matrix, selectedRow, selectedTerm);
      minorGrid.innerHTML = '';
      selectedMinor.forEach(row => {
        row.forEach(val => {
          const cell = document.createElement('div');
          cell.className = 'minor-cell';
          cell.textContent = val;
          minorGrid.appendChild(cell);
        });
      });
      
      const minorDet = det2x2(selectedMinor);
      
      // build expansion formula
      const terms = [];
      let det = 0;
      for (let j = 0; j < 3; j++) {
        const val = matrix[selectedRow][j];
        const minor = getMinor(matrix, selectedRow, j);
        const mDet = det2x2(minor);
        const sign = (selectedRow + j) % 2 === 0 ? 1 : -1;
        const signedVal = sign * val;
        det += signedVal * mDet;
        
        const signStr = sign > 0 ? '+' : '−';
        const absVal = Math.abs(val);
        terms.push({ sign: signStr, val: absVal, minorDet: mDet, termValue: signedVal * mDet });
      }
      
      const totalDet = computeDeterminant(matrix, selectedRow);
      detResult.textContent = totalDet;
      
      // display expansion line
      expansionLine.innerHTML = '';
      terms.forEach((t, i) => {
        if (i > 0) {
          const plus = document.createElement('span');
          plus.textContent = t.sign === '+' ? '+' : '−';
          plus.style.margin = '0 4px';
          plus.style.fontWeight = '700';
          expansionLine.appendChild(plus);
        }
        
        const termSpan = document.createElement('span');
        termSpan.className = `term ${i === selectedTerm ? (t.sign === '+' ? 'positive' : 'negative') : ''}`;
        termSpan.textContent = `${Math.abs(t.val)}·${t.minorDet}`;
        if (i === selectedTerm) {
          termSpan.style.background = '#d1fae5';
          termSpan.style.border = '2px solid #10b981';
        }
        expansionLine.appendChild(termSpan);
      });
      
      const eq = document.createElement('span');
      eq.textContent = '=';
      eq.style.margin = '0 8px';
      eq.style.fontWeight = '700';
      expansionLine.appendChild(eq);
      
      const totalSpan = document.createElement('span');
      totalSpan.className = 'term';
      totalSpan.style.background = '#fef9e7';
      totalSpan.style.fontWeight = '700';
      totalSpan.textContent = totalDet;
      expansionLine.appendChild(totalSpan);
    }
    
    function setExample(ex) {
      currentEx = ex;
      document.querySelectorAll('.example-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.ex === ex);
      });
      render();
    }
    
    function setRow(row) {
      selectedRow = row;
      document.querySelectorAll('.row-btn').forEach(btn => {
        btn.classList.toggle('active', parseInt(btn.dataset.row) === row);
      });
      render();
    }
    
    function setTerm(term) {
      selectedTerm = term;
      document.querySelectorAll('.term-btn').forEach(btn => {
        btn.classList.toggle('active', parseInt(btn.dataset.term) === term);
      });
      render();
    }
    
    document.querySelectorAll('.example-btn').forEach(btn => {
      btn.addEventListener('click', () => setExample(btn.dataset.ex));
    });
    
    document.querySelectorAll('.row-btn').forEach(btn => {
      btn.addEventListener('click', () => setRow(parseInt(btn.dataset.row)));
    });
    
    document.querySelectorAll('.term-btn').forEach(btn => {
      btn.addEventListener('click', () => setTerm(parseInt(btn.dataset.term)));
    });
    
    render();
  })();
</script>
</body>
</html>
