<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>➕ matrix addition · subtraction</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .card {
      max-width: 750px;
      width: 100%;
      background: #fafcff;
      border-radius: 28px;
      border: 1px solid #d0e2ff;
      padding: 20px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.04);
    }

    h2 {
      font-weight: 700;
      font-size: 1.4rem;
      color: #0a1e3c;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .subhead {
      color: #3a628c;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }

    .control-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }

    .mode-btn {
      flex: 1;
      min-width: 100px;
      padding: 12px 8px;
      border-radius: 40px;
      border: 1.5px solid #d0e2ff;
      background: #fff;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      color: #3a628c;
      transition: 0.15s;
      text-align: center;
    }

    .mode-btn.active {
      background: #3b82f6;
      border-color: #3b82f6;
      color: #fff;
    }

    .matrix-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin: 20px 0;
    }

    .matrix {
      display: grid;
      gap: 8px;
      background: #f8fcff;
      padding: 16px;
      border-radius: 18px;
      border: 2px solid #d0e2ff;
    }

    .matrix-cell {
      width: 65px;
      height: 65px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.5rem;
      font-weight: 700;
      border-radius: 14px;
      transition: 0.2s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.04);
    }

    .operator {
      font-size: 2.5rem;
      font-weight: 700;
      color: #3b82f6;
    }

    .equals {
      font-size: 2rem;
      font-weight: 700;
      color: #10b981;
    }

    .dimension-selector {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      justify-content: center;
    }

    .dim-btn {
      padding: 8px 20px;
      border-radius: 30px;
      border: 1.5px solid #d0e2ff;
      background: #fff;
      font-weight: 600;
      cursor: pointer;
      color: #3a628c;
    }

    .dim-btn.active {
      background: #3b82f6;
      border-color: #3b82f6;
      color: #fff;
    }

    .info-note {
      text-align: center;
      margin-top: 16px;
      font-size: 0.85rem;
      color: #3a628c;
    }

    .legend {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 16px;
      font-size: 0.8rem;
      color: #3a628c;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .color-bar {
      width: 20px;
      height: 12px;
      border-radius: 6px;
    }

    @media (max-width: 600px) {
      .matrix-cell {
        width: 50px;
        height: 50px;
        font-size: 1.2rem;
      }
      .operator { font-size: 2rem; }
    }
  </style>
</head>
<body>
<div class="card">
  <h2>➕ matrix addition & subtraction</h2>
  <div class="subhead">element-wise operation · same dimensions required</div>

  <div class="control-row">
    <button class="mode-btn active" data-op="add">➕ addition</button>
    <button class="mode-btn" data-op="sub">➖ subtraction</button>
  </div>

  <div class="matrix-container" id="matrixDisplay">
    <!-- dynamically filled -->
  </div>

  <div class="dimension-selector">
    <button class="dim-btn active" data-dim="2x2">2 × 2</button>
    <button class="dim-btn" data-dim="2x3">2 × 3</button>
    <button class="dim-btn" data-dim="3x3">3 × 3</button>
  </div>

  <div class="info-note" id="infoNote">
    each colored cell pair is added (or subtracted) to produce the result
  </div>

  <div class="legend">
    <div class="legend-item"><div class="color-bar" style="background:#ef4444;"></div> row 1</div>
    <div class="legend-item"><div class="color-bar" style="background:#3b82f6;"></div> row 2</div>
    <div class="legend-item"><div class="color-bar" style="background:#10b981;"></div> row 3</div>
  </div>
</div>

<script>
  (function(){
    const matrixDisplay = document.getElementById('matrixDisplay');
    const infoNote = document.getElementById('infoNote');
    
    let currentOp = 'add';
    let currentDim = '2x2';
    
    const rowColors = ['#ef4444', '#3b82f6', '#10b981'];
    
    const matrices = {
      '2x2': {
        A: [[2, 5], [7, 3]],
        B: [[4, 1], [2, 6]]
      },
      '2x3': {
        A: [[3, 1, 6], [4, 5, 2]],
        B: [[2, 7, 1], [3, 2, 5]]
      },
      '3x3': {
        A: [[1, 5, 3], [6, 2, 4], [7, 1, 8]],
        B: [[4, 2, 5], [1, 6, 3], [2, 7, 1]]
      }
    };
    
    function render() {
      const { A, B } = matrices[currentDim];
      const rows = A.length;
      const cols = A[0].length;
      
      const result = A.map((row, i) => 
        row.map((val, j) => currentOp === 'add' ? val + B[i][j] : val - B[i][j])
      );
      
      // build matrices
      const buildMatrix = (data, isResult = false) => {
        const container = document.createElement('div');
        container.className = 'matrix';
        container.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        
        data.forEach((row, i) => {
          row.forEach((val, j) => {
            const cell = document.createElement('div');
            cell.className = 'matrix-cell';
            
            if (!isResult) {
              cell.style.background = rowColors[i % rowColors.length] + '20';
              cell.style.border = `2px solid ${rowColors[i % rowColors.length]}`;
              cell.style.color = '#0a1e3c';
            } else {
              cell.style.background = '#f0f6ff';
              cell.style.border = '2px solid #10b981';
              cell.style.color = '#10b981';
            }
            
            cell.textContent = val;
            container.appendChild(cell);
          });
        });
        
        return container;
      };
      
      // clear and rebuild
      matrixDisplay.innerHTML = '';
      
      const matrixA = buildMatrix(A);
      const matrixB = buildMatrix(B);
      const matrixR = buildMatrix(result, true);
      
      const opSpan = document.createElement('span');
      opSpan.className = 'operator';
      opSpan.textContent = currentOp === 'add' ? '+' : '−';
      
      const eqSpan = document.createElement('span');
      eqSpan.className = 'equals';
      eqSpan.textContent = '=';
      
      matrixDisplay.appendChild(matrixA);
      matrixDisplay.appendChild(opSpan);
      matrixDisplay.appendChild(matrixB);
      matrixDisplay.appendChild(eqSpan);
      matrixDisplay.appendChild(matrixR);
      
      infoNote.innerHTML = currentOp === 'add' 
        ? 'each colored cell pair is added to produce the result' 
        : 'each colored cell pair is subtracted to produce the result';
    }
    
    function setOp(op) {
      currentOp = op;
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.op === op);
      });
      render();
    }
    
    function setDim(dim) {
      currentDim = dim;
      document.querySelectorAll('.dim-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.dim === dim);
      });
      render();
    }
    
    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => setOp(btn.dataset.op));
    });
    
    document.querySelectorAll('.dim-btn').forEach(btn => {
      btn.addEventListener('click', () => setDim(btn.dataset.dim));
    });
    
    render();
  })();
</script>
</body>
</html>
