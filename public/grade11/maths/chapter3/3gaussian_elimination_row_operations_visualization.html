<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>📐 gaussian elimination · REF · RREF</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .card {
      max-width: 800px;
      width: 100%;
      background: #fafcff;
      border-radius: 28px;
      border: 1px solid #d0e2ff;
      padding: 20px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.04);
    }

    h2 {
      font-weight: 700;
      font-size: 1.4rem;
      color: #0a1e3c;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .subhead {
      color: #3a628c;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }

    .example-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    .example-btn {
      flex: 1;
      min-width: 120px;
      padding: 10px 8px;
      border-radius: 40px;
      border: 1.5px solid #d0e2ff;
      background: #fff;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      color: #3a628c;
      transition: 0.15s;
      text-align: center;
    }

    .example-btn.active {
      background: #3b82f6;
      border-color: #3b82f6;
      color: #fff;
    }

    .matrix-container {
      background: #f8fcff;
      border-radius: 20px;
      padding: 24px 20px;
      border: 1px solid #d0e2ff;
      margin-bottom: 16px;
    }

    .augmented-matrix {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .matrix-part {
      display: grid;
      gap: 6px;
    }

    .matrix-cell {
      width: 55px;
      height: 55px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.3rem;
      font-weight: 600;
      background: #fff;
      border-radius: 12px;
      border: 1.5px solid #d0e2ff;
      transition: 0.2s;
    }

    .matrix-cell.pivot {
      background: #d1fae5;
      border-color: #10b981;
      color: #065f46;
    }

    .matrix-cell.eliminate {
      background: #fee2e2;
      border-color: #ef4444;
    }

    .augment-line {
      width: 3px;
      height: 100%;
      background: #94a3b8;
      margin: 0 8px;
    }

    .step-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin: 20px 0 12px;
    }

    .step-btn {
      width: 50px;
      height: 50px;
      border-radius: 50px;
      border: 1.5px solid #d0e2ff;
      background: #fff;
      font-size: 1.5rem;
      font-weight: 600;
      cursor: pointer;
      color: #3b82f6;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .step-btn:active {
      background: #3b82f6;
      color: #fff;
    }

    .step-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .step-indicator {
      font-weight: 600;
      color: #3b82f6;
      min-width: 100px;
      text-align: center;
    }

    .operation-label {
      background: #f0f6ff;
      border-radius: 40px;
      padding: 10px 18px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      color: #3b82f6;
      text-align: center;
      margin: 8px 0;
    }

    .solution-box {
      background: #fef9e7;
      border-radius: 18px;
      padding: 16px 20px;
      border-left: 4px solid #f59e0b;
      margin-top: 16px;
    }

    .solution-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      color: #92400e;
    }

    .solution-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.3rem;
      font-weight: 700;
      color: #0a1e3c;
    }

    .legend {
      display: flex;
      gap: 20px;
      margin-top: 12px;
      font-size: 0.75rem;
      color: #3a628c;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    @media (max-width: 600px) {
      .matrix-cell {
        width: 40px;
        height: 40px;
        font-size: 1rem;
      }
      .example-btn { min-width: 90px; font-size: 0.7rem; }
    }
  </style>
</head>
<body>
<div class="card">
  <h2>📐 gaussian elimination</h2>
  <div class="subhead">elementary row operations · REF · RREF</div>

  <div class="example-row">
    <button class="example-btn active" data-ex="ex1">🧪 3x3 system</button>
    <button class="example-btn" data-ex="ex2">📊 unique solution</button>
    <button class="example-btn" data-ex="ex3">🔄 infinite solutions</button>
  </div>

  <div class="matrix-container">
    <div class="augmented-matrix" id="matrixDisplay"></div>
  </div>

  <div class="operation-label" id="operationLabel">R₂ → R₂ - 2R₁</div>

  <div class="step-controls">
    <button class="step-btn" id="prevBtn">←</button>
    <span class="step-indicator" id="stepIndicator">step 1/5</span>
    <button class="step-btn" id="nextBtn">→</button>
    <button class="step-btn" id="resetBtn">↻</button>
  </div>

  <div class="solution-box">
    <div class="solution-label">solution</div>
    <div class="solution-value" id="solutionDisplay">x = 3, y = -1, z = -1</div>
  </div>

  <div class="legend">
    <div class="legend-item"><span style="background:#d1fae5; width:16px; height:10px; border-radius:5px;"></span> pivot</div>
    <div class="legend-item"><span style="background:#fee2e2; width:16px; height:10px; border-radius:5px;"></span> being eliminated</div>
    <div class="legend-item"><span style="color:#3b82f6;">↻</span> elementary row op</div>
  </div>
</div>

<script>
  (function(){
    const matrixDisplay = document.getElementById('matrixDisplay');
    const operationLabel = document.getElementById('operationLabel');
    const stepIndicator = document.getElementById('stepIndicator');
    const solutionDisplay = document.getElementById('solutionDisplay');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const resetBtn = document.getElementById('resetBtn');
    
    const examples = {
      ex1: {
        name: '3x3 system',
        initial: [
          [1, 2, 1, 2],
          [2, 5, 1, 5],
          [1, 3, 3, 0]
        ],
        steps: [
          { op: 'R₂ → R₂ - 2R₁', matrix: [[1,2,1,2],[0,1,-1,1],[1,3,3,0]] },
          { op: 'R₃ → R₃ - R₁', matrix: [[1,2,1,2],[0,1,-1,1],[0,1,2,-2]] },
          { op: 'R₃ → R₃ - R₂', matrix: [[1,2,1,2],[0,1,-1,1],[0,0,3,-3]] },
          { op: 'R₃ → R₃ / 3', matrix: [[1,2,1,2],[0,1,-1,1],[0,0,1,-1]] },
          { op: 'back substitute', matrix: [[1,0,0,3],[0,1,0,-1],[0,0,1,-1]] }
        ],
        solution: 'x = 3, y = -1, z = -1'
      },
      ex2: {
        name: 'unique solution',
        initial: [
          [2, 1, -1, 8],
          [-3, -1, 2, -11],
          [-2, 1, 2, -3]
        ],
        steps: [
          { op: 'R₁ → R₁ / 2', matrix: [[1,0.5,-0.5,4],[-3,-1,2,-11],[-2,1,2,-3]] },
          { op: 'R₂ → R₂ + 3R₁', matrix: [[1,0.5,-0.5,4],[0,0.5,0.5,1],[-2,1,2,-3]] },
          { op: 'R₃ → R₃ + 2R₁', matrix: [[1,0.5,-0.5,4],[0,0.5,0.5,1],[0,2,1,5]] },
          { op: 'R₂ → R₂ * 2', matrix: [[1,0.5,-0.5,4],[0,1,1,2],[0,2,1,5]] },
          { op: 'R₃ → R₃ - 2R₂', matrix: [[1,0.5,-0.5,4],[0,1,1,2],[0,0,-1,1]] },
          { op: 'R₃ → -R₃', matrix: [[1,0.5,-0.5,4],[0,1,1,2],[0,0,1,-1]] },
          { op: 'back substitute', matrix: [[1,0,0,2],[0,1,0,3],[0,0,1,-1]] }
        ],
        solution: 'x = 2, y = 3, z = -1'
      },
      ex3: {
        name: 'infinite solutions',
        initial: [
          [1, 2, -1, 3],
          [2, 4, -2, 6],
          [1, 1, 1, 4]
        ],
        steps: [
          { op: 'R₂ → R₂ - 2R₁', matrix: [[1,2,-1,3],[0,0,0,0],[1,1,1,4]] },
          { op: 'R₃ → R₃ - R₁', matrix: [[1,2,-1,3],[0,0,0,0],[0,-1,2,1]] },
          { op: 'swap R₂ ↔ R₃', matrix: [[1,2,-1,3],[0,-1,2,1],[0,0,0,0]] },
          { op: 'R₂ → -R₂', matrix: [[1,2,-1,3],[0,1,-2,-1],[0,0,0,0]] },
          { op: 'R₁ → R₁ - 2R₂', matrix: [[1,0,3,5],[0,1,-2,-1],[0,0,0,0]] }
        ],
        solution: 'x = 5 - 3t, y = -1 + 2t, z = t (free)'
      }
    };
    
    let currentEx = 'ex1';
    let currentStep = 0;
    
    function render() {
      const ex = examples[currentEx];
      const steps = ex.steps;
      const matrix = currentStep === 0 ? ex.initial : steps[currentStep - 1].matrix;
      
      // build matrix display
      matrixDisplay.innerHTML = '';
      
      const rows = matrix.length;
      const cols = matrix[0].length;
      
      const leftPart = document.createElement('div');
      leftPart.className = 'matrix-part';
      leftPart.style.gridTemplateColumns = `repeat(${cols - 1}, 1fr)`;
      
      const rightPart = document.createElement('div');
      rightPart.className = 'matrix-part';
      rightPart.style.gridTemplateColumns = '1fr';
      
      // determine pivot and eliminate cells
      const isEliminationStep = currentStep > 0 && currentStep <= steps.length;
      
      matrix.forEach((row, i) => {
        row.forEach((val, j) => {
          const cell = document.createElement('div');
          cell.className = 'matrix-cell';
          
          let displayVal = val;
          if (Math.abs(val - Math.round(val)) < 0.001) displayVal = Math.round(val);
          else if (Math.abs(val) < 0.001) displayVal = 0;
          else displayVal = val.toFixed(1);
          
          cell.textContent = displayVal;
          
          // highlight pivots and eliminated cells
          if (isEliminationStep && currentStep <= steps.length) {
            const prevMatrix = currentStep === 1 ? ex.initial : steps[currentStep - 2].matrix;
            
            if (j < cols - 1) {
              // check if this is a pivot (1 on diagonal ideally)
              if (i === j && Math.abs(val - 1) < 0.1) {
                cell.classList.add('pivot');
              } else if (prevMatrix && Math.abs(prevMatrix[i][j] - val) > 0.01) {
                cell.classList.add('eliminate');
              }
            }
          }
          
          if (j < cols - 1) {
            leftPart.appendChild(cell);
          } else {
            rightPart.appendChild(cell);
          }
        });
      });
      
      matrixDisplay.appendChild(leftPart);
      
      const augLine = document.createElement('div');
      augLine.className = 'augment-line';
      matrixDisplay.appendChild(augLine);
      
      matrixDisplay.appendChild(rightPart);
      
      // update operation label
      if (currentStep === 0) {
        operationLabel.textContent = 'initial augmented matrix';
      } else if (currentStep <= steps.length) {
        operationLabel.textContent = steps[currentStep - 1].op;
      } else {
        operationLabel.textContent = '✓ RREF · solution';
      }
      
      // update step indicator
      if (currentStep === 0) {
        stepIndicator.textContent = `initial · step 0/${steps.length}`;
      } else {
        stepIndicator.textContent = `step ${currentStep}/${steps.length}`;
      }
      
      // update solution
      solutionDisplay.textContent = ex.solution;
      
      // update button states
      prevBtn.disabled = (currentStep === 0);
      nextBtn.disabled = (currentStep === steps.length);
    }
    
    function setExample(ex) {
      currentEx = ex;
      currentStep = 0;
      document.querySelectorAll('.example-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.ex === ex);
      });
      render();
    }
    
    function nextStep() {
      const ex = examples[currentEx];
      if (currentStep < ex.steps.length) {
        currentStep++;
        render();
      }
    }
    
    function prevStep() {
      if (currentStep > 0) {
        currentStep--;
        render();
      }
    }
    
    function resetSteps() {
      currentStep = 0;
      render();
    }
    
    document.querySelectorAll('.example-btn').forEach(btn => {
      btn.addEventListener('click', () => setExample(btn.dataset.ex));
    });
    
    nextBtn.addEventListener('click', nextStep);
    prevBtn.addEventListener('click', prevStep);
    resetBtn.addEventListener('click', resetSteps);
    
    render();
  })();
</script>
</body>
</html>
