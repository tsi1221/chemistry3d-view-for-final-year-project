<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>row reduction · gaussian elimination</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1f2d;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      touch-action: none;
    }
    canvas {
      display: block;
      width: min(96vw, 96vh);
      height: min(96vw, 96vh);
      background: #fafcff;
      border-radius: 2.8rem;
      box-shadow: 0 20px 40px rgba(0,15,40,0.25);
      touch-action: none;
      cursor: grab;
    }
    canvas:active { cursor: grabbing; }
  </style>
</head>
<body>
<canvas id="canvas" width="800" height="800"></canvas>
<script>
  (function(){
    "use strict";

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let W = 800, H = 800;
    const dpr = window.devicePixelRatio || 1;
    
    function resize() {
      const s = Math.min(window.innerWidth * 0.96, window.innerHeight * 0.96);
      canvas.style.width = `${s}px`;
      canvas.style.height = `${s}px`;
      canvas.width = 800 * dpr;
      canvas.height = 800 * dpr;
      ctx.scale(dpr, dpr);
      W = 800; H = 800;
    }

    // ----- 3x4 augmented matrix · solution: x=3, y=-1, z=1 -----
    const A = [
      [ 2,  1, -1,   8],
      [-3, -1,  2, -11],
      [-2,  1,  2,  -3]
    ];

    // ----- precomputed reduction steps (clean, minimal) -----
    const steps = [];
    
    // deep copy helper
    const copy = (m) => m.map(r => [...r]);
    
    // step 0: original
    let m = copy(A);
    steps.push({ mat: copy(m), op: '', desc: 'initial system' });
    
    // step 1: R2 ← R2 + 1.5·R1
    for (let c=0; c<4; c++) m[1][c] += 1.5 * m[0][c];
    steps.push({ mat: copy(m), op: 'R₂ + 1.5 R₁', desc: 'eliminate x in row 2' });
    
    // step 2: R3 ← R3 + R1
    for (let c=0; c<4; c++) m[2][c] += m[0][c];
    steps.push({ mat: copy(m), op: 'R₃ + R₁', desc: 'eliminate x in row 3' });
    
    // step 3: R3 ← R3 − 4·R2
    for (let c=0; c<4; c++) m[2][c] -= 4 * m[1][c];
    steps.push({ mat: copy(m), op: 'R₃ − 4 R₂', desc: 'eliminate y in row 3' });
    
    // step 4: scale to leading 1s (REF)
    for (let c=0; c<4; c++) m[0][c] /= 2;
    for (let c=0; c<4; c++) m[1][c] /= 0.5;
    for (let c=0; c<4; c++) m[2][c] /= -1;
    steps.push({ mat: copy(m), op: 'scale rows', desc: 'row echelon form' });
    
    // step 5: back substitution (RREF)
    for (let c=0; c<4; c++) m[1][c] -= m[2][c];
    for (let c=0; c<4; c++) m[0][c] += m[2][c];
    for (let c=0; c<4; c++) m[0][c] -= 0.5 * m[1][c];
    steps.push({ mat: copy(m), op: 'back substitute', desc: 'reduced row echelon' });
    
    // final: solution
    steps.push({ mat: copy(m), op: '⎧ x = 3\n⎨ y = −1\n⎩ z = 1', desc: 'solution' });

    const N = steps.length; // 7

    // ----- interaction state (pure gesture) -----
    let idx = 0;          // integer step index
    let t = 0;            // interpolation [0,1) toward idx+1
    let dragging = false;
    let dragBase = 0;
    let startRaw = 0;
    let pointerDown = false;
    let holdTimer = null;
    let holding = false;
    const HOLD_MS = 500;

    // ----- colors: minimal blue + white -----
    const C = {
      bg: '#f6faff',
      card: '#ffffff',
      cell: '#2d6cc0',
      pivot: '#eab308',
      text: '#f0f6ff',
      dark: '#122b44',
      line: '#2563eb',
      shadow: 'rgba(18,52,100,0.1)'
    };

    // ----- interpolation -----
    function currentMatrix() {
      if (idx >= N-1) return steps[N-1].mat;
      const a = steps[idx].mat;
      const b = steps[idx+1].mat;
      return a.map((r, i) => r.map((v, j) => v * (1-t) + b[i][j] * t));
    }

    function currentOp() {
      if (idx >= N-1) return steps[N-1].op;
      return t < 0.5 ? steps[idx].op : steps[idx+1].op;
    }

    function currentDesc() {
      if (idx >= N-1) return steps[N-1].desc;
      return t < 0.5 ? steps[idx].desc : steps[idx+1].desc;
    }

    // ----- actions -----
    function next() { if (idx < N-1) { idx++; t = 0; } }
    function reset() { idx = 0; t = 0; }

    // ----- draw matrix (clean, centered) -----
    function drawMatrix(mat, cx, cy) {
      const rows = 3, cols = 4;
      const cw = 62, ch = 52, gap = 8;
      const tw = cols*cw + (cols-1)*gap;
      const th = rows*ch + (rows-1)*gap;
      const sx = cx - tw/2, sy = cy - th/2;

      ctx.save();
      ctx.shadowColor = C.shadow;
      ctx.shadowBlur = 16;
      ctx.shadowOffsetY = 4;
      ctx.fillStyle = C.card;
      ctx.beginPath();
      ctx.roundRect(sx-14, sy-14, tw+28, th+28, 18);
      ctx.fill();
      ctx.shadowBlur = 0;

      // augmented line
      ctx.beginPath();
      const lx = sx + 3*cw + 2*gap + gap/2;
      ctx.moveTo(lx, sy-6);
      ctx.lineTo(lx, sy+th+6);
      ctx.strokeStyle = C.line;
      ctx.lineWidth = 3;
      ctx.stroke();

      for (let r=0; r<rows; r++) {
        for (let c=0; c<cols; c++) {
          const x = sx + c*(cw+gap);
          const y = sy + r*(ch+gap);
          const val = mat[r][c];
          const isPivot = (r === c && c < 3) && Math.abs(val) > 0.1;

          ctx.fillStyle = isPivot ? C.pivot : C.cell;
          ctx.beginPath();
          ctx.roundRect(x, y, cw, ch, 10);
          ctx.fill();
          
          ctx.strokeStyle = '#ffffff';
          ctx.lineWidth = 2;
          ctx.globalAlpha = 0.4;
          ctx.stroke();
          ctx.globalAlpha = 1;

          ctx.font = `600 19px 'Segoe UI', monospace`;
          ctx.fillStyle = C.text;
          ctx.shadowColor = '#0a1e30';
          ctx.shadowBlur = 6;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          const disp = Math.abs(val) < 0.001 ? '0' : (Math.abs(val - Math.round(val)) < 0.01 ? val.toFixed(0) : val.toFixed(2));
          ctx.fillText(disp, x + cw/2, y + ch/2);
          ctx.shadowBlur = 0;
        }
      }
      ctx.restore();
    }

    // ----- draw interface (minimal text) -----
    function drawUI() {
      const op = currentOp();
      const desc = currentDesc();
      
      ctx.save();
      ctx.font = "500 16px system-ui";
      ctx.fillStyle = C.dark;
      ctx.textAlign = "center";
      
      // operation pill
      ctx.fillStyle = '#e2ebf6';
      ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.roundRect(W/2-150, 90, 300, 48, 40);
      ctx.fill();
      ctx.fillStyle = '#1a3d66';
      ctx.font = "600 16px system-ui";
      ctx.fillText(op || '·', W/2, 120);
      
      ctx.font = "500 14px system-ui";
      ctx.fillStyle = '#2e5780';
      ctx.fillText(desc, W/2, 150);

      // progress indicator (subtle dots)
      const dots = N;
      const dotX = (W - (dots-1)*32)/2;
      for (let i=0; i<dots; i++) {
        const x = dotX + i*32;
        const active = (i === idx && t<0.1) || (i === idx+1 && t>0.9);
        ctx.beginPath();
        ctx.arc(x, H-48, active ? 7 : 5, 0, 2*Math.PI);
        ctx.fillStyle = (i <= idx || (i===idx+1 && t>0.5)) ? '#2563eb' : '#bdd3eb';
        ctx.fill();
      }

      // gesture hint
      ctx.font = "13px system-ui";
      ctx.fillStyle = '#5b7da3';
      ctx.fillText('← drag · tap → · hold reset', W/2, H-22);
      
      // solution text (final step)
      if (idx === N-1) {
        ctx.font = "500 17px system-ui";
        ctx.fillStyle = '#0f3a5c';
        ctx.fillText('x = 3    y = −1    z = 1', W/2, H-80);
      }
      ctx.restore();
    }

    // ----- interaction handlers -----
    function ptrDown(e) {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const sx = W / rect.width;
      const cx = (e.clientX ?? e.touches[0].clientX) - rect.left;
      
      dragBase = cx * sx;
      startRaw = idx + t;
      dragging = true;
      pointerDown = true;
      canvas.style.cursor = 'grabbing';
      
      if (holdTimer) clearTimeout(holdTimer);
      holding = true;
      holdTimer = setTimeout(() => {
        if (pointerDown && !dragging) reset();
        holding = false;
        holdTimer = null;
      }, HOLD_MS);
    }

    function ptrMove(e) {
      e.preventDefault();
      if (!dragging) return;
      const rect = canvas.getBoundingClientRect();
      const sx = W / rect.width;
      const cx = (e.clientX ?? e.touches[0].clientX) - rect.left;
      const delta = (cx * sx) - dragBase;
      let raw = startRaw + delta / 160;
      raw = Math.min(N-1, Math.max(0, raw));
      
      const newIdx = Math.floor(raw);
      const newT = raw - newIdx;
      if (newIdx !== idx || Math.abs(newT - t) > 0.005) {
        idx = newIdx;
        t = Math.min(0.999, newT);
        if (idx === N-1) t = 0;
      }
      
      if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; holding = false; }
    }

    function ptrUp(e) {
      e.preventDefault();
      if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
      
      if (dragging) {
        const rect = canvas.getBoundingClientRect();
        const sx = W / rect.width;
        const cx = (e.clientX ?? (e.changedTouches ? e.changedTouches[0].clientX : 0)) - rect.left;
        const dist = Math.abs(cx*sx - dragBase);
        if (dist < 10) next();  // tap advances
        dragging = false;
        canvas.style.cursor = 'grab';
      }
      pointerDown = false;
      holding = false;
    }

    function ptrCancel(e) { ptrUp(e); }

    // ----- animation loop -----
    function animate() {
      if (!dragging && t > 0.01) t *= 0.8; else if (!dragging) t = 0;
      
      ctx.clearRect(0, 0, W, H);
      const grad = ctx.createLinearGradient(0, 0, W*0.6, H);
      grad.addColorStop(0, '#f0f7ff');
      grad.addColorStop(1, '#e2ecf9');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);
      
      drawMatrix(currentMatrix(), W/2, H/2 - 10);
      drawUI();
      
      if (holding) {
        ctx.beginPath();
        ctx.arc(W/2, H/2-10, 100, 0, 2*Math.PI);
        ctx.strokeStyle = '#3b82f6';
        ctx.lineWidth = 3.5;
        ctx.setLineDash([10, 14]);
        ctx.stroke();
        ctx.setLineDash([]);
      }
      
      requestAnimationFrame(animate);
    }

    // roundRect utility
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
      if (w < 2*r) r = w/2;
      if (h < 2*r) r = h/2;
      this.moveTo(x+r, y);
      this.lineTo(x+w-r, y);
      this.quadraticCurveTo(x+w, y, x+w, y+r);
      this.lineTo(x+w, y+h-r);
      this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
      this.lineTo(x+r, y+h);
      this.quadraticCurveTo(x, y+h, x, y+h-r);
      this.lineTo(x, y+r);
      this.quadraticCurveTo(x, y, x+r, y);
      return this;
    };

    function bind() {
      canvas.addEventListener('touchstart', ptrDown, {passive: false});
      canvas.addEventListener('touchmove', ptrMove, {passive: false});
      canvas.addEventListener('touchend', ptrUp);
      canvas.addEventListener('touchcancel', ptrCancel);
      canvas.addEventListener('mousedown', ptrDown);
      window.addEventListener('mousemove', ptrMove);
      window.addEventListener('mouseup', ptrUp);
      canvas.addEventListener('contextmenu', e => e.preventDefault());
    }

    resize();
    bind();
    animate();
    window.addEventListener('resize', () => { resize(); });
  })();
</script>
</body>
</html>
