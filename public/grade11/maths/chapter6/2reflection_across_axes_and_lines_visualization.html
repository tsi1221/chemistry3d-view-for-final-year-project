<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>reflection · across axes & lines</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      touch-action: none;
    }
    canvas {
      display: block;
      width: min(96vw, 96vh);
      height: min(96vw, 96vh);
      background: #ffffff;
      border-radius: 2.5rem;
      box-shadow: 0 8px 30px rgba(0,0,0,0.04);
      touch-action: none;
      cursor: grab;
    }
    canvas:active { cursor: grabbing; }
  </style>
</head>
<body>
<canvas id="canvas" width="800" height="800"></canvas>
<script>
  (function(){
    "use strict";

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let W = 800, H = 800;
    const dpr = window.devicePixelRatio || 1;
    
    function resize() {
      const s = Math.min(window.innerWidth * 0.96, window.innerHeight * 0.96);
      canvas.style.width = `${s}px`;
      canvas.style.height = `${s}px`;
      canvas.width = 800 * dpr;
      canvas.height = 800 * dpr;
      ctx.scale(dpr, dpr);
      W = 800; H = 800;
    }

    // ----- triangle vertices -----
    let D = { x: 1, y: 4 };
    let E = { x: 5, y: 5 };
    let F = { x: 4, y: 1 };
    
    // mirror type: 'x', 'y', 'yx', 'y-x'
    let mirror = 'yx';
    
    const SCALE = 38;
    const OX = 400, OY = 400;
    
    // dragging
    let dragging = null;
    let dragOffsetX = 0, dragOffsetY = 0;
    
    // hold to reset
    let holdTimer = null;
    let holding = false;
    let pointerDown = false;
    const HOLD_MS = 500;

    // colors
    const C = {
      orig: '#2563eb',
      image: '#f59e0b',
      mirror: '#94a3b8',
      grid: '#f1f5f9',
      axis: '#cbd5e1',
      dark: '#1e293b',
      dim: '#94a3b8',
      active: '#3b82f6'
    };

    // ----- reflection functions -----
    function reflect(p) {
      switch(mirror) {
        case 'x': return { x: p.x, y: -p.y };
        case 'y': return { x: -p.x, y: p.y };
        case 'yx': return { x: p.y, y: p.x };
        case 'y-x': return { x: -p.y, y: -p.x };
        default: return { x: p.x, y: p.y };
      }
    }

    function Dp() { return reflect(D); }
    function Ep() { return reflect(E); }
    function Fp() { return reflect(F); }

    function toScreen(p) {
      return { x: OX + p.x * SCALE, y: OY - p.y * SCALE };
    }

    function hitTest(px, py) {
      const pts = [
        { id: 'D', p: D },
        { id: 'E', p: E },
        { id: 'F', p: F }
      ];
      for (let item of pts) {
        const sp = toScreen(item.p);
        if (Math.hypot(px - sp.x, py - sp.y) < 24) return item.id;
      }
      return null;
    }
    
    function hitMirrorButton(px, py) {
      const buttons = [
        { id: 'x', x: 50, y: 70, w: 60, h: 32 },
        { id: 'y', x: 120, y: 70, w: 60, h: 32 },
        { id: 'yx', x: 190, y: 70, w: 60, h: 32 },
        { id: 'y-x', x: 260, y: 70, w: 60, h: 32 }
      ];
      for (let b of buttons) {
        if (px >= b.x && px <= b.x + b.w && py >= b.y && py <= b.y + b.h) {
          return b.id;
        }
      }
      return null;
    }

    function updateFromDrag(px, py) {
      const dx = (px - OX) / SCALE;
      const dy = (OY - py) / SCALE;
      const newVal = { x: Math.round(dx * 2) / 2, y: Math.round(dy * 2) / 2 };
      
      if (dragging === 'D') D = newVal;
      else if (dragging === 'E') E = newVal;
      else if (dragging === 'F') F = newVal;
    }

    // ----- drawing -----
    function drawGrid() {
      ctx.save();
      for (let i = -9; i <= 9; i++) {
        const x = OX + i * SCALE;
        ctx.beginPath();
        ctx.moveTo(x, 30); ctx.lineTo(x, H-30);
        ctx.strokeStyle = i === 0 ? C.axis : C.grid;
        ctx.lineWidth = i === 0 ? 1.5 : 0.6;
        ctx.stroke();
      }
      for (let i = -9; i <= 9; i++) {
        const y = OY - i * SCALE;
        ctx.beginPath();
        ctx.moveTo(30, y); ctx.lineTo(W-30, y);
        ctx.strokeStyle = i === 0 ? C.axis : C.grid;
        ctx.lineWidth = i === 0 ? 1.5 : 0.6;
        ctx.stroke();
      }
      ctx.font = "11px system-ui";
      ctx.fillStyle = C.dim;
      ctx.textAlign = "center";
      for (let i = -8; i <= 8; i++) if (i !== 0) ctx.fillText(i, OX + i*SCALE, OY+18);
      for (let i = -8; i <= 8; i++) if (i !== 0) ctx.fillText(i, OX-18, OY - i*SCALE+4);
      ctx.fillText('O', OX-12, OY+18);
      ctx.restore();
    }

    function drawMirrorLine() {
      ctx.save();
      ctx.strokeStyle = C.mirror;
      ctx.lineWidth = 2.5;
      ctx.setLineDash([8, 6]);
      
      ctx.beginPath();
      if (mirror === 'x') {
        ctx.moveTo(30, OY);
        ctx.lineTo(W-30, OY);
      } else if (mirror === 'y') {
        ctx.moveTo(OX, 30);
        ctx.lineTo(OX, H-30);
      } else if (mirror === 'yx') {
        ctx.moveTo(30, H-30);
        ctx.lineTo(W-30, 30);
      } else if (mirror === 'y-x') {
        ctx.moveTo(30, 30);
        ctx.lineTo(W-30, H-30);
      }
      ctx.stroke();
      
      ctx.setLineDash([]);
      ctx.font = "13px system-ui";
      ctx.fillStyle = C.mirror;
      ctx.textAlign = "center";
      
      let label = '';
      if (mirror === 'x') label = 'y = 0';
      else if (mirror === 'y') label = 'x = 0';
      else if (mirror === 'yx') label = 'y = x';
      else label = 'y = −x';
      
      ctx.fillText(label, W-80, 50);
      ctx.restore();
    }

    function drawTriangle(p1, p2, p3, color, fillAlpha = 0.08) {
      const s1 = toScreen(p1);
      const s2 = toScreen(p2);
      const s3 = toScreen(p3);
      
      ctx.save();
      ctx.fillStyle = color;
      ctx.globalAlpha = fillAlpha;
      ctx.beginPath();
      ctx.moveTo(s1.x, s1.y);
      ctx.lineTo(s2.x, s2.y);
      ctx.lineTo(s3.x, s3.y);
      ctx.closePath();
      ctx.fill();
      
      ctx.globalAlpha = 1;
      ctx.strokeStyle = color;
      ctx.lineWidth = 2.5;
      ctx.stroke();
      ctx.restore();
    }

    function drawVertex(p, label, color, isImage = false) {
      const sp = toScreen(p);
      ctx.save();
      ctx.beginPath();
      ctx.arc(sp.x, sp.y, 7, 0, 2*Math.PI);
      ctx.fillStyle = color;
      ctx.shadowColor = 'rgba(0,0,0,0.06)';
      ctx.shadowBlur = 8;
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2;
      ctx.stroke();
      
      ctx.font = "600 13px system-ui";
      ctx.fillStyle = color;
      ctx.textAlign = "center";
      ctx.textBaseline = "bottom";
      const lbl = isImage ? label + "'" : label;
      ctx.fillText(lbl, sp.x, sp.y - 12);
      
      ctx.font = "11px monospace";
      ctx.fillStyle = C.dim;
      ctx.fillText(`(${p.x.toFixed(1)}, ${p.y.toFixed(1)})`, sp.x, sp.y + 20);
      ctx.restore();
    }

    function drawMirrorButtons() {
      const btns = [
        { id: 'x', label: 'x‑axis', x: 50 },
        { id: 'y', label: 'y‑axis', x: 120 },
        { id: 'yx', label: 'y = x', x: 190 },
        { id: 'y-x', label: 'y = −x', x: 260 }
      ];
      
      ctx.save();
      ctx.font = "13px system-ui";
      
      btns.forEach(b => {
        const isActive = mirror === b.id;
        ctx.fillStyle = isActive ? C.active : '#f8fafc';
        ctx.strokeStyle = isActive ? C.active : C.dim;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.roundRect(b.x, 70, 60, 32, 16);
        ctx.fill();
        ctx.stroke();
        
        ctx.fillStyle = isActive ? '#ffffff' : C.dim;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(b.label, b.x + 30, 86);
      });
      ctx.restore();
    }

    function drawInfo() {
      ctx.save();
      ctx.font = "500 14px system-ui";
      ctx.fillStyle = C.dark;
      ctx.textAlign = "left";
      ctx.fillText('original', 50, 140);
      ctx.fillText(`D(${D.x.toFixed(1)}, ${D.y.toFixed(1)})  E(${E.x.toFixed(1)}, ${E.y.toFixed(1)})  F(${F.x.toFixed(1)}, ${F.y.toFixed(1)})`, 50, 165);
      
      ctx.fillStyle = C.image;
      ctx.fillText('reflected', 50, 200);
      const d = Dp(), e = Ep(), f = Fp();
      ctx.fillText(`D'(${d.x.toFixed(1)}, ${d.y.toFixed(1)})  E'(${e.x.toFixed(1)}, ${e.y.toFixed(1)})  F'(${f.x.toFixed(1)}, ${f.y.toFixed(1)})`, 50, 225);
      
      // transformation rule
      ctx.font = "13px system-ui";
      ctx.fillStyle = C.dim;
      let rule = '';
      if (mirror === 'x') rule = '(x, y) → (x, −y)';
      else if (mirror === 'y') rule = '(x, y) → (−x, y)';
      else if (mirror === 'yx') rule = '(x, y) → (y, x)';
      else rule = '(x, y) → (−y, −x)';
      ctx.fillText(rule, 50, 260);
      ctx.restore();
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      drawGrid();
      drawMirrorLine();
      
      drawTriangle(D, E, F, C.orig, 0.08);
      drawTriangle(Dp(), Ep(), Fp(), C.image, 0.06);
      
      drawVertex(D, 'D', C.orig);
      drawVertex(E, 'E', C.orig);
      drawVertex(F, 'F', C.orig);
      drawVertex(Dp(), 'D', C.image, true);
      drawVertex(Ep(), 'E', C.image, true);
      drawVertex(Fp(), 'F', C.image, true);
      
      drawMirrorButtons();
      drawInfo();
      
      // hint
      ctx.font = "13px system-ui";
      ctx.fillStyle = '#94a3b8';
      ctx.textAlign = "center";
      ctx.fillText('drag points · tap mirror · hold to reset', W/2, H-30);
      
      if (holding) {
        ctx.beginPath();
        ctx.arc(W/2, H/2, 80, 0, 2*Math.PI);
        ctx.strokeStyle = C.orig;
        ctx.lineWidth = 3;
        ctx.setLineDash([10, 12]);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    }

    // ----- interaction -----
    function ptrDown(e) {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const sx = W / rect.width, sy = H / rect.height;
      const cx = (e.clientX ?? e.touches[0].clientX) - rect.left;
      const cy = (e.clientY ?? e.touches[0].clientY) - rect.top;
      const px = cx * sx, py = cy * sy;
      
      const btn = hitMirrorButton(px, py);
      if (btn) {
        mirror = btn;
        return;
      }
      
      const hit = hitTest(px, py);
      if (hit) {
        dragging = hit;
        const p = hit === 'D' ? D : (hit === 'E' ? E : F);
        const sp = toScreen(p);
        dragOffsetX = sp.x - px;
        dragOffsetY = sp.y - py;
      }
      
      pointerDown = true;
      
      if (holdTimer) clearTimeout(holdTimer);
      holding = true;
      holdTimer = setTimeout(() => {
        if (pointerDown && !dragging) {
          D = { x: 1, y: 4 };
          E = { x: 5, y: 5 };
          F = { x: 4, y: 1 };
          mirror = 'yx';
        }
        holding = false;
        holdTimer = null;
      }, HOLD_MS);
    }

    function ptrMove(e) {
      e.preventDefault();
      if (!dragging) return;
      
      const rect = canvas.getBoundingClientRect();
      const sx = W / rect.width, sy = H / rect.height;
      const cx = (e.clientX ?? e.touches[0].clientX) - rect.left;
      const cy = (e.clientY ?? e.touches[0].clientY) - rect.top;
      const px = cx * sx, py = cy * sy;
      
      updateFromDrag(px + dragOffsetX, py + dragOffsetY);
      
      if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; holding = false; }
    }

    function ptrUp(e) {
      e.preventDefault();
      if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
      dragging = null;
      pointerDown = false;
      holding = false;
    }

    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
      if (w < 2*r) r = w/2;
      if (h < 2*r) r = h/2;
      this.moveTo(x+r, y);
      this.lineTo(x+w-r, y);
      this.quadraticCurveTo(x+w, y, x+w, y+r);
      this.lineTo(x+w, y+h-r);
      this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
      this.lineTo(x+r, y+h);
      this.quadraticCurveTo(x, y+h, x, y+h-r);
      this.lineTo(x, y+r);
      this.quadraticCurveTo(x, y, x+r, y);
      return this;
    };

    function bind() {
      canvas.addEventListener('touchstart', ptrDown, {passive: false});
      canvas.addEventListener('touchmove', ptrMove, {passive: false});
      canvas.addEventListener('touchend', ptrUp);
      canvas.addEventListener('touchcancel', ptrUp);
      canvas.addEventListener('mousedown', ptrDown);
      window.addEventListener('mousemove', ptrMove);
      window.addEventListener('mouseup', ptrUp);
      canvas.addEventListener('contextmenu', e => e.preventDefault());
    }

    function animate() {
      draw();
      requestAnimationFrame(animate);
    }

    resize();
    bind();
    animate();
    window.addEventListener('resize', resize);
  })();
</script>
</body>
</html>
