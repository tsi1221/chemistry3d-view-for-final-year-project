<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>vector · addition & subtraction</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      touch-action: none;
    }
    canvas {
      display: block;
      width: min(96vw, 96vh);
      height: min(96vw, 96vh);
      background: #ffffff;
      border-radius: 2.5rem;
      box-shadow: 0 8px 30px rgba(0,0,0,0.04);
      touch-action: none;
      cursor: grab;
    }
    canvas:active { cursor: grabbing; }
  </style>
</head>
<body>
<canvas id="canvas" width="800" height="800"></canvas>
<script>
  (function(){
    "use strict";

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let W = 800, H = 800;
    const dpr = window.devicePixelRatio || 1;
    
    function resize() {
      const s = Math.min(window.innerWidth * 0.96, window.innerHeight * 0.96);
      canvas.style.width = `${s}px`;
      canvas.style.height = `${s}px`;
      canvas.width = 800 * dpr;
      canvas.height = 800 * dpr;
      ctx.scale(dpr, dpr);
      W = 800; H = 800;
    }

    // ----- vectors (grid units, scale for display) -----
    let u = { x: 3, y: 4 };
    let v = { x: 5, y: 1 };
    
    const SCALE = 38;
    const OX = 180, OY = 500;
    
    // dragging state
    let dragging = null; // 'u', 'v'
    let dragOffsetX = 0, dragOffsetY = 0;
    
    // mode: 'add' or 'subtract' — tap the operation symbol to toggle
    let mode = 'add'; // 'add' or 'sub'
    
    // hold to reset
    let holdTimer = null;
    let holding = false;
    let pointerDown = false;
    const HOLD_MS = 500;

    // colors — minimal blue on white
    const C = {
      u: '#2563eb',
      v: '#0ea5e9',
      sum: '#0284c7',
      diff: '#f59e0b',
      negV: '#eab308',
      grid: '#e2e8f0',
      axis: '#cbd5e1',
      dark: '#1e293b',
      dim: '#94a3b8',
      light: '#f0f9ff'
    };

    // ----- vector math -----
    function add() { return { x: u.x + v.x, y: u.y + v.y }; }
    function sub() { return { x: u.x - v.x, y: u.y - v.y }; }
    function negV() { return { x: -v.x, y: -v.y }; }
    function result() { return mode === 'add' ? add() : sub(); }

    // screen coords
    function toScreen(vec) {
      return { x: OX + vec.x * SCALE, y: OY - vec.y * SCALE };
    }

    // hit test for draggable arrowheads
    function hitTest(px, py) {
      const uTip = toScreen(u);
      const vTip = toScreen(v);
      if (Math.hypot(px - uTip.x, py - uTip.y) < 28) return 'u';
      if (Math.hypot(px - vTip.x, py - vTip.y) < 28) return 'v';
      return null;
    }

    // update from drag
    function updateFromDrag(px, py) {
      const dx = (px - OX) / SCALE;
      const dy = (OY - py) / SCALE;
      const newVec = { x: Math.round(dx * 2) / 2, y: Math.round(dy * 2) / 2 };
      const clamped = { x: Math.max(-7, Math.min(9, newVec.x)), y: Math.max(-6, Math.min(7, newVec.y)) };
      if (dragging === 'u') u = clamped;
      else if (dragging === 'v') v = clamped;
    }

    // ----- drawing -----
    function drawGrid() {
      ctx.save();
      ctx.strokeStyle = C.grid;
      ctx.lineWidth = 0.8;
      
      // grid lines
      for (let i = -8; i <= 10; i++) {
        const x = OX + i * SCALE;
        ctx.beginPath();
        ctx.moveTo(x, 80);
        ctx.lineTo(x, H-80);
        ctx.strokeStyle = i === 0 ? C.axis : C.grid;
        ctx.lineWidth = i === 0 ? 1.5 : 0.6;
        ctx.stroke();
      }
      for (let i = -7; i <= 8; i++) {
        const y = OY - i * SCALE;
        ctx.beginPath();
        ctx.moveTo(60, y);
        ctx.lineTo(W-60, y);
        ctx.strokeStyle = i === 0 ? C.axis : C.grid;
        ctx.lineWidth = i === 0 ? 1.5 : 0.6;
        ctx.stroke();
      }
      
      // axis labels
      ctx.font = "11px system-ui";
      ctx.fillStyle = C.dim;
      ctx.textAlign = "center";
      for (let i = -7; i <= 9; i++) {
        if (i === 0) continue;
        ctx.fillText(i, OX + i*SCALE, OY+18);
      }
      for (let i = -6; i <= 7; i++) {
        if (i === 0) continue;
        ctx.fillText(i, OX-18, OY - i*SCALE+4);
      }
      ctx.fillText('O', OX-12, OY+18);
      ctx.restore();
    }

    function drawVector(vec, color, label, fromX=OX, fromY=OY, dashed=false) {
      const tip = toScreen(vec);
      
      ctx.save();
      if (dashed) ctx.setLineDash([6, 4]);
      ctx.lineWidth = 3.5;
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineCap = 'round';
      
      // arrow shaft
      ctx.beginPath();
      ctx.moveTo(fromX, fromY);
      ctx.lineTo(tip.x, tip.y);
      ctx.stroke();
      
      // arrowhead
      const angle = Math.atan2(tip.y - fromY, tip.x - fromX);
      const size = 14;
      ctx.beginPath();
      ctx.translate(tip.x, tip.y);
      ctx.rotate(angle);
      ctx.moveTo(-size, -size/2.2);
      ctx.lineTo(0, 0);
      ctx.lineTo(-size, size/2.2);
      ctx.fill();
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      
      // label
      ctx.font = "600 15px system-ui";
      ctx.shadowColor = '#ffffff';
      ctx.shadowBlur = 6;
      ctx.fillStyle = color;
      ctx.textAlign = "center";
      ctx.textBaseline = "bottom";
      ctx.fillText(label, tip.x + 10, tip.y - 12);
      ctx.shadowBlur = 0;
      
      // coordinates
      ctx.font = "12px monospace";
      ctx.fillStyle = C.dim;
      ctx.fillText(`(${vec.x.toFixed(1)}, ${vec.y.toFixed(1)})`, tip.x + 10, tip.y + 8);
      
      ctx.restore();
    }

    function drawParallelogram() {
      const uTip = toScreen(u);
      const vTip = toScreen(v);
      const sumVec = add();
      const sumTip = toScreen(sumVec);
      
      ctx.save();
      ctx.strokeStyle = C.sum;
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 5]);
      ctx.globalAlpha = 0.5;
      
      // parallelogram edges
      ctx.beginPath();
      ctx.moveTo(uTip.x, uTip.y);
      ctx.lineTo(sumTip.x, sumTip.y);
      ctx.lineTo(vTip.x, vTip.y);
      ctx.stroke();
      
      ctx.restore();
    }

    function drawTriangleLaw() {
      const uTip = toScreen(u);
      const res = result();
      const resTip = toScreen(res);
      
      // v placed at head of u (if add) or -v at head of u (if subtract)
      const secondVec = mode === 'add' ? v : negV();
      const secondColor = mode === 'add' ? C.v : C.negV;
      const secondLabel = mode === 'add' ? 'v' : '−v';
      
      drawVector(secondVec, secondColor, secondLabel, uTip.x, uTip.y);
      
      // resultant
      drawVector(res, mode === 'add' ? C.sum : C.diff, mode === 'add' ? 'u+v' : 'u−v');
      
      // label at midpoint
      ctx.font = "500 13px system-ui";
      ctx.fillStyle = C.dim;
      ctx.textAlign = "center";
      ctx.fillText('head‑to‑tail', (OX + uTip.x)/2 - 30, (OY + uTip.y)/2 - 20);
    }

    function drawOperationToggle() {
      const cx = W/2, cy = 110;
      
      ctx.font = "600 28px system-ui";
      ctx.fillStyle = C.dark;
      ctx.textAlign = "center";
      ctx.fillText(mode === 'add' ? 'u + v' : 'u − v', cx, cy);
      
      ctx.font = "13px system-ui";
      ctx.fillStyle = C.dim;
      ctx.fillText('tap to toggle', cx, cy+28);
    }

    function drawInfo() {
      const res = result();
      ctx.font = "500 15px system-ui";
      ctx.fillStyle = C.dark;
      ctx.textAlign = "left";
      ctx.fillText(`u = (${u.x.toFixed(1)}, ${u.y.toFixed(1)})`, 60, 130);
      ctx.fillText(`v = (${v.x.toFixed(1)}, ${v.y.toFixed(1)})`, 60, 158);
      ctx.fillText(`${mode === 'add' ? 'u+v' : 'u−v'} = (${res.x.toFixed(1)}, ${res.y.toFixed(1)})`, 60, 186);
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      
      drawGrid();
      
      // draw from origin
      drawVector(u, C.u, 'u');
      drawVector(v, C.v, 'v');
      
      // parallelogram (only for addition, subtle)
      if (mode === 'add') {
        drawParallelogram();
      }
      
      // triangle law
      drawTriangleLaw();
      
      drawInfo();
      drawOperationToggle();
      
      // draggable handles
      const uTip = toScreen(u);
      const vTip = toScreen(v);
      [uTip, vTip].forEach((p, i) => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 11, 0, 2*Math.PI);
        ctx.fillStyle = i === 0 ? C.u : C.v;
        ctx.shadowColor = 'rgba(0,0,0,0.1)';
        ctx.shadowBlur = 8;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2.5;
        ctx.stroke();
      });
      
      // hint
      ctx.font = "13px system-ui";
      ctx.fillStyle = '#94a3b8';
      ctx.textAlign = "center";
      ctx.fillText('drag arrowheads · hold to reset', W/2, H-30);
      
      if (holding) {
        ctx.beginPath();
        ctx.arc(W/2, H/2, 80, 0, 2*Math.PI);
        ctx.strokeStyle = C.u;
        ctx.lineWidth = 3;
        ctx.setLineDash([10, 12]);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    }

    // ----- interaction -----
    function ptrDown(e) {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const sx = W / rect.width, sy = H / rect.height;
      const cx = (e.clientX ?? e.touches[0].clientX) - rect.left;
      const cy = (e.clientY ?? e.touches[0].clientY) - rect.top;
      const px = cx * sx, py = cy * sy;
      
      // toggle mode if tapping title area
      if (py < 140 && px > W/2-80 && px < W/2+80) {
        mode = mode === 'add' ? 'sub' : 'add';
      }
      
      const hit = hitTest(px, py);
      if (hit) {
        dragging = hit;
        const tip = hit === 'u' ? toScreen(u) : toScreen(v);
        dragOffsetX = tip.x - px;
        dragOffsetY = tip.y - py;
      }
      
      pointerDown = true;
      
      if (holdTimer) clearTimeout(holdTimer);
      holding = true;
      holdTimer = setTimeout(() => {
        if (pointerDown && !dragging) {
          u = { x: 3, y: 4 };
          v = { x: 5, y: 1 };
          mode = 'add';
        }
        holding = false;
        holdTimer = null;
      }, HOLD_MS);
    }

    function ptrMove(e) {
      e.preventDefault();
      if (!dragging) return;
      
      const rect = canvas.getBoundingClientRect();
      const sx = W / rect.width, sy = H / rect.height;
      const cx = (e.clientX ?? e.touches[0].clientX) - rect.left;
      const cy = (e.clientY ?? e.touches[0].clientY) - rect.top;
      const px = cx * sx, py = cy * sy;
      
      updateFromDrag(px + dragOffsetX, py + dragOffsetY);
      
      if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; holding = false; }
    }

    function ptrUp(e) {
      e.preventDefault();
      if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
      dragging = null;
      pointerDown = false;
      holding = false;
    }

    // roundRect
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
      if (w < 2*r) r = w/2;
      if (h < 2*r) r = h/2;
      this.moveTo(x+r, y);
      this.lineTo(x+w-r, y);
      this.quadraticCurveTo(x+w, y, x+w, y+r);
      this.lineTo(x+w, y+h-r);
      this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
      this.lineTo(x+r, y+h);
      this.quadraticCurveTo(x, y+h, x, y+h-r);
      this.lineTo(x, y+r);
      this.quadraticCurveTo(x, y, x+r, y);
      return this;
    };

    function bind() {
      canvas.addEventListener('touchstart', ptrDown, {passive: false});
      canvas.addEventListener('touchmove', ptrMove, {passive: false});
      canvas.addEventListener('touchend', ptrUp);
      canvas.addEventListener('touchcancel', ptrUp);
      canvas.addEventListener('mousedown', ptrDown);
      window.addEventListener('mousemove', ptrMove);
      window.addEventListener('mouseup', ptrUp);
      canvas.addEventListener('contextmenu', e => e.preventDefault());
    }

    function animate() {
      draw();
      requestAnimationFrame(animate);
    }

    resize();
    bind();
    animate();
    window.addEventListener('resize', resize);
  })();
</script>aa
</body>
</html>
